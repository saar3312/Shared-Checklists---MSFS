:"OTHER EXTERIOR LIGHTS","action":"AS REQUIRED","id":"s21_g0_i535"},{"actor":"_NOTE_","item":"Ensure that the chocks are in place.","action":""},{"actor":"PILOT","item":"FUEL PUMPS/CTR XFR VALVES","action":"OFF","id":"s21_g0_i536"},{"actor":"PILOT","item":"ATC","action":"STBY","id":"s21_g0_i537"},{"actor":"PILOT","item":"IRS PERFORMANCE","action":"VERIFY","id":"s21_g0_i538"},{"actor":"_NOTE_","item":"Verify the NAV accuracy in the MCDU POSITION MONITOR page.","action":""},{"actor":"PILOT","item":"FUEL QUANTITY","action":"VERIFY","id":"s21_g0_i539"},{"actor":"_NOTE_","item":"Ensure that the sum of fuel on board and the used fuel quantity is consistent with the fuel on board at departure.","action":""},{"actor":"PILOT","item":"STS pushbutton","action":"PRESS","id":"s21_g0_i540"},{"actor":"_NOTE_","item":"Verify the STATUS page.","action":""},{"actor":"PILOT","item":"BRAKE FAN","action":"OFF","id":"s21_g0_i541"},{"actor":"PILOT","item":"PARKING BRAKE","action":"AS REQUIRED","id":"s21_g0_i542"},{"actor":"_NOTE_","item":"It is recommended to release the parking brakes when the chocks are in place.","action":""},{"actor":"PILOT","item":"DISPLAY UNIT BRIGHTNESS","action":"DIM","id":"s21_g0_i543"},{"actor":"PILOT","item":"PARKING CHECKLIST","action":"COMPLETE","id":"s21_g0_i544"}]}]},{"title":"Securing the Aircraft","groups":[{"heading":"Securing the Aircraft","level":1,"items":[],"subgroups":[{"heading":"Parking Brake","level":2,"items":[{"actor":"PILOT","item":"PARKING BRAKE handle","action":"ON","id":"s22_g0_sg0_i545"},{"actor":"_NOTE_","item":"It is recommended to keep the parking brake to ON to reduce the hydraulic leak.","action":""}]},{"heading":"Oxygen Crew Supply","level":2,"items":[{"actor":"PILOT","item":"OXYGEN CREW SUPPLY pushbutton","action":"OFF","id":"s22_g0_sg1_i546"}]},{"heading":"ADIRS","level":2,"items":[{"actor":"PILOT","item":"ALL IR MODE selectors","action":"OFF","id":"s22_g0_sg2_i547"}]},{"heading":"Exterior Lights","level":2,"items":[{"actor":"PILOT","item":"EXTERIOR LIGHTS","action":"OFF","id":"s22_g0_sg3_i548"}]},{"heading":"Maintenance Bus","level":2,"items":[{"actor":"PILOT","item":"MAINT BUS switch","action":"AS REQUIRED","id":"s22_g0_sg4_i549"}]},{"heading":"APU","level":2,"items":[{"actor":"PILOT","item":"APU BLEED pushbutton","action":"OFF","id":"s22_g0_sg5_i550"},{"actor":"PILOT","item":"APU MASTER switch","action":"OFF","id":"s22_g0_sg5_i551"},{"actor":"_NOTE_","item":"Switch the APU to off only when all the passengers have disembarked.","action":""},{"actor":"PILOT","item":"EMER EXIT LT switch","action":"OFF","id":"s22_g0_sg5_i552"},{"actor":"PILOT","item":"SIGNS switch","action":"OFF","id":"s22_g0_sg5_i553"}]},{"heading":"External Power","level":2,"items":[{"actor":"PILOT","item":"EXT PWR pushbutton","action":"AS REQUIRED","id":"s22_g0_sg6_i554"}]},{"heading":"Batteries","level":2,"items":[{"actor":"PILOT","item":"BAT 1 & 2 pushbuttons","action":"OFF","id":"s22_g0_sg7_i555"}]},{"heading":"Securing the Aircraft Checklist","level":2,"items":[{"actor":"PILOT","item":"SECURING THE AIRCRAFT CHECKLIST","action":"COMPLETE","id":"s22_g0_sg8_i556"}]}]}]}],"slug":"a320_1p","theme":"a320","pilots":1},"b777_2p":{"aircraft":"Boeing 777","mode":"2P","sections":[{"title":"Power Up & Pre-Flight FMC Setup","groups":[{"heading":"Initial Safety Sweep","level":1,"items":[{"actor":"_NOTE_","item":"Before applying any electrical power, walk the flight deck and verify nothing is in a state that could move the aircraft or actuate a control surface unexpectedly when power comes on.","action":""}],"subgroups":[{"heading":"Electrical Panel","level":2,"items":[{"actor":"PM","item":"BATTERY switch","action":"OFF","id":"b777_0001"},{"actor":"PM","item":"BUS TIE switches (L, R)","action":"AUTO","id":"b777_0002"},{"actor":"PM","item":"EXT PWR (Primary & Secondary)","action":"AVAILABLE \u2014 VERIFY","id":"b777_0003"}]},{"heading":"Hydraulic Panel","level":2,"items":[{"actor":"PM","item":"DEMAND PUMPS (L, C1, C2, R)","action":"OFF","id":"b777_0004"},{"actor":"PM","item":"ELECTRIC PRIMARY PUMPS (C1, C2)","action":"OFF","id":"b777_0005"},{"actor":"_NOTE_","item":"The two engine-driven primary pump ON lights are illuminated permanently and are not a fault.","action":""}]},{"heading":"Forward Pedestal & Controls","level":2,"items":[{"actor":"PF","item":"FLAP lever","action":"VERIFY UP","id":"b777_0006"},{"actor":"PF","item":"LANDING GEAR lever","action":"DOWN","id":"b777_0007"},{"actor":"PF","item":"SPEED BRAKE lever","action":"DOWN / STOWED","id":"b777_0008"},{"actor":"PF","item":"THRUST LEVERS","action":"IDLE","id":"b777_0009"},{"actor":"PF","item":"FUEL CONTROL switches (L, R)","action":"CUTOFF","id":"b777_0010"},{"actor":"PF","item":"PARKING BRAKE","action":"SET","id":"b777_0011"}]}]},{"heading":"Apply Electrical Power","level":1,"items":[{"actor":"PM","item":"BATTERY switch","action":"ON","id":"b777_0012"},{"actor":"PM","item":"PRIMARY EXT PWR switch","action":"ON","id":"b777_0013"},{"actor":"PM","item":"SECONDARY EXT PWR switch","action":"ON","id":"b777_0014"},{"actor":"_BULLET_","item":"Confirm both PRI EXT PWR and SEC EXT PWR ON lights illuminate.","action":""},{"actor":"_BULLET_","item":"Avionics cooling fans should be heard spinning up.","action":""},{"actor":"_NOTE_","item":"If only one external power source is available, the airplane will operate, but obtaining both is the normal pre-flight configuration.","action":""}],"subgroups":[]},{"heading":"Initialise the IRS / ADIRU","level":1,"items":[{"actor":"PM","item":"ADIRU switch (top-left overhead)","action":"ON","id":"b777_0015"},{"actor":"_NOTE_","item":"Unlike the 737 the 777 does not require manual alignment latitude entry \u2014 the ADIRU figures it out automatically. Allow a few minutes for the displays and IRS to come fully online.","action":""}],"subgroups":[]},{"heading":"Cabin & IFE Power","level":1,"items":[{"actor":"_NOTE_","item":"In real-world operation these are normally left ON; in a Sim cold start they are typically OFF and must be selected manually.","action":""}],"subgroups":[{"heading":"Passenger Systems","level":2,"items":[{"actor":"PM","item":"IFE/PASS SEATS switch","action":"ON","id":"b777_0016"},{"actor":"PM","item":"CABIN/UTILITY switch","action":"ON","id":"b777_0017"}]}]},{"heading":"FMC \u2014 Position Initialisation","level":1,"items":[{"actor":"PF","item":"FMC","action":"SELECT \u2014 POS INIT page","id":"b777_0018"},{"actor":"PF","item":"GPS position","action":"DROP INTO INITIAL POSITION","id":"b777_0019"},{"actor":"PF","item":"Reference airport (e.g. EGLL)","action":"ENTER & VERIFY","id":"b777_0020"},{"actor":"_BULLET_","item":"Sanity-check: the reference airport coordinates should match the GPS position within a few miles.","action":""}],"subgroups":[]},{"heading":"FMC \u2014 Route Setup","level":1,"items":[{"actor":"PF","item":"EFB","action":"REQUEST ROUTE FROM SIMBRIEF","id":"b777_0021"},{"actor":"_NOTE_","item":"On real operations the route is uplinked via ACARS through the COMM page; the SimBrief request via EFB substitutes for this in the simulator.","action":""},{"actor":"PF","item":"ROUTE REQUEST page","action":"SELECT SIMBRIEF ROUTE","id":"b777_0022"},{"actor":"PF","item":"SET PAYLOAD","action":"AS REQUIRED","id":"b777_0023"},{"actor":"PF","item":"SET FUEL","action":"AS REQUIRED","id":"b777_0024"},{"actor":"PF","item":"LOAD ROUTE","action":"EXECUTE & ACTIVATE","id":"b777_0025"},{"actor":"_BULLET_","item":"Always activate the route after loading or the FMC will not use it for guidance.","action":""}],"subgroups":[]},{"heading":"FMC \u2014 Performance Init","level":1,"items":[{"actor":"PF","item":"ZERO FUEL WEIGHT","action":"VERIFY MATCH OFP","id":"b777_0026"},{"actor":"PF","item":"RESERVES (FINRES + ALT)","action":"VERIFY","id":"b777_0027"},{"actor":"PF","item":"COST INDEX","action":"VERIFY (typical 15\u201380 long-haul)","id":"b777_0028"},{"actor":"PF","item":"INITIAL CRUISE ALTITUDE","action":"ENTER","id":"b777_0029"},{"actor":"PF","item":"PERF INIT Uplink","action":"ACCEPT","id":"b777_0030"},{"actor":"_NOTE_","item":"Inspect the page carefully before accepting: small (auto-uploaded) numbers are computed by the box, large (bold) numbers are crew-entered values you should verify against the OFP.","action":""}],"subgroups":[]},{"heading":"FMC \u2014 Descent Forecast / Winds","level":1,"items":[{"actor":"PF","item":"LEGS page \u2192 ROUTE DATA","action":"REQUEST","id":"b777_0031"},{"actor":"PF","item":"WIND UPLINK","action":"LOAD","id":"b777_0032"},{"actor":"PF","item":"DESCENT FORECAST Uplink (FMC COMM)","action":"LOAD","id":"b777_0033"},{"actor":"_BULLET_","item":"Each waypoint gets a W in the wind column when wind data is loaded.","action":""},{"actor":"_NOTE_","item":"The 777 takes a vertical slice of forecast winds for every waypoint, whereas the 737 only knows one altitude at a time. This allows accurate fuel-burn prediction over the whole flight.","action":""}],"subgroups":[]},{"heading":"FMC \u2014 Departure & Arrival","level":1,"items":[{"actor":"PF","item":"DEPARTURE \u2014 Runway","action":"SELECT FIRST","id":"b777_0034"},{"actor":"_BULLET_","item":"Selecting the runway before the SID limits the FMC to applicable transitions.","action":""},{"actor":"PF","item":"DEPARTURE \u2014 SID","action":"SELECT","id":"b777_0035"},{"actor":"PF","item":"DEPARTURE \u2014 Transition","action":"SELECT IF APPLICABLE","id":"b777_0036"},{"actor":"PF","item":"ARRIVAL \u2014 Runway","action":"SELECT","id":"b777_0037"},{"actor":"PF","item":"ARRIVAL \u2014 STAR / Transition","action":"SELECT","id":"b777_0038"},{"actor":"PF","item":"ARRIVAL \u2014 Approach","action":"SELECT","id":"b777_0039"},{"actor":"PF","item":"EXECUTE","action":"PRESS","id":"b777_0040"}],"subgroups":[]},{"heading":"Cross-Check Route Integrity","level":1,"items":[{"actor":"PF","item":"PROGRESS page \u2192 Distance to Go","action":"COMPARE TO OFP","id":"b777_0041"},{"actor":"_BULLET_","item":"Route distance should match the OFP within ~20 nm. A larger mismatch is a red flag \u2014 investigate before continuing.","action":""},{"actor":"PF","item":"LEGS page","action":"SCAN FOR DISCONTINUITIES","id":"b777_0042"},{"actor":"PM","item":"Altitude / speed constraints","action":"VERIFY EACH WAYPOINT","id":"b777_0043"},{"actor":"_NOTE_","item":"Discontinuities appear as a row of five solid boxes followed by the word DISCONTINUITY. Close them by dragging the next waypoint up onto the empty line.","action":""}],"subgroups":[]},{"heading":"Display Select Panel Familiarisation","level":1,"items":[{"actor":"_NOTE_","item":"The Display Select Panel sits just left of the EFIS control panel. The top row of three switches picks which MFD you are controlling (Left Inboard, Lower Center, Right Inboard); the bottom rows pick which synoptic to display.","action":""},{"actor":"_BULLET_","item":"Normal practice: always return the display select to LOWER CENTER after manipulating Captain or FO MFD pages, so the next press doesn't accidentally swap engine indication off the screen.","action":""}],"subgroups":[{"heading":"Lower Center MFD","level":2,"items":[{"actor":"CM","item":"LOWER CENTER","action":"SELECT","id":"b777_0044"},{"actor":"CM","item":"DOOR synoptic","action":"VERIFY ALL DOORS","id":"b777_0045"}]}]}]},{"title":"Overhead Panel Flow","groups":[{"heading":"Flow Discipline","level":1,"items":[{"actor":"_NOTE_","item":"Work the overhead panel top-left to bottom-right. The 777 is heavily automated \u2014 you will leave most switches in AUTO. If everything is normal you should see no amber lights and very little colour anywhere on the panel.","action":""}],"subgroups":[]},{"heading":"Top Strip","level":1,"items":[],"subgroups":[{"heading":"ADIRU","level":2,"items":[{"actor":"PM","item":"ADIRU switch","action":"ON","id":"b777_0046"}]},{"heading":"Cabin / IFE","level":2,"items":[{"actor":"PM","item":"IFE/PASS SEATS","action":"ON","id":"b777_0047"},{"actor":"PM","item":"CABIN/UTILITY","action":"ON","id":"b777_0048"}]}]},{"heading":"Electrical Panel","level":1,"items":[{"actor":"_NOTE_","item":"The 777 has six sources of electrical power: two main engine generators, two backup permanent-magnet generators, the APU generator, and the RAT. Single-generator electrical operation is fully supported including autoland.","action":""}],"subgroups":[{"heading":"Generator Controls","level":2,"items":[{"actor":"PM","item":"L GENERATOR CONTROL","action":"ON","id":"b777_0049"},{"actor":"PM","item":"R GENERATOR CONTROL","action":"ON","id":"b777_0050"},{"actor":"PM","item":"L BACKUP GENERATOR","action":"ON","id":"b777_0051"},{"actor":"PM","item":"R BACKUP GENERATOR","action":"ON","id":"b777_0052"},{"actor":"PM","item":"BUS TIE L / R","action":"AUTO","id":"b777_0053"}]}]},{"heading":"Emergency Lights","level":1,"items":[{"actor":"PM","item":"EMERGENCY LIGHTS switch","action":"ARMED \u2014 CLOSE GUARD","id":"b777_0054"}],"subgroups":[]},{"heading":"Window Heat","level":1,"items":[{"actor":"PM","item":"L SIDE WINDOW HEAT","action":"ON","id":"b777_0055"},{"actor":"PM","item":"L FORWARD WINDOW HEAT","action":"ON","id":"b777_0056"},{"actor":"PM","item":"R FORWARD WINDOW HEAT","action":"ON","id":"b777_0057"},{"actor":"PM","item":"R SIDE WINDOW HEAT","action":"ON","id":"b777_0058"}],"subgroups":[]},{"heading":"Hydraulic System","level":1,"items":[{"actor":"_NOTE_","item":"Top row of hydraulic switches are primary pumps; bottom row are demand pumps. Demand pumps run only when there is demand. The R DEMAND pump in AUTO supplies normal brake pressure on the ground.","action":""}],"subgroups":[{"heading":"Right System First (prevents fluid migration L\u2192R)","level":2,"items":[{"actor":"PM","item":"R DEMAND PUMP","action":"AUTO","id":"b777_0059"},{"actor":"CM","item":"Brake source pressure","action":"VERIFY ON BRAKE ACCUMULATOR GAUGE","id":"b777_0060"},{"actor":"_BULLET_","item":"Center I-cast should clear the BRAKE SOURCE light once the R demand pump pressurises the system.","action":""}]},{"heading":"Pressurise Remaining Systems","level":2,"items":[{"actor":"PM","item":"C2 ELECTRIC PRIMARY pump","action":"ON","id":"b777_0061"},{"actor":"PM","item":"C1 ELECTRIC PRIMARY pump","action":"ON","id":"b777_0062"},{"actor":"PM","item":"L DEMAND PUMP","action":"AUTO","id":"b777_0063"},{"actor":"PM","item":"C1 AIR DEMAND pump","action":"AUTO","id":"b777_0064"},{"actor":"PM","item":"C2 AIR DEMAND pump","action":"AUTO","id":"b777_0065"}]}]},{"heading":"Passenger Signs","level":1,"items":[{"actor":"PM","item":"FASTEN BELTS","action":"AUTO","id":"b777_0066"},{"actor":"PM","item":"NO SMOKING","action":"ON","id":"b777_0067"},{"actor":"PM","item":"CHIME inhibit","action":"AS REQUIRED","id":"b777_0068"}],"subgroups":[]},{"heading":"Master Brightness","level":1,"items":[{"actor":"_NOTE_","item":"The single Master Brightness knob in the overhead controls all instrument and integral panel lighting. Each individual panel knob should be lined up with the central reference dot so the master knob's adjustments stay consistent.","action":""},{"actor":"PM","item":"MASTER BRIGHTNESS","action":"AS REQUIRED","id":"b777_0069"},{"actor":"PM","item":"INDIVIDUAL PANEL FLOOD knobs","action":"VERIFY LINED UP WITH DOT","id":"b777_0070"},{"actor":"PM","item":"FLOOD LIGHTS (storm) \u2014 inner knob","action":"OFF","id":"b777_0071"}],"subgroups":[]},{"heading":"Fire Protection","level":1,"items":[{"actor":"_NOTE_","item":"The 777 has a single fire test button that exercises all ten warning indications at once. Press and hold, then verify each item below.","action":""}],"subgroups":[{"heading":"Fire Test \u2014 Ten Indications","level":2,"items":[{"actor":"PF","item":"Hold FIRE TEST button","action":"PRESS & HOLD","id":"b777_0072"},{"actor":"CM","item":"FIRE TEST IN PROGRESS \u2192 FIRE TEST PASS (EICAS)","action":"VERIFY","id":"b777_0073"},{"actor":"CM","item":"L & R MASTER WARNING lights","action":"ILLUMINATE","id":"b777_0074"},{"actor":"PF","item":"L & R FUEL CONTROL switch fire lights","action":"ILLUMINATE","id":"b777_0075"},{"actor":"CM","item":"L & R FIRE HANDLES","action":"ILLUMINATE","id":"b777_0076"},{"actor":"CM","item":"APU FIRE HANDLE","action":"ILLUMINATE","id":"b777_0077"},{"actor":"CM","item":"L & R CARGO FIRE indicators","action":"ILLUMINATE","id":"b777_0078"},{"actor":"CM","item":"FIRE BELL","action":"AUDIBLE","id":"b777_0079"},{"actor":"CM","item":"Release FIRE TEST button","action":"RELEASE","id":"b777_0080"}]}]},{"heading":"Engine Start Selectors","level":1,"items":[{"actor":"CM","item":"L & R ENGINE START SELECTORS","action":"VERIFY NORMAL","id":"b777_0081"}],"subgroups":[]},{"heading":"Fuel Panel","level":1,"items":[{"actor":"_NOTE_","item":"The 777 has two crossfeed valves rather than one \u2014 added redundancy in case a single valve fails closed during an engine failure or leak. Center tank pumps are more powerful than wing pumps so they feed first; turn them off below ~10,500 lb (4,800 kg) center quantity to avoid pump cavitation.","action":""}],"subgroups":[{"heading":"Pump Sequencing on Ground","level":2,"items":[{"actor":"PM","item":"L FWD pump","action":"ON","id":"b777_0082"},{"actor":"PM","item":"L AFT pump","action":"ON","id":"b777_0083"},{"actor":"PM","item":"R FWD pump","action":"ON","id":"b777_0084"},{"actor":"PM","item":"R AFT pump","action":"ON","id":"b777_0085"},{"actor":"PM","item":"L CENTER pump","action":"ON","id":"b777_0086"},{"actor":"PM","item":"R CENTER pump","action":"ON","id":"b777_0087"}]},{"heading":"Crossfeed Valves","level":2,"items":[{"actor":"PM","item":"CROSSFEED FORWARD valve","action":"AUTO","id":"b777_0088"},{"actor":"PM","item":"CROSSFEED AFT valve","action":"AUTO","id":"b777_0089"}]},{"heading":"Fuel Jettison","level":2,"items":[{"actor":"_NOTE_","item":"Fuel jettison computes maximum landing weight automatically and arms the dump to that quantity. Pulling out the JETTISON NOZZLE knob arms; the two red guarded JETTISON switches actually start the dump. Always run the appropriate non-normal checklist before dumping fuel and avoid jettisoning over populated areas.","action":""}]}]},{"heading":"Anti-Ice","level":1,"items":[{"actor":"PM","item":"ENGINE ANTI-ICE (L, R)","action":"AUTO","id":"b777_0090"},{"actor":"PM","item":"WING ANTI-ICE","action":"AUTO","id":"b777_0091"},{"actor":"PM","item":"WINDOW HEAT","action":"ALL ON","id":"b777_0092"},{"actor":"PM","item":"COWL ANTI-ICE NACELLE valves","action":"AUTO","id":"b777_0093"}],"subgroups":[]},{"heading":"External Lighting Panel","level":1,"items":[],"subgroups":[{"heading":"Initial Test","level":2,"items":[{"actor":"PM","item":"INDICATOR LIGHTS switch","action":"TEST","id":"b777_0094"},{"actor":"_BULLET_","item":"All annunciators illuminate and indicator dimming is exercised; release to BRIGHT for daylight ops.","action":""}]},{"heading":"Predeparture Light State","level":2,"items":[{"actor":"PM","item":"BEACON","action":"OFF (until just before engine start)","id":"b777_0095"},{"actor":"PM","item":"NAV lights","action":"ON","id":"b777_0096"},{"actor":"PM","item":"LOGO light","action":"AS REQUIRED","id":"b777_0097"},{"actor":"PM","item":"STROBE","action":"OFF","id":"b777_0098"},{"actor":"PM","item":"WING / RUNWAY TURNOFF / TAXI / LANDING","action":"OFF","id":"b777_0099"}]}]},{"heading":"Air Conditioning Panel","level":1,"items":[{"actor":"_NOTE_","item":"If preconditioned air is connected at the gate, packs and recirculation fans should be OFF \u2014 supplying pre-cond air with packs running can damage the ducts. Once you start the APU and disconnect ground air, leave the whole panel in AUTO.","action":""},{"actor":"PM","item":"LEFT PACK","action":"AUTO","id":"b777_0100"},{"actor":"PM","item":"RIGHT PACK","action":"AUTO","id":"b777_0101"},{"actor":"PM","item":"L & R RECIRC FANS","action":"AUTO","id":"b777_0102"},{"actor":"PM","item":"TRIM AIR","action":"AUTO","id":"b777_0103"},{"actor":"PM","item":"EQUIPMENT COOLING","action":"AUTO","id":"b777_0104"}],"subgroups":[]},{"heading":"Pressurization","level":1,"items":[{"actor":"_NOTE_","item":"Fully automatic. The system already knows the destination airport's elevation from the FMC and will plan the pressurisation schedule accordingly.","action":""},{"actor":"PM","item":"LANDING ALTITUDE","action":"AUTO","id":"b777_0105"},{"actor":"PM","item":"OUTFLOW VALVES","action":"AUTO","id":"b777_0106"}],"subgroups":[]}]},{"title":"MCP & Pedestal Flow","groups":[{"heading":"EFIS Control Panel (each side)","level":1,"items":[],"subgroups":[{"heading":"Barometric Settings","level":2,"items":[{"actor":"PF","item":"BARO reference","action":"STD ABOVE TRANSITION / QNH BELOW","id":"b777_0107"},{"actor":"PF","item":"BARO units (IN / hPa)","action":"AS REQUIRED FOR REGION","id":"b777_0108"},{"actor":"PF","item":"STBY altimeter","action":"SET TO MATCH","id":"b777_0109"}]},{"heading":"Display Configuration","level":2,"items":[{"actor":"PF","item":"Range","action":"10 NM (taxi / departure)","id":"b777_0110"},{"actor":"PF","item":"APT / TFC / TERR / WXR","action":"ON / ON / ON / AS REQUIRED","id":"b777_0111"},{"actor":"PF","item":"WPT / VOR / NDB / ARPT","action":"AS REQUIRED","id":"b777_0112"}]}]},{"heading":"Mode Control Panel","level":1,"items":[{"actor":"_NOTE_","item":"V2 must replace the 200 placeholder before taxi out \u2014 leaving it at 200 is the standard 'something not yet set' cue. The HDG / ALT centre buttons act as heading-select and altitude-intervene respectively (no separate intervene switch like the 737).","action":""}],"subgroups":[{"heading":"Flight Directors","level":2,"items":[{"actor":"PF","item":"L FLIGHT DIRECTOR switch","action":"ON","id":"b777_0113"},{"actor":"PF","item":"R FLIGHT DIRECTOR switch","action":"ON","id":"b777_0114"}]},{"heading":"Initial Speed / Heading / Altitude","level":2,"items":[{"actor":"PF","item":"IAS / MACH window","action":"200 (placeholder \u2014 replaced by V2)","id":"b777_0115"},{"actor":"PF","item":"HEADING window","action":"RUNWAY HEADING","id":"b777_0116"},{"actor":"PF","item":"ALTITUDE window","action":"INITIAL CLEARED ALTITUDE","id":"b777_0117"},{"actor":"PF","item":"ALTITUDE INCREMENT selector","action":"100 ft / 1000 ft (as required)","id":"b777_0118"}]},{"heading":"Arming","level":2,"items":[{"actor":"PF","item":"LNAV","action":"ARM","id":"b777_0119"},{"actor":"PF","item":"VNAV","action":"ARM","id":"b777_0120"}]}]},{"heading":"Center Pedestal Flow","level":1,"items":[],"subgroups":[{"heading":"Auto Brake","level":2,"items":[{"actor":"PF","item":"AUTO BRAKE selector","action":"RTO","id":"b777_0121"}]},{"heading":"Throttle Quadrant","level":2,"items":[{"actor":"PF","item":"THRUST LEVERS","action":"IDLE","id":"b777_0122"},{"actor":"PF","item":"REVERSE THRUST LEVERS","action":"STOWED","id":"b777_0123"},{"actor":"PF","item":"SPEED BRAKE lever","action":"DOWN / DETENT","id":"b777_0124"},{"actor":"PF","item":"FLAP lever","action":"UP \u2014 VERIFY","id":"b777_0125"},{"actor":"PF","item":"FUEL CONTROL switches (L, R)","action":"CUTOFF","id":"b777_0126"}]},{"heading":"Stabiliser Trim","level":2,"items":[{"actor":"PF","item":"STAB TRIM gauge","action":"VERIFY GREEN BAND","id":"b777_0127"},{"actor":"PF","item":"ALTERNATE STAB TRIM cutout switches","action":"NORM (guarded)","id":"b777_0128"}]},{"heading":"Rudder & Aileron Trim","level":2,"items":[{"actor":"PF","item":"RUDDER TRIM","action":"ZERO","id":"b777_0129"},{"actor":"PF","item":"AILERON TRIM (control wheel)","action":"ZERO","id":"b777_0130"},{"actor":"PF","item":"MANUAL TRIM CANCEL","action":"PRESS TO RECENTER","id":"b777_0131"}]},{"heading":"Transponder & TCAS","level":2,"items":[{"actor":"PM","item":"TRANSPONDER code","action":"AS ASSIGNED","id":"b777_0132"},{"actor":"PM","item":"TRANSPONDER mode","action":"STBY (until line up)","id":"b777_0133"},{"actor":"PM","item":"TCAS mode","action":"TA / RA \u2014 VERIFY","id":"b777_0134"}]},{"heading":"Radios","level":2,"items":[{"actor":"PM","item":"VHF L / R / C","action":"TUNE AS REQUIRED","id":"b777_0135"},{"actor":"_NOTE_","item":"Watch for the tuning lights on the radio panels \u2014 an illuminated tuning light means another panel (often the jump-seat occupant) is currently tuning that radio.","action":""}]},{"heading":"Weather Radar","level":2,"items":[{"actor":"PF","item":"WXR control panel","action":"AS REQUIRED","id":"b777_0136"},{"actor":"_NOTE_","item":"Unlike the 737 there is no mandatory pre-flight weather radar self-test on most 777 operators' SOPs.","action":""}]},{"heading":"Clock / Chronograph","level":2,"items":[{"actor":"PF","item":"L CLOCK","action":"RUN (300-series starts elapsed time automatically at takeoff)","id":"b777_0137"},{"actor":"PF","item":"CHRONOGRAPH","action":"RESET","id":"b777_0138"}]}]}]},{"title":"Preflight Checklist","groups":[{"heading":"Preflight Items","level":1,"items":[{"actor":"CM","item":"Oxygen \u2014 Mask & Microphone","action":"TESTED 100%","id":"b777_0139"},{"actor":"CM","item":"Battery","action":"ON","id":"b777_0140"},{"actor":"CM","item":"Hydraulic Panel","action":"SET","id":"b777_0141"},{"actor":"PM","item":"Window Heat","action":"ON (all 4)","id":"b777_0142"},{"actor":"PM","item":"Pressurization","action":"AUTO \u2014 LANDING ALT SET","id":"b777_0143"},{"actor":"CM","item":"Fuel Pumps","action":"ON (per quantity policy)","id":"b777_0144"},{"actor":"PM","item":"Anti-Collision / NAV Lights","action":"AS REQUIRED","id":"b777_0145"},{"actor":"CM","item":"Flaps","action":"UP \u2014 agreed with handle position","id":"b777_0146"},{"actor":"CM","item":"Speed Brake","action":"DOWN / DETENT","id":"b777_0147"},{"actor":"PF","item":"Stab Trim","action":"GREEN BAND \u2014 UNITS SET ON BRIEFING","id":"b777_0148"},{"actor":"PF","item":"Parking Brake","action":"SET (verify PARKING BRAKE SET on EICAS)","id":"b777_0149"},{"actor":"_BULLET_","item":"Both pilots point at the EICAS PARKING BRAKE SET message \u2014 handle position alone is not proof of pressure in the system.","action":""},{"actor":"PF","item":"Flight Instruments","action":"HEADING / ALTIMETER CROSS-CHECKED","id":"b777_0150"},{"actor":"CM","item":"Doors","action":"ALL CLOSED \u2014 DOOR synoptic","id":"b777_0151"}],"subgroups":[]},{"heading":"Briefings","level":1,"items":[{"actor":"PF","item":"Departure Briefing","action":"COMPLETE","id":"b777_0152"},{"actor":"_BULLET_","item":"Cover: route, SID, initial altitude, speed restrictions, terrain, runway analysis, NORMAL / EOSID, emergency return, MEL/CDL items.","action":""},{"actor":"PF","item":"Taxi Briefing","action":"COMPLETE","id":"b777_0153"},{"actor":"_BULLET_","item":"Cover: expected taxi route, hotspots, hold-short bars, runway crossings.","action":""},{"actor":"PF","item":"Takeoff Briefing","action":"COMPLETE","id":"b777_0154"},{"actor":"_BULLET_","item":"Cover: V-speeds, flap setting, thrust rating / assumed temp, abort criteria, low-altitude actions, weather.","action":""}],"subgroups":[]}]},{"title":"Takeoff Data & Pre-Start","groups":[{"heading":"ATIS & Clearance","level":1,"items":[{"actor":"PM","item":"ATIS","action":"OBTAIN \u2014 CHECK INFORMATION CODE","id":"b777_0155"},{"actor":"PM","item":"CLEARANCE DELIVERY","action":"OBTAIN ATC CLEARANCE & READ BACK","id":"b777_0156"},{"actor":"PM","item":"CABIN MANAGER","action":"ADVISED OF EXPECTED PUSHBACK","id":"b777_0157"}],"subgroups":[]},{"heading":"Performance Tool","level":1,"items":[],"subgroups":[{"heading":"Runway & Conditions","level":2,"items":[{"actor":"PF","item":"RUNWAY","action":"SELECT","id":"b777_0158"},{"actor":"PF","item":"RUNWAY CONDITION","action":"DRY / WET / CONTAMINATED","id":"b777_0159"},{"actor":"PF","item":"WIND / OAT / QNH","action":"ENTER OR IMPORT","id":"b777_0160"}]},{"heading":"Aircraft Config","level":2,"items":[{"actor":"PF","item":"ZFW / TOW / FUEL","action":"IMPORT FROM AIRCRAFT","id":"b777_0161"},{"actor":"PF","item":"FLAP CONFIG","action":"OPTIMUM (5 / 15 / 20)","id":"b777_0162"},{"actor":"PF","item":"THRUST RATING","action":"OPTIMUM (TO / TO1 / TO2)","id":"b777_0163"},{"actor":"PM","item":"ANTI-ICE CONFIG","action":"AUTO / WING / ENG / OFF","id":"b777_0164"},{"actor":"PF","item":"AIR-CON CONFIG","action":"AUTO (PACKS OFF / APU PACKS as required)","id":"b777_0165"}]},{"heading":"Calculate & Cross-Check","level":2,"items":[{"actor":"PF","item":"CALCULATE","action":"PRESS","id":"b777_0166"},{"actor":"PF","item":"RESULTS","action":"VERIFY V1 / VR / V2 / FLAPS / ASSUMED TEMP","id":"b777_0167"},{"actor":"_BULLET_","item":"Always run the first calculation in OPTIMUM. If runway/wind dictate, increase to flap 15 or 20. Never assume short-field flap based on weather alone.","action":""}]}]},{"heading":"Insert Takeoff Data into FMC","level":1,"items":[{"actor":"PF","item":"INIT REF \u2192 TAKEOFF page","action":"OPEN","id":"b777_0168"},{"actor":"PF","item":"FLAPS","action":"ENTER (5 / 15 / 20)","id":"b777_0169"},{"actor":"PF","item":"ASSUMED TEMP (SEL TEMP)","action":"ENTER","id":"b777_0170"},{"actor":"PF","item":"THRUST LIMIT (TO1 / TO2)","action":"SELECT IF APPLICABLE","id":"b777_0171"},{"actor":"PF","item":"V1 / VR / V2","action":"VERIFY (auto-populate after SEL TEMP & flap)","id":"b777_0172"},{"actor":"PF","item":"ACCEL HEIGHT","action":"ENTER (typically 1000 ft AGL or per airport)","id":"b777_0173"},{"actor":"PF","item":"THRUST REDUCTION HEIGHT","action":"ENTER","id":"b777_0174"},{"actor":"PF","item":"ENG OUT ACCEL HEIGHT","action":"ENTER","id":"b777_0175"},{"actor":"_NOTE_","item":"Acceleration and thrust-reduction values are sometimes negotiated between operator and airport \u2014 defer to BlackBox or your operator's data if available.","action":""},{"actor":"PF","item":"EXECUTE","action":"PRESS","id":"b777_0176"}],"subgroups":[]},{"heading":"Stabiliser Trim","level":1,"items":[{"actor":"PF","item":"STAB TRIM UNITS","action":"SET FROM PERF (e.g. 5.25)","id":"b777_0177"},{"actor":"CM","item":"FLT CTRL synoptic","action":"VERIFY STAB MATCHES SET","id":"b777_0178"}],"subgroups":[]},{"heading":"Set V2 in MCP","level":1,"items":[{"actor":"PF","item":"MCP IAS window","action":"SET V2 (e.g. 176)","id":"b777_0179"},{"actor":"_BULLET_","item":"Until V2 is in the window, the 200 kt placeholder is your visual cue that takeoff data is not yet complete.","action":""}],"subgroups":[]},{"heading":"APU Start","level":1,"items":[{"actor":"PM","item":"APU selector","action":"ON \u2014 count one potato \u2014 START","id":"b777_0180"},{"actor":"_BULLET_","item":"Watch L FWD fuel pump indicator: it auto-energises to feed the APU even if you have not commanded that pump on.","action":""},{"actor":"CM","item":"APU RUNNING on EICAS","action":"VERIFY","id":"b777_0181"}],"subgroups":[]}]},{"title":"Before Start Checklist","groups":[{"heading":"ATC","level":1,"items":[{"actor":"PM","item":"DEPARTURE / IFR CLEARANCE","action":"OBTAIN & READ BACK","id":"_dep_clr"}],"subgroups":[]},{"heading":"Pre-Pushback Confirmation","level":1,"items":[{"actor":"PM","item":"CABIN CREW","action":"ADVISED FOR DEPARTURE","id":"b777_0182"},{"actor":"PM","item":"BOARDING COMPLETE","action":"VERIFIED","id":"b777_0183"},{"actor":"PM","item":"FINAL WEIGHTS / LOAD SHEET","action":"RECEIVED","id":"b777_0184"},{"actor":"PF","item":"PERF UPLINK","action":"ACCEPT (after final weights)","id":"b777_0185"},{"actor":"CM","item":"DOORS","action":"ALL CLOSED & ARMED \u2014 DOOR synoptic","id":"b777_0186"}],"subgroups":[]},{"heading":"Aircraft Configuration","level":1,"items":[{"actor":"PM","item":"BEACON","action":"ON","id":"b777_0187"},{"actor":"PM","item":"TRANSPONDER","action":"TA (test only \u2014 pushback)","id":"b777_0188"},{"actor":"PF","item":"FUEL PUMPS (all six)","action":"ON","id":"b777_0189"},{"actor":"PF","item":"HYDRAULIC PANEL","action":"ALL PUMPS ON / AUTO","id":"b777_0190"},{"actor":"PF","item":"FLIGHT INSTRUMENTS","action":"CROSS-CHECKED","id":"b777_0191"},{"actor":"PF","item":"MCP","action":"V2 / HDG / ALT SET","id":"b777_0192"},{"actor":"PF","item":"Stab Trim","action":"SET FOR TAKEOFF","id":"b777_0193"},{"actor":"CM","item":"EICAS \u2014 RECALL","action":"PRESS \u2014 VERIFY NO RED OR AMBER","id":"b777_0194"},{"actor":"_BULLET_","item":"Squash the two EICAS messages (ENGINE SHUTDOWN and TCAS OFF) by pressing RECALL once. After engines start, the only remaining message should be APU RUNNING.","action":""}],"subgroups":[]},{"heading":"Pushback Coordination","level":1,"items":[{"actor":"PM","item":"Ground crew on intercom","action":"ESTABLISHED","id":"b777_0195"},{"actor":"PM","item":"Brake release on ground crew signal","action":"RELEASE PARKING BRAKE","id":"b777_0196"},{"actor":"_BULLET_","item":"Confirm direction and final orientation with the tug operator before releasing brakes.","action":""}],"subgroups":[]}]},{"title":"Engine Start & Taxi","groups":[{"heading":"Engine Start Sequence","level":1,"items":[{"actor":"_NOTE_","item":"Start L first, then R. The GE90 is the largest and most powerful jet engine in regular commercial service (115,000 lb thrust each). Only one engine at a time during pushback \u2014 running both could overpower the tug.","action":""}],"subgroups":[{"heading":"Engine 1 (Left)","level":2,"items":[{"actor":"PF","item":"L ENGINE START selector","action":"START","id":"b777_0197"},{"actor":"PF","item":"L FUEL CONTROL switch","action":"RUN (immediately after starter engaged)","id":"b777_0198"},{"actor":"PF","item":"L OIL PRESSURE rise","action":"VERIFY","id":"b777_0199"},{"actor":"PF","item":"L EGT light-off (red notch disappears)","action":"VERIFY","id":"b777_0200"},{"actor":"PF","item":"L N2 / N1 / FF / EGT stabilising","action":"VERIFY","id":"b777_0201"},{"actor":"_BULLET_","item":"Automation will abort the start automatically if any parameter goes out of limits \u2014 you only have to monitor oil pressure.","action":""}]},{"heading":"Engine 2 (Right)","level":2,"items":[{"actor":"PF","item":"R ENGINE START selector","action":"START","id":"b777_0202"},{"actor":"PF","item":"R FUEL CONTROL switch","action":"RUN","id":"b777_0203"},{"actor":"PF","item":"R OIL PRESSURE rise","action":"VERIFY","id":"b777_0204"},{"actor":"PF","item":"R EGT light-off (red notch disappears)","action":"VERIFY","id":"b777_0205"},{"actor":"PF","item":"R N2 / N1 / FF / EGT stabilising","action":"VERIFY","id":"b777_0206"}]}]},{"heading":"After Start Items","level":1,"items":[{"actor":"CM","item":"APU","action":"OFF (selector to OFF)","id":"b777_0207"},{"actor":"PM","item":"ENGINE ANTI-ICE","action":"AS REQUIRED","id":"b777_0208"},{"actor":"CM","item":"FLAPS","action":"5 (or per performance)","id":"b777_0209"},{"actor":"_BULLET_","item":"There is no flap 2 detent \u2014 valid takeoff settings are 5, 15, and 20.","action":""},{"actor":"CM","item":"EICAS \u2014 RECALL","action":"PRESS \u2014 only APU RUNNING should clear; nothing new should appear","id":"b777_0210"},{"actor":"CM","item":"HYDRAULIC pressures (L, C, R)","action":"VERIFY ALL NORMAL","id":"b777_0211"},{"actor":"CM","item":"ELECTRICAL","action":"L & R GEN ONLINE, EXT PWR / APU GEN OFF","id":"b777_0212"}],"subgroups":[]},{"heading":"Flight Controls Check","level":1,"items":[{"actor":"_NOTE_","item":"Even though the FBW system enforces protections, a full deflection check confirms all surfaces respond. In the real airplane do this slowly (lots of hydraulic pressure and big panels). On the F/CTRL synoptic the white boxes are spoiler-up indications, with elevator and rudder shown below.","action":""},{"actor":"CM","item":"AILERON \u2014 full L, full R","action":"CHECK ON F/CTRL SYNOPTIC","id":"b777_0213"},{"actor":"PF","item":"ELEVATOR \u2014 full nose-up, full nose-down","action":"CHECK","id":"b777_0214"},{"actor":"PF","item":"RUDDER \u2014 full L, full R","action":"CHECK","id":"b777_0215"},{"actor":"PF","item":"Display Select","action":"RETURN TO LOWER CENTER / ENG","id":"b777_0216"}],"subgroups":[]},{"heading":"Ground Crew Disconnect","level":1,"items":[{"actor":"PM","item":"Ground crew salute / pin in hand","action":"ACKNOWLEDGE","id":"b777_0217"},{"actor":"PM","item":"Push-to-talk","action":"RELEASE","id":"b777_0218"}],"subgroups":[]},{"heading":"Taxi Technique","level":1,"items":[{"actor":"_NOTE_","item":"Max 35% N1 breakaway thrust in congested ramp areas. Once rolling, idle is usually enough \u2014 these engines push the airplane forward easily, even at light weight. Taxi steady-state speed around 20 kt on straights; slower in turns.","action":""},{"actor":"PM","item":"TAXI clearance","action":"OBTAIN & READ BACK","id":"b777_0219"},{"actor":"PF","item":"PARKING BRAKE","action":"RELEASE","id":"b777_0220"},{"actor":"PF","item":"Initial thrust","action":"\u226435% N1 to begin roll","id":"b777_0221"},{"actor":"_BULLET_","item":"Use the airplane's mass \u2014 once moving you rarely need more than idle. The 777-300ER weighs up to 775,000 lb / 351 t at MTOW.","action":""}],"subgroups":[{"heading":"Turn Technique","level":2,"items":[{"actor":"PF","item":"Look down the runway / taxiway centerline","action":"AHEAD","id":"b777_0222"},{"actor":"PF","item":"Begin turn when the centerline reaches your shoulder","action":"ROLL TILLER IN","id":"b777_0223"},{"actor":"_NOTE_","item":"Main gear is approximately 100 ft aft of the cockpit \u2014 your wheels are always well inside your visual line. Take wide turns.","action":""},{"actor":"_NOTE_","item":"The rear truck of the main gear actively steers OPPOSITE the nose wheel once nose-wheel angle exceeds 10\u00b0, to prevent tyre scrub. Big airplane, big radius.","action":""}]}]}]},{"title":"Before Taxi Checklist","groups":[{"heading":"Standard Items","level":1,"items":[{"actor":"PM","item":"Anti-Ice","action":"AS REQUIRED","id":"b777_0224"},{"actor":"CM","item":"Recall","action":"COMPLETED","id":"b777_0225"},{"actor":"PF","item":"Auto Brake","action":"RTO","id":"b777_0226"},{"actor":"CM","item":"Flight Controls","action":"CHECKED","id":"b777_0227"},{"actor":"CM","item":"Ground Equipment","action":"CLEAR \u2014 VISUAL","id":"b777_0228"},{"actor":"CM","item":"Flaps","action":"TAKEOFF SETTING SET","id":"b777_0229"},{"actor":"PM","item":"Cabin Ready","action":"RECEIVED VIA DING","id":"b777_0230"}],"subgroups":[]}]},{"title":"Before Takeoff Checklist","groups":[{"heading":"Exterior Lights","level":1,"items":[{"actor":"CM","item":"LANDING LIGHTS","action":"ON","id":"b777_0231"},{"actor":"PM","item":"RUNWAY TURNOFF LIGHTS","action":"ON","id":"b777_0232"},{"actor":"PM","item":"STROBE","action":"ON","id":"b777_0233"},{"actor":"CM","item":"TAXI LIGHTS","action":"OFF (no longer needed at line-up)","id":"b777_0234"}],"subgroups":[]},{"heading":"Avionics","level":1,"items":[{"actor":"PM","item":"TRANSPONDER","action":"TA/RA","id":"b777_0235"},{"actor":"PM","item":"TCAS","action":"TA/RA","id":"b777_0236"},{"actor":"PM","item":"FLIGHT INSTRUMENTS","action":"RUNWAY HEADING / V2 / ALT","id":"b777_0237"}],"subgroups":[]},{"heading":"Line-Up","level":1,"items":[{"actor":"PM","item":"LINE-UP CLEARANCE","action":"OBTAIN","id":"b777_0238"},{"actor":"PF","item":"Center line","action":"ALIGNED","id":"b777_0239"},{"actor":"_NOTE_","item":"Once aligned, count one-potato-two-potato before applying takeoff thrust. This gives the locking hydraulic ram on the main-gear truck time to straighten the wheels \u2014 applying full power before it has straightened can produce a TAKEOFF CONFIG warning.","action":""}],"subgroups":[]}]},{"title":"Takeoff & Climb","groups":[{"heading":"Takeoff Roll","level":1,"items":[{"actor":"PM","item":"TAKEOFF CLEARANCE","action":"OBTAINED","id":"b777_0240"},{"actor":"PF","item":"Thrust levers \u2014 initial set","action":"\u224855% N1 (pointer at left edge of EGT arc)","id":"b777_0241"},{"actor":"PF","item":"Engines stabilised","action":"MOMENTARY PAUSE","id":"b777_0242"},{"actor":"PF","item":"TO/GA switch","action":"PRESS","id":"b777_0243"},{"actor":"PF","item":"N1 spool-up","action":"MONITOR \u2014 REF (green carat) CAPTURED","id":"b777_0244"},{"actor":"PM","item":"80 KNOTS callout","action":"PM CALLS","id":"b777_0245"},{"actor":"PM","item":"V1 callout","action":"PM CALLS \u2014 Captain transfers feet from brakes","id":"b777_0246"},{"actor":"PM","item":"ROTATE callout (VR)","action":"PM CALLS","id":"b777_0247"}],"subgroups":[]},{"heading":"Rotation & Initial Climb","level":1,"items":[{"actor":"PF","item":"Rotation rate","action":"1.5\u00b0\u20132\u00b0 per second to ~15\u00b0 pitch","id":"b777_0248"},{"actor":"_BULLET_","item":"Do not hesitate \u2014 the 777 wants to fly. A sluggish rotation eats runway.","action":""},{"actor":"PM","item":"POSITIVE RATE call","action":"PM","id":"b777_0249"},{"actor":"PF","item":"LANDING GEAR lever","action":"UP","id":"b777_0250"},{"actor":"PF","item":"LNAV captured","action":"VERIFY","id":"b777_0251"},{"actor":"PF","item":"Through THRUST REDUCTION altitude","action":"THR REF mode engages","id":"b777_0252"},{"actor":"PF","item":"Through ACCEL altitude","action":"VNAV SPD; nose lowers, speed builds","id":"b777_0253"}],"subgroups":[]},{"heading":"Flap Retraction Schedule","level":1,"items":[{"actor":"_NOTE_","item":"As you pass each green speed bug, the arrow points to the next flap setting. From 15 or 20 you always step to 5 first.","action":""},{"actor":"PF","item":"Slats / Flaps UP indication","action":"VERIFY","id":"b777_0259"}],"subgroups":[{"heading":"From Flaps 5 (typical)","level":2,"items":[{"actor":"PF","item":"Past F5 speed bug \u2192 Flaps 1","action":"RETRACT","id":"b777_0254"},{"actor":"PF","item":"Past F1 speed bug \u2192 Flaps UP","action":"RETRACT","id":"b777_0255"}]},{"heading":"From Flaps 15 / 20","level":2,"items":[{"actor":"PF","item":"Initial retraction to Flaps 5","action":"RETRACT","id":"b777_0256"},{"actor":"PF","item":"Then Flaps 1","action":"RETRACT","id":"b777_0257"},{"actor":"PF","item":"Then Flaps UP","action":"RETRACT","id":"b777_0258"}]}]},{"heading":"Initial Climb-Out Items","level":1,"items":[{"actor":"PF","item":"AUTOPILOT","action":"ENGAGE WHEN STABLE","id":"b777_0260"},{"actor":"PF","item":"AUTOTHROTTLE","action":"ARM (already armed on TO/GA)","id":"b777_0261"},{"actor":"PF","item":"MCP altitude","action":"SET TO CLEARED ALTITUDE","id":"b777_0262"},{"actor":"_NOTE_","item":"VNAV modes \u2014 review: SPD is essentially level-change with vertical protection. PATH means the box is on its planned profile. ALT means the FMC has no path and is holding because the MCP altitude is restricting it; you must intervene by pushing the ALT knob after setting a new value.","action":""}],"subgroups":[]}]},{"title":"After Takeoff Checklist","groups":[{"heading":"Sensed Items","level":1,"items":[{"actor":"CM","item":"Landing Gear","action":"UP & OFF","id":"b777_0263"},{"actor":"CM","item":"Flaps","action":"UP","id":"b777_0264"}],"subgroups":[]},{"heading":"Unsensed","level":1,"items":[{"actor":"PF","item":"Climb thrust","action":"VERIFY THR REF (Climb 1 / Climb 2 as set)","id":"b777_0265"},{"actor":"PF","item":"Speed schedule","action":"VERIFY 250 BELOW 10,000 OR PER WAIVER","id":"b777_0266"},{"actor":"_BULLET_","item":"777 holders of the high-speed waiver from ICAO may exceed 250 KIAS below 10,000 ft once clean. Confirm operator approval before doing so.","action":""}],"subgroups":[]}]},{"title":"10,000 ft & Cruise","groups":[{"heading":"Passing 10,000 ft","level":1,"items":[{"actor":"PM","item":"NO SMOKING sign \u2014 chime cycle","action":"OFF then ON (double chime)","id":"b777_0267"},{"actor":"PM","item":"LANDING LIGHTS","action":"OFF (or 18,000 ft per operator)","id":"b777_0268"},{"actor":"PM","item":"FASTEN BELTS","action":"AUTO","id":"b777_0269"},{"actor":"PM","item":"WING LIGHT","action":"OFF (daytime)","id":"b777_0270"},{"actor":"PM","item":"LOGO LIGHT","action":"OFF (daytime)","id":"b777_0271"}],"subgroups":[]},{"heading":"Cruise Setup","level":1,"items":[{"actor":"_NOTE_","item":"Configure the lower-center MFD to display the COMM page without losing engine indications, by reverting one display via the dial-by-the-yoke and selecting ENGINE on the alternate.","action":""}],"subgroups":[{"heading":"Lower Center \u2192 COMM","level":2,"items":[{"actor":"PM","item":"Display Reversionary selector","action":"ICAS","id":"b777_0272"},{"actor":"PM","item":"Display Select \u2192 Left Inboard \u2192 ENGINE","action":"SELECT","id":"b777_0273"},{"actor":"PM","item":"Display Reversionary selector","action":"BACK TO MFD","id":"b777_0274"},{"actor":"PM","item":"Display Select \u2192 Lower Center \u2192 COMM","action":"SELECT","id":"b777_0275"}]},{"heading":"Fuel Monitoring","level":2,"items":[{"actor":"PM","item":"Fuel remaining","action":"COMPARE TO OFP EVERY 30 MIN","id":"b777_0276"},{"actor":"PM","item":"Burn vs. plan","action":"DOCUMENT","id":"b777_0277"},{"actor":"PM","item":"Wind / TAS vs. plan","action":"CROSS-CHECK","id":"b777_0278"}]}]},{"heading":"Step Climbs","level":1,"items":[{"actor":"_NOTE_","item":"The 777-300ER is wing-limited \u2014 heavy long-hauls often start at FL280 and progressively step to FL380 or FL400 as fuel burns. The FMC's VNAV page shows OPT / MAX / RECOMMENDED altitudes; aim to be close to RECOMMENDED.","action":""}],"subgroups":[{"heading":"RVSM / Increment","level":2,"items":[{"actor":"PF","item":"VNAV CRZ page \u2192 STEP increment","action":"RVSM (2000 ft) or 1000 ft over NAT tracks","id":"b777_0279"}]},{"heading":"Manual Step","level":2,"items":[{"actor":"PM","item":"New cruise altitude","action":"DIAL INTO MCP","id":"b777_0280"},{"actor":"PM","item":"ALT knob","action":"PUSH \u2014 ALT INTERVENE","id":"b777_0281"},{"actor":"PF","item":"VNAV CRZ ALT (upper-left of CRZ page)","action":"VERIFY UPDATED","id":"b777_0282"},{"actor":"_NOTE_","item":"VNAV will follow you up at idle / climb thrust based on PERF. After capture it returns to VNAV PATH at the new altitude.","action":""}]},{"heading":"Auto Step","level":2,"items":[{"actor":"CM","item":"AUTO STEP CLIMBS toggle (Auto Cruise window)","action":"ON","id":"b777_0283"},{"actor":"_BULLET_","item":"The system steps automatically based on weight and forecast winds \u2014 no manual intervention required.","action":""}]}]},{"heading":"Long-Range Fuel Management","level":1,"items":[{"actor":"PM","item":"CENTER TANK low message","action":"EXPECT BELOW ~700 KG REMAINING",
