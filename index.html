table fire extinguisher, smoke goggles, oxygen masks, flashlights, and escape ropes.","action":""}]},{"heading":"Rain Repellent","level":1,"items":[{"actor":"PM","item":"RAIN RPLNT indicators","action":"VERIFY PRESSURE AND QUANTITY","id":"s0_g15_i62"},{"actor":"_NOTE_","item":"It is not recommended to use rain repellent to wash the windshield. It is also not recommended to use it on a dry windshield.","action":""}]},{"heading":"Circuit Breakers Panels","level":1,"items":[{"actor":"PM","item":"REAR AND OVERHEAD CIRCUIT BREAKER panels","action":"VERIFY","id":"s0_g16_i63"},{"actor":"_NOTE_","item":"Ensure that all the breakers are set. Flight crew may reset as necessary.","action":""}]},{"heading":"Landing Gear Pins and Covers","level":1,"items":[{"actor":"PM","item":"GEAR PINS AND COVERS","action":"VERIFY ONBOARD AND STOWED","id":"s0_g17_i64"}]}]},{"title":"Exterior Inspection","groups":[]},{"title":"Cockpit Preparation","groups":[{"heading":"Overhead Panel","level":1,"items":[],"subgroups":[{"heading":"White Lights on the Overhead Panel","level":2,"items":[{"actor":"_BULLET_","item":"In the passing flow the overhead panel:","action":""},{"actor":"PF","item":"ALL WHITE LIGHTS","action":"OFF","id":"s2_g0_sg0_i65"}]},{"heading":"Recorder","level":2,"items":[{"actor":"PF","item":"RCDR GND CTL pushbutton","action":"ON","id":"s2_g0_sg1_i66"},{"actor":"PF","item":"LOUDSPEAKER VOLUME knob","action":"BOTH SIDES \u2013 OFF","id":"s2_g0_sg1_i67"},{"actor":"PF","item":"ACP INT/RAD switch","action":"SET TO INT","id":"s2_g0_sg1_i68"},{"actor":"PF","item":"INTERPHONE VOLUME RECEPTION knob","action":"RELEASE","id":"s2_g0_sg1_i69"},{"actor":"PF","item":"CVR TEST pushbutton","action":"PRESS AND MAINTAIN","id":"s2_g0_sg1_i70"},{"actor":"_NOTE_","item":"To know the CVR result, the flight crew should hear an audio test signal through the loudspeakers. The audio test signal depends on the CVR model installed on the aircraft. A CVR 30 minutes will emit a continuous tone or a short tone, while the CVR 120 minutes will emit a short tone, or a short tone and a beep at every 4 seconds, or two short tones and a beep every 4 seconds.","action":""}]},{"heading":"EVAC","level":2,"items":[{"actor":"PF","item":"CAPT & PURS/CAPT switch","action":"AS REQUIRED","id":"s2_g0_sg2_i71"},{"actor":"_NOTE_","item":"This depends on the company policy.","action":""}]},{"heading":"ADIRS","level":2,"items":[{"actor":"PF","item":"All IR MODE selectors","action":"NAV","id":"s2_g0_sg3_i72"},{"actor":"_NOTE_","item":"It is recommended to align the inertial references as soon as possible. The initialization may take some time. It is also recommended to complete a full alignment if this is the first flight of the day, the flight crew has changed, the GPS is not available to all segments in the flight and the pilot expects long segments with low NAVAID coverage, or if the GPS is not available during a flight with an expected flight time over 3 hours. It is recommended to perform a fast alignment for all other flight conditions.","action":""}]},{"heading":"Exterior Lights","level":2,"items":[{"actor":"PF","item":"STROBE switch","action":"AUTO","id":"s2_g0_sg4_i73"},{"actor":"PF","item":"BEACON switch","action":"OFF","id":"s2_g0_sg4_i74"},{"actor":"PF","item":"NAV & LOGO switch","action":"AS REQUIRED","id":"s2_g0_sg4_i75"},{"actor":"PF","item":"REMAINING EXTERIOR LIGHTS","action":"AS REQUIRED","id":"s2_g0_sg4_i76"}]},{"heading":"Signs","level":2,"items":[{"actor":"PF","item":"SEAT BELTS sign","action":"ON / AUTO","id":"s2_g0_sg5_i77"},{"actor":"PF","item":"NO SMOKING sign","action":"AUTO","id":"s2_g0_sg5_i78"},{"actor":"_NOTE_","item":"Leaving the SEAT BELTS sign or NO SMOKING sign prevents the emergency batteries from charging.","action":""},{"actor":"PF","item":"EMER EXIT LT selector","action":"ARM","id":"s2_g0_sg5_i79"}]},{"heading":"Probe / Window Heat","level":2,"items":[{"actor":"PF","item":"PROBE/WINDOW HEAT pushbuttons","action":"VERIFY AUTO","id":"s2_g0_sg6_i80"}]},{"heading":"Cabin Pressure","level":2,"items":[{"actor":"PF","item":"LDG ELEV knob","action":"AUTO","id":"s2_g0_sg7_i81"}]},{"heading":"Air Conditioning","level":2,"items":[{"actor":"PF","item":"PACK FLOW selector","action":"AS REQUIRED","id":"s2_g0_sg8_i82"},{"actor":"_NOTE_","item":"It is recommended to set the PACK FLOW to NORM. The flight crew can select LO if the flight has less than 141 passengers. The flight crew can also select HI for abnormally hot and humid conditions.","action":""},{"actor":"_NOTE_","item":"Note: If the APU is supplying, the pack controllers will select HI flow automatically, no matter what the selector position is.","action":""}]},{"heading":"Electrical","level":2,"items":[{"actor":"PF","item":"ECAM ELEC PAGE","action":"PRESS","id":"s2_g0_sg9_i83"},{"actor":"PF","item":"BAT 1 & 2 pushbuttons","action":"OFF THEN ON","id":"s2_g0_sg9_i84"},{"actor":"_NOTE_","item":"After 10 seconds, the flight crew should ensure that the battery charge is below 60 A and is decreasing.","action":""}]},{"heading":"Fuel","level":2,"items":[{"actor":"_BULLET_","item":"If the fuel level in the center tank is less than 200 kg / 440 lbs for the flight:","action":""},{"actor":"PF","item":"FUEL MODE SEL pushbutton","action":"MAN","id":"s2_g0_sg10_i85"},{"actor":"PF","item":"CTR TK PUMP 1 & 2 pushbuttons","action":"OFF","id":"s2_g0_sg10_i86"},{"actor":"_BULLET_","item":"If the fuel level in the center tank is not less than 200 kg / 440 lbs for the flight:","action":""},{"actor":"PF","item":"FUEL MODE SEL pushbutton","action":"VERIFY AUTO","id":"s2_g0_sg10_i87"}]},{"heading":"Engine Fire Tests","level":2,"items":[{"actor":"PF","item":"ENG 1 FIRE & ENG 2 FIRE pushbuttons","action":"VERIFY IN AND GUARDED","id":"s2_g0_sg11_i88"},{"actor":"PF","item":"AGENT 1 & 2 lights","action":"VERIFY OFF","id":"s2_g0_sg11_i89"},{"actor":"PF","item":"ENG 1 TEST & ENG 2 TEST","action":"PRESS AND MAINTAIN","id":"s2_g0_sg11_i90"},{"actor":"_NOTE_","item":"The pilots hold the TEST pushbutton pressed throughout the test. The test result should include the following items:","action":""},{"actor":"_BULLET_","item":"A constant repetitive chime sound;","action":""},{"actor":"_BULLET_","item":"The master warning light flashes on the glareshield;","action":""},{"actor":"_BULLET_","item":"The ECAM displays the engine fire alert messages (ENG 1 FIRE, ENG 2 FIRE);","action":""},{"actor":"_BULLET_","item":"All engine fire pushbuttons and the squib lights of the engine agent pushbuttons are illuminated;","action":""},{"actor":"_BULLET_","item":"The disch light of the engine agent pushbutton illuminates; and","action":""},{"actor":"_BULLET_","item":"All fire lights on the engine master panel illuminate.","action":""}]},{"heading":"Audio Switching Panel","level":2,"items":[{"actor":"PF","item":"AUDIO SWITCHING selector","action":"NORM","id":"s2_g0_sg12_i91"}]},{"heading":"Ventilation","level":2,"items":[{"actor":"PF","item":"ALL LIGHTS","action":"VERIFY OFF","id":"s2_g0_sg13_i92"}]},{"heading":"ACT Control Panel","level":2,"items":[{"actor":"PF","item":"ACT XFR rotary selector","action":"OFF","id":"s2_g0_sg14_i93"}]},{"heading":"Third Occupant Audio Control Panel","level":2,"items":[{"actor":"PF","item":"PA knob","action":"RECEPT","id":"s2_g0_sg15_i94"},{"actor":"_NOTE_","item":"It is recommended to set the volume at or above medium range. This allows the cabin announcements to be recorded on the cockpit voice recorder.","action":""}]},{"heading":"Maintenance Panel","level":2,"items":[{"actor":"PF","item":"ALL LIGHTS","action":"VERIFY OFF","id":"s2_g0_sg16_i95"}]}]},{"heading":"Center Instrument Panel","level":1,"items":[],"subgroups":[{"heading":"ISIS","level":2,"items":[{"actor":"PF","item":"ISIS","action":"VERIFY","id":"s2_g1_sg0_i96"},{"actor":"_NOTE_","item":"The flight crew can adjust the brightness, the altimeter readings and setting, and the attitude display. Ensure that no flags are shown. If necessary, reset the attitude.","action":""},{"actor":"_NOTE_","item":"Note: The use of the ISIS bug functions is not recommended.","action":""}]},{"heading":"Clock","level":2,"items":[{"actor":"PF","item":"CLOCK","action":"VERIFY / SET","id":"s2_g1_sg1_i97"},{"actor":"_NOTE_","item":"The flight crew must ensure that the date is correct. If it is not correct, the flight crew can set the date manually and keep the clock mode in the internal mode for the flight.","action":""}]},{"heading":"Nosewheel Steering","level":2,"items":[{"actor":"PF","item":"A/SKID & N/W STRG switch","action":"ON","id":"s2_g1_sg2_i98"}]}]},{"heading":"Pedestal","level":1,"items":[],"subgroups":[{"heading":"ACP","level":2,"items":[{"actor":"PF","item":"INT knob","action":"PRESS OUT / VERIFY VOLUME","id":"s2_g2_sg0_i99"},{"actor":"PF","item":"VHF","action":"VERIFY","id":"s2_g2_sg0_i100"},{"actor":"PF","item":"HF","action":"VERIFY","id":"s2_g2_sg0_i101"},{"actor":"_NOTE_","item":"Verify the transmission and reception of the VHF and HF. It is prohibited to transmit on HF when the aircraft is refueling.","action":""}]},{"heading":"Cockpit Door","level":2,"items":[{"actor":"PF","item":"ANN LT selector","action":"TEST","id":"s2_g2_sg1_i102"},{"actor":"_NOTE_","item":"On the pedestal, ensure that the OPEN, FAULT, and the three LED lights on the overhead panel illuminate.","action":""},{"actor":"PF","item":"ANN LT selector","action":"BRT","id":"s2_g2_sg1_i103"},{"actor":"_NOTE_","item":"Ensure that all lights go off.","action":""},{"actor":"PF","item":"CKPT DOOR","action":"VERIFY CORRECT OPERATION","id":"s2_g2_sg1_i104"},{"actor":"PF","item":"CKPT DOOR MECHANICAL OVERRIDE","action":"VERIFY","id":"s2_g2_sg1_i105"}]},{"heading":"Switching Panel","level":2,"items":[{"actor":"PF","item":"ALL SELECTORS","action":"VERIFY NORM","id":"s2_g2_sg2_i106"}]},{"heading":"Engine","level":2,"items":[{"actor":"PF","item":"THRUST lever","action":"IDLE","id":"s2_g2_sg3_i107"},{"actor":"PF","item":"ENG MASTER switches","action":"OFF","id":"s2_g2_sg3_i108"},{"actor":"PF","item":"ENG MODE selector","action":"NORM","id":"s2_g2_sg3_i109"}]},{"heading":"Parking Brake","level":2,"items":[{"actor":"PF","item":"ACCU PRESS indicator","action":"VERIFY","id":"s2_g2_sg4_i110"},{"actor":"_NOTE_","item":"If the ACCU PRESS indicates outside of the green band, the flight crew may use the electric pump on the yellow hydraulic system to recharge the brake accumulator.","action":""},{"actor":"PF","item":"PARK BRK handle","action":"VERIFY ON","id":"s2_g2_sg4_i111"},{"actor":"_NOTE_","item":"If the brakes are hot, and chocks are in place, the flight crew may leave the parking brakes off.","action":""},{"actor":"PF","item":"BRAKES PRESS indicator","action":"VERIFY","id":"s2_g2_sg4_i112"}]},{"heading":"Gravity Gear Extension","level":2,"items":[{"actor":"PF","item":"GRAVITY GEAR EXTN","action":"VERIFY STOWED","id":"s2_g2_sg5_i113"}]},{"heading":"Air Traffic Control","level":2,"items":[{"actor":"PF","item":"ATC","action":"STBY","id":"s2_g2_sg6_i114"},{"actor":"PF","item":"ALT RPTG","action":"ON","id":"s2_g2_sg6_i115"},{"actor":"PF","item":"ATC SYS 1","action":"SELECT","id":"s2_g2_sg6_i116"},{"actor":"_NOTE_","item":"It is recommended to select SYS 1 if AP 1 is used, and SYS 2 if AP 2 is used in RVSM operations.","action":""}]},{"heading":"Radio Management Panel","level":2,"items":[{"actor":"PF","item":"RMP","action":"VERIFY ON","id":"s2_g2_sg7_i117"},{"actor":"PF","item":"GREEN NAV light","action":"VERIFY OFF","id":"s2_g2_sg7_i118"},{"actor":"PF","item":"SEL light","action":"VERIFY OFF","id":"s2_g2_sg7_i119"},{"actor":"PF","item":"COM FREQUENCIES","action":"TUNE","id":"s2_g2_sg7_i120"},{"actor":"_NOTE_","item":"It is recommended to use the VHF in the following ways to ensure optimal operation of the system:","action":""},{"actor":"_BULLET_","item":"VHF selected for the active Air Traffic Control communications and emergency frequencies.","action":""},{"actor":"_BULLET_","item":"VHF 2 for the Automatic Terminal Information Service (ATIS).","action":""},{"actor":"_BULLET_","item":"VHF 3 for the ACARS.","action":""}]},{"heading":"ATC Datalink Communication","level":2,"items":[{"actor":"PF","item":"MSG RECORD","action":"ERASE","id":"s2_g2_sg8_i121"},{"actor":"_NOTE_","item":"To erase the message record, press the ATC COMM button on the MCDU and display the MSG RECORD page. Then, you can erase the MSG RECORD file.","action":""}]}]},{"heading":"FMGS Preparation","level":1,"items":[{"actor":"PF","item":"ENGINE & AIRCRAFT TYPE","action":"VERIFY","id":"s2_g3_i122"},{"actor":"_NOTE_","item":"To display the status page, press the DATA key.","action":""},{"actor":"PF","item":"FM database validity","action":"VERIFY","id":"s2_g3_i123"},{"actor":"_NOTE_","item":"Verify the database validity and the stored waypoints, navaids, runways, and routes.","action":""},{"actor":"_NOTE_","item":"On the Honeywell FMS, the AIRAC has one day in common with the previous AIRAC. It is then recommended on the first day of the AIRAC cycle to select the new AIRAC cycle on the first flight of the day.","action":""},{"actor":"PF","item":"NAVAID DESELECTION","action":"AS REQUIRED","id":"s2_g3_i124"},{"actor":"PF","item":"FLIGHT PLAN INITIALIZATION","action":"COMPLETE","id":"s2_g3_i125"},{"actor":"_NOTE_","item":"The flight crew should insert the company route or FROM/TO airport, verify ALTN/CO RTE, insert the flight number, enter the cost index, insert the estimated flight cruise level, verify the cruise flight level temperature, insert the expected ground temperature, and verify the alignment with the latitude and longitude.","action":""},{"actor":"PF","item":"ADIRS POSITION INITIALIZATION","action":"AS APPROPRIATE","id":"s2_g3_i126"},{"actor":"PF","item":"F-PLN A page","action":"COMPLETE AND VERIFIED","id":"s2_g3_i127"},{"actor":"_NOTE_","item":"First, perform a verification of the waypoints, routes, departure, arrival, and vertical climb speed limit or constraint. Then, modify the flight plan if appropriate. Verify the total distance calculated by the flight plan, and ensure that it is similar to the projected flight plan.","action":""},{"actor":"PF","item":"WINDS","action":"AS APPROPRIATE","id":"s2_g3_i128"},{"actor":"_NOTE_","item":"The flight crew can choose between using the trip wind and the forecast wind for climb, cruise, and descent phase.","action":""},{"actor":"PF","item":"F-PLN","action":"VERIFY","id":"s2_g3_i129"},{"actor":"_NOTE_","item":"Verify the total distance calculated by the flight plan using the DIST TO DEST function, and ensure that it is similar to the projected flight plan.","action":""},{"actor":"PF","item":"SECONDARY FLIGHT PLAN","action":"AS APPROPRIATE","id":"s2_g3_i130"},{"actor":"_NOTE_","item":"It is recommended to use secondary flight plans. Secondary flight plan should be used to anticipate a runway change, an immediate return, or an emergency landing to the nearest airport. However, the pilot must ensure that any past secondary flight plans are deleted.","action":""},{"actor":"PF","item":"RADIO NAV","action":"VERIFY","id":"s2_g3_i131"},{"actor":"_NOTE_","item":"Verify the VOR, ILS/GLS, MLS, and ADF chosen by the FMGC. If they are erroneous, modify them, and ensure the correct identifier is displayed on the navigation display and primary flight display.","action":""}],"subgroups":[{"heading":"Gross Weight Insertion (INIT B page)","level":2,"items":[{"actor":"PF","item":"ZFWCG/ZFW","action":"INSERT","id":"s2_g3_sg0_i132"},{"actor":"PF","item":"BLOCK FUEL","action":"INSERT","id":"s2_g3_sg0_i133"},{"actor":"_NOTE_","item":"If the data is not available yet, the pilot can insert the expected values to enable performance predictions and the optimal fuel distribution.","action":""}]},{"heading":"Takeoff Data Insertion (PERF TAKEOFF page)","level":2,"items":[{"actor":"PF","item":"T.O SHIFT","action":"INSERT AS REQUIRED","id":"s2_g3_sg1_i134"},{"actor":"_NOTE_","item":"It is recommended to insert a T.O Shift value if the flight crew plans to take off from an intersection.","action":""},{"actor":"PF","item":"V1, VR, V2","action":"INSERT","id":"s2_g3_sg1_i135"},{"actor":"PF","item":"FLX TO TEMP","action":"INSERT","id":"s2_g3_sg1_i136"},{"actor":"PF","item":"THR RED/ACC altitude","action":"SET OR VERIFY","id":"s2_g3_sg1_i137"},{"actor":"PF","item":"ENG OUT ACC altitude","action":"SET OR VERIFY","id":"s2_g3_sg1_i138"},{"actor":"PF","item":"FLAPS/THS reminder","action":"INSERT","id":"s2_g3_sg1_i139"}]},{"heading":"Climb, Cruise, Descent, Speed Preselection","level":2,"items":[{"actor":"PF","item":"PRESET SPEEDS","action":"AS REQUIRED","id":"s2_g3_sg2_i140"}]},{"heading":"FMGS Preparation Verification","level":2,"items":[{"actor":"PF","item":"FMS PREPARATION","action":"VERIFY","id":"s2_g3_sg3_i141"},{"actor":"_NOTE_","item":"Verify all the data inserted in the FMS.","action":""}]}]},{"heading":"Glareshield","level":1,"items":[],"subgroups":[{"heading":"EFIS Control Panel","level":2,"items":[{"actor":"CM","item":"BAROMETRIC REFERENCE","action":"SET","id":"s2_g4_sg0_i142"},{"actor":"_NOTE_","item":"Ensure to set the barometric on the EFIS control panel and on the standby altimeter. The flight crew must also verify that the difference in altitude of both PFDs is 20 feet, and the difference between a PFD and ISIS is no more than 100 feet.","action":""},{"actor":"CM","item":"FD","action":"VERIFY ON","id":"s2_g4_sg0_i143"},{"actor":"CM","item":"ILS/LS","action":"AS REQUIRED","id":"s2_g4_sg0_i144"},{"actor":"CM","item":"ND MODE AND RANGE","action":"AS REQUIRED","id":"s2_g4_sg0_i145"},{"actor":"CM","item":"ADF/VOR switch","action":"AS REQUIRED","id":"s2_g4_sg0_i146"}]},{"heading":"FCU","level":2,"items":[{"actor":"PF","item":"SPD MACH window","action":"DASHED","id":"s2_g4_sg1_i147"},{"actor":"PF","item":"HDG V/S \u2013 TRK FPA pushbutton","action":"HDG V/S","id":"s2_g4_sg1_i148"},{"actor":"PF","item":"ALT window","action":"SET INITIAL EXPECTED CLEARANCE ALTITUDE","id":"s2_g4_sg1_i149"}]}]},{"heading":"Lateral Console","level":1,"items":[],"subgroups":[{"heading":"Oxygen Mask Test","level":2,"items":[{"actor":"CM","item":"CREW SUPPLY pushbutton","action":"VERIFY ON","id":"s2_g5_sg0_i150"},{"actor":"CM","item":"LOUDSPEAKERS","action":"ON","id":"s2_g5_sg0_i151"},{"actor":"CM","item":"INT reception knob","action":"PRESS OUT - ADJUST","id":"s2_g5_sg0_i152"},{"actor":"CM","item":"INT/RAD switch","action":"INT","id":"s2_g5_sg0_i153"},{"actor":"_BULLET_","item":"On the mask stowage box:","action":""},{"actor":"CM","item":"RESET/TEST pushbutton","action":"PRESS IN DIRECTION OF THE ARROW","id":"s2_g5_sg0_i154"},{"actor":"_NOTE_","item":"Ensure that the blinker turns yellow, and after a short time goes black.","action":""},{"actor":"CM","item":"RESET/TEST pushbutton","action":"MAINTAIN","id":"s2_g5_sg0_i155"},{"actor":"CM","item":"EMERGENCY PRESSURE selector","action":"PRESS","id":"s2_g5_sg0_i156"},{"actor":"_NOTE_","item":"Ensure that the blinker turns yellow and remains yellow. The flight crew must also notice an oxygen flow through the loudspeakers.","action":""},{"actor":"CM","item":"REGUL LO PR message","action":"VERIFY OFF","id":"s2_g5_sg0_i157"}]}]},{"heading":"Instrument Panel","level":1,"items":[{"actor":"CM","item":"PFD and ND brightness knob","action":"AS REQUIRED","id":"s2_g6_i158"},{"actor":"CM","item":"LOUDSPEAKER knob","action":"SET","id":"s2_g6_i159"},{"actor":"_NOTE_","item":"It is recommended to set the LOUDSPEAKER knob to the 1 o\u2019clock position.","action":""},{"actor":"CM","item":"PFD","action":"VERIFY","id":"s2_g6_i160"},{"actor":"_NOTE_","item":"Ensure that the PFD displays the ATT and HDG when available, and the IAS, FMA, initial targeted altitude, altimeter readings, vertical speed indicator, heading and attitude.","action":""},{"actor":"CM","item":"ND","action":"VERIFY","id":"s2_g6_i161"},{"actor":"_NOTE_","item":"Ensure that the ND displays the heading, initial waypoint, and VOR ADF indications.","action":""}]},{"heading":"ECAM Control Panel","level":1,"items":[{"actor":"PF","item":"PRESS pushbutton","action":"PRESS","id":"s2_g7_i162"},{"actor":"_NOTE_","item":"Ensure that the CAB PRESS page displays the LDG ELEV AUTO to verify the correct position of the LDG ELEV knob.","action":""},{"actor":"PF","item":"STS pushbutton","action":"PRESS","id":"s2_g7_i163"},{"actor":"_NOTE_","item":"Ensure that the INOP SYS displayed are compatible with the MEL.","action":""}]},{"heading":"ADIRS","level":1,"items":[{"actor":"PM","item":"IRS ALIGN","action":"VERIFY","id":"s2_g8_i164"},{"actor":"_NOTE_","item":"Ensure that the IRS are in the NAV mode, and that the aircraft position is consistent with the airport position.","action":""}]},{"heading":"Takeoff Briefing","level":1,"items":[{"actor":"CM","item":"TAKEOFF BRIEFING","action":"PERFORM","id":"s2_g9_i165"},{"actor":"_NOTE_","item":"The takeoff briefing should contain information about any adverse weather, the runway condition, the crew coordination in case of a rejected takeoff, a discussion of any unusual conditions that can affect the safety of the flight, the SID if the aircraft has one engine out, and any other operational risks.","action":""}]}]},{"title":"Before Pushback or Start","groups":[{"heading":"ATC","level":1,"items":[{"actor":"PM","item":"DEPARTURE / IFR CLEARANCE","action":"OBTAIN & READ BACK","id":"_dep_clr"}],"subgroups":[]},{"heading":"Loadsheet","level":1,"items":[{"actor":"CM","item":"FINAL LOADSHEET","action":"VERIFY","id":"s3_g0_i166"},{"actor":"_NOTE_","item":"Ensure that the loadsheet is accurate.","action":""},{"actor":"CM","item":"ZFW/ZFWCG","action":"VERIFY/REVISE","id":"s3_g0_i167"},{"actor":"_NOTE_","item":"The flight crew compares the ZFW and ZFWCG data with the previously entered data. If different, the flight crew must reinsert the data.","action":""},{"actor":"CM","item":"ZFW/ZFWCG","action":"CROSSCHECK","id":"s3_g0_i168"},{"actor":"_NOTE_","item":"The pilots verify on both flight management systems the values of the ZFW/ZFWCG.","action":""},{"actor":"CM","item":"FOB","action":"VERIFY","id":"s3_g0_i169"},{"actor":"_NOTE_","item":"Verify the fuel on board (FOB) on the system display. Ensure that it corresponds to the flight plan and to the loadsheet.","action":""}]},{"heading":"Takeoff Data","level":1,"items":[{"actor":"_BULLET_","item":"If takeoff conditions have changed:","action":""},{"actor":"PF","item":"FINAL TAKEOFF PERF DATA","action":"RECOMPUTE","id":"s3_g1_i170"},{"actor":"_NOTE_","item":"The flight crew members independently recompute the takeoff performance data.","action":""},{"actor":"PF","item":"FMS TAKEOFF DATA","action":"REVISE","id":"s3_g1_i171"},{"actor":"_NOTE_","item":"Verify the takeoff speeds, flexible temperature, and takeoff configuration.","action":""},{"actor":"PM","item":"FMS REVISED TAKEOFF PERF DATA","action":"CROSSCHECK","id":"s3_g1_i172"},{"actor":"_NOTE_","item":"The PF ensures the PNF got the same performance data on the T.O page.","action":""}]},{"heading":"Seating Position","level":1,"items":[{"actor":"CM","item":"SEATING POSITION","action":"ADJUST","id":"s3_g2_i173"},{"actor":"_NOTE_","item":"The pilot\u2019s eyes should be in line with the red and white balls.","action":""}]},{"heading":"MCDU","level":1,"items":[{"actor":"PF","item":"FMS PERF TO page","action":"SELECT","id":"s3_g3_i174"},{"actor":"_NOTE_","item":"It is recommended to set the PERF TO page on the PF MCDU.","action":""},{"actor":"PM","item":"FMS F-PLN page","action":"SELECT","id":"s3_g3_i175"},{"actor":"_NOTE_","item":"It is recommended to set the F-PLN page on the PM MCDU.","action":""}]},{"heading":"ELEC","level":1,"items":[{"actor":"PM","item":"EXT PWR","action":"VERIFY AVAIL","id":"s3_g4_i176"},{"actor":"PM","item":"EXT PWR DISCONNECTION","action":"REQUEST","id":"s3_g4_i177"}]},{"heading":"Before Start Clearance","level":1,"items":[],"subgroups":[{"heading":"Before Start Checklist","level":2,"items":[{"actor":"CM","item":"BEFORE START CHECKLIST down to the line","action":"COMPLETE","id":"s3_g5_sg0_i178"}]}]},{"heading":"At Start Clearance","level":1,"items":[],"subgroups":[{"heading":"Pushback / Start Up Clearance","level":2,"items":[{"actor":"PM","item":"PUSHBACK/START CLEARANCE","action":"OBTAIN","id":"s3_g6_sg0_i179"},{"actor":"PM","item":"ATC","action":"SET FOR OPERATION","id":"s3_g6_sg0_i180"}]},{"heading":"Windows and Doors","level":2,"items":[{"actor":"CM","item":"WINDOWS AND DOORS","action":"VERIFY CLOSED","id":"s3_g6_sg1_i181"},{"actor":"_NOTE_","item":"Verify on the ECAM DOOR page that the doors are closed.","action":""},{"actor":"CM","item":"SLIDES","action":"VERIFY ARMED","id":"s3_g6_sg1_i182"},{"actor":"_NOTE_","item":"Verify on the ECAM DOOR page that the slides are armed.","action":""}]},{"heading":"Exterior Lights","level":2,"items":[{"actor":"PF","item":"BEACON switch","action":"ON","id":"s3_g6_sg2_i183"}]},{"heading":"Thrust Levers","level":2,"items":[{"actor":"PF","item":"THRUST LEVERS","action":"IDLE","id":"s3_g6_sg3_i184"},{"actor":"_NOTE_","item":"Ensure that the thrust levers are at the idle position. If the lever is beyond the idle detent, it can cause a hazardous situation at start-up.","action":""}]},{"heading":"ACCU Pressure","level":2,"items":[{"actor":"PF","item":"ACCU PRESS indicator","action":"VERIFY","id":"s3_g6_sg4_i185"},{"actor":"_NOTE_","item":"The ACCU PRESS must indicate within the green band. If this is not the case, use the electric pump of the yellow hydraulic system.","action":""}]},{"heading":"Parking Brake and Nosewheel Steering","level":2,"items":[{"actor":"_BULLET_","item":"If pushback is not required:","action":""},{"actor":"PF","item":"PARK BRK handle","action":"VERIFY ON","id":"s3_g6_sg5_i186"},{"actor":"PF","item":"BRAKES PRESS indicator","action":"VERIFY","id":"s3_g6_sg5_i187"},{"actor":"CM","item":"BEFORE START CHECKLIST below the line","action":"COMPLETE","id":"s3_g6_sg5_i188"},{"actor":"_BULLET_","item":"If pushback is required:","action":""},{"actor":"PF","item":"N/W STRG DISC MEMO","action":"VERIFY DISPLAYED","id":"s3_g6_sg5_i189"},{"actor":"CM","item":"BEFORE START CHECKLIST below the line","action":"COMPLETE","id":"s3_g6_sg5_i190"},{"actor":"PF","item":"PARK BRK handle","action":"OFF","id":"s3_g6_sg5_i191"},{"actor":"_BULLET_","item":"When the pushback is completed:","action":""},{"actor":"PF","item":"PARK BRK handle","action":"ON","id":"s3_g6_sg5_i192"},{"actor":"PF","item":"BRAKE PRESS indicator","action":"VERIFY","id":"s3_g6_sg5_i193"}]}]}]},{"title":"Engine Start","groups":[{"heading":"Automatic Engine Start","level":1,"items":[{"actor":"PF","item":"ENG MODE selector","action":"IGN/START","id":"s4_g0_i194"},{"actor":"_NOTE_","item":"The flight crew should look at the engine warning display for the indication of \u201cCOOLING\u201d.","action":""},{"actor":"PF","item":"ENGINE 2 START","action":"ANNOUNCE","id":"s4_g0_i195"},{"actor":"_NOTE_","item":"Engine 2 is usually started first. This will add the ability to pressurize the yellow hydraulic system.","action":""},{"actor":"PF","item":"ENG MASTER 2","action":"ON","id":"s4_g0_i196"},{"actor":"_NOTE_","item":"It is recommended to wait until all amber crosses and messages have disappeared from the upper ECAM display before setting the ENG MASTER 2 switch to ON.","action":""},{"actor":"_BULLET_","item":"When engine idle is reached (AVAIL indication is displayed):","action":""},{"actor":"PF","item":"ENG IDLE PARAMETERS","action":"VERIFY","id":"s4_g0_i197"},{"actor":"_NOTE_","item":"At ISA sea level, the engine parameters should indicate the following:","action":""},{"actor":"_BULLET_","item":"19% N1","action":""},{"actor":"_BULLET_","item":"68% N2","action":""},{"actor":"_BULLET_","item":"520\u00b0C EGT","action":""},{"actor":"_BULLET_","item":"290 kg/h FF","action":""},{"actor":"PF","item":"ENGINE 1 START","action":"ANNOUNCE","id":"s4_g0_i198"},{"actor":"PF","item":"ENG MASTER 1","action":"ON","id":"s4_g0_i199"},{"actor":"_BULLET_","item":"When engine idle is reached (AVAIL indication is displayed):","action":""},{"actor":"PF","item":"ENG IDLE PARAMETERS","action":"VERIFY","id":"s4_g0_i200"},{"actor":"_NOTE_","item":"At ISA sea level, the engine parameters should indicate the following:","action":""},{"actor":"_BULLET_","item":"19% N1","action":""},{"actor":"_BULLET_","item":"68% N2","action":""},{"actor":"_BULLET_","item":"520\u00b0C EGT","action":""},{"actor":"_BULLET_","item":"290 kg/h FF","action":""}]}]},{"title":"After Start","groups":[{"heading":"After Start","level":1,"items":[],"subgroups":[{"heading":"Engine Mode","level":2,"items":[{"actor":"PF","item":"ENG MODE selector","action":"NORM","id":"s5_g0_sg0_i201"},{"actor":"_NOTE_","item":"It is recommended to wait 5 minutes before taking off to prevent a thermal shock. The taxi time can be included in the waiting period.","action":""}]},{"heading":"APU Bleed","level":2,"items":[{"actor":"PF","item":"APU Bleed pushbutton","action":"OFF","id":"s5_g0_sg1_i202"},{"actor":"_NOTE_","item":"The auxiliary power unit bleed valves close. All engine bleed valves automatically open.","action":""}]},{"heading":"Anti-Ice","level":2,"items":[{"actor":"PF","item":"ENG ANTI-ICE pushbutton","action":"AS REQUIRED","id":"s5_g0_sg2_i203"},{"actor":"_NOTE_","item":"The engine anti-ice must be set to on during all ground operations if there is an icing condition. If ground surface and the environment allow, the flight crew can proceed to an engine de-icing runup. To proceed to an engine de-icing runup, set the parking brakes to ON, then accelerate the engines N1 to a minimum of 50% for 5 seconds.","action":""},{"actor":"PF","item":"WING ANTI-ICE pushbutton","action":"AS REQUIRED","id":"s5_g0_sg2_i204"},{"actor":"_NOTE_","item":"The flight crew should turn the wing anti-ice ON when icing conditions are encountered. After 30 seconds, the valve will close itself as a self-test is passed.","action":""}]},{"heading":"APU","level":2,"items":[{"actor":"_BULLET_","item":"If the APU is not required:","action":""},{"actor":"PF","item":"APU MASTER pushbutton","action":"OFF","id":"s5_g0_sg3_i205"}]},{"heading":"Ground Spoilers","level":2,"items":[{"actor":"PM","item":"GROUND SPOILERS","action":"ARM","id":"s5_g0_sg4_i206"}]},{"heading":"Rudder Trim","level":2,"items":[{"actor":"PM","item":"RUD TRIM position indication","action":"VERIFY ZERO","id":"s5_g0_sg5_i207"},{"actor":"_BULLET_","item":"If the RUD TRIM position indication does not indicate at zero:","action":""},{"actor":"CM","item":"RESET pushbutton","action":"PRESS","id":"s5_g0_sg5_i208"}]},{"heading":"Flaps","level":2,"items":[{"actor":"PM","item":"FLAPS lever","action":"SET TAKEOFF POSITION","id":"s5_g0_sg6_i209"},{"actor":"PM","item":"FLAPS","action":"VERIFY POSITION","id":"s5_g0_sg6_i210"},{"actor":"_NOTE_","item":"If taxiing in icing condition, delay the flaps extension until the runway holding point. This prevents contamination in the mechanism.","action":""}]},{"heading":"Pitch Trim","level":2,"items":[{"actor":"PM","item":"PITCH TRIM handwheel","action":"SET","id":"s5_g0_sg7_i211"},{"actor":"_NOTE_","item":"Verify that the pitch trim is set to the takeoff trim position.","action":""}]},{"heading":"ECAM Status","level":2,"items":[{"actor":"PF","item":"STATUS REMINDER","action":"VERIFY NOT DISPLAYED","id":"s5_g0_sg8_i212"},{"actor":"_BULLET_","item":"If STS reminder is displayed:","action":""},{"actor":"PF","item":"STS pushbutton","action":"PRESS","id":"s5_g0_sg8_i213"}]},{"heading":"N/W STEER DISC Memo","level":2,"items":[{"actor":"PF","item":"N/W STEER DISC MEMO","action":"VERIFY NOT DISPLAYED","id":"s5_g0_sg9_i214"}]},{"heading":"Ground Crew","level":2,"items":[{"actor":"PF","item":"CLEAR TO DISCONNECT","action":"ANNOUNCE","id":"s5_g0_sg10_i215"},{"actor":"_NOTE_","item":"When the clearance to disconnect is given, the ground crew should remove the chocks, remove the tow pin, disconnect the interphone and make a hand signal on one side of the aircraft.","action":""}]},{"heading":"After Start Checklist","level":2,"items":[{"actor":"CM","item":"AFTER START Checklist","action":"COMPLETE","id":"s5_g0_sg11_i216"}]}]}]},{"title":"Taxi","groups":[{"heading":"Taxi","level":1,"items":[],"subgroups":[{"heading":"Taxi Clearance","level":2,"items":[{"actor":"PM","item":"TAXI clearance","action":"OBTAIN","id":"s6_g0_sg0_i217"}]},{"heading":"Exterior Lights","level":2,"items":[{"actor":"PF","item":"NOSE switch","action":"TAXI","id":"s6_g0_sg1_i218"},{"actor":"PF","item":"RWY TURN OFF switch","action":"ON","id":"s6_g0_sg1_i219"},{"actor":"_BULLET_","item":"When crossing a runway:","action":""},{"actor":"PF","item":"STROBE switch","action":"ON","id":"s6_g0_sg1_i220"}]},{"heading":"Parking Brakes","level":2,"items":[{"actor":"PF","item":"PARK BRK handle","action":"OFF","id":"s6_g0_sg2_i221"},{"actor":"PM","item":"BRAKES PRESSURE","action":"VERIFY AT ZERO","id":"s6_g0_sg2_i222"}]},{"heading":"Thrust Lever","level":2,"items":[{"actor":"PF","item":"THRUST lever","action":"AS REQUIRED","id":"s6_g0_sg3_i223"}]},{"heading":"Brakes","level":2,"items":[{"actor":"PF","item":"BRAKE PEDALS","action":"PRESS","id":"s6_g0_sg4_i224"},{"actor":"PF","item":"BRAKES","action":"VERIFY","id":"s6_g0_sg4_i225"},{"actor":"_NOTE_","item":"The flight crew should monitor the WHEEL SD page on the ECAM display. If an arc is displayed above the brake temperature, it is recommended to set the brake fans to ON.","action":""}]},{"heading":"Nosewheel Steering","level":2,"items":[{"actor":"PF","item":"TILLER or RUDDER PEDALS","action":"USE AS REQUIRED","id":"s6_g0_sg5_i226"}]},{"heading":"Flight Controls","level":2,"items":[{"actor":"CM","item":"FLIGHT CONTROLS","action":"VERIFY","id":"s6_g0_sg6_i227"}]},{"heading":"ATC Clearance","level":2,"items":[{"actor":"PM","item":"ATC Clearance","action":"CONFIRM","id":"s6_g0_sg7_i228"}]},{"heading":"Takeoff Data/Conditions","level":2,"items":[{"actor":"_BULLET_","item":"If takeoff conditions have changed:","action":""},{"actor":"PM","item":"FINAL TAKEOFF PERF DATA","action":"RECOMPUTE","id":"s6_g0_sg8_i229"},{"actor":"_NOTE_","item":"The flight crew should independently compute the takeoff performance data again.","action":""},{"actor":"PM","item":"FMS TAKEOFF DATA","action":"REVISE","id":"s6_g0_sg8_i230"},{"actor":"_NOTE_","item":"The flight crew should revise the takeoff data in the FMS. It is recommended to pay attention to the changes at the slats/flaps configuration at takeoff.","action":""},{"actor":"CM","item":"FMS REVISED TAKEOFF PERF DATA","action":"CROSSCHECK","id":"s6_g0_sg8_i231"},{"actor":"PM","item":"FLAPS lever","action":"AS APPROPRIATE","id":"s6_g0_sg8_i232"}]},{"heading":"AFS / Flight Instruments","level":2,"items":[{"actor":"PM","item":"F-PLN (SID, TRANS)","action":"REVISE or VERIFY","id":"s6_g0_sg9_i233"},{"actor":"_NOTE_","item":"Ensure that the ATC clearance is the same as the inserted flight plan in the FMS.","action":""},{"actor":"PM","item":"INITIAL CLIMB SPEED AND SPEED LIMIT","action":"MODIFY or VERIFY","id":"s6_g0_sg9_i234"},{"actor":"_NOTE_","item":"It is recommended to use VERT REV at departure, or at a CLB waypoint.","action":""},{"actor":"PM","item":"CLEARED ALTITUDE ON FCU","action":"SET","id":"s6_g0_sg9_i235"},{"actor":"PM","item":"HDG ON FCU","action":"PRESET","id":"s6_g0_sg9_i236"},{"actor":"_NOTE_","item":"Preset the heading if the air traffic control requires a radar vector departure. However, please note that the RWY TRK mode maintains the aircraft on the runway heading until the heading mode engages.","action":""},{"actor":"PM","item":"BOTH FD","action":"VERIFY ON","id":"s6_g0_sg9_i237"},{"actor":"CM","item":"PFD/ND","action":"VERIFY","id":"s6_g0_sg9_i238"},{"actor":"CM","item":"TAKEOFF BRIEFING","action":"CONFIRM","id":"s6_g0_sg9_i239"},{"actor":"PM","item":"RADAR","action":"ON","id":"s6_g0_sg9_i240"},{"actor":"_NOTE_","item":"It is recommended to set the MULTISCAN switch to MAN. This allows the flight crew to verify the radar and the departure path. The flight crew can then set the radar to the AUTO position.","action":""},{"actor":"PM","item":"PREDICTIVE WINDSHEAR SYSTEM","action":"AUTO","id":"s6_g0_sg9_i241"}]},{"heading":"ATC","level":2,"items":[{"actor":"PM","item":"ATC code/mode","action":"CONFIRM & SET FOR TAKEOFF","id":"s6_g0_sg10_i242"}]},{"heading":"Terrain Radar","level":2,"items":[{"actor":"CM","item":"TERR ON ND","action":"AS REQUIRED","id":"s6_g0_sg11_i243"},{"actor":"_NOTE_","item":"It is recommended to set the weather radar display on the PF side, and the terrain radar on the PM side.","action":""}]},{"heading":"Autobrakes","level":2,"items":[{"actor":"PM","item":"AUTO BRK MAX pushbutton","action":"ON","id":"s6_g0_sg12_i244"}]},{"heading":"Final Verification","level":2,"items":[{"actor":"PM","item":"T.O CONFIG pushbutton","action":"TEST","id":"s6_g0_sg13_i245"},{"actor":"_NOTE_","item":"Ensure that the upper ECAM display shows the message \u201cT.O CONFIG NORMAL\u201d.","action":""},{"actor":"PM","item":"T.O MEMO","action":"VERIFY NO BLUE","id":"s6_g0_sg13_i246"},{"actor":"CM","item":"CABIN REPORT","action":"RECEIVE","id":"s6_g0_sg13_i247"},{"actor":"_NOTE_","item":"Verify on the engine warning display the display of the message \u201cCABIN READY\u201d or obtain the report from the chief flight attendant \u201cCabin ready for takeoff\u201d.","action":""}]},{"heading":"Before Takeoff Checklist","level":2,"items":[{"actor":"CM","item":"BEFORE TAKEOFF CHECKLIST down to the line","action":"COMPLETE","id":"s6_g0_sg14_i248"}]}]}]},{"title":"Before Takeoff","groups":[{"heading":"Before Takeoff","level":1,"items":[],"subgroups":[{"heading":"Brake Fans","level":2,"items":[{"actor":"_BULLET_","item":"If the brake fans are currently running:","action":""},{"actor":"PM","item":"BRAKE TEMPERATURE","action":"VERIFY","id":"s7_g0_sg0_i249"},{"actor":"_NOTE_","item":"If the brake temperature is below 150\u00b0C, the flight crew can select the brake fans OFF. If the brake temperature is above 150\u00b0C, it is recommended to delay the takeoff.","action":""}]},{"heading":"Line-Up Clearance","level":2,"items":[{"actor":"PM","item":"LINE-UP CLEARANCE","action":"OBTAIN","id":"s7_g0_sg1_i250"}]},{"heading":"Exterior Lights","level":2,"items":[{"actor":"PF","item":"STROBE switch","action":"ON","id":"s7_g0_sg2_i251"},{"actor":"_NOTE_","item":"The flight crew can turn off the strobe lights if it causes any visual trouble.","action":""}]},{"heading":"TCAS","level":2,"items":[{"actor":"PM","item":"TCAS mode selector","action":"TA or TA/RA","id":"s7_g0_sg3_i252"},{"actor":"_NOTE_","item":"It is recommended to use TA/RA for normal situations. If it is inappropriate, such as converging runways or parallel runways, the use of TA ONLY mode is recommended.","action":""}]},{"heading":"Approach Path","level":2,"items":[{"actor":"CM","item":"APPROACH PATH","action":"CLEARED OF TRAFFIC","id":"s7_g0_sg4_i253"},{"actor":"_NOTE_","item":"Ensure there is no traffic incoming, both from visual confirmation and using the TCAS display on the ND.","action":""},{"actor":"PM","item":"Cabin Crew","action":"ADVISE","id":"s7_g0_sg4_i254"}]},{"heading":"Sliding Table / EFB","level":2,"items":[{"actor":"CM","item":"SLIDING TABLE","action":"STOW","id":"s7_g0_sg5_i255"},{"actor":"CM","item":"ALL EFB transmitting mode","action":"AS REQUIRED","id":"s7_g0_sg5_i256"},{"actor":"CM","item":"TAKEOFF RUNWAY","action":"CONFIRM","id":"s7_g0_sg5_i257"},{"actor":"PM","item":"PACK 1 and 2","action":"AS REQUIRED","id":"s7_g0_sg5_i258"},{"actor":"_NOTE_","item":"It is recommended to select the packs OFF or put the APU bleed ON. This should improve performance when using TOGA thrust. Furthermore, it can reduce maintenance cost due to the takeoff EGT reduction. However, if the wing anti-ice is used, it is not recommended to use the APU bleed.","action":""},{"actor":"CM","item":"BEFORE TAKEOFF CHECKLIST below the line","action":"COMPLETE","id":"s7_g0_sg5_i259"}]}]}]},{"title":"Takeoff","groups":[{"heading":"Takeoff","level":1,"items":[],"subgroups":[{"heading":"Takeoff Clearance","level":2,"items":[{"actor":"PM","item":"TAKEOFF CLEARANCE","action":"OBTAINED","id":"s8_g0_sg0_i260"}]},{"heading":"Exterior Lights","level":2,"items":[{"actor":"PF","item":"NOSE switch","action":"T.O","id":"s8_g0_sg1_i261"},{"actor":"PF","item":"RWY TURN OFF switch","action":"ON","id":"s8_g0_sg1_i262"},{"actor":"PF","item":"LAND LIGHTS switch","action":"ON","id":"s8_g0_sg1_i263"}]},{"heading":"Thrust Setting","level":2,"items":[{"actor":"PF","item":"TAKEOFF","action":"ANNOUNCE","id":"s8_g0_sg2_i264"},{"actor":"PF","item":"THRUST LEVERS","action":"50% N1","id":"s8_g0_sg2_i265"},{"actor":"_BULLET_","item":"If the crosswind is at or below 20 knots and there is no tailwind:","action":""},{"actor":"_NOTE_","item":"It is recommended to apply half forward sidestick until the aircraft reaches the airspeed of 80 knots to counter the nose-up effect. At 80 knots, release the sidestick gradually. The sidestick must be neutral at 100 knots.","action":""},{"actor":"PF","item":"BRAKES","action":"RELEASE","id":"s8_g0_sg2_i266"},{"actor":"PF","item":"THRUST LEVERS","action":"FLX or TOGA","id":"s8_g0_sg2_i267"},{"actor":"_BULLET_","item":"If the crosswind is greater than 20 knots, or there is tailwind:","action":""},{"actor":"_NOTE_","item":"It is recommended to apply full forward sidestick until the aircraft reaches the airspeed of 80 knots. At 80 knots, release the sidestick gradually. The sidestick must be neutral at 100 knots.","action":""},{"actor":"PF","item":"BRAKES","action":"RELEASE","id":"s8_g0_sg2_i268"},{"actor":"PF","item":"THRUST LEVERS","action":"FLX or TOGA","id":"s8_g0_sg2_i269"},{"actor":"_NOTE_","item":"Note: Expect the ENG SD page to replace the WHEEL SD page on the lower ECAM display.","action":""},{"actor":"PF","item":"DIRECTIONAL CONTROL","action":"RUDDER","id":"s8_g0_sg2_i270"},{"actor":"_NOTE_","item":"Once the wheel reaches 130 knots, there is an automatic disconnection between the nosewheel steering and the rudder pedals.","action":""},{"actor":"PM","item":"CHRONO","action":"START","id":"s8_g0_sg2_i271"},{"actor":"CM","item":"PFD/ND","action":"MONITOR","id":"s8_g0_sg2_i272"},{"actor":"_NOTE_","item":"Ensure that either of the following modes are displayed on the FMA: MAN TOGA (or MAN FLX xx) / SRS / RWY / A/THR / Blank. Also, verify the FMS position on the ND.","action":""},{"actor":"PF","item":"FMA","action":"ANNOUNCE","id":"s8_g0_sg2_i273"}]},{"heading":"Below 80 Knots","level":2,"items":[{"actor":"PM","item":"TAKEOFF N1","action":"VERIFY","id":"s8_g0_sg3_i274"},{"actor":"_NOTE_","item":"Ensure that the actual N1 of each engine has reached the N1 rating limit before the aircraft reaches the airspeed of 80 knots.","action":""},{"actor":"PM","item":"THRUST SET","action":"ANNOUNCE","id":"s8_g0_sg3_i275"},{"actor":"PM","item":"PFD/ENG indications","action":"MONITOR","id":"s8_g0_sg3_i276"}]},{"heading":"Reaching 100 Knots","level":2,"items":[{"actor":"PM","item":"ONE HUNDRED KNOTS","action":"ANNOUNCE","id":"s8_g0_sg4_i277"},{"actor":"_NOTE_","item":"It is recommended to reject the takeoff under 100 knots. However, rejecting takeoff above 100 knots is a more serious case.","action":""}]},{"heading":"At V1","level":2,"items":[{"actor":"PM","item":"V1","action":"ANNOUNCE","id":"s8_g0_sg5_i278"}]},{"heading":"At VR","level":2,"items":[{"actor":"PM","item":"ROTATION","action":"ORDER","id":"s8_g0_sg6_i279"},{"actor":"PF","item":"ROTATION","action":"PERFORM","id":"s8_g0_sg6_i280"},{"actor":"_NOTE_","item":"It is recommended to have a rotation rate of 3\u00b0/s until the aircraft is at a pitch attitude of 15\u00b0. It is recommended to minimize any lateral inputs as it can extend spoilers. After lift-off, it is recommended to follow the SRS pitch command bar.","action":""},{"actor":"_NOTE_","item":"Note: In case of an engine failure, the recommended pitch attitude is 12.5\u00b0.","action":""}]},{"heading":"When Positive Climb","level":2,"items":[{"actor":"PM","item":"POSITIVE CLIMB","action":"ANNOUNCE","id":"s8_g0_sg7_i281"},{"actor":"PF","item":"LANDING GEAR UP","action":"ORDER","id":"s8_g0_sg7_i282"},{"actor":"PM","item":"LANDING GEAR","action":"SELECT UP","id":"s8_g0_sg7_i283"},{"actor":"PF","item":"AUTOPILOT","action":"AS REQUIRED","id":"s8_g0_sg7_i284"},{"actor":"_NOTE_","item":"The autopilot can be engaged above 100 feet AGL.","action":""}]},{"heading":"At Thrust Reduction Altitude","level":2,"items":[{"actor":"PF","item":"THRUST LEVERS","action":"CL","id":"s8_g0_sg8_i285"},{"actor":"_NOTE_","item":"On the FMA, when the message \u201cLVR CLB\u201d appears flashing, move the thrust levers to the CL detent. The autothrottle will activate.","action":""},{"actor":"PM","item":"PACK 1 & 2","action":"ON","id":"s8_g0_sg8_i286"},{"actor":"_NOTE_","item":"It is recommended to select PACK 2 at least 10 seconds after PACK 1 has been selected. This is for passenger comfort.","action":""}]},{"heading":"At Acceleration Altitude","level":2,"items":[{"actor":"PM","item":"TARGET SPEED","action":"MODIFIED","id":"s8_g0_sg9_i287"},{"actor":"_NOTE_","item":"Ensure that the speed target changes from V2 +10 to the first CLB speed.","action":""}]},{"heading":"Above Acceleration Altitude / Climb Phase","level":2,"items":[{"actor":"_BULLET_","item":"At F speed (the F speed will only appear if the aircraft is in a higher configuration than 1+F):","action":""},{"actor":"PF","item":"FLAPS 1","action":"ORDER","id":"s8_g0_sg10_i288"},{"actor":"PM","item":"FLAPS 1","action":"SELECT","id":"s8_g0_sg10_i289"},{"actor":"_BULLET_","item":"At S speed:","action":""},{"actor":"PF","item":"FLAPS 0","action":"ORDER","id":"s8_g0_sg10_i290"},{"actor":"PM","item":"FLAPS 0","action":"SELECT","id":"s8_g0_sg10_i291"},{"actor":"PM","item":"GND SPLRS","action":"DISARM","id":"s8_g0_sg10_i292"},{"actor":"PM","item":"NOSE switch","action":"OFF","id":"s8_g0_sg10_i293"},{"actor":"PM","item":"RWY TURN OFF switch","action":"OFF","id":"s8_g0_sg10_i294"},{"actor":"PM","item":"EXTERIOR LIGHTS","action":"AS REQUIRED","id":"s8_g0_sg10_i295"}]}]}]},{"title":"After Takeoff","groups":[{"heading":"After Takeoff","level":1,"items":[{"actor":"PM","item":"APU BLEED pushbutton","action":"AS REQUIRED","id":"s9_g0_i296"},{"actor":"PM","item":"APU MASTER pushbutton","action":"AS REQUIRED","id":"s9_g0_i297"},{"actor":"PM","item":"TCAS mode selector","action":"TA/RA","id":"s9_g0_i298"},{"actor":"_NOTE_","item":"If the takeoff was performed using TA only, select the TA/RA mode.","action":""},{"actor":"PM","item":"ENG ANTI-ICE pushbutton","action":"AS REQUIRED","id":"s9_g0_i299"},{"actor":"_NOTE_","item":"It is recommended to set the engine anti-ice to ON when flying through icing condition, or anticipated icing condition, except when the SAT is below -40\u00b0C.","action":""},{"actor":"PM","item":"WING ANTI-ICE pushbutton","action":"AS REQUIRED","id":"s9_g0_i300"},{"actor":"_NOTE_","item":"It is recommended to set the wing anti-ice to ON when flying through icing conditions. It prevents ice accretion on the wing leading edge.","action":""},{"actor":"CM","item":"AFTER TAKEOFF/CLIMB CHECKLIST down to the line","action":"COMPLETE","id":"s9_g0_i301"}]}]},{"title":"Climb","groups":[{"heading":"Climb","level":1,"items":[{"actor":"PF","item":"MCDU","action":"PERF CLB","id":"s10_g0_i302"},{"actor":"_NOTE_","item":"It is recommended for the PF MCDU to display the PERF CLB page. This allows the PF to monitor the aircraft when it reaches the FCU selected altitude.","action":""},{"actor":"PM","item":"MCDU","action":"F-PLN","id":"s10_g0_i303"},{"actor":"_NOTE_","item":"It is recommended for the PM MCDU to display the F-PLN page. This allows the PM to enter a long-term revision to the lateral or vertical flight plan.","action":""}],"subgroups":[{"heading":"Climb Speed Modifications","level":2,"items":[{"actor":"PF","item":"FCU SPD","action":"SELECT AND PULL","id":"s10_g0_sg0_i304"},{"actor":"_NOTE_","item":"By pulling the FCU SPD knob, the speed target is in the selected mode. To return in managed speed mode, push the FCU SPD knob.","action":""}]},{"heading":"Expedite Climb","level":2,"items":[{"actor":"_BULLET_","item":"If the ATC requires a rapid climb through a particular level:","action":""},{"actor":"PF","item":"EXP pushbutton","action":"PUSH","id":"s10_g0_sg1_i305"},{"actor":"_NOTE_","item":"By pushing the EXP pushbutton, the aircraft enters the expedite climb mode. To return to the ECON CLB mode, push the ALT knob.","action":""},{"actor":"CM","item":"BAROMETRIC REFERENCE","action":"SET STD / CROSSCHECK","id":"s10_g0_sg1_i306"},{"actor":"_NOTE_","item":"Once the aircraft reaches the transition altitude, set STD on the EFIS control panel and on the ISIS.","action":""},{"actor":"PF","item":"CRZ FL","action":"SET AS REQUIRED","id":"s10_g0_sg1_i307"}]},{"heading":"Checklist","level":2,"items":[{"actor":"CM","item":"AFTER TAKEOFF/CLIMB CHECKLIST below the line","action":"COMPLETE","id":"s10_g0_sg2_i308"},{"actor":"PM","item":"ENG ANTI-ICE pushbutton","action":"AS REQUIRED","id":"s10_g0_sg2_i309"},{"actor":"_NOTE_","item":"It is recommended to set the engine anti-ice to ON when icing conditions are present or are anticipated.","action":""},{"actor":"PF","item":"RADAR","action":"AS APPROPRIATE","id":"s10_g0_sg2_i310"}]},{"heading":"At 10 000 Feet","level":2,"items":[{"actor":"PM","item":"LAND LIGHTS selector","action":"RETRACT","id":"s10_g0_sg3_i311"},{"actor":"PM","item":"SEAT BELTS switch","action":"AS REQUIRED","id":"s10_g0_sg3_i312"},{"actor":"CM","item":"EFIS options","action":"AS REQUIRED","id":"s10_g0_sg3_i313"},{"actor":"_NOTE_","item":"It is recommended to select CSTR on one ND and ARPT on the other ND.","action":""},{"actor":"PM","item":"ECAM MEMO","action":"REVIEW","id":"s10_g0_sg3_i314"},{"actor":"PM","item":"NAVAIDS","action":"CLEAR","id":"s10_g0_sg3_i315"},{"actor":"_NOTE_","item":"It is recommended to clear the manually tuned VORs from the MCDU RAD NAV page.","action":""},{"actor":"PM","item":"SEC F-PLN page","action":"AS REQUIRED","id":"s10_g0_sg3_i316"},{"actor":"_NOTE_","item":"It is recommended to recopy the active flight plan in the secondary flight plan.","action":""},{"actor":"PM","item":"OPT/MAX ALT","action":"VERIFY","id":"s10_g0_sg3_i317"}]}]}]},{"title":"Cruise","groups":[{"heading":"Cruise","level":1,"items":[{"actor":"PF","item":"ECAM MEMO","action":"REVIEW","id":"s11_g0_i318"},{"actor":"PF","item":"ECAM SD PAGES","action":"REVIEW","id":"s11_g0_i319"},{"actor":"_NOTE_","item":"It is recommended to review regularly the following pages: ENG, BLEED, ELEC, HYD, FUEL, COND, FLT CTL, and DOOR.","action":""},{"actor":"PF","item":"FLIGHT PROGRESS","action":"VERIFY","id":"s11_g0_i320"},{"actor":"_NOTE_","item":"It is recommended to monitor the flight progress. When overflying a waypoint, verify the track and distance to the next waypoint. Each 30 minutes, verify the fuel on board from the ECAM, the fuel prediction from the FMGC, and compare the data with the flight plan. Ensure that the fuel on board and fuel consumed is consistent with the fuel on board at departure.","action":""},{"actor":"PF","item":"STEP FLIGHT LEVEL","action":"AS APPROPRIATE","id":"s11_g0_i321"},{"actor":"PF","item":"RADAR","action":"AS APPROPRIATE","id":"s11_g0_i322"},{"actor":"_BULLET_","item":"If the oxygen mask has been used:","action":""},{"actor":"CM","item":"OXYGEN MASK","action":"VERIFY","id":"s11_g0_i323"}]}]},{"title":"Descent Preparation","groups":[{"heading":"Descent Preparation","level":1,"items":[{"actor":"PM","item":"WEATHER AND LANDING INFORMATION","action":"OBTAIN","id":"s12_g0_i324"},{"actor":"_NOTE_","item":"Verify the weather reports at the destination and the alternate airport. This should include the runway in use for the arrival.","action":""},{"actor":"CM","item":"NAV CHARTS","action":"PREPARE","id":"s12_g0_i325"},{"actor":"PM","item":"LDG PERFORMANCE","action":"COMPUTE","id":"s12_g0_i326"},{"actor":"_NOTE_","item":"It is recommended to perform an in-flight landing performance calculation in case the landing conditions have changed since departure. If the landing conditions are expected to change, it is recommended to compute with the worst possible runway conditions. Furthermore, the selection of REV MAX is the standard practice for landing.","action":""},{"actor":"CM","item":"LDG PERFORMANCE","action":"VERIFY","id":"s12_g0_i327"},{"actor":"CM","item":"ARRIVAL page","action":"COMPLETE/VERIFY","id":"s12_g0_i328"},{"actor":"_NOTE_","item":"If possible, insert the APPR, STAR, APPR VIA and TRANS.","action":""},{"actor":"CM","item":"F-PLN A page","action":"VERIFY","id":"s12_g0_i329"},{"actor":"_NOTE_","item":"Ensure that the inserted flight plan agrees with the planned and missed approach. Ensure that they respect the restrictions from the charts. The flight crew may require adding a new speed or altitude constraint. It is not recommended to modify the final approach fix (FAF to runway or MAP). In case of a \u201cTOO STEEP PATH\u201d message appearing, do not use the FINAL APP guidance for approach.","action":""},{"actor":"CM","item":"DES WIND page","action":"VERIFY","id":"s12_g0_i330"},{"actor":"CM","item":"PERF CRUISE page","action":"VERIFY","id":"s12_g0_i331"},{"actor":"CM","item":"PERF DES page","action":"VERIFY","id":"s12_g0_i332"},{"actor":"_NOTE_","item":"Before starting the descent, it is recommended to access the PERF DES page and verify the ECON MACH/SPD. If any other speed is required other than the ECON speed, insert that MACH or SPD into the ECON field. This allows the system to calculate the descent path and the top of descent.","action":""},{"actor":"_NOTE_","item":"Note: The default speed limit is 250 knots below 10 000 feet. The flight crew may modify on the VERT REV at the DEST page.","action":""},{"actor":"CM","item":"PERF APPR page","action":"COMPLETE/VERIFY","id":"s12_g0_i333"},{"actor":"_NOTE_","item":"Insert the QNH, the temperature, the wind at destination and the minimum. It is not recommended to insert gust values.","action":""},{"actor":"_NOTE_","item":"Note: If there is a change of runway or a change in the approach type, it will automatically erase the inserted minimum.","action":""},{"actor":"CM","item":"PERF GO-AROUND page","action":"VERIFY/MODIFY","id":"s12_g0_i334"},{"actor":"_NOTE_","item":"Verify the thrust reduction altitude and the acceleration altitude. The flight crew may modify if necessary.","action":""},{"actor":"CM","item":"RAD NAV page","action":"VERIFY","id":"s12_g0_i335"},{"actor":"_NOTE_","item":"Set the navaids as required. Verify the idents on the navigation display and on the primary flight display. If a VOR/DME exists close to the airfield, it is recommended to select it and enter its ident in the BRG/DIST field of the PROG page. This allows the monitoring of NAV ACCY during descent.","action":""},{"actor":"CM","item":"SEC F-PLN page","action":"AS REQUIRED","id":"s12_g0_i336"},{"actor":"_NOTE_","item":"It is recommended to set the secondary flight plan to the alternate runway for destination, or to the landing runway in case of a circling approach.","action":""},{"actor":"PM","item":"GPWS LDG FLAP 3 pushbutton","action":"AS REQUIRED","id":"s12_g0_i337"},{"actor":"_NOTE_","item":"If the flight crew plans on landing with the FLAPS 3 configuration, the GPWS LDG FLAP 3 must be set to ON.","action":""},{"actor":"PF","item":"LDG ELEV","action":"VERIFY","id":"s12_g0_i338"},{"actor":"_NOTE_","item":"Ensure that the LDG ELEV AUTO displays in green on the ECAM CRUISE page and verify the associated value.","action":""},{"actor":"PF","item":"AUTO BRK","action":"AS REQUIRED","id":"s12_g0_i339"},{"actor":"_NOTE_","item":"It is recommended to use the autobrakes. For short or contaminated runways, the MED mode is recommended. For long runways, the LO mode is recommended. It is not recommended to use the MAX mode.","action":""},{"actor":"CM","item":"APPROACH BRIEFING","action":"PERFORM","id":"s12_g0_i340"},{"actor":"CM","item":"TERR ON ND","action":"AS REQUIRED","id":"s12_g0_i341"},{"actor":"_NOTE_","item":"It is recommended to set the weather radar to the PF side and the TERR ON ND on the PM side. It is not recommended to use the TERR ON ND if the nav accuracy is low.","action":""},{"actor":"PF","item":"RADAR","action":"ADJUST AS APPROPRIATE","id":"s12_g0_i342"},{"actor":"PM","item":"ENG ANTI-ICE pushbutton","action":"AS REQUIRED","id":"s12_g0_i343"},{"actor":"_NOTE_","item":"It is recommended to set the engine anti-ice to ON, even if the SAT is below -40\u00b0C. This ensures better protection against flame-out.","action":""},{"actor":"PM","item":"WING ANTI-ICE pushbutton","action":"AS REQUIRED","id":"s12_g0_i344"},{"actor":"_NOTE_","item":"Note: When turning the anti-ice on, it reduces the descent path angle. The pilot can therefore compensate by increasing the descent speed or by extending up to half speedbrakes.","action":""},{"actor":"PM","item":"DESCENT CLEARANCE","action":"OBTAIN","id":"s12_g0_i345"},{"actor":"PF","item":"CLEARED ALTITUDE ON FCU","action":"SET","id":"s12_g0_i346"},{"actor":"_NOTE_","item":"Ensure that the cleared altitude is lower than the ATC-cleared altitude.","action":""}]}]},{"title":"Descent","groups":[{"heading":"Descent Initiation","level":1,"items":[{"actor":"PF","item":"DESCENT","action":"INITIATE","id":"s13_g0_i347"},{"actor":"_NOTE_","item":"It is recommended to select the DES mode at the top of descent.","action":""}],"subgroups":[{"heading":"Descent Monitoring","level":2,"items":[{"actor":"PF","item":"MCDU","action":"PROG/PERF DES","id":"s13_g0_sg0_i348"},{"actor":"_NOTE_","item":"It is recommended for the PF to display the PROG page to get the VDEV or RQD DIST TO LAND/DIRECT DIST TO LAND information. The PF can also select the PERF DES page to get predictions to any inserted altitude in the DES/OP DES and EXP mode.","action":""},{"actor":"PM","item":"MCDU","action":"F-PLN","id":"s13_g0_sg0_i349"},{"actor":"PF","item":"DESCENT","action":"MONITOR/ADJUST","id":"s13_g0_sg0_i350"},{"actor":"_NOTE_","item":"It is recommended to use the DES mode when flying in the NAV mode. This allows the aircraft to descend along the descent flight path, considering all constraints.","action":""},{"actor":"_NOTE_","item":"Note: When the aircraft is flying in HDG or TRK mode, the DES mode is not available.","action":""}]},{"heading":"Descent Adjustment","level":2,"items":[{"actor":"_NOTE_","item":"To increase the rate of descent, it is recommended to increase the descent speed using selected speed. It allows better fuel economy than other techniques.","action":""},{"actor":"CM","item":"BAROMETRIC REFERENCE","action":"SET","id":"s13_g0_sg1_i351"},{"actor":"_NOTE_","item":"Set the QNH on the EFIS control panel and on the ISIS at the transition altitude.","action":""},{"actor":"PM","item":"ECAM STATUS","action":"VERIFY","id":"s13_g0_sg1_i352"},{"actor":"_NOTE_","item":"Ensure that there is no status reminder on the upper ECAM display. Note any degradation in landing capability or affecting approach and landing.","action":""}]},{"heading":"At 10 000 Feet","level":2,"items":[{"actor":"PM","item":"LAND lights","action":"SET","id":"s13_g0_sg2_i353"},{"actor":"PM","item":"SEAT BELTS switch","action":"ON","id":"s13_g0_sg2_i354"},{"actor":"CM","item":"EFIS options","action":"CSTR","id":"s13_g0_sg2_i355"},{"actor":"_NOTE_","item":"It is recommended to select CSTR on both sides.","action":""},{"actor":"CM","item":"ILS/LS pushbutton","action":"AS REQUIRED","id":"s13_g0_sg2_i356"},{"actor":"_NOTE_","item":"It is recommended to turn on the ILS/LS if an ILS, GLS, MLS, ILS G/S out, LOC only, LOC/BC or FLS approaches. The flight crew must ensure that the deviation scales and IDENT are displayed on the PFD.","action":""},{"actor":"PM","item":"RAD NAVAIDS","action":"SELECTED/IDENTIFIED","id":"s13_g0_sg2_i357"},{"actor":"_NOTE_","item":"The flight crew must ensure that the appropriate NAVAIDS are tuned and identified.","action":""},{"actor":"PF","item":"NAV ACCURACY","action":"VERIFY","id":"s13_g0_sg2_i358"},{"actor":"_NOTE_","item":"If the GPS PRIMARY function is available, there is no accuracy check required.","action":""}]},{"heading":"Approach Checklist","level":2,"items":[{"actor":"CM","item":"APPROACH CHECKLIST","action":"PERFORM","id":"s13_g0_sg3_i359"}]}]}]},{"title":"Approach \u2013 General","groups":[{"heading":"Guidance Mode per Approach Type","level":1,"items":[]},{"heading":"Initial Approach \u2013 General","level":1,"items":[{"actor":"PF","item":"F-PLN SEQUENCING","action":"ADJUST","id":"s14_g1_i360"},{"actor":"_NOTE_","item":"The NAV mode will be automatically available after go-around if the flight plan is properly sequenced. If flying in nav mode, the F-PLN will sequence automatically. In HDG/TRK mode, the F-PLN will only sequence automatically if flying close to the F-PLN route.","action":""},{"actor":"CM","item":"APPROACH PHASE","action":"VERIFY/ACTIVATE","id":"s14_g1_i361"},{"actor":"_NOTE_","item":"If flying in NAV mode, the approach phase will automatically activate itself if the aircraft overlies the DECEL pseudo waypoint. If flying in HDG/TRK mode, it is recommended to activate the approach phase 15 NM from touchdown.","action":""},{"actor":"PF","item":"MANAGED SPEED","action":"VERIFY","id":"s14_g1_i362"},{"actor":"_NOTE_","item":"It is recommended to remain in managed speed mode. If, for any reasons, the ATC requires a different speed, use the selected speed mode.","action":""},{"actor":"PF","item":"FLIGHT PATH","action":"MONITOR","id":"s14_g1_i363"},{"actor":"_NOTE_","item":"If flying in NAV mode, it is recommended to use the VDEV information on the PFD and PROG MCDU page. If flying in HDG/TRK mode, it is recommended to use the energy circle on the ND.","action":""},{"actor":"PF","item":"SPEED BRAKES lever","action":"AS REQUIRED","id":"s14_g1_i364"},{"actor":"_NOTE_","item":"It is recommended to avoid the use of the speed brakes. In the case of the use of the speedbrakes, the flight crew should ensure that there is an appropriate speed margin before the extension of the speed brakes. The flight crew should also ensure that there is an appropriate speed margin before the beginning of a turn. This is to ensure that the Alpha-Floor protection doesn\u2019t activate.","action":""},{"actor":"PF","item":"RADAR","action":"ADJUST AS APPROPRIATE","id":"s14_g1_i365"},{"actor":"PM","item":"NAV ACCURACY","action":"MONITOR","id":"s14_g1_i366"},{"actor":"_NOTE_","item":"If the GPS PRIMARY function is available, there is no accuracy check required.","action":""}]},{"heading":"Intermediate / Final Approach \u2013 General","level":1,"items":[],"subgroups":[{"heading":"At Green Dot Speed","level":2,"items":[{"actor":"PF","item":"FLAPS 1","action":"ORDER","id":"s14_g2_sg0_i367"},{"actor":"PM","item":"FLAPS 1","action":"SELECT","id":"s14_g2_sg0_i368"},{"actor":"_NOTE_","item":"It is recommended to select the FLAPS 1 3 NM before the final descent point. The aircraft should also decelerate. If the aircraft does not decelerate, the flight crew should consider the extension of the landing gear before the extension of speedbrakes. The extension of the speedbrakes at this point will cause an increase in VLS.","action":""},{"actor":"PM","item":"TCAS MODE selector","action":"TA or TA/RA","id":"s14_g2_sg0_i369"},{"actor":"_NOTE_","item":"It is recommended to use TA/RA for normal situations. If it is inappropriate, such as converging runways or parallel runways, the use of TA ONLY mode is recommended.","action":""}]},{"heading":"At 2 000 Feet AGL Minimum","level":2,"items":[{"actor":"PF","item":"FLAPS 2","action":"ORDER","id":"s14_g2_sg1_i370"},{"actor":"PM","item":"FLAPS 2","action":"SELECT","id":"s14_g2_sg1_i371"},{"actor":"_NOTE_","item":"The flight crew must notice a deceleration toward the F speed. The flight crew should consider extending the landing gear to reduce the airspeed. The use of speedbrakes is not recommended.","action":""}]},{"heading":"When Flaps Are at 2","level":2,"items":[{"actor":"PF","item":"L/G DOWN","action":"ORDER","id":"s14_g2_sg2_i372"},{"actor":"PM","item":"L/G lever","action":"SELECT DOWN","id":"s14_g2_sg2_i373"},{"actor":"PM","item":"AUTO BRK","action":"CONFIRM","id":"s14_g2_sg2_i374"},{"actor":"PM","item":"GROUND SPOILERS","action":"ARM","id":"s14_g2_sg2_i375"}]},{"heading":"Exterior Lights","level":2,"items":[{"actor":"PM","item":"NOSE switch","action":"T.O","id":"s14_g2_sg3_i376"},{"actor":"PM","item":"RWY TURN OFF switch","action":"ON","id":"s14_g2_sg3_i377"}]},{"heading":"When Landing Gear is Down","level":2,"items":[{"actor":"PF","item":"FLAPS 3","action":"ORDER","id":"s14_g2_sg4_i378"},{"actor":"PM","item":"FLAPS 3","action":"SELECT","id":"s14_g2_sg4_i379"},{"actor":"PM","item":"ECAM WHEEL SD page","action":"CHECK","id":"s14_g2_sg4_i380"},{"actor":"PM","item":"L/G lights","action":"CONFIRM THREE GREEN","id":"s14_g2_sg4_i381"},{"actor":"PF","item":"FLAPS FULL","action":"ORDER","id":"s14_g2_sg4_i382"},{"actor":"PM","item":"FLAPS FULL","action":"SELECT","id":"s14_g2_sg4_i383"},{"actor":"_NOTE_","item":"It is recommended to retract the speedbrakes before selecting the FLAPS full. This prevents the aircraft from pitching down when the speedbrakes retract automatically.","action":""},{"actor":"PM","item":"A/THR","action":"VERIFY IN SPEED MODE OR OFF","id":"s14_g2_sg4_i384"},{"actor":"PM","item":"WING ANTI-ICE pushbutton","action":"OFF","id":"s14_g2_sg4_i385"},{"actor":"_NOTE_","item":"Only turn the wing anti-ice ON when there are severe icing conditions.","action":""},{"actor":"CM","item":"SLIDING TABLE","action":"STOW","id":"s14_g2_sg4_i386"},{"actor":"CM","item":"ALL EFB","action":"STOW","id":"s14_g2_sg4_i387"},{"actor":"PM","item":"LDG MEMO","action":"VERIFY NO BLUE","id":"s14_g2_sg4_i388"},{"actor":"CM","item":"CABIN REPORT","action":"RECEIVE","id":"s14_g2_sg4_i389"},{"actor":"PM","item":"CABIN CREW","action":"ADVISE","id":"s14_g2_sg4_i390"},{"actor":"CM","item":"LANDING CHECKLIST","action":"COMPLETE","id":"s14_g2_sg4_i391"},{"actor":"PM","item":"FLIGHT PARAMETERS","action":"MONITOR","id":"s14_g2_sg4_i392"},{"actor":"_NOTE_","item":"The PF should announce any FMA modification. The PM should call out in the following condition sg0_i468"},{"actor":"PF","item":"THRUST levers","action":"IDLE","id":"s18_g0_sg0_i469"},{"actor":"_NOTE_","item":"The autopilot will automatically disengage when the thrust levers are set to IDLE.","action":""}]},{"heading":"At Touchdown","level":2,"items":[{"actor":"PF","item":"DEROTATION","action":"INITIATE","id":"s18_g0_sg1_i470"},{"actor":"PF","item":"ALL THRUST LEVERS","action":"REV MAX or REV IDLE","id":"s18_g0_sg1_i471"},{"actor":"_NOTE_","item":"The flight crew must select the reverse thrust immediately after the main landing gear touches the ground.","action":""},{"actor":"PM","item":"GROUND SPOILERS","action":"VERIFY/ANNOUNCE","id":"s18_g0_sg1_i472"},{"actor":"_NOTE_","item":"Verify the ground spoilers on the WHEEL SD page.","action":""},{"actor":"PM","item":"REVERSERS","action":"VERIFY/ANNOUNCE","id":"s18_g0_sg1_i473"},{"actor":"_NOTE_","item":"Ensure that the ECAM E/WD displays the reverse deployment (REV in green).","action":""},{"actor":"PF","item":"DIRECTIONAL CONTROL","action":"MONITOR/ENSURE","id":"s18_g0_sg1_i474"},{"actor":"_NOTE_","item":"It is recommended to use the rudder until reaching taxi speed.","action":""},{"actor":"PF","item":"BRAKES","action":"AS REQUIRED","id":"s18_g0_sg1_i475"},{"actor":"_NOTE_","item":"If there are no ground spoilers extended, the autobrakes are not activated. The use of manual braking is therefore recommended in this situation.","action":""},{"actor":"PM","item":"DECELERATION","action":"VERIFY/ANNOUNCE","id":"s18_g0_sg1_i476"}]},{"heading":"At 70 Knots","level":2,"items":[{"actor":"PM","item":"SEVENTY KNOTS","action":"ANNOUNCE","id":"s18_g0_sg2_i477"},{"actor":"PF","item":"BOTH THRUST LEVERS","action":"REV IDLE","id":"s18_g0_sg2_i478"},{"actor":"_NOTE_","item":"It is recommended to reduce thrust when passing 70 knots. Keeping a high level of reverse thrust may result in an engine stall due to excessive EGT.","action":""}]},{"heading":"At Taxi Speed","level":2,"items":[{"actor":"PF","item":"REVERSERS","action":"STOW"
