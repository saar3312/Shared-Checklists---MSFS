or":"PILOT","item":"PRELIMINARY TAKEOFF DATA","action":"CROSSCHECK","id":"s0_g8_i43"},{"actor":"_NOTE_","item":"The flight crew should compare both preliminary takeoff data results and ensure that the computations are the same.","action":""}]},{"heading":"Operation Engineering Bulletins","level":1,"items":[{"actor":"PILOT","item":"OEB","action":"VERIFY","id":"s0_g9_i44"}]},{"heading":"Before Walkaround","level":1,"items":[],"subgroups":[{"heading":"ECAM Pages","level":2,"items":[{"actor":"_BULLET_","item":"On the DOOR system display page:","action":""},{"actor":"PILOT","item":"OXYGEN","action":"VERIFY PRESSURE","id":"s0_g10_sg0_i45"},{"actor":"_BULLET_","item":"If the oxygen pressure is half boxed in amber:","action":""},{"actor":"PILOT","item":"MIN FLT CREW OXY CHART","action":"VERIFY PRESSURE","id":"s0_g10_sg0_i46"},{"actor":"_BULLET_","item":"On the HYD system display page:","action":""},{"actor":"PILOT","item":"RESERVOIR FLUID LEVEL","action":"VERIFY WITHIN NORMAL RANGE","id":"s0_g10_sg0_i47"},{"actor":"_NOTE_","item":"The volume of the hydraulic fluid level in the reservoirs may be altered due to the outside air pressure. It is recommended to verify with the maintenance crew to validate the issue and resolve the situation.","action":""},{"actor":"_BULLET_","item":"On the ENG system display page:","action":""},{"actor":"PILOT","item":"ENGINE OIL QUANTITY","action":"VERIFY WITHIN NORMAL RANGE","id":"s0_g10_sg0_i48"},{"actor":"_NOTE_","item":"If there is no indication of the engine oil quantity on the engine system display page, push the ENG 1 and 2 FADEC GND PWR to the ON position. The indication will then appear. After verification, set the ENG 1 and 2 FADEC GND PWR to the OFF position. The oil quantity should indicate at or above 8.9 qt + estimated consumption and not below 10.6 qt. The estimated consumption is 0.45 qt/h.","action":""}]}]},{"heading":"Flight Controls","level":1,"items":[{"actor":"PILOT","item":"FLAPS lever","action":"VERIFY POSITION","id":"s0_g11_i49"},{"actor":"_NOTE_","item":"Ensure that the upper ECAM displays the same position as the flap lever position.","action":""},{"actor":"PILOT","item":"SPEEDBRAKES lever","action":"VERIFY RETRACTED AND DISARMED","id":"s0_g11_i50"}]},{"heading":"Parking Brake","level":1,"items":[{"actor":"PILOT","item":"ACCU PRESS indicator","action":"VERIFY","id":"s0_g12_i51"},{"actor":"_NOTE_","item":"The ACCU PRESS indicator should indicate within the green band. If it is not in the green band, the flight crew may turn on the electric pump on the yellow hydraulic system to recharge the brake accumulator.","action":""},{"actor":"PILOT","item":"PARKING BRAKE handle","action":"ON","id":"s0_g12_i52"},{"actor":"_NOTE_","item":"It is recommended to avoid applying the parking brake when one or multiple brake temperatures are above 500\u00b0C.","action":""},{"actor":"PILOT","item":"BRAKE PRESS indicator","action":"VERIFY","id":"s0_g12_i53"}]},{"heading":"Alternate Braking System","level":1,"items":[{"actor":"PILOT","item":"Y ELECTRIC PUMP pushbutton","action":"VERIFY OFF","id":"s0_g13_i54"},{"actor":"PILOT","item":"CHOCKS","action":"VERIFY IN PLACE","id":"s0_g13_i55"},{"actor":"PILOT","item":"PARKING BRAKE handle","action":"OFF","id":"s0_g13_i56"},{"actor":"PILOT","item":"BRAKE pedals","action":"PRESS MAXIMUM PRESSURE","id":"s0_g13_i57"},{"actor":"PILOT","item":"BRAKE PRESSURE","action":"VERIFY","id":"s0_g13_i58"},{"actor":"_NOTE_","item":"The flight crew should ensure that the pressure builds up symmetrically without delay. With full pedal deflection, the pressure must be within 2000 and 2700 psi.","action":""},{"actor":"PILOT","item":"BRAKE pedals","action":"RELEASE","id":"s0_g13_i59"},{"actor":"PILOT","item":"PARKING BRAKE handle","action":"ON","id":"s0_g13_i60"},{"actor":"_NOTE_","item":"The parking brake must be set for the exterior inspection. This allows the flight crew to verify the brake wear indicators.","action":""}]},{"heading":"Emergency Equipment","level":1,"items":[{"actor":"PILOT","item":"EMERGENCY EQUIPMENT","action":"VERIFY ONBOARD","id":"s0_g14_i61"},{"actor":"_NOTE_","item":"Ensure that the following emergency equipment is found onboard the aircraft: life jackets, axe, smoke hoods or portable oxygen equipment and full-face masks, portable fire extinguisher, smoke goggles, oxygen masks, flashlights, and escape ropes.","action":""}]},{"heading":"Rain Repellent","level":1,"items":[{"actor":"PILOT","item":"RAIN RPLNT indicators","action":"VERIFY PRESSURE AND QUANTITY","id":"s0_g15_i62"},{"actor":"_NOTE_","item":"It is not recommended to use rain repellent to wash the windshield. It is also not recommended to use it on a dry windshield.","action":""}]},{"heading":"Circuit Breakers Panels","level":1,"items":[{"actor":"PILOT","item":"REAR AND OVERHEAD CIRCUIT BREAKER panels","action":"VERIFY","id":"s0_g16_i63"},{"actor":"_NOTE_","item":"Ensure that all the breakers are set. Flight crew may reset as necessary.","action":""}]},{"heading":"Landing Gear Pins and Covers","level":1,"items":[{"actor":"PILOT","item":"GEAR PINS AND COVERS","action":"VERIFY ONBOARD AND STOWED","id":"s0_g17_i64"}]}]},{"title":"Exterior Inspection","groups":[]},{"title":"Cockpit Preparation","groups":[{"heading":"Overhead Panel","level":1,"items":[],"subgroups":[{"heading":"White Lights on the Overhead Panel","level":2,"items":[{"actor":"_BULLET_","item":"In the passing flow the overhead panel:","action":""},{"actor":"PILOT","item":"ALL WHITE LIGHTS","action":"OFF","id":"s2_g0_sg0_i65"}]},{"heading":"Recorder","level":2,"items":[{"actor":"PILOT","item":"RCDR GND CTL pushbutton","action":"ON","id":"s2_g0_sg1_i66"},{"actor":"PILOT","item":"LOUDSPEAKER VOLUME knob","action":"BOTH SIDES \u2013 OFF","id":"s2_g0_sg1_i67"},{"actor":"PILOT","item":"ACP INT/RAD switch","action":"SET TO INT","id":"s2_g0_sg1_i68"},{"actor":"PILOT","item":"INTERPHONE VOLUME RECEPTION knob","action":"RELEASE","id":"s2_g0_sg1_i69"},{"actor":"PILOT","item":"CVR TEST pushbutton","action":"PRESS AND MAINTAIN","id":"s2_g0_sg1_i70"},{"actor":"_NOTE_","item":"To know the CVR result, the flight crew should hear an audio test signal through the loudspeakers. The audio test signal depends on the CVR model installed on the aircraft. A CVR 30 minutes will emit a continuous tone or a short tone, while the CVR 120 minutes will emit a short tone, or a short tone and a beep at every 4 seconds, or two short tones and a beep every 4 seconds.","action":""}]},{"heading":"EVAC","level":2,"items":[{"actor":"PILOT","item":"CAPT & PURS/CAPT switch","action":"AS REQUIRED","id":"s2_g0_sg2_i71"},{"actor":"_NOTE_","item":"This depends on the company policy.","action":""}]},{"heading":"ADIRS","level":2,"items":[{"actor":"PILOT","item":"All IR MODE selectors","action":"NAV","id":"s2_g0_sg3_i72"},{"actor":"_NOTE_","item":"It is recommended to align the inertial references as soon as possible. The initialization may take some time. It is also recommended to complete a full alignment if this is the first flight of the day, the flight crew has changed, the GPS is not available to all segments in the flight and the pilot expects long segments with low NAVAID coverage, or if the GPS is not available during a flight with an expected flight time over 3 hours. It is recommended to perform a fast alignment for all other flight conditions.","action":""}]},{"heading":"Exterior Lights","level":2,"items":[{"actor":"PILOT","item":"STROBE switch","action":"AUTO","id":"s2_g0_sg4_i73"},{"actor":"PILOT","item":"BEACON switch","action":"OFF","id":"s2_g0_sg4_i74"},{"actor":"PILOT","item":"NAV & LOGO switch","action":"AS REQUIRED","id":"s2_g0_sg4_i75"},{"actor":"PILOT","item":"REMAINING EXTERIOR LIGHTS","action":"AS REQUIRED","id":"s2_g0_sg4_i76"}]},{"heading":"Signs","level":2,"items":[{"actor":"PILOT","item":"SEAT BELTS sign","action":"ON / AUTO","id":"s2_g0_sg5_i77"},{"actor":"PILOT","item":"NO SMOKING sign","action":"AUTO","id":"s2_g0_sg5_i78"},{"actor":"_NOTE_","item":"Leaving the SEAT BELTS sign or NO SMOKING sign prevents the emergency batteries from charging.","action":""},{"actor":"PILOT","item":"EMER EXIT LT selector","action":"ARM","id":"s2_g0_sg5_i79"}]},{"heading":"Probe / Window Heat","level":2,"items":[{"actor":"PILOT","item":"PROBE/WINDOW HEAT pushbuttons","action":"VERIFY AUTO","id":"s2_g0_sg6_i80"}]},{"heading":"Cabin Pressure","level":2,"items":[{"actor":"PILOT","item":"LDG ELEV knob","action":"AUTO","id":"s2_g0_sg7_i81"}]},{"heading":"Air Conditioning","level":2,"items":[{"actor":"PILOT","item":"PACK FLOW selector","action":"AS REQUIRED","id":"s2_g0_sg8_i82"},{"actor":"_NOTE_","item":"It is recommended to set the PACK FLOW to NORM. The flight crew can select LO if the flight has less than 141 passengers. The flight crew can also select HI for abnormally hot and humid conditions.","action":""},{"actor":"_NOTE_","item":"Note: If the APU is supplying, the pack controllers will select HI flow automatically, no matter what the selector position is.","action":""}]},{"heading":"Electrical","level":2,"items":[{"actor":"PILOT","item":"ECAM ELEC PAGE","action":"PRESS","id":"s2_g0_sg9_i83"},{"actor":"PILOT","item":"BAT 1 & 2 pushbuttons","action":"OFF THEN ON","id":"s2_g0_sg9_i84"},{"actor":"_NOTE_","item":"After 10 seconds, the flight crew should ensure that the battery charge is below 60 A and is decreasing.","action":""}]},{"heading":"Fuel","level":2,"items":[{"actor":"_BULLET_","item":"If the fuel level in the center tank is less than 200 kg / 440 lbs for the flight:","action":""},{"actor":"PILOT","item":"FUEL MODE SEL pushbutton","action":"MAN","id":"s2_g0_sg10_i85"},{"actor":"PILOT","item":"CTR TK PUMP 1 & 2 pushbuttons","action":"OFF","id":"s2_g0_sg10_i86"},{"actor":"_BULLET_","item":"If the fuel level in the center tank is not less than 200 kg / 440 lbs for the flight:","action":""},{"actor":"PILOT","item":"FUEL MODE SEL pushbutton","action":"VERIFY AUTO","id":"s2_g0_sg10_i87"}]},{"heading":"Engine Fire Tests","level":2,"items":[{"actor":"PILOT","item":"ENG 1 FIRE & ENG 2 FIRE pushbuttons","action":"VERIFY IN AND GUARDED","id":"s2_g0_sg11_i88"},{"actor":"PILOT","item":"AGENT 1 & 2 lights","action":"VERIFY OFF","id":"s2_g0_sg11_i89"},{"actor":"PILOT","item":"ENG 1 TEST & ENG 2 TEST","action":"PRESS AND MAINTAIN","id":"s2_g0_sg11_i90"},{"actor":"_NOTE_","item":"The pilots hold the TEST pushbutton pressed throughout the test. The test result should include the following items:","action":""},{"actor":"_BULLET_","item":"A constant repetitive chime sound;","action":""},{"actor":"_BULLET_","item":"The master warning light flashes on the glareshield;","action":""},{"actor":"_BULLET_","item":"The ECAM displays the engine fire alert messages (ENG 1 FIRE, ENG 2 FIRE);","action":""},{"actor":"_BULLET_","item":"All engine fire pushbuttons and the squib lights of the engine agent pushbuttons are illuminated;","action":""},{"actor":"_BULLET_","item":"The disch light of the engine agent pushbutton illuminates; and","action":""},{"actor":"_BULLET_","item":"All fire lights on the engine master panel illuminate.","action":""}]},{"heading":"Audio Switching Panel","level":2,"items":[{"actor":"PILOT","item":"AUDIO SWITCHING selector","action":"NORM","id":"s2_g0_sg12_i91"}]},{"heading":"Ventilation","level":2,"items":[{"actor":"PILOT","item":"ALL LIGHTS","action":"VERIFY OFF","id":"s2_g0_sg13_i92"}]},{"heading":"ACT Control Panel","level":2,"items":[{"actor":"PILOT","item":"ACT XFR rotary selector","action":"OFF","id":"s2_g0_sg14_i93"}]},{"heading":"Third Occupant Audio Control Panel","level":2,"items":[{"actor":"PILOT","item":"PA knob","action":"RECEPT","id":"s2_g0_sg15_i94"},{"actor":"_NOTE_","item":"It is recommended to set the volume at or above medium range. This allows the cabin announcements to be recorded on the cockpit voice recorder.","action":""}]},{"heading":"Maintenance Panel","level":2,"items":[{"actor":"PILOT","item":"ALL LIGHTS","action":"VERIFY OFF","id":"s2_g0_sg16_i95"}]}]},{"heading":"Center Instrument Panel","level":1,"items":[],"subgroups":[{"heading":"ISIS","level":2,"items":[{"actor":"PILOT","item":"ISIS","action":"VERIFY","id":"s2_g1_sg0_i96"},{"actor":"_NOTE_","item":"The flight crew can adjust the brightness, the altimeter readings and setting, and the attitude display. Ensure that no flags are shown. If necessary, reset the attitude.","action":""},{"actor":"_NOTE_","item":"Note: The use of the ISIS bug functions is not recommended.","action":""}]},{"heading":"Clock","level":2,"items":[{"actor":"PILOT","item":"CLOCK","action":"VERIFY / SET","id":"s2_g1_sg1_i97"},{"actor":"_NOTE_","item":"The flight crew must ensure that the date is correct. If it is not correct, the flight crew can set the date manually and keep the clock mode in the internal mode for the flight.","action":""}]},{"heading":"Nosewheel Steering","level":2,"items":[{"actor":"PILOT","item":"A/SKID & N/W STRG switch","action":"ON","id":"s2_g1_sg2_i98"}]}]},{"heading":"Pedestal","level":1,"items":[],"subgroups":[{"heading":"ACP","level":2,"items":[{"actor":"PILOT","item":"INT knob","action":"PRESS OUT / VERIFY VOLUME","id":"s2_g2_sg0_i99"},{"actor":"PILOT","item":"VHF","action":"VERIFY","id":"s2_g2_sg0_i100"},{"actor":"PILOT","item":"HF","action":"VERIFY","id":"s2_g2_sg0_i101"},{"actor":"_NOTE_","item":"Verify the transmission and reception of the VHF and HF. It is prohibited to transmit on HF when the aircraft is refueling.","action":""}]},{"heading":"Cockpit Door","level":2,"items":[{"actor":"PILOT","item":"ANN LT selector","action":"TEST","id":"s2_g2_sg1_i102"},{"actor":"_NOTE_","item":"On the pedestal, ensure that the OPEN, FAULT, and the three LED lights on the overhead panel illuminate.","action":""},{"actor":"PILOT","item":"ANN LT selector","action":"BRT","id":"s2_g2_sg1_i103"},{"actor":"_NOTE_","item":"Ensure that all lights go off.","action":""},{"actor":"PILOT","item":"CKPT DOOR","action":"VERIFY CORRECT OPERATION","id":"s2_g2_sg1_i104"},{"actor":"PILOT","item":"CKPT DOOR MECHANICAL OVERRIDE","action":"VERIFY","id":"s2_g2_sg1_i105"}]},{"heading":"Switching Panel","level":2,"items":[{"actor":"PILOT","item":"ALL SELECTORS","action":"VERIFY NORM","id":"s2_g2_sg2_i106"}]},{"heading":"Engine","level":2,"items":[{"actor":"PILOT","item":"THRUST lever","action":"IDLE","id":"s2_g2_sg3_i107"},{"actor":"PILOT","item":"ENG MASTER switches","action":"OFF","id":"s2_g2_sg3_i108"},{"actor":"PILOT","item":"ENG MODE selector","action":"NORM","id":"s2_g2_sg3_i109"}]},{"heading":"Parking Brake","level":2,"items":[{"actor":"PILOT","item":"ACCU PRESS indicator","action":"VERIFY","id":"s2_g2_sg4_i110"},{"actor":"_NOTE_","item":"If the ACCU PRESS indicates outside of the green band, the flight crew may use the electric pump on the yellow hydraulic system to recharge the brake accumulator.","action":""},{"actor":"PILOT","item":"PARK BRK handle","action":"VERIFY ON","id":"s2_g2_sg4_i111"},{"actor":"_NOTE_","item":"If the brakes are hot, and chocks are in place, the flight crew may leave the parking brakes off.","action":""},{"actor":"PILOT","item":"BRAKES PRESS indicator","action":"VERIFY","id":"s2_g2_sg4_i112"}]},{"heading":"Gravity Gear Extension","level":2,"items":[{"actor":"PILOT","item":"GRAVITY GEAR EXTN","action":"VERIFY STOWED","id":"s2_g2_sg5_i113"}]},{"heading":"Air Traffic Control","level":2,"items":[{"actor":"PILOT","item":"ATC","action":"STBY","id":"s2_g2_sg6_i114"},{"actor":"PILOT","item":"ALT RPTG","action":"ON","id":"s2_g2_sg6_i115"},{"actor":"PILOT","item":"ATC SYS 1","action":"SELECT","id":"s2_g2_sg6_i116"},{"actor":"_NOTE_","item":"It is recommended to select SYS 1 if AP 1 is used, and SYS 2 if AP 2 is used in RVSM operations.","action":""}]},{"heading":"Radio Management Panel","level":2,"items":[{"actor":"PILOT","item":"RMP","action":"VERIFY ON","id":"s2_g2_sg7_i117"},{"actor":"PILOT","item":"GREEN NAV light","action":"VERIFY OFF","id":"s2_g2_sg7_i118"},{"actor":"PILOT","item":"SEL light","action":"VERIFY OFF","id":"s2_g2_sg7_i119"},{"actor":"PILOT","item":"COM FREQUENCIES","action":"TUNE","id":"s2_g2_sg7_i120"},{"actor":"_NOTE_","item":"It is recommended to use the VHF in the following ways to ensure optimal operation of the system:","action":""},{"actor":"_BULLET_","item":"VHF selected for the active Air Traffic Control communications and emergency frequencies.","action":""},{"actor":"_BULLET_","item":"VHF 2 for the Automatic Terminal Information Service (ATIS).","action":""},{"actor":"_BULLET_","item":"VHF 3 for the ACARS.","action":""}]},{"heading":"ATC Datalink Communication","level":2,"items":[{"actor":"PILOT","item":"MSG RECORD","action":"ERASE","id":"s2_g2_sg8_i121"},{"actor":"_NOTE_","item":"To erase the message record, press the ATC COMM button on the MCDU and display the MSG RECORD page. Then, you can erase the MSG RECORD file.","action":""}]}]},{"heading":"FMGS Preparation","level":1,"items":[{"actor":"PILOT","item":"ENGINE & AIRCRAFT TYPE","action":"VERIFY","id":"s2_g3_i122"},{"actor":"_NOTE_","item":"To display the status page, press the DATA key.","action":""},{"actor":"PILOT","item":"FM database validity","action":"VERIFY","id":"s2_g3_i123"},{"actor":"_NOTE_","item":"Verify the database validity and the stored waypoints, navaids, runways, and routes.","action":""},{"actor":"_NOTE_","item":"On the Honeywell FMS, the AIRAC has one day in common with the previous AIRAC. It is then recommended on the first day of the AIRAC cycle to select the new AIRAC cycle on the first flight of the day.","action":""},{"actor":"PILOT","item":"NAVAID DESELECTION","action":"AS REQUIRED","id":"s2_g3_i124"},{"actor":"PILOT","item":"FLIGHT PLAN INITIALIZATION","action":"COMPLETE","id":"s2_g3_i125"},{"actor":"_NOTE_","item":"The flight crew should insert the company route or FROM/TO airport, verify ALTN/CO RTE, insert the flight number, enter the cost index, insert the estimated flight cruise level, verify the cruise flight level temperature, insert the expected ground temperature, and verify the alignment with the latitude and longitude.","action":""},{"actor":"PILOT","item":"ADIRS POSITION INITIALIZATION","action":"AS APPROPRIATE","id":"s2_g3_i126"},{"actor":"PILOT","item":"F-PLN A page","action":"COMPLETE AND VERIFIED","id":"s2_g3_i127"},{"actor":"_NOTE_","item":"First, perform a verification of the waypoints, routes, departure, arrival, and vertical climb speed limit or constraint. Then, modify the flight plan if appropriate. Verify the total distance calculated by the flight plan, and ensure that it is similar to the projected flight plan.","action":""},{"actor":"PILOT","item":"WINDS","action":"AS APPROPRIATE","id":"s2_g3_i128"},{"actor":"_NOTE_","item":"The flight crew can choose between using the trip wind and the forecast wind for climb, cruise, and descent phase.","action":""},{"actor":"PILOT","item":"F-PLN","action":"VERIFY","id":"s2_g3_i129"},{"actor":"_NOTE_","item":"Verify the total distance calculated by the flight plan using the DIST TO DEST function, and ensure that it is similar to the projected flight plan.","action":""},{"actor":"PILOT","item":"SECONDARY FLIGHT PLAN","action":"AS APPROPRIATE","id":"s2_g3_i130"},{"actor":"_NOTE_","item":"It is recommended to use secondary flight plans. Secondary flight plan should be used to anticipate a runway change, an immediate return, or an emergency landing to the nearest airport. However, the pilot must ensure that any past secondary flight plans are deleted.","action":""},{"actor":"PILOT","item":"RADIO NAV","action":"VERIFY","id":"s2_g3_i131"},{"actor":"_NOTE_","item":"Verify the VOR, ILS/GLS, MLS, and ADF chosen by the FMGC. If they are erroneous, modify them, and ensure the correct identifier is displayed on the navigation display and primary flight display.","action":""}],"subgroups":[{"heading":"Gross Weight Insertion (INIT B page)","level":2,"items":[{"actor":"PILOT","item":"ZFWCG/ZFW","action":"INSERT","id":"s2_g3_sg0_i132"},{"actor":"PILOT","item":"BLOCK FUEL","action":"INSERT","id":"s2_g3_sg0_i133"},{"actor":"_NOTE_","item":"If the data is not available yet, the pilot can insert the expected values to enable performance predictions and the optimal fuel distribution.","action":""}]},{"heading":"Takeoff Data Insertion (PERF TAKEOFF page)","level":2,"items":[{"actor":"PILOT","item":"T.O SHIFT","action":"INSERT AS REQUIRED","id":"s2_g3_sg1_i134"},{"actor":"_NOTE_","item":"It is recommended to insert a T.O Shift value if the flight crew plans to take off from an intersection.","action":""},{"actor":"PILOT","item":"V1, VR, V2","action":"INSERT","id":"s2_g3_sg1_i135"},{"actor":"PILOT","item":"FLX TO TEMP","action":"INSERT","id":"s2_g3_sg1_i136"},{"actor":"PILOT","item":"THR RED/ACC altitude","action":"SET OR VERIFY","id":"s2_g3_sg1_i137"},{"actor":"PILOT","item":"ENG OUT ACC altitude","action":"SET OR VERIFY","id":"s2_g3_sg1_i138"},{"actor":"PILOT","item":"FLAPS/THS reminder","action":"INSERT","id":"s2_g3_sg1_i139"}]},{"heading":"Climb, Cruise, Descent, Speed Preselection","level":2,"items":[{"actor":"PILOT","item":"PRESET SPEEDS","action":"AS REQUIRED","id":"s2_g3_sg2_i140"}]},{"heading":"FMGS Preparation Verification","level":2,"items":[{"actor":"PILOT","item":"FMS PREPARATION","action":"VERIFY","id":"s2_g3_sg3_i141"},{"actor":"_NOTE_","item":"Verify all the data inserted in the FMS.","action":""}]}]},{"heading":"Glareshield","level":1,"items":[],"subgroups":[{"heading":"EFIS Control Panel","level":2,"items":[{"actor":"PILOT","item":"BAROMETRIC REFERENCE","action":"SET","id":"s2_g4_sg0_i142"},{"actor":"_NOTE_","item":"Ensure to set the barometric on the EFIS control panel and on the standby altimeter. The flight crew must also verify that the difference in altitude of both PFDs is 20 feet, and the difference between a PFD and ISIS is no more than 100 feet.","action":""},{"actor":"PILOT","item":"FD","action":"VERIFY ON","id":"s2_g4_sg0_i143"},{"actor":"PILOT","item":"ILS/LS","action":"AS REQUIRED","id":"s2_g4_sg0_i144"},{"actor":"PILOT","item":"ND MODE AND RANGE","action":"AS REQUIRED","id":"s2_g4_sg0_i145"},{"actor":"PILOT","item":"ADF/VOR switch","action":"AS REQUIRED","id":"s2_g4_sg0_i146"}]},{"heading":"FCU","level":2,"items":[{"actor":"PILOT","item":"SPD MACH window","action":"DASHED","id":"s2_g4_sg1_i147"},{"actor":"PILOT","item":"HDG V/S \u2013 TRK FPA pushbutton","action":"HDG V/S","id":"s2_g4_sg1_i148"},{"actor":"PILOT","item":"ALT window","action":"SET INITIAL EXPECTED CLEARANCE ALTITUDE","id":"s2_g4_sg1_i149"}]}]},{"heading":"Lateral Console","level":1,"items":[],"subgroups":[{"heading":"Oxygen Mask Test","level":2,"items":[{"actor":"PILOT","item":"CREW SUPPLY pushbutton","action":"VERIFY ON","id":"s2_g5_sg0_i150"},{"actor":"PILOT","item":"LOUDSPEAKERS","action":"ON","id":"s2_g5_sg0_i151"},{"actor":"PILOT","item":"INT reception knob","action":"PRESS OUT - ADJUST","id":"s2_g5_sg0_i152"},{"actor":"PILOT","item":"INT/RAD switch","action":"INT","id":"s2_g5_sg0_i153"},{"actor":"_BULLET_","item":"On the mask stowage box:","action":""},{"actor":"PILOT","item":"RESET/TEST pushbutton","action":"PRESS IN DIRECTION OF THE ARROW","id":"s2_g5_sg0_i154"},{"actor":"_NOTE_","item":"Ensure that the blinker turns yellow, and after a short time goes black.","action":""},{"actor":"PILOT","item":"RESET/TEST pushbutton","action":"MAINTAIN","id":"s2_g5_sg0_i155"},{"actor":"PILOT","item":"EMERGENCY PRESSURE selector","action":"PRESS","id":"s2_g5_sg0_i156"},{"actor":"_NOTE_","item":"Ensure that the blinker turns yellow and remains yellow. The flight crew must also notice an oxygen flow through the loudspeakers.","action":""},{"actor":"PILOT","item":"REGUL LO PR message","action":"VERIFY OFF","id":"s2_g5_sg0_i157"}]}]},{"heading":"Instrument Panel","level":1,"items":[{"actor":"PILOT","item":"PFD and ND brightness knob","action":"AS REQUIRED","id":"s2_g6_i158"},{"actor":"PILOT","item":"LOUDSPEAKER knob","action":"SET","id":"s2_g6_i159"},{"actor":"_NOTE_","item":"It is recommended to set the LOUDSPEAKER knob to the 1 o\u2019clock position.","action":""},{"actor":"PILO LOT","item":"ZFW/ZFWCG","action":"VERIFY/REVISE","id":"s3_g0_i166"},{"actor":"_NOTE_","item":"The flight crew compares the ZFW and ZFWCG data with the previously entered data. If different, the flight crew must reinsert the data.","action":""},{"actor":"PILOT","item":"ZFW/ZFWCG","action":"CROSSCHECK","id":"s3_g0_i167"},{"actor":"_NOTE_","item":"The pilots verify on both flight management systems the values of the ZFW/ZFWCG.","action":""},{"actor":"PILOT","item":"FOB","action":"VERIFY","id":"s3_g0_i168"},{"actor":"_NOTE_","item":"Verify the fuel on board (FOB) on the system display. Ensure that it corresponds to the flight plan and to the loadsheet.","action":""}]},{"heading":"Takeoff Data","level":1,"items":[{"actor":"_BULLET_","item":"If takeoff conditions have changed:","action":""},{"actor":"PILOT","item":"FINAL TAKEOFF PERF DATA","action":"RECOMPUTE","id":"s3_g1_i169"},{"actor":"_NOTE_","item":"The flight crew members independently recompute the takeoff performance data.","action":""},{"actor":"PILOT","item":"FMS TAKEOFF DATA","action":"REVISE","id":"s3_g1_i170"},{"actor":"_NOTE_","item":"Verify the takeoff speeds, flexible temperature, and takeoff configuration.","action":""},{"actor":"PILOT","item":"FMS REVISED TAKEOFF PERF DATA","action":"CROSSCHECK","id":"s3_g1_i171"},{"actor":"_NOTE_","item":"The PF ensures the PNF got the same performance data on the T.O page.","action":""}]},{"heading":"Seating Position","level":1,"items":[{"actor":"PILOT","item":"SEATING POSITION","action":"ADJUST","id":"s3_g2_i172"},{"actor":"_NOTE_","item":"The pilot\u2019s eyes should be in line with the red and white balls.","action":""}]},{"heading":"MCDU","level":1,"items":[{"actor":"PILOT","item":"FMS PERF TO page","action":"SELECT","id":"s3_g3_i173"},{"actor":"_NOTE_","item":"It is recommended to set the PERF TO page on the PF MCDU.","action":""},{"actor":"PILOT","item":"FMS F-PLN page","action":"SELECT","id":"s3_g3_i174"},{"actor":"_NOTE_","item":"It is recommended to set the F-PLN page on the PM MCDU.","action":""}]},{"heading":"ELEC","level":1,"items":[{"actor":"PILOT","item":"EXT PWR","action":"VERIFY AVAIL","id":"s3_g4_i175"},{"actor":"PILOT","item":"EXT PWR DISCONNECTION","action":"REQUEST","id":"s3_g4_i176"}]},{"heading":"Before Start Clearance","level":1,"items":[],"subgroups":[{"heading":"Before Start Checklist","level":2,"items":[{"actor":"PILOT","item":"BEFORE START CHECKLIST down to the line","action":"COMPLETE","id":"s3_g5_sg0_i177"}]}]},{"heading":"At Start Clearance","level":1,"items":[],"subgroups":[{"heading":"Pushback / Start Up Clearance","level":2,"items":[{"actor":"PILOT","item":"PUSHBACK/START CLEARANCE","action":"OBTAIN","id":"s3_g6_sg0_i178"},{"actor":"PILOT","item":"ATC","action":"SET FOR OPERATION","id":"s3_g6_sg0_i179"}]},{"heading":"Windows and Doors","level":2,"items":[{"actor":"PILOT","item":"WINDOWS AND DOORS","action":"VERIFY CLOSED","id":"s3_g6_sg1_i180"},{"actor":"_NOTE_","item":"Verify on the ECAM DOOR page that the doors are closed.","action":""},{"actor":"PILOT","item":"SLIDES","action":"VERIFY ARMED","id":"s3_g6_sg1_i181"},{"actor":"_NOTE_","item":"Verify on the ECAM DOOR page that the slides are armed.","action":""}]},{"heading":"Exterior Lights","level":2,"items":[{"actor":"PILOT","item":"BEACON switch","action":"ON","id":"s3_g6_sg2_i182"}]},{"heading":"Thrust Levers","level":2,"items":[{"actor":"PILOT","item":"THRUST LEVERS","action":"IDLE","id":"s3_g6_sg3_i183"},{"actor":"_NOTE_","item":"Ensure that the thrust levers are at the idle position. If the lever is beyond the idle detent, it can cause a hazardous situation at start-up.","action":""}]},{"heading":"ACCU Pressure","level":2,"items":[{"actor":"PILOT","item":"ACCU PRESS indicator","action":"VERIFY","id":"s3_g6_sg4_i184"},{"actor":"_NOTE_","item":"The ACCU PRESS must indicate within the green band. If this is not the case, use the electric pump of the yellow hydraulic system.","action":""}]},{"heading":"Parking Brake and Nosewheel Steering","lev he engine parameters should indicate the following:","action":""},{"actor":"_BULLET_","item":"19% N1","action":""},{"actor":"_BULLET_","item":"68% N2","action":""},{"actor":"_BULLET_","item":"520\u00b0C EGT","action":""},{"actor":"_BULLET_","item":"290 kg/h FF","action":""},{"actor":"PILOT","item":"ENGINE 1 START","action":"VERIFY","id":"s4_g0_i197"},{"actor":"PILOT","item":"ENG MASTER 1","action":"ON","id":"s4_g0_i198"},{"actor":"_BULLET_","item":"When engine idle is reached (AVAIL indication is displayed):","action":""},{"actor":"PILOT","item":"ENG IDLE PARAMETERS","action":"VERIFY","id":"s4_g0_i199"},{"actor":"_NOTE_","item":"At ISA sea level, the engine parameters should indicate the following:","action":""},{"actor":"_BULLET_","item":"19% N1","action":""},{"actor":"_BULLET_","item":"68% N2","action":""},{"actor":"_BULLET_","item":"520\u00b0C EGT","action":""},{"actor":"_BULLET_","item":"290 kg/h FF","action":""}]}]},{"title":"After Start","groups":[{"heading":"After Start","level":1,"items":[],"subgroups":[{"heading":"Engine Mode","level":2,"items":[{"actor":"PILOT","item":"ENG MODE selector","action":"NORM","id":"s5_g0_sg0_i200"},{"actor":"_NOTE_","item":"It is recommended to wait 5 minutes before taking off to prevent a thermal shock. The taxi time can be included in the waiting period.","action":""}]},{"heading":"APU Bleed","level":2,"items":[{"actor":"PILOT","item":"APU Bleed pushbutton","action":"OFF","id":"s5_g0_sg1_i201"},{"actor":"_NOTE_","item":"The auxiliary power unit bleed valves close. All engine bleed valves automatically open.","action":""}]},{"heading":"Anti-Ice","level":2,"items":[{"actor":"PILOT","item":"ENG ANTI-ICE pushbutton","action":"AS REQUIRED","id":"s5_g0_sg2_i202"},{"actor":"_NOTE_","item":"The engine anti-ice must be set to on during all ground operations if there is an icing condition. If ground surface and the environment allow, the flight crew can proceed to an engine de-icing runup. To proceed to an engine de-icing runup, set the parking brakes to ON, then accelerate the engines N1 to a minimum of 50% for 5 seconds.","action":""},{"actor":"PILOT","item":"WING ANTI-ICE pushbutton","action":"AS REQUIRED","id":"s5_g0_sg2_i203"},{"actor":"_NOTE_","item":"The flight crew should turn the wing anti-ice ON when icing conditions are encountered. After 30 seconds, the valve will close itself as a self-test is passed.","action":""}]},{"heading":"APU","level":2,"items":[{"actor":"_BULLET_","item":"If the APU is not required:","action":""},{"actor":"PILOT","item":"APU MASTER pushbutton","action":"OFF","id":"s5_g0_sg3_i204"}]},{"heading":"Ground Spoilers","level":2,"items":[{"actor":"PILOT","item":"GROUND SPOILERS","action":"ARM","id":"s5_g0_sg4_i205"}]},{"heading":"Rudder Trim","level":2,"items":[{"actor":"PILOT","item":"RUD TRIM position indication","action":"VERIFY ZERO","id":"s5_g0_sg5_i206"},{"actor":"_BULLET_","item":"If the RUD TRIM position indication does not indicate at zero:","action":""},{"actor":"PILOT","item":"RESET pushbutton","action":"PRESS","id":"s5_g0_sg5_i207"}]},{"heading":"Flaps","level":2,"items":[{"actor":"PILOT","item":"FLAPS lever","action":"SET TAKEOFF POSITION","id":"s5_g0_sg6_i208"},{"actor":"PILOT","item":"FLAPS","action":"VERIFY POSITION","id":"s5_g0_sg6_i209"},{"actor":"_NOTE_","item":"If taxiing in icing condition, delay the flaps extension until the runway holding point. This prevents contamination in the mechanism.","action":""}]},{"heading":"Pitch Trim","level":2,"items":[{"actor":"PILOT","item":"PITCH TRIM handwheel","action":"SET","id":"s5_g0_sg7_i210"},{"actor":"_NOTE_","item":"Verify that the pitch trim is set to the takeoff trim position.","action":""}]},{"heading":"ECAM Status","level":2,"items":[{"actor":"PILOT","item":"STATUS REMINDER","action":"VERIFY NOT DISPLAYED","id":"s5_g0_sg8_i211"},{"actor":"_BULLET_","item":"If STS reminder is displayed:","action":""},{"actor":"PILOT","item":"STS pushbutton","action":"PRESS","id":"s5_g0_sg8_i212"}]},{"heading":"N/W STEER DISC Memo","level":2,"items":[{"actor":"PILOT","item":"N/W STEER DISC MEMO","action":"VERIFY NOT DISPLAYED","id":"s5_g0_sg9_i213"}]},{"heading":"Ground Crew","level":2,"items":[{"actor":"_NOTE_","item":"When the clearance to disconnect is given, the ground crew should remove the chocks, remove the tow pin, disconnect the interphone and make a hand signal on one side of the aircraft.","action":""}]},{"heading":"After Start Checklist","level":2,"items":[{"actor":"PILOT","item":"AFTER START Checklist","action":"COMPLETE","id":"s5_g0_sg11_i214"}]}]}]},{"title":"Taxi","groups":[{"heading":"Taxi","level":1,"items":[],"subgroups":[{"heading":"Taxi Clearance","level":2,"items":[{"actor":"PILOT","item":"TAXI clearance","action":"OBTAIN","id":"s6_g0_sg0_i215"}]},{"heading":"Exterior Lights","level":2,"items":[{"actor":"PILOT","item":"NOSE switch","action":"TAXI","id":"s6_g0_sg1_i216"},{"actor":"PILOT","item":"RWY TURN OFF switch","action":"ON","id":"s6_g0_sg1_i217"},{"actor":"_BULLET_","item":"When crossing a runway:","action":""},{"actor":"PILOT","item":"STROBE switch","action":"ON","id":"s6_g0_sg1_i218"}]},{"heading":"Parking Brakes","level":2,"items":[{"actor":"PILOT","item":"PARK BRK handle","action":"OFF","id":"s6_g0_sg2_i219"},{"actor":"PILOT","item":"BRAKES PRESSURE","action":"VERIFY AT ZERO","id":"s6_g0_sg2_i220"}]},{"heading":"Thrust Lever","level":2,"items":[{"actor":"PILOT","item":"THRUST lever","action":"AS REQUIRED","id":"s6_g0_sg3_i221"}]},{"heading":"Brakes","level":2,"items":[{"actor":"PILOT","item":"BRAKE PEDALS","action":"PRESS","id":"s6_g0_sg4_i222"},{"actor":"PILOT","item":"BRAKES","action":"VERIFY","id":"s6_g0_sg4_i223"},{"actor":"_NOTE_","item":"The flight crew should monitor the WHEEL SD page on the ECAM display. If an arc is displayed above the brake temperature, it is recommended to set the brake fans to ON.","action":""}]},{"heading":"Nosewheel Steering","level":2,"items":[{"actor":"PILOT","item":"TILLER or RUDDER PEDALS","action":"USE AS REQUIRED","id":"s6_g0_sg5_i224"}]},{"heading":"Flight Controls","level":2,"items":[{"actor":"PILOT","item":"FLIGHT CONTROLS","action":"VERIFY","id":"s6_g0_sg6_i225"}]},{"heading":"ATC Clearance","level":2,"items":[{"actor":"PILOT","item":"ATC Clearance","action":"CONFIRM","id":"s6_g0_sg7_i226"}]},{"heading":"Takeoff Data/Conditions","level":2,"items":[{"actor":"_BULLET_","item":"If takeoff conditions have changed:","action":""},{"actor":"PILOT","item":"FINAL TAKEOFF PERF DATA","action":"RECOMPUTE","id":"s6_g0_sg8_i227"},{"actor":"_NOTE_","item":"The flight crew should independently compute the takeoff performance data again.","action":""},{"actor":"PILOT","item":"FMS TAKEOFF DATA","action":"REVISE","id":"s6_g0_sg8_i228"},{"actor":"_NOTE_","item":"The flight crew should revise the takeoff data in the FMS. It is recommended to pay attention to the changes at the slats/flaps configuration at takeoff.","action":""},{"actor":"PILOT","item":"FMS REVISED TAKEOFF PERF DATA","action":"CROSSCHECK","id":"s6_g0_sg8_i229"},{"actor":"PILOT","item":"FLAPS lever","action":"AS APPROPRIATE","id":"s6_g0_sg8_i230"}]},{"heading":"AFS / Flight Instruments","level":2,"items":[{"actor":"PILOT","item":"F-PLN (SID, TRANS)","action":"REVISE or VERIFY","id":"s6_g0_sg9_i231"},{"actor":"_NOTE_","item":"Ensure that the ATC clearance is the same as the inserted flight plan in the FMS.","action":""},{"actor":"PILOT","item":"INITIAL CLIMB SPEED AND SPEED LIMIT","action":"MODIFY or VERIFY","id":"s6_g0_sg9_i232"},{"actor":"_NOTE_","item":"It is recommended to use VERT REV at departure, or at a CLB waypoint.","action":""},{"actor":"PILOT","item":"CLEARED ALTITUDE ON FCU","action":"SET","id":"s6_g0_sg9_i233"},{"actor":"PILOT","item":"HDG ON FCU","action":"PRESET","id":"s6_g0_sg9_i234"},{"actor":"_NOTE_","item":"Preset the heading if the air traffic control requires a radar vector departure. However, please note that the RWY TRK mode maintains the aircraft on the runway heading until the heading mode engages.","action":""},{"actor":"PILOT","item":"BOTH FD","action":"VERIFY ON","id":"s6_g0_sg9_i235"},{"actor":"PILOT","item":"PFD/ND","action":"VERIFY","id":"s6_g0_sg9_i236"},{"actor":"PILOT","item":"RADAR","action":"ON","id":"s6_g0_sg9_i237"},{"actor":"_NOTE_","item":"It is recommended to set the MULTISCAN switch to MAN. This allows the flight crew to verify the radar and the departure path. The flight crew can then set the radar to the AUTO position.","action":""},{"actor":"PILOT","item":"PREDICTIVE WINDSHEAR SYSTEM","action":"AUTO","id":"s6_g0_sg9_i238"}]},{"heading":"ATC","level":2,"items":[{"actor":"PILOT","item":"ATC code/mode","action":"CONFIRM & SET FOR TAKEOFF","id":"s6_g0_sg10_i239"}]},{"heading":"Terrain Radar","level":2,"items":[{"actor":"PILOT","item":"TERR ON ND","action":"AS REQUIRED","id":"s6_g0_sg11_i240"},{"actor":"_NOTE_","item":"It is recommended to set the weather radar display on the PF side, and the terrain radar on the PM side.","action":""}]},{"heading":"Autobrakes","level":2,"items":[{"actor":"PILOT","item":"AUTO BRK MAX pushbutton","action":"ON","id":"s6_g0_sg12_i241"}]},{"heading":"Final Verification","level":2,"items":[{"actor":"PILOT","item":"T.O CONFIG pushbutton","action":"TEST","id":"s6_g0_sg13_i242"},{"actor":"_NOTE_","item":"Ensure that the upper ECAM display shows the message \u201cT.O CONFIG NORMAL\u201d.","action":""},{"actor":"PILOT","item":"T.O MEMO","action":"VERIFY NO BLUE","id":"s6_g0_sg13_i243"},{"actor":"PILOT","item":"CABIN REPORT","action":"RECEIVE","id":"s6_g0_sg13_i244"},{"actor":"_NOTE_","item":"Verify on the engine warning display the display of the message \u201cCABIN READY\u201d or obtain the report from the chief flight attendant \u201cCabin ready for takeoff\u201d.","action":""}]},{"heading":"Before Takeoff Checklist","level":2,"items":[{"actor":"PILOT","item":"BEFORE TAKEOFF CHECKLIST down to the line","action":"COMPLETE","id":"s6_g0_sg14_i245"}]}]}]},{"title":"Before Takeoff","groups":[{"heading":"Before Takeoff","level":1,"items":[],"subgroups":[{"heading":"Brake Fans","level":2,"items":[{"actor":"_BULLET_","item":"If the brake fans are currently running:","action":""},{"actor":"PILOT","item":"BRAKE TEMPERATURE","action":"VERIFY","id":"s7_g0_sg0_i246"},{"actor":"_NOTE_","item":"If the brake temperature is below 150\u00b0C, the flight crew can select the brake fans OFF. If the brake temperature is above 150\u00b0C, it is recommended to delay the takeoff.","action":""}]},{"heading":"Line-Up Clearance","level":2,"items":[{"actor":"PILOT","item":"LINE-UP CLEARANCE","action":"OBTAIN","id":"s7_g0_sg1_i247"}]},{"heading":"Exterior Lights","level":2,"items":[{"actor":"PILOT","item":"STROBE switch","action":"ON","id":"s7_g0_sg2_i248"},{"actor":"_NOTE_","item":"The flight crew can turn off the strobe lights if it causes any visual trouble.","action":""}]},{"heading":"TCAS","level":2,"items":[{"actor":"PILOT","item":"TCAS mode selector","action":"TA or TA/RA","id":"s7_g0_sg3_i249"},{"actor":"_NOTE_","item":"It is recommended to use TA/RA for normal situations. If it is inappropriate, such as converging runways or parallel runways, the use of TA ONLY mode is recommended.","action":""}]},{"heading":"Approach Path","level":2,"items":[{"actor":"PILOT","item":"APPROACH PATH","action":"CLEARED OF TRAFFIC","id":"s7_g0_sg4_i250"},{"actor":"_NOTE_","item":"Ensure there is no traffic incoming, both from visual confirmation and using the TCAS display on the ND.","action":""}]},{"heading":"Sliding Table / EFB","level":2,"items":[{"actor":"PILOT","item":"SLIDING TABLE","action":"STOW","id":"s7_g0_sg5_i251"},{"actor":"PILOT","item":"ALL EFB transmitting mode","action":"AS REQUIRED","id":"s7_g0_sg5_i252"},{"actor":"PILOT","item":"TAKEOFF RUNWAY","action":"CONFIRM","id":"s7_g0_sg5_i253"},{"actor":"PILOT","item":"PACK 1 and 2","action":"AS REQUIRED","id":"s7_g0_sg5_i254"},{"actor":"_NOTE_","item":"It is recommended to select the packs OFF or put the APU bleed ON. This should improve performance when using TOGA thrust. Furthermore, it can reduce maintenance cost due to the takeoff EGT reduction. However, if the wing anti-ice is used, it is not recommended to use the APU bleed.","action":""},{"actor":"PILOT","item":"BEFORE TAKEOFF CHECKLIST below the line","action":"COMPLETE","id":"s7_g0_sg5_i255"}]}]}]},{"title":"Takeoff","groups":[{"heading":"Takeoff","level":1,"items":[],"subgroups":[{"heading":"Takeoff Clearance","level":2,"items":[{"actor":"PILOT","item":"TAKEOFF CLEARANCE","action":"OBTAINED","id":"s8_g0_sg0_i256"}]},{"heading":"Exterior Lights","level":2,"items":[{"actor":"PILOT","item":"NOSE switch","action":"T.O","id":"s8_g0_sg1_i257"},{"actor":"PILOT","item":"RWY TURN OFF switch","action":"ON","id":"s8_g0_sg1_i258"},{"actor":"PILOT","item":"LAND LIGHTS switch","action":"ON","id":"s8_g0_sg1_i259"}]},{"heading":"Thrust Setting","level":2,"items":[{"actor":"PILOT","item":"TAKEOFF","action":"VERIFY","id":"s8_g0_sg2_i260"},{"actor":"PILOT","item":"THRUST LEVERS","action":"50% N1","id":"s8_g0_sg2_i261"},{"actor":"_BULLET_","item":"If the crosswind is at or below 20 knots and there is no tailwind:","action":""},{"actor":"_NOTE_","item":"It is recommended to apply half forward sidestick until the aircraft reaches the airspeed of 80 knots to counter the nose-up effect. At 80 knots, release the sidestick gradually. The sidestick must be neutral at 100 knots.","action":""},{"actor":"PILOT","item":"BRAKES","action":"RELEASE","id":"s8_g0_sg2_i262"},{"actor":"PILOT","item":"THRUST LEVERS","action":"FLX or TOGA","id":"s8_g0_sg2_i263"},{"actor":"_BULLET_","item":"If the crosswind is greater than 20 knots, or there is tailwind:","action":""},{"actor":"_NOTE_","item":"It is recommended to apply full forward sidestick until the aircraft reaches the airspeed of 80 knots. At 80 knots, release the sidestick gradually. The sidestick must be neutral at 100 knots.","action":""},{"actor":"PILOT","item":"BRAKES","action":"RELEASE","id":"s8_g0_sg2_i264"},{"actor":"PILOT","item":"THRUST LEVERS","action":"FLX or TOGA","id":"s8_g0_sg2_i265"},{"actor":"_NOTE_","item":"Note: Expect the ENG SD page to replace the WHEEL SD page on the lower ECAM display.","action":""},{"actor":"PILOT","item":"DIRECTIONAL CONTROL","action":"RUDDER","id":"s8_g0_sg2_i266"},{"actor":"_NOTE_","item":"Once the wheel reaches 130 knots, there is an automatic disconnection between the nosewheel steering and the rudder pedals.","action":""},{"actor":"PILOT","item":"CHRONO","action":"START","id":"s8_g0_sg2_i267"},{"actor":"PILOT","item":"PFD/ND","action":"MONITOR","id":"s8_g0_sg2_i268"},{"actor":"_NOTE_","item":"Ensure that either of the following modes are displayed on the FMA: MAN TOGA (or MAN FLX xx) / SRS / RWY / A/THR / Blank. Also, verify the FMS position on the ND.","action":""},{"actor":"PILOT","item":"FMA","action":"VERIFY","id":"s8_g0_sg2_i269"}]},{"heading":"Below 80 Knots","level":2,"items":[{"actor":"PILOT","item":"TAKEOFF N1","action":"VERIFY","id":"s8_g0_sg3_i270"},{"actor":"_NOTE_","item":"Ensure that the actual N1 of each engine has reached the N1 rating limit before the aircraft reaches the airspeed of 80 knots.","action":""},{"actor":"PILOT","item":"THRUST SET","action":"VERIFY","id":"s8_g0_sg3_i271"},{"actor":"PILOT","item":"PFD/ENG indications","action":"MONITOR","id":"s8_g0_sg3_i272"}]},{"heading":"Reaching 100 Knots","level":2,"items":[{"actor":"PILOT","item":"ONE HUNDRED KNOTS","action":"VERIFY","id":"s8_g0_sg4_i273"},{"actor":"_NOTE_","item":"It is recommended to reject the takeoff under 100 knots. However, rejecting takeoff above 100 knots is a more serious case.","action":""}]},{"heading":"At V1","level":2,"items":[{"actor":"PILOT","item":"V1","action":"VERIFY","id":"s8_g0_sg5_i274"}]},{"heading":"At VR","level":2,"items":[{"actor":"PILOT","item":"ROTATION","action":"EXECUTE","id":"s8_g0_sg6_i275"},{"actor":"PILOT","item":"ROTATION","action":"PERFORM","id":"s8_g0_sg6_i276"},{"actor":"_NOTE_","item":"It is recommended to have a rotation rate of 3\u00b0/s until the aircraft is at a pitch attitude of 15\u00b0. It is recommended to minimize any lateral inputs as it can extend spoilers. After lift-off, it is recommended to follow the SRS pitch command bar.","action":""},{"actor":"_NOTE_","item":"Note: In case of an engine failure, the recommended pitch attitude is 12.5\u00b0.","action":""}]},{"heading":"When Positive Climb","level":2,"items":[{"actor":"PILOT","item":"POSITIVE CLIMB","action":"VERIFY","id":"s8_g0_sg7_i277"},{"actor":"PILOT","item":"LANDING GEAR UP","action":"EXECUTE","id":"s8_g0_sg7_i278"},{"actor":"PILOT","item":"LANDING GEAR","action":"SELECT UP","id":"s8_g0_sg7_i279"},{"actor":"PILOT","item":"AUTOPILOT","action":"AS REQUIRED","id":"s8_g0_sg7_i280"},{"actor":"_NOTE_","item":"The autopilot can be engaged above 100 feet AGL.","action":""}]},{"heading":"At Thrust Reduction Altitude","level":2,"items":[{"actor":"PILOT","item":"THRUST LEVERS","action":"CL","id":"s8_g0_sg8_i281"},{"actor":"_NOTE_","item":"On the FMA, when the message \u201cLVR CLB\u201d appears flashing, move the thrust levers to the CL detent. The autothrottle will activate.","action":""},{"actor":"PILOT","item":"PACK 1 & 2","action":"ON","id":"s8_g0_sg8_i282"},{"actor":"_NOTE_","item":"It is recommended to select PACK 2 at least 10 seconds after PACK 1 has been selected. This is for passenger comfort.","action":""}]},{"heading":"At Acceleration Altitude","level":2,"items":[{"actor":"PILOT","item":"TARGET SPEED","action":"MODIFIED","id":"s8_g0_sg9_i283"},{"actor":"_NOTE_","item":"Ensure that the speed target changes from V2 +10 to the first CLB speed.","action":""}]},{"heading":"Above Acceleration Altitude / Climb Phase","level":2,"items":[{"actor":"_BULLET_","item":"At F speed (the F speed will only appear if the aircraft is in a higher configuration than 1+F):","action":""},{"actor":"PILOT","item":"FLAPS 1","action":"EXECUTE","id":"s8_g0_sg10_i284"},{"actor":"PILOT","item":"FLAPS 1","action":"SELECT","id":"s8_g0_sg10_i285"},{"actor":"_BULLET_","item":"At S speed:","action":""},{"actor":"PILOT","item":"FLAPS 0","action":"EXECUTE","id":"s8_g0_sg10_i286"},{"actor":"PILOT","item":"FLAPS 0","action":"SELECT","id":"s8_g0_sg10_i287"},{"actor":"PILOT","item":"GND SPLRS","action":"DISARM","id":"s8_g0_sg10_i288"},{"actor":"PILOT","item":"NOSE switch","action":"OFF","id":"s8_g0_sg10_i289"},{"actor":"PILOT","item":"RWY TURN OFF switch","action":"OFF","id":"s8_g0_sg10_i290"},{"actor":"PILOT","item":"EXTERIOR LIGHTS","action":"AS REQUIRED","id":"s8_g0_sg10_i291"}]}]}]},{"title":"After Takeoff","groups":[{"heading":"After Takeoff","level":1,"items":[{"actor":"PILOT","item":"APU BLEED pushbutton","action":"AS REQUIRED","id":"s9_g0_i292"},{"actor":"PILOT","item":"APU MASTER pushbutton","action":"AS REQUIRED","id":"s9_g0_i293"},{"actor":"PILOT","item":"TCAS mode selector","action":"TA/RA","id":"s9_g0_i294"},{"actor":"_NOTE_","item":"If the takeoff was performed using TA only, select the TA/RA mode.","action":""},{"actor":"PILOT","item":"ENG ANTI-ICE pushbutton","action":"AS REQUIRED","id":"s9_g0_i295"},{"actor":"_NOTE_","item":"It is recommended to set the engine anti-ice to ON when flying through icing condition, or anticipated icing condition, except when the SAT is below -40\u00b0C.","action":""},{"actor":"PILOT","item":"WING ANTI-ICE pushbutton","action":"AS REQUIRED","id":"s9_g0_i296"},{"actor":"_NOTE_","item":"It is recommended to set the wing anti-ice to ON when flying through icing conditions. It prevents ice accretion on the wing leading edge.","action":""},{"actor":"PILOT","item":"AFTER TAKEOFF/CLIMB CHECKLIST down to the line","action":"COMPLETE","id":"s9_g0_i297"}]}]},{"title":"Climb","groups":[{"heading":"Climb","level":1,"items":[{"actor":"PILOT","item":"MCDU","action":"PERF CLB","id":"s10_g0_i298"},{"actor":"_NOTE_","item":"It is recommended for the PF MCDU to display the PERF CLB page. This allows the PF to monitor the aircraft when it reaches the FCU selected altitude.","action":""},{"actor":"PILOT","item":"MCDU","action":"F-PLN","id":"s10_g0_i299"},{"actor":"_NOTE_","item":"It is recommended for the PM MCDU to display the F-PLN page. This allows the PM to enter a long-term revision to the lateral or vertical flight plan.","action":""}],"subgroups":[{"heading":"Climb Speed Modifications","level":2,"items":[{"actor":"PILOT","item":"FCU SPD","action":"SELECT AND PULL","id":"s10_g0_sg0_i300"},{"actor":"_NOTE_","item":"By pulling the FCU SPD knob, the speed target is in the selected mode. To return in managed speed mode, push the FCU SPD knob.","action":""}]},{"heading":"Expedite Climb","level":2,"items":[{"actor":"_BULLET_","item":"If the ATC requires a rapid climb through a particular level:","action":""},{"actor":"PILOT","item":"EXP pushbutton","action":"PUSH","id":"s10_g0_sg1_i301"},{"actor":"_NOTE_","item":"By pushing the EXP pushbutton, the aircraft enters the expedite climb mode. To return to the ECON CLB mode, push the ALT knob.","action":""},{"actor":"PILOT","item":"BAROMETRIC REFERENCE","action":"SET STD / CROSSCHECK","id":"s10_g0_sg1_i302"},{"actor":"_NOTE_","item":"Once the aircraft reaches the transition altitude, set STD on the EFIS control panel and on the ISIS.","action":""},{"actor":"PILOT","item":"CRZ FL","action":"SET AS REQUIRED","id":"s10_g0_sg1_i303"}]},{"heading":"Checklist","level":2,"items":[{"actor":"PILOT","item":"AFTER TAKEOFF/CLIMB CHECKLIST below the line","action":"COMPLETE","id":"s10_g0_sg2_i304"},{"actor":"PILOT","item":"ENG ANTI-ICE pushbutton","action":"AS REQUIRED","id":"s10_g0_sg2_i305"},{"actor":"_NOTE_","item":"It is recommended to set the engine anti-ice to ON when icing conditions are present or are anticipated.","action":""},{"actor":"PILOT","item":"RADAR","action":"AS APPROPRIATE","id":"s10_g0_sg2_i306"}]},{"heading":"At 10 000 Feet","level":2,"items":[{"actor":"PILOT","item":"LAND LIGHTS selector","action":"RETRACT","id":"s10_g0_sg3_i307"},{"actor":"PILOT","item":"SEAT BELTS switch","action":"AS REQUIRED","id":"s10_g0_sg3_i308"},{"actor":"PILOT","item":"EFIS options","action":"AS REQUIRED","id":"s10_g0_sg3_i309"},{"actor":"_NOTE_","item":"It is recommended to select CSTR on one ND and ARPT on the other ND.","action":""},{"actor":"PILOT","item":"ECAM MEMO","action":"REVIEW","id":"s10_g0_sg3_i310"},{"actor":"PILOT","item":"NAVAIDS","action":"CLEAR","id":"s10_g0_sg3_i311"},{"actor":"_NOTE_","item":"It is recommended to clear the manually tuned VORs from the MCDU RAD NAV page.","action":""},{"actor":"PILOT","item":"SEC F-PLN page","action":"AS REQUIRED","id":"s10_g0_sg3_i312"},{"actor":"_NOTE_","item":"It is recommended to recopy the active flight plan in the secondary flight plan.","action":""},{"actor":"PILOT","item":"OPT/MAX ALT","action":"VERIFY","id":"s10_g0_sg3_i313"}]}]}]},{"title":"Cruise","groups":[{"heading":"Cruise","level":1,"items":[{"actor":"PILOT","item":"ECAM MEMO","action":"REVIEW","id":"s11_g0_i314"},{"actor":"PILOT","item":"ECAM SD PAGES","action":"REVIEW","id":"s11_g0_i315"},{"actor":"_NOTE_","item":"It is recommended to review regularly the following pages: ENG, BLEED, ELEC, HYD, FUEL, COND, FLT CTL, and DOOR.","action":""},{"actor":"PILOT","item":"FLIGHT PROGRESS","action":"VERIFY","id":"s11_g0_i316"},{"actor":"_NOTE_","item":"It is recommended to monitor the flight progress. When overflying a waypoint, verify the track and distance to the next waypoint. Each 30 minutes, verify the fuel on board from the ECAM, the fuel prediction from the FMGC, and compare the data with the flight plan. Ensure that the fuel on board and fuel consumed is consistent with the fuel on board at departure.","action":""},{"actor":"PILOT","item":"STEP FLIGHT LEVEL","action":"AS APPROPRIATE","id":"s11_g0_i317"},{"actor":"PILOT","item":"RADAR","action":"AS APPROPRIATE","id":"s11_g0_i318"},{"actor":"_BULLET_","item":"If the oxygen mask has been used:","action":""},{"actor":"PILOT","item":"OXYGEN MASK","action":"VERIFY","id":"s11_g0_i319"}]}]},{"title":"Descent Preparation","groups":[{"heading":"Descent Preparation","level":1,"items":[{"actor":"PILOT","item":"WEATHER AND LANDING INFORMATION","action":"OBTAIN","id":"s12_g0_i320"},{"actor":"_NOTE_","item":"Verify the weather reports at the destination and the alternate airport. This should include the runway in use for the arrival.","action":""},{"actor":"PILOT","item":"NAV CHARTS","action":"PREPARE","id":"s12_g0_i321"},{"actor":"PILOT","item":"LDG PERFORMANCE","action":"COMPUTE","id":"s12_g0_i322"},{"actor":"_NOTE_","item":"It is recommended to perform an in-flight landing performance calculation in case the landing conditions have changed since departure. If the landing conditions are expected to change, it is recommended to compute with the worst possible runway conditions. Furthermore, the selection of REV MAX is the standard practice for landing.","action":""},{"actor":"PILOT","item":"LDG PERFORMANCE","action":"VERIFY","id":"s12_g0_i323"},{"actor":"PILOT","item":"ARRIVAL page","action":"COMPLETE/VERIFY","id":"s12_g0_i324"},{"actor":"_NOTE_","item":"If possible, insert the APPR, STAR, APPR VIA and TRANS.","action":""},{"actor":"PILOT","item":"F-PLN A page","action":"VERIFY","id":"s12_g0_i325"},{"actor":"_NOTE_","item":"Ensure that the inserted flight plan agrees with the planned and missed approach. Ensure that they respect the restrictions from the charts. The flight crew may require adding a new speed or altitude constraint. It is not recommended to modify the final approach fix (FAF to runway or MAP). In case of a \u201cTOO STEEP PATH\u201d message appearing, do not use the FINAL APP guidance for approach.","action":""},{"actor":"PILOT","item":"DES WIND page","action":"VERIFY","id":"s12_g0_i326"},{"actor":"PILOT","item":"PERF CRUISE page","action":"VERIFY","id":"s12_g0_i327"},{"actor":"PILOT","item":"PERF DES page","action":"VERIFY","id":"s12_g0_i328"},{"actor":"_NOTE_","item":"Before starting the descent, it is recommended to access the PERF DES page and verify the ECON MACH/SPD. If any other speed is required other than the ECON speed, insert that MACH or SPD into the ECON field. This allows the system to calculate the descent path and the top of descent.","action":""},{"actor":"_NOTE_","item":"Note: The default speed limit is 250 knots below 10 000 feet. The flight crew may modify on the VERT REV at the DEST page.","action":""},{"actor":"PILOT","item":"PERF APPR page","action":"COMPLETE/VERIFY","id":"s12_g0_i329"},{"actor":"_NOTE_","item":"Insert the QNH, the temperature, the wind at destination and the minimum. It is not recommended to insert gust values.","action":""},{"actor":"_NOTE_","item":"Note: If there is a change of runway or a change in the approach type, it will automatically erase the inserted minimum.","action":""},{"actor":"PILOT","item":"PERF GO-AROUND page","action":"VERIFY/MODIFY","id":"s12_g0_i330"},{"actor":"_NOTE_","item":"Verify the thrust reduction altitude and the acceleration altitude. The flight crew may modify if necessary.","action":""},{"actor":"PILOT","item":"RAD NAV page","action":"VERIFY","id":"s12_g0_i331"},{"actor":"_NOTE_","item":"Set the navaids as required. Verify the idents on the navigation display and on the primary flight display. If a VOR/DME exists close to the airfield, it is recommended to select it and enter its ident in the BRG/DIST field of the PROG page. This allows the monitoring of NAV ACCY during descent.","action":""},{"actor":"PILOT","item":"SEC F-PLN page","action":"AS REQUIRED","id":"s12_g0_i332"},{"actor":"_NOTE_","item":"It is recommended to set the secondary flight plan to the alternate runway for destination, or to the landing runway in case of a circling approach.","action":""},{"actor":"PILOT","item":"GPWS LDG FLAP 3 pushbutton","action":"AS REQUIRED","id":"s12_g0_i333"},{"actor":"_NOTE_","item":"If the flight crew plans on landing with the FLAPS 3 configuration, the GPWS LDG FLAP 3 must be set to ON.","action":""},{"actor":"PILOT","item":"LDG ELEV","action":"VERIFY","id":"s12_g0_i334"},{"actor":"_NOTE_","item":"Ensure that the LDG ELEV AUTO displays in green on the ECAM CRUISE page and verify the associated value.","action":""},{"actor":"PILOT","item":"AUTO BRK","action":"AS REQUIRED","id":"s12_g0_i335"},{"actor":"_NOTE_","item":"It is recommended to use the autobrakes. For short or contaminated runways, the MED mode is recommended. For long runways, the LO mode is recommended. It is not recommended to use the MAX mode.","action":""},{"actor":"PILOT","item":"TERR ON ND","action":"AS REQUIRED","id":"s12_g0_i336"},{"actor":"_NOTE_","item":"It is recommended to set the weather radar to the PF side and the TERR ON ND on the PM side. It is not recommended to use the TERR ON ND if the nav accuracy is low.","action":""},{"actor":"PILOT","item":"RADAR","action":"ADJUST AS APPROPRIATE","id":"s12_g0_i337"},{"actor":"PILOT","item":"ENG ANTI-ICE pushbutton","action":"AS REQUIRED","id":"s12_g0_i338"},{"actor":"_NOTE_","item":"It is recommended to set the engine anti-ice to ON, even if the SAT is below -40\u00b0C. This ensures better protection against flame-out.","action":""},{"actor":"PILOT","item":"WING ANTI-ICE pushbutton","action":"AS REQUIRED","id":"s12_g0_i339"},{"actor":"_NOTE_","item":"Note: When turning the anti-ice on, it reduces the descent path angle. The pilot can therefore compensate by increasing the descent speed or by extending up to half speedbrakes.","action":""},{"actor":"PILOT","item":"DESCENT CLEARANCE","action":"OBTAIN","id":"s12_g0_i340"},{"actor":"PILOT","item":"CLEARED ALTITUDE ON FCU","action":"SET","id":"s12_g0_i341"},{"actor":"_NOTE_","item":"Ensure that the cleared altitude is lower than the ATC-cleared altitude.","action":""}]}]},{"title":"Descent","groups":[{"heading":"Descent Initiation","level":1,"items":[{"actor":"PILOT","item":"DESCENT","action":"INITIATE","id":"s13_g0_i342"},{"actor":"_NOTE_","item":"It is recommended to select the DES mode at the top of descent.","action":""}],"subgroups":[{"heading":"Descent Monitoring","level":2,"items":[{"actor":"PILOT","item":"MCDU","action":"PROG/PERF DES","id":"s13_g0_sg0_i343"},{"actor":"_NOTE_","item":"It is recommended for the PF to display the PROG page to get the VDEV or RQD DIST TO LAND/DIRECT DIST TO LAND information. The PF can also select the PERF DES page to get predictions to any inserted altitude in the DES/OP DES and EXP mode.","action":""},{"actor":"PILOT","item":"MCDU","action":"F-PLN","id":"s13_g0_sg0_i344"},{"actor":"PILOT","item":"DESCENT","action":"MONITOR/ADJUST","id":"s13_g0_sg0_i345"},{"actor":"_NOTE_","item":"It is recommended to use the DES mode when flying in the NAV mode. This allows the aircraft to descend along the descent flight path, considering all constraints.","action":""},{"actor":"_NOTE_","item":"Note: When the aircraft is flying in HDG or TRK mode, the DES mode is not available.","action":""}]},{"heading":"Descent Adjustment","level":2,"items":[{"actor":"_NOTE_","item":"To increase the rate of descent, it is recommended to increase the descent speed using selected speed. It allows better fuel economy than other techniques.","action":""},{"actor":"PILOT","item":"BAROMETRIC REFERENCE","action":"SET","id":"s13_g0_sg1_i346"},{"actor":"_NOTE_","item":"Set the QNH on the EFIS control panel and on the ISIS at the transition altitude.","action":""},{"actor":"PILOT","item":"ECAM STATUS","action":"VERIFY","id":"s13_g0_sg1_i347"},{"actor":"_NOTE_","item":"Ensure that there is no status reminder on the upper ECAM display. Note any degradation in landing capability or affecting approach and landing.","action":""}]},{"heading":"At 10 000 Feet","level":2,"items":[{"actor":"PILOT","item":"LAND lights","action":"SET","id":"s13_g0_sg2_i348"},{"actor":"PILOT","item":"SEAT BELTS switch","action":"ON","id":"s13_g0_sg2_i349"},{"actor":"PILOT","item":"EFIS options","action":"CSTR","id":"s13_g0_sg2_i350"},{"actor":"_NOTE_","item":"It is recommended to select CSTR on both sides.","action":""},{"actor":"PILOT","item":"ILS/LS pushbutton","action":"AS REQUIRED","id":"s13_g0_sg2_i351"},{"actor":"_NOTE_","item":"It is recommended to turn on the ILS/LS if an ILS, GLS, MLS, ILS G/S out, LOC only, LOC/BC or FLS approaches. The flight crew must ensure that the deviation scales and IDENT are displayed on the PFD.","action":""},{"actor":"PILOT","item":"RAD NAVAIDS","action":"SELECTED/IDENTIFIED","id":"s13_g0_sg2_i352"},{"actor":"_NOTE_","item":"The flight crew must ensure that the appropriate NAVAIDS are tuned and identified.","action":""},{"actor":"PILOT","item":"NAV ACCURACY","action":"VERIFY","id":"s13_g0_sg2_i353"},{"actor":"_NOTE_","item":"If the GPS PRIMARY function is available, there is no accuracy check required.","action":""}]},{"heading":"Approach Checklist","level":2,"items":[{"actor":"PILOT","item":"APPROACH CHECKLIST","action":"PERFORM","id":"s13_g0_sg3_i354"}]}]}]},{"title":"Approach \u2013 General","groups":[{"heading":"Guidance Mode per Approach Type","level":1,"items":[]},{"heading":"Initial Approach \u2013 General","level":1,"items":[{"actor":"PILOT","item":"F-PLN SEQUENCING","action":"ADJUST","id":"s14_g1_i355"},{"actor":"_NOTE_","item":"The NAV mode will be automatically available after go-around if the flight plan is properly sequenced. If flying in nav mode, the F-PLN will sequence automatically. In HDG/TRK mode, the F-PLN will only sequence automatically if flying close to the F-PLN route.","action":""},{"actor":"PILOT","item":"APPROACH PHASE","action":"VERIFY/ACTIVATE","id":"s14_g1_i356"},{"actor":"_NOTE_","item":"If flying in NAV mode, the approach phase will automatically activate itself if the aircraft overlies the DECEL pseudo waypoint. If flying in HDG/TRK mode, it is recommended to activate the approach phase 15 NM from touchdown.","action":""},{"actor":"PILOT","item":"MANAGED SPEED","action":"VERIFY","id":"s14_g1_i357"},{"actor":"_NOTE_","item":"It is recommended to remain in managed speed mode. If, for any reasons, the ATC requires a different speed, use the selected speed mode.","action":""},{"actor":"PILOT","item":"FLIGHT PATH","action":"MONITOR","id":"s14_g1_i358"},{"actor":"_NOTE_","item":"If flying in NAV mode, it is recommended to use the VDEV information on the PFD and PROG MCDU page. If flying in HDG/TRK mode, it is recommended to use the energy circle on the ND.","action":""},{"actor":"PILOT","item":"SPEED BRAKES lever","action":"AS REQUIRED","id":"s14_g1_i359"},{"actor":"_NOTE_","item":"It is recommended to avoid the use of the speed brakes. In the case of the use of the speedbrakes, the flight crew should ensure that there is an appropriate speed margin before the extension of the speed brakes. The flight crew should also ensure that there is an appropriate speed margin before the beginning of a turn. This is to ensure that the Alpha-Floor protection doesn\u2019t activate.","action":""},{"actor":"PILOT","item":"RADAR","action":"ADJUST AS APPROPRIATE","id":"s14_g1_i360"},{"actor":"PILOT","item":"NAV ACCURACY","action":"MONITOR","id":"s14_g1_i361"},{"actor":"_NOTE_","item":"If the GPS PRIMARY function is available, there is no accuracy check required.","action":""}]},{"heading":"Intermediate / Final Approach \u2013 General","level":1,"items":[],"subgroups":[{"heading":"At Green Dot Speed","level":2,"items":[{"actor":"PILOT","item":"FLAPS 1","action":"EXECUTE","id":"s14_g2_sg0_i362"},{"actor":"PILOT","item":"FLAPS 1","action":"SELECT","id":"s14_g2_sg0_i363"},{"actor":"_NOTE_","item":"It is recommended to select the FLAPS 1 3 NM before the final descent point. The aircraft should also decelerate. If the aircraft does not decelerate, the flight crew should consider the extension of the landing gear before the extension of speedbrakes. The extension of the speedbrakes at this point will cause an increase in VLS.","action":""},{"actor":"PILOT","item":"TCAS MODE selector","action":"TA or TA/RA","id":"s14_g2_sg0_i364"},{"actor":"_NOTE_","item":"It is recommended to use TA/RA for normal situations. If it is inappropriate, such as converging runways or parallel runways, the use of TA ONLY mode is recommended.","action":""}]},{"heading":"At 2 000 Feet AGL Minimum","level":2,"items":[{"actor":"PILOT","item":"FLAPS 2","action":"EXECUTE","id":"s14_g2_sg1_i365"},{"actor":"PILOT","item":"FLAPS 2","action":"SELECT","id":"s14_g2_sg1_i366"},{"actor":"_NOTE_","item":"The flight crew must notice a deceleration toward the F speed. The flight crew should consider extending the landing gear to reduce the airspeed. The use of speedbrakes is not recommended.","action":""}]},{"heading":"When Flaps Are at 2","level":2,"items":[{"actor":"PILOT","item":"L/G DOWN","action":"EXECUTE","id":"s14_g2_sg2_i367"},{"actor":"PILOT","item":"L/G lever","action":"SELECT DOWN","id":"s14_g2_sg2_i368"},{"actor":"PILOT","item":"AUTO BRK","action":"CONFIRM","id":"s14_g2_sg2_i369"},{"actor":"PILOT","item":"GROUND SPOILERS","action":"ARM","id":"s14_g2_sg2_i370"}]},{"heading":"Exterior Lights","level":2,"items":[{"actor":"PILOT","item":"NOSE switch","action":"T.O","id":"s14_g2_sg3_i371"},{"actor":"PILOT","item":"RWY TURN OFF switch","action":"ON","id":"s14_g2_sg3_i372"}]},{"heading":"When Landing Gear is Down","level":2,"items":[{"actor":"PILOT","item":"FLAPS 3","action":"EXECUTE","id":"s14_g2_sg4_i373"},{"actor":"PILOT","item":"FLAPS 3","action":"SELECT","id":"s14_g2_sg4_i374"},{"actor":"PILOT","item":"ECAM WHEEL SD page","action":"CHECK","id":"s14_g2_sg4_i375"},{"actor":"PILOT","item":"L/G lights","action":"CONFIRM THREE GREEN","id":"s14_g2_sg4_i376"},{"actor":"PILOT","item":"FLAPS FULL","action":"EXECUTE","id":"s14_g2_sg4_i377"},{"actor":"PILOT","item":"FLAPS FULL","action":"SELECT","id":"s14_g2_sg4_i378"},{"actor":"_NOTE_","item":"It is recommended to retract the speedbrakes before selecting the FLAPS full. This prevents the aircraft from pitching down when the speedbrakes retract automatically.","action":""},{"actor":"PILOT","item":"A/THR","action":"VERIFY IN SPEED MODE OR OFF","id":"s14_g2_sg4_i379"},{"actor":"PILOT","item":"WING ANTI-ICE pushbutton","action":"OFF","id":"s14_g2_sg4_i380"},{"actor":"_NOTE_","item":"Only turn the wing anti-ice ON when there are severe icing conditions.","action":""},{"actor":"PILOT","item":"SLIDING TABLE","action":"STOW","id":"s14_g2_sg4_i381"},{"actor":"PILOT","item":"ALL EFB","action":"STOW","id":"s14_g2_sg4_i382"},{"actor":"PILOT","item":"LDG MEMO","action":"VERIFY NO BLUE","id":"s14_g2_sg4_i383"},{"actor":"PILOT","item":"CABIN REPORT","action":"RECEIVE","id":"s14_g2_sg4_i384"},{"actor":"PILOT","item":"LANDING CHECKLIST","action":"COMPLETE","id":"s14_g2_sg4_i385"},{"actor":"PILOT","item":"FLIGHT PARAMETERS","action":"MONITOR","id":"s14_g2_sg4_i386"},{"actor":"_NOTE_","item":"The PF should announce any FMA modification. The PM should call out in the following conditions:","action":""},{"actor":"_BULLET_","item":"The speed goes lower than the speed target -5 kt, or greater than the speed target +10 kt;","action":""},{"actor":"_BULLET_","item":"The pitch attitude is lower than -2.5\u00b0 or greater than 7.5\u00b0;","action":""},{"actor":"_BULLET_","item":"The bank angle is greater than 7\u00b0;","action":""},{"actor":"_BULLET_","item":"The descent rate is greater than 1 000 ft/min.","action":""}]}]}]},{"title":"Approach \u2013 LOC G/S Guidance","groups":[{"heading":"Approach Using LOC G/S Guidance","level":1,"items":[],"subgroups":[{"heading":"Descent Preparation","level":2,"items":[{"actor":"PILOT","item":"APPROACH MINIMUM","action":"DETERMINE","id":"s15_g0_sg0_i387"},{"actor":"_NOTE_","item":"It is recommended to insert \u201cNO\u201d in the DH field of the MCDU to avoid any false auto callouts for a CAT III approach.","action":""}]},{"heading":"Initial / Intermediate Approach","level":2,"items":[{"actor":"PILOT","item":"APPR pushbutton","action":"PRESS","id":"s15_g0_sg1_i388"},{"actor":"_NOTE_","item":"The APPR should be activated when the aircraft is cleared for the approach, the aircraft is on the intercept trajectory for the final approach course, and the LOC deviation is available.","action":""},{"actor":"PILOT","item":"BOTH APs","action":"ENGAGE","id":"s15_g0_sg1_i389"},{"actor":"_NOTE_","item":"It is recommended to engage the AP1 and AP2 when the APPR mode is selected. The FMA will display CAT 1 above 5 000 feet AGL. Below 5 000 feet AGL, the FMA will display the intended approach.","action":""},{"actor":"PILOT","item":"LOC","action":"VERIFY ARMED","id":"s15_g0_sg1_i390"},{"actor":"PILOT","item":"G/S","action":"VERIFY ARMED","id":"s15_g0_sg1_i391"},{"actor":"PILOT","item":"LOC CAPTURE","action":"MONITOR","id":"s15_g0_sg1_i392"},{"actor":"PILOT","item":"G/S CAPTURE","action":"MONITOR","id":"s15_g0_sg1_i393"},{"actor":"PILOT","item":"GO-AROUND ALTITUDE","action":"SET","id":"s15_g0_sg1_i394"}]},{"heading":"Glide Interception from Above","level":2,"items":[{"actor":"PILOT","item":"APPR mode","action":"ARM / VERIFY ARMED","id":"s15_g0_sg2_i395"},{"actor":"PILOT","item":"FCU altitude","action":"SET ABOVE A/C ALTITUDE","id":"s15_g0_sg2_i396"},{"actor":"PILOT","item":"V/S MODE","action":"SELECT","id":"s15_g0_sg2_i397"},{"actor":"_NOTE_","item":"It is recommended to select a V/S of 1 500 ft/min. If the V/S is above 2 000 ft/min, the airspeed will increase toward VFE.","action":""}]},{"heading":"Final Approach","level":2,"items":[{"actor":"PILOT","item":"FLIGHT PARAMETERS","action":"MONITOR","id":"s15_g0_sg3_i398"},{"actor":"_NOTE_","item":"The PM should call out if \u00bd dot of LOC or GLIDE deviation.","action":""}]},{"heading":"At 350 ft RA","level":2,"items":[{"actor":"PILOT","item":"LAND mode","action":"VERIFY ENGAGED/ANNOUNCE","id":"s15_g0_sg4_i399"},{"actor":"_NOTE_","item":"If there is no LAND mode, the Autoland function is not authorized.","action":""}]},{"heading":"For CAT I, CAT II, CAT III with DH Approach","level":2,"items":[{"actor":"_NOTE_","item":"<b>At entered minimum + 100 ft</b>","action":""},{"actor":"PILOT","item":"ONE HUNDRED ABOVE","action":"MONITOR OR ANNOUNCE","id":"s15_g0_sg5_i400"},{"actor":"_NOTE_","item":"<b>At entered minimum</b>","action":""},{"actor":"PILOT","item":"MINIMUM","action":"MONITOR OR ANNOUNCE","id":"s15_g0_sg5_i401"},{"actor":"_BULLET_","item":"If visual references are sufficient:","action":""},{"actor":"PILOT","item":"CONTINUE","action":"VERIFY","id":"s15_g0_sg5_i402"},{"actor":"PILOT","item":"AP","action":"AS REQUIRED","id":"s15_g0_sg5_i403"},{"actor":"_BULLET_","item":"If visual references are not sufficient:","action":""},{"actor":"PILOT","item":"GO AROUND","action":"VERIFY","id":"s15_g0_sg5_i404"}]},{"heading":"For CAT III Without DH Approach","level":2,"items":[{"actor":"_NOTE_","item":"<b>At 100 ft (Alert height) if no failure</b>","action":""},{"actor":"PILOT","item":"CONTINUE","action":"VERIFY","id":"s15_g0_sg6_i405"}]},{"heading":"Degraded Guidance Procedures","level":2,"items":[{"actor":"_NOTE_","item":"<b>For CAT II, CAT III Operations</b>","action":""},{"actor":"_BULLET_","item":"In case of an amber caution, or landing capability degradation.","action":""},{"actor":"_NOTE_","item":"<b>Above 1 000 ft:</b>","action":""},{"actor":"PILOT","item":"ECAM / QRH PROCEDURE","action":"COMPLETE","id":"s15_g0_sg7_i406"},{"actor":"PILOT","item":"REQUIRED EQUIPMENT","action":"VERIFY","id":"s15_g0_sg7_i407"},{"actor":"PILOT","item":"APPROACH AND LANDING CAPABILITY","action":"VERIFY","id":"s15_g0_sg7_i408"},{"actor":"_NOTE_","item":"<i>If required:</i>","action":""},{"actor":"PILOT","item":"RVR","action":"VERIFY","id":"s15_g0_sg7_i409"},{"actor":"PILOT","item":"DH","action":"ADJUST","id":"s15_g0_sg7_i410"},{"actor":"_BULLET_","item":"If the flight crew does not complete all the above actions above 1 000 feet:","action":""},{"actor":"PILOT","item":"GO AROUND","action":"PERFORM","id":"s15_g0_sg7_i411"},{"actor":"_NOTE_","item":"<b>Below 1 000 ft:</b>","action":""},{"actor":"_BULLET_","item":"If external visual is not sufficient:","action":""},{"actor":"PILOT","item":"GO AROUND","action":"PERFORM","id":"s15_g0_sg7_i412"},{"actor":"_NOTE_","item":"<b>Below 100 feet (Alert height) for CAT 3 DUAL:</b>","action":""},{"actor":"_BULLET_","item":"In the case of Autoland warning light, if visual references not sufficient:","action":""},{"actor":"PILOT","item":"GO AROUND","action":"PERFORM","id":"s15_g0_sg7_i413"},{"actor":"_BULLET_","item":"If visual references are sufficient:","action":""},{"actor":"PILOT","item":"LANDING","action":"PERFORM","id":"s15_g0_sg7_i414"}]}]}]},{"title":"Approach \u2013 Final APP Guidance","groups":[{"heading":"Approach Using Final APP Guidance","level":1,"items":[],"subgroups":[{"heading":"Descent Preparation","level":2,"items":[{"actor":"PILOT","item":"WEATHER AND LANDING INFORMATION","action":"OBTAIN","id":"s16_g0_sg0_i415"},{"actor":"_NOTE_","item":"It is not recommended to use the vertical managed guidance if the OAT is below the minimum temperature indicated on the chart or when the temperature corrections are required.","action":""},{"actor":"PILOT","item":"F-PLN A page","action":"VERIFY","id":"s16_g0_sg0_i416"},{"actor":"_NOTE_","item":"It is not recommended to use FINAL APP guidance if a TOO STEEP PATH is displayed after the Final Descent Point.","action":""},{"actor":"PILOT","item":"PROG page","action":"COMPLETE","id":"s16_g0_sg0_i417"},{"actor":"_NOTE_","item":"Insert the reference runway threshold in the BRG/DIST field. This allows the monitoring of position during approach.","action":""},{"actor":"PILOT","item":"GO-AROUND STRATEGY","action":"REVIEW","id":"s16_g0_sg0_i418"}]},{"heading":"Descent","level":2,"items":[{"actor":"_NOTE_","item":"<b>At 10 000 feet:</b>","action":""},{"actor":"PILOT","item":"NAV ACCURACY","action":"VERIFY","id":"s16_g0_sg1_i419"},{"actor":"_NOTE_","item":"If the nav accuracy is low, it is recommended to use TRK FPA mode for approach.","action":""},{"actor":"_BULLET_","item":"For RNAV (GNSS) approach:","action":""},{"actor":"PILOT","item":"GPS PRIMARY","action":"VERIFY","id":"s16_g0_sg1_i420"},{"actor":"_NOTE_","item":"The GPS PRIMARY must be available on at least one FMS.","action":""},{"actor":"PILOT","item":"BARO REF","action":"SET","id":"s16_g0_sg1_i421"}]},{"heading":"Initial / Intermediate / Final Approach","level":2,"items":[{"actor":"PILOT","item":"POSITION","action":"MONITOR","id":"s16_g0_sg2_i422"},{"actor":"PILOT","item":"APPR pushbutton","action":"PRESS","id":"s16_g0_sg2_i423"},{"actor":"_NOTE_","item":"Turn on the APPR mode only when the aircraft is cleared for approach and the TO waypoint is the Final Descent Point.","action":""},{"actor":"PILOT","item":"APP NAV","action":"VERIFY ARMED or ENGAGED","id":"s16_g0_sg2_i424"},{"actor":"PILOT","item":"FINAL","action":"VERIFY ARMED","id":"s16_g0_sg2_i425"},{"actor":"_NOTE_","item":"Verify that the V/DEV scale is displayed on the PFD. Ensure the display of a blue arrow on ND. This indicates that FINAL APP engagement conditions are fulfilled.","action":""}]},{"heading":"At the Final Descent Point","level":2,"items":[{"actor":"PILOT","item":"FINAL APP","action":"VERIFY ENGAGED","id":"s16_g0_sg3_i426"},{"actor":"PILOT","item":"GO AROUND ALTITUDE","action":"SET","id":"s16_g0_sg3_i427"},{"actor":"PILOT","item":"FLIGHT PARAMETERS","action":"MONITOR","id":"s16_g0_sg3_i428"}]},{"heading":"At Entered Minimum + 100 feet","level":2,"items":[{"actor":"PILOT","item":"ONE HUNDRED ABOVE","action":"MONITOR OR ANNOUNCE","id":"s16_g0_sg4_i429"}]},{"heading":"At Entered Minimum","level":2,"items":[{"actor":"PILOT","item":"MINIMUM","action":"MONITOR OR ANNOUNCE","id":"s16_g0_sg5_i430"},{"actor":"_BULLET_","item":"If visual references are sufficient:","action":""},{"actor":"PILOT","item":"CONTINUE","action":"VERIFY","id":"s16_g0_sg5_i431"},{"actor":"_BULLET_","item":"At the latest at the MAP or Minimum Use Height of the AP (whichever occurs first):","action":""},{"actor":"PILOT","item":"AP","action":"OFF","id":"s16_g0_sg5_i432"},{"actor":"PILOT","item":"FD","action":"AS REQUIRED","id":"s16_g0_sg5_i433"},{"actor":"_BULLET_","item":"If visual references are not sufficient:","action":""},{"actor":"PILOT","item":"GO AROUND","action":"VERIFY","id":"s16_g0_sg5_i434"}]}]}]},{"title":"Approach \u2013 FPA Guidance","groups":[{"heading":"Approach Using FPA Guidance","level":1,"items":[],"subgroups":[{"heading":"Descent Preparation","level":2,"items":[{"actor":"PILOT","item":"F-PLN A page","action":"VERIFY","id":"s17_g0_sg0_i435"},{"actor":"_NOTE_","item":"It is recommended to disregard the V/DEV information on the PFD if the message TOO STEEP PATH is displayed after the Final Descent Point. For the approaches using the NAV FPA mode, 1 degree of difference between the MCDU and the charted final lateral track is acceptable. For conventional radio NAVAID approach, 3 degrees of difference between the MCDU and the charted final lateral track is acceptable. For all other cases, it is recommended to use TRK FPA mode.","action":""},{"actor":"PILOT","item":"PROG page","action":"COMPLETE","id":"s17_g0_sg0_i436"},{"actor":"_NOTE_","item":"Insert the reference runway threshold in the BRG/DIST field. This allows the monitoring of position during approach.","action":""},{"actor":"PILOT","item":"GO AROUND STRATEGY","action":"REVIEW","id":"s17_g0_sg0_i437"}]},{"heading":"Descent","level":2,"items":[{"actor":"_NOTE_","item":"<b>At 10 000 feet:</b>","action":""},{"actor":"PILOT","item":"NAV ACCURACY","action":"VERIFY","id":"s17_g0_sg1_i438"},{"actor":"_NOTE_","item":"If the nav accuracy is low, it is recommended to use TRK FPA mode for approach.","action":""},{"actor":"_BULLET_","item":"For RNAV (GNSS) approach:","action":""},{"actor":"PILOT","item":"GPS PRIMARY","action":"VERIFY","id":"s17_g0_sg1_i439"},{"actor":"_NOTE_","item":"The GPS PRIMARY must be available on at least one FMS.","action":""}]},{"heading":"Initial / Intermediate / Final Approach","level":2,"items":[{"actor":"PILOT","item":"LATERAL GUIDANCE MODE","action":"SET FOR APPROACH","id":"s17_g0_sg2_i440"},{"actor":"_NOTE_","item":"Arm the NAV or LOC mode as appropriate.","action":""},{"actor":"_BULLET_","item":"
