777_0002"},{"actor":"PILOT","item":"EXT PWR (Primary & Secondary)","action":"AVAILABLE \u2014 VERIFY","id":"b777_0003"}]},{"heading":"Hydraulic Panel","level":2,"items":[{"actor":"PILOT","item":"DEMAND PUMPS (L, C1, C2, R)","action":"OFF","id":"b777_0004"},{"actor":"PILOT","item":"ELECTRIC PRIMARY PUMPS (C1, C2)","action":"OFF","id":"b777_0005"},{"actor":"_NOTE_","item":"The two engine-driven primary pump ON lights are illuminated permanently and are not a fault.","action":""}]},{"heading":"Forward Pedestal & Controls","level":2,"items":[{"actor":"PILOT","item":"FLAP lever","action":"VERIFY UP","id":"b777_0006"},{"actor":"PILOT","item":"LANDING GEAR lever","action":"DOWN","id":"b777_0007"},{"actor":"PILOT","item":"SPEED BRAKE lever","action":"DOWN / STOWED","id":"b777_0008"},{"actor":"PILOT","item":"THRUST LEVERS","action":"IDLE","id":"b777_0009"},{"actor":"PILOT","item":"FUEL CONTROL switches (L, R)","action":"CUTOFF","id":"b777_0010"},{"actor":"PILOT","item":"PARKING BRAKE","action":"SET","id":"b777_0011"}]}]},{"heading":"Apply Electrical Power","level":1,"items":[{"actor":"PILOT","item":"BATTERY switch","action":"ON","id":"b777_0012"},{"actor":"PILOT","item":"PRIMARY EXT PWR switch","action":"ON","id":"b777_0013"},{"actor":"PILOT","item":"SECONDARY EXT PWR switch","action":"ON","id":"b777_0014"},{"actor":"_BULLET_","item":"Confirm both PRI EXT PWR and SEC EXT PWR ON lights illuminate.","action":""},{"actor":"_BULLET_","item":"Avionics cooling fans should be heard spinning up.","action":""},{"actor":"_NOTE_","item":"If only one external power source is available, the airplane will operate, but obtaining both is the normal pre-flight configuration.","action":""}],"subgroups":[]},{"heading":"Initialise the IRS / ADIRU","level":1,"items":[{"actor":"PILOT","item":"ADIRU switch (top-left overhead)","action":"ON","id":"b777_0015"},{"actor":"_NOTE_","item":"Unlike the 737 the 777 does not require manual alignment latitude entry \u2014 the ADIRU figures it out automatically. Allow a few minutes for the displays and IRS to come fully online.","action":""}],"subgroups":[]},{"heading":"Cabin & IFE Power","level":1,"items":[{"actor":"_NOTE_","item":"In real-world operation these are normally left ON; in a Sim cold start they are typically OFF and must be selected manually.","action":""}],"subgroups":[{"heading":"Passenger Systems","level":2,"items":[{"actor":"PILOT","item":"IFE/PASS SEATS switch","action":"ON","id":"b777_0016"},{"actor":"PILOT","item":"CABIN/UTILITY switch","action":"ON","id":"b777_0017"}]}]},{"heading":"FMC \u2014 Position Initialisation","level":1,"items":[{"actor":"PILOT","item":"FMC","action":"SELECT \u2014 POS INIT page","id":"b777_0018"},{"actor":"PILOT","item":"GPS position","action":"DROP INTO INITIAL POSITION","id":"b777_0019"},{"actor":"PILOT","item":"Reference airport (e.g. EGLL)","action":"ENTER & VERIFY","id":"b777_0020"},{"actor":"_BULLET_","item":"Sanity-check: the reference airport coordinates should match the GPS position within a few miles.","action":""}],"subgroups":[]},{"heading":"FMC \u2014 Route Setup","level":1,"items":[{"actor":"PILOT","item":"EFB","action":"REQUEST ROUTE FROM SIMBRIEF","id":"b777_0021"},{"actor":"_NOTE_","item":"On real operations the route is uplinked via ACARS through the COMM page; the SimBrief request via EFB substitutes for this in the simulator.","action":""},{"actor":"PILOT","item":"ROUTE REQUEST page","action":"SELECT SIMBRIEF ROUTE","id":"b777_0022"},{"actor":"PILOT","item":"SET PAYLOAD","action":"AS REQUIRED","id":"b777_0023"},{"actor":"PILOT","item":"SET FUEL","action":"AS REQUIRED","id":"b777_0024"},{"actor":"PILOT","item":"LOAD ROUTE","action":"EXECUTE & ACTIVATE","id":"b777_0025"},{"actor":"_BULLET_","item":"Always activate the route after loading or the FMC will not use it for guidance.","action":""}],"subgroups":[]},{"heading":"FMC \u2014 Performance Init","level":1,"items":[{"actor":"PILOT","item":"ZERO FUEL WEIGHT","action":"VERIFY MATCH OFP","id":"b777_0026"},{"actor":"PILOT","item":"RESERVES (FINRES + ALT)","action":"VERIFY","id":"b777_0027"},{"actor":"PILOT","item":"COST INDEX","action":"VERIFY (typical 15\u201380 long-haul)","id":"b777_0028"},{"actor":"PILOT","item":"INITIAL CRUISE ALTITUDE","action":"ENTER","id":"b777_0029"},{"actor":"PILOT","item":"PERF INIT Uplink","action":"ACCEPT","id":"b777_0030"},{"actor":"_NOTE_","item":"Inspect the page carefully before accepting: small (auto-uploaded) numbers are computed by the box, large (bold) numbers are crew-entered values you should verify against the OFP.","action":""}],"subgroups":[]},{"heading":"FMC \u2014 Descent Forecast / Winds","level":1,"items":[{"actor":"PILOT","item":"LEGS page \u2192 ROUTE DATA","action":"REQUEST","id":"b777_0031"},{"actor":"PILOT","item":"WIND UPLINK","action":"LOAD","id":"b777_0032"},{"actor":"PILOT","item":"DESCENT FORECAST Uplink (FMC COMM)","action":"LOAD","id":"b777_0033"},{"actor":"_BULLET_","item":"Each waypoint gets a W in the wind column when wind data is loaded.","action":""},{"actor":"_NOTE_","item":"The 777 takes a vertical slice of forecast winds for every waypoint, whereas the 737 only knows one altitude at a time. This allows accurate fuel-burn prediction over the whole flight.","action":""}],"subgroups":[]},{"heading":"FMC \u2014 Departure & Arrival","level":1,"items":[{"actor":"PILOT","item":"DEPARTURE \u2014 Runway","action":"SELECT FIRST","id":"b777_0034"},{"actor":"_BULLET_","item":"Selecting the runway before the SID limits the FMC to applicable transitions.","action":""},{"actor":"PILOT","item":"DEPARTURE \u2014 SID","action":"SELECT","id":"b777_0035"},{"actor":"PILOT","item":"DEPARTURE \u2014 Transition","action":"SELECT IF APPLICABLE","id":"b777_0036"},{"actor":"PILOT","item":"ARRIVAL \u2014 Runway","action":"SELECT","id":"b777_0037"},{"actor":"PILOT","item":"ARRIVAL \u2014 STAR / Transition","action":"SELECT","id":"b777_0038"},{"actor":"PILOT","item":"ARRIVAL \u2014 Approach","action":"SELECT","id":"b777_0039"},{"actor":"PILOT","item":"EXECUTE","action":"PRESS","id":"b777_0040"}],"subgroups":[]},{"heading":"Cross-Check Route Integrity","level":1,"items":[{"actor":"PILOT","item":"PROGRESS page \u2192 Distance to Go","action":"COMPARE TO OFP","id":"b777_0041"},{"actor":"_BULLET_","item":"Route distance should match the OFP within ~20 nm. A larger mismatch is a red flag \u2014 investigate before continuing.","action":""},{"actor":"PILOT","item":"LEGS page","action":"SCAN FOR DISCONTINUITIES","id":"b777_0042"},{"actor":"PILOT","item":"Altitude / speed constraints","action":"VERIFY EACH WAYPOINT","id":"b777_0043"},{"actor":"_NOTE_","item":"Discontinuities appear as a row of five solid boxes followed by the word DISCONTINUITY. Close them by dragging the next waypoint up onto the empty line.","action":""}],"subgroups":[]},{"heading":"Display Select Panel Familiarisation","level":1,"items":[{"actor":"_NOTE_","item":"The Display Select Panel sits just left of the EFIS control panel. The top row of three switches picks which MFD you are controlling (Left Inboard, Lower Center, Right Inboard); the bottom rows pick which synoptic to display.","action":""},{"actor":"_BULLET_","item":"Normal practice: always return the display select to LOWER CENTER after manipulating Captain or FO MFD pages, so the next press doesn't accidentally swap engine indication off the screen.","action":""}],"subgroups":[{"heading":"Lower Center MFD","level":2,"items":[{"actor":"PILOT","item":"LOWER CENTER","action":"SELECT","id":"b777_0044"},{"actor":"PILOT","item":"DOOR synoptic","action":"VERIFY ALL DOORS","id":"b777_0045"}]}]}]},{"title":"Overhead Panel Flow","groups":[{"heading":"Flow Discipline","level":1,"items":[{"actor":"_NOTE_","item":"Work the overhead panel top-left to bottom-right. The 777 is heavily automated \u2014 you will leave most switches in AUTO. If everything is normal you should see no amber lights and very little colour anywhere on the panel.","action":""}],"subgroups":[]},{"heading":"Top Strip","level":1,"items":[],"subgroups":[{"heading":"ADIRU","level":2,"items":[{"actor":"PILOT","item":"ADIRU switch","action":"ON","id":"b777_0046"}]},{"heading":"Cabin / IFE","level":2,"items":[{"actor":"PILOT","item":"IFE/PASS SEATS","action":"ON","id":"b777_0047"},{"actor":"PILOT","item":"CABIN/UTILITY","action":"ON","id":"b777_0048"}]}]},{"heading":"Electrical Panel","level":1,"items":[{"actor":"_NOTE_","item":"The 777 has six sources of electrical power: two main engine generators, two backup permanent-magnet generators, the APU generator, and the RAT. Single-generator electrical operation is fully supported including autoland.","action":""}],"subgroups":[{"heading":"Generator Controls","level":2,"items":[{"actor":"PILOT","item":"L GENERATOR CONTROL","action":"ON","id":"b777_0049"},{"actor":"PILOT","item":"R GENERATOR CONTROL","action":"ON","id":"b777_0050"},{"actor":"PILOT","item":"L BACKUP GENERATOR","action":"ON","id":"b777_0051"},{"actor":"PILOT","item":"R BACKUP GENERATOR","action":"ON","id":"b777_0052"},{"actor":"PILOT","item":"BUS TIE L / R","action":"AUTO","id":"b777_0053"}]}]},{"heading":"Emergency Lights","level":1,"items":[{"actor":"PILOT","item":"EMERGENCY LIGHTS switch","action":"ARMED \u2014 CLOSE GUARD","id":"b777_0054"}],"subgroups":[]},{"heading":"Window Heat","level":1,"items":[{"actor":"PILOT","item":"L SIDE WINDOW HEAT","action":"ON","id":"b777_0055"},{"actor":"PILOT","item":"L FORWARD WINDOW HEAT","action":"ON","id":"b777_0056"},{"actor":"PILOT","item":"R FORWARD WINDOW HEAT","action":"ON","id":"b777_0057"},{"actor":"PILOT","item":"R SIDE WINDOW HEAT","action":"ON","id":"b777_0058"}],"subgroups":[]},{"heading":"Hydraulic System","level":1,"items":[{"actor":"_NOTE_","item":"Top row of hydraulic switches are primary pumps; bottom row are demand pumps. Demand pumps run only when there is demand. The R DEMAND pump in AUTO supplies normal brake pressure on the ground.","action":""}],"subgroups":[{"heading":"Right System First (prevents fluid migration L\u2192R)","level":2,"items":[{"actor":"PILOT","item":"R DEMAND PUMP","action":"AUTO","id":"b777_0059"},{"actor":"PILOT","item":"Brake source pressure","action":"VERIFY ON BRAKE ACCUMULATOR GAUGE","id":"b777_0060"},{"actor":"_BULLET_","item":"Center I-cast should clear the BRAKE SOURCE light once the R demand pump pressurises the system.","action":""}]},{"heading":"Pressurise Remaining Systems","level":2,"items":[{"actor":"PILOT","item":"C2 ELECTRIC PRIMARY pump","action":"ON","id":"b777_0061"},{"actor":"PILOT","item":"C1 ELECTRIC PRIMARY pump","action":"ON","id":"b777_0062"},{"actor":"PILOT","item":"L DEMAND PUMP","action":"AUTO","id":"b777_0063"},{"actor":"PILOT","item":"C1 AIR DEMAND pump","action":"AUTO","id":"b777_0064"},{"actor":"PILOT","item":"C2 AIR DEMAND pump","action":"AUTO","id":"b777_0065"}]}]},{"heading":"Passenger Signs","level":1,"items":[{"actor":"PILOT","item":"FASTEN BELTS","action":"AUTO","id":"b777_0066"},{"actor":"PILOT","item":"NO SMOKING","action":"ON","id":"b777_0067"},{"actor":"PILOT","item":"CHIME inhibit","action":"AS REQUIRED","id":"b777_0068"}],"subgroups":[]},{"heading":"Master Brightness","level":1,"items":[{"actor":"_NOTE_","item":"The single Master Brightness knob in the overhead controls all instrument and integral panel lighting. Each individual panel knob should be lined up with the central reference dot so the master knob's adjustments stay consistent.","action":""},{"actor":"PILOT","item":"MASTER BRIGHTNESS","action":"AS REQUIRED","id":"b777_0069"},{"actor":"PILOT","item":"INDIVIDUAL PANEL FLOOD knobs","action":"VERIFY LINED UP WITH DOT","id":"b777_0070"},{"actor":"PILOT","item":"FLOOD LIGHTS (storm) \u2014 inner knob","action":"OFF","id":"b777_0071"}],"subgroups":[]},{"heading":"Fire Protection","level":1,"items":[{"actor":"_NOTE_","item":"The 777 has a single fire test button that exercises all ten warning indications at once. Press and hold, then verify each item below.","action":""}],"subgroups":[{"heading":"Fire Test \u2014 Ten Indications","level":2,"items":[{"actor":"PILOT","item":"Hold FIRE TEST button","action":"PRESS & HOLD","id":"b777_0072"},{"actor":"PILOT","item":"FIRE TEST IN PROGRESS \u2192 FIRE TEST PASS (EICAS)","action":"VERIFY","id":"b777_0073"},{"actor":"PILOT","item":"L & R MASTER WARNING lights","action":"ILLUMINATE","id":"b777_0074"},{"actor":"PILOT","item":"L & R FUEL CONTROL switch fire lights","action":"ILLUMINATE","id":"b777_0075"},{"actor":"PILOT","item":"L & R FIRE HANDLES","action":"ILLUMINATE","id":"b777_0076"},{"actor":"PILOT","item":"APU FIRE HANDLE","action":"ILLUMINATE","id":"b777_0077"},{"actor":"PILOT","item":"L & R CARGO FIRE indicators","action":"ILLUMINATE","id":"b777_0078"},{"actor":"PILOT","item":"FIRE BELL","action":"AUDIBLE","id":"b777_0079"},{"actor":"PILOT","item":"Release FIRE TEST button","action":"RELEASE","id":"b777_0080"}]}]},{"heading":"Engine Start Selectors","level":1,"items":[{"actor":"PILOT","item":"L & R ENGINE START SELECTORS","action":"VERIFY NORMAL","id":"b777_0081"}],"subgroups":[]},{"heading":"Fuel Panel","level":1,"items":[{"actor":"_NOTE_","item":"The 777 has two crossfeed valves rather than one \u2014 added redundancy in case a single valve fails closed during an engine failure or leak. Center tank pumps are more powerful than wing pumps so they feed first; turn them off below ~10,500 lb (4,800 kg) center quantity to avoid pump cavitation.","action":""}],"subgroups":[{"heading":"Pump Sequencing on Ground","level":2,"items":[{"actor":"PILOT","item":"L FWD pump","action":"ON","id":"b777_0082"},{"actor":"PILOT","item":"L AFT pump","action":"ON","id":"b777_0083"},{"actor":"PILOT","item":"R FWD pump","action":"ON","id":"b777_0084"},{"actor":"PILOT","item":"R AFT pump","action":"ON","id":"b777_0085"},{"actor":"PILOT","item":"L CENTER pump","action":"ON","id":"b777_0086"},{"actor":"PILOT","item":"R CENTER pump","action":"ON","id":"b777_0087"}]},{"heading":"Crossfeed Valves","level":2,"items":[{"actor":"PILOT","item":"CROSSFEED FORWARD valve","action":"AUTO","id":"b777_0088"},{"actor":"PILOT","item":"CROSSFEED AFT valve","action":"AUTO","id":"b777_0089"}]},{"heading":"Fuel Jettison","level":2,"items":[{"actor":"_NOTE_","item":"Fuel jettison computes maximum landing weight automatically and arms the dump to that quantity. Pulling out the JETTISON NOZZLE knob arms; the two red guarded JETTISON switches actually start the dump. Always run the appropriate non-normal checklist before dumping fuel and avoid jettisoning over populated areas.","action":""}]}]},{"heading":"Anti-Ice","level":1,"items":[{"actor":"PILOT","item":"ENGINE ANTI-ICE (L, R)","action":"AUTO","id":"b777_0090"},{"actor":"PILOT","item":"WING ANTI-ICE","action":"AUTO","id":"b777_0091"},{"actor":"PILOT","item":"WINDOW HEAT","action":"ALL ON","id":"b777_0092"},{"actor":"PILOT","item":"COWL ANTI-ICE NACELLE valves","action":"AUTO","id":"b777_0093"}],"subgroups":[]},{"heading":"External Lighting Panel","level":1,"items":[],"subgroups":[{"heading":"Initial Test","level":2,"items":[{"actor":"PILOT","item":"INDICATOR LIGHTS switch","action":"TEST","id":"b777_0094"},{"actor":"_BULLET_","item":"All annunciators illuminate and indicator dimming is exercised; release to BRIGHT for daylight ops.","action":""}]},{"heading":"Predeparture Light State","level":2,"items":[{"actor":"PILOT","item":"BEACON","action":"OFF (until just before engine start)","id":"b777_0095"},{"actor":"PILOT","item":"NAV lights","action":"ON","id":"b777_0096"},{"actor":"PILOT","item":"LOGO light","action":"AS REQUIRED","id":"b777_0097"},{"actor":"PILOT","item":"STROBE","action":"OFF","id":"b777_0098"},{"actor":"PILOT","item":"WING / RUNWAY TURNOFF / TAXI / LANDING","action":"OFF","id":"b777_0099"}]}]},{"heading":"Air Conditioning Panel","level":1,"items":[{"actor":"_NOTE_","item":"If preconditioned air is connected at the gate, packs and recirculation fans should be OFF \u2014 supplying pre-cond air with packs running can damage the ducts. Once you start the APU and disconnect ground air, leave the whole panel in AUTO.","action":""},{"actor":"PILOT","item":"LEFT PACK","action":"AUTO","id":"b777_0100"},{"actor":"PILOT","item":"RIGHT PACK","action":"AUTO","id":"b777_0101"},{"actor":"PILOT","item":"L & R RECIRC FANS","action":"AUTO","id":"b777_0102"},{"actor":"PILOT","item":"TRIM AIR","action":"AUTO","id":"b777_0103"},{"actor":"PILOT","item":"EQUIPMENT COOLING","action":"AUTO","id":"b777_0104"}],"subgroups":[]},{"heading":"Pressurization","level":1,"items":[{"actor":"_NOTE_","item":"Fully automatic. The system already knows the destination airport's elevation from the FMC and will plan the pressurisation schedule accordingly.","action":""},{"actor":"PILOT","item":"LANDING ALTITUDE","action":"AUTO","id":"b777_0105"},{"actor":"PILOT","item":"OUTFLOW VALVES","action":"AUTO","id":"b777_0106"}],"subgroups":[]}]},{"title":"MCP & Pedestal Flow","groups":[{"heading":"EFIS Control Panel (each side)","level":1,"items":[],"subgroups":[{"heading":"Barometric Settings","level":2,"items":[{"actor":"PILOT","item":"BARO reference","action":"STD ABOVE TRANSITION / QNH BELOW","id":"b777_0107"},{"actor":"PILOT","item":"BARO units (IN / hPa)","action":"AS REQUIRED FOR REGION","id":"b777_0108"},{"actor":"PILOT","item":"STBY altimeter","action":"SET TO MATCH","id":"b777_0109"}]},{"heading":"Display Configuration","level":2,"items":[{"actor":"PILOT","item":"Range","action":"10 NM (taxi / departure)","id":"b777_0110"},{"actor":"PILOT","item":"APT / TFC / TERR / WXR","action":"ON / ON / ON / AS REQUIRED","id":"b777_0111"},{"actor":"PILOT","item":"WPT / VOR / NDB / ARPT","action":"AS REQUIRED","id":"b777_0112"}]}]},{"heading":"Mode Control Panel","level":1,"items":[{"actor":"_NOTE_","item":"V2 must replace the 200 placeholder before taxi out \u2014 leaving it at 200 is the standard 'something not yet set' cue. The HDG / ALT centre buttons act as heading-select and altitude-intervene respectively (no separate intervene switch like the 737).","action":""}],"subgroups":[{"heading":"Flight Directors","level":2,"items":[{"actor":"PILOT","item":"L FLIGHT DIRECTOR switch","action":"ON","id":"b777_0113"},{"actor":"PILOT","item":"R FLIGHT DIRECTOR switch","action":"ON","id":"b777_0114"}]},{"heading":"Initial Speed / Heading / Altitude","level":2,"items":[{"actor":"PILOT","item":"IAS / MACH window","action":"200 (placeholder \u2014 replaced by V2)","id":"b777_0115"},{"actor":"PILOT","item":"HEADING window","action":"RUNWAY HEADING","id":"b777_0116"},{"actor":"PILOT","item":"ALTITUDE window","action":"INITIAL CLEARED ALTITUDE","id":"b777_0117"},{"actor":"PILOT","item":"ALTITUDE INCREMENT selector","action":"100 ft / 1000 ft (as required)","id":"b777_0118"}]},{"heading":"Arming","level":2,"items":[{"actor":"PILOT","item":"LNAV","action":"ARM","id":"b777_0119"},{"actor":"PILOT","item":"VNAV","action":"ARM","id":"b777_0120"}]}]},{"heading":"Center Pedestal Flow","level":1,"items":[],"subgroups":[{"heading":"Auto Brake","level":2,"items":[{"actor":"PILOT","item":"AUTO BRAKE selector","action":"RTO","id":"b777_0121"}]},{"heading":"Throttle Quadrant","level":2,"items":[{"actor":"PILOT","item":"THRUST LEVERS","action":"IDLE","id":"b777_0122"},{"actor":"PILOT","item":"REVERSE THRUST LEVERS","action":"STOWED","id":"b777_0123"},{"actor":"PILOT","item":"SPEED BRAKE lever","action":"DOWN / DETENT","id":"b777_0124"},{"actor":"PILOT","item":"FLAP lever","action":"UP \u2014 VERIFY","id":"b777_0125"},{"actor":"PILOT","item":"FUEL CONTROL switches (L, R)","action":"CUTOFF","id":"b777_0126"}]},{"heading":"Stabiliser Trim","level":2,"items":[{"actor":"PILOT","item":"STAB TRIM gauge","action":"VERIFY GREEN BAND","id":"b777_0127"},{"actor":"PILOT","item":"ALTERNATE STAB TRIM cutout switches","action":"NORM (guarded)","id":"b777_0128"}]},{"heading":"Rudder & Aileron Trim","level":2,"items":[{"actor":"PILOT","item":"RUDDER TRIM","action":"ZERO","id":"b777_0129"},{"actor":"PILOT","item":"AILERON TRIM (control wheel)","action":"ZERO","id":"b777_0130"},{"actor":"PILOT","item":"MANUAL TRIM CANCEL","action":"PRESS TO RECENTER","id":"b777_0131"}]},{"heading":"Transponder & TCAS","level":2,"items":[{"actor":"PILOT","item":"TRANSPONDER code","action":"AS ASSIGNED","id":"b777_0132"},{"actor":"PILOT","item":"TRANSPONDER mode","action":"STBY (until line up)","id":"b777_0133"},{"actor":"PILOT","item":"TCAS mode","action":"TA / RA \u2014 VERIFY","id":"b777_0134"}]},{"heading":"Radios","level":2,"items":[{"actor":"PILOT","item":"VHF L / R / C","action":"TUNE AS REQUIRED","id":"b777_0135"},{"actor":"_NOTE_","item":"Watch for the tuning lights on the radio panels \u2014 an illuminated tuning light means another panel (often the jump-seat occupant) is currently tuning that radio.","action":""}]},{"heading":"Weather Radar","level":2,"items":[{"actor":"PILOT","item":"WXR control panel","action":"AS REQUIRED","id":"b777_0136"},{"actor":"_NOTE_","item":"Unlike the 737 there is no mandatory pre-flight weather radar self-test on most 777 operators' SOPs.","action":""}]},{"heading":"Clock / Chronograph","level":2,"items":[{"actor":"PILOT","item":"L CLOCK","action":"RUN (300-series starts elapsed time automatically at takeoff)","id":"b777_0137"},{"actor":"PILOT","item":"CHRONOGRAPH","action":"RESET","id":"b777_0138"}]}]}]},{"title":"Preflight Checklist","groups":[{"heading":"Preflight Items","level":1,"items":[{"actor":"PILOT","item":"Oxygen \u2014 Mask & Microphone","action":"TESTED 100%","id":"b777_0139"},{"actor":"PILOT","item":"Battery","action":"ON","id":"b777_0140"},{"actor":"PILOT","item":"Hydraulic Panel","action":"SET","id":"b777_0141"},{"actor":"PILOT","item":"Window Heat","action":"ON (all 4)","id":"b777_0142"},{"actor":"PILOT","item":"Pressurization","action":"AUTO \u2014 LANDING ALT SET","id":"b777_0143"},{"actor":"PILOT","item":"Fuel Pumps","action":"ON (per quantity policy)","id":"b777_0144"},{"actor":"PILOT","item":"Anti-Collision / NAV Lights","action":"AS REQUIRED","id":"b777_0145"},{"actor":"PILOT","item":"Flaps","action":"UP \u2014 agreed with handle position","id":"b777_0146"},{"actor":"PILOT","item":"Speed Brake","action":"DOWN / DETENT","id":"b777_0147"},{"actor":"PILOT","item":"Stab Trim","action":"GREEN BAND \u2014 UNITS SET ON BRIEFING","id":"b777_0148"},{"actor":"PILOT","item":"Parking Brake","action":"SET (verify PARKING BRAKE SET on EICAS)","id":"b777_0149"},{"actor":"_BULLET_","item":"Both pilots point at the EICAS PARKING BRAKE SET message \u2014 handle position alone is not proof of pressure in the system.","action":""},{"actor":"PILOT","item":"Flight Instruments","action":"HEADING / ALTIMETER CROSS-CHECKED","id":"b777_0150"},{"actor":"PILOT","item":"Doors","action":"ALL CLOSED \u2014 DOOR synoptic","id":"b777_0151"}],"subgroups":[]},{"heading":"Briefings","level":1,"items":[{"actor":"PILOT","item":"Departure Briefing","action":"COMPLETE","id":"b777_0152"},{"actor":"_BULLET_","item":"Cover: route, SID, initial altitude, speed restrictions, terrain, runway analysis, NORMAL / EOSID, emergency return, MEL/CDL items.","action":""},{"actor":"PILOT","item":"Taxi Briefing","action":"COMPLETE","id":"b777_0153"},{"actor":"_BULLET_","item":"Cover: expected taxi route, hotspots, hold-short bars, runway crossings.","action":""},{"actor":"PILOT","item":"Takeoff Briefing","action":"COMPLETE","id":"b777_0154"},{"actor":"_BULLET_","item":"Cover: V-speeds, flap setting, thrust rating / assumed temp, abort criteria, low-altitude actions, weather.","action":""}],"subgroups":[]}]},{"title":"Takeoff Data & Pre-Start","groups":[{"heading":"ATIS & Clearance","level":1,"items":[{"actor":"PILOT","item":"ATIS","action":"OBTAIN \u2014 CHECK INFORMATION CODE","id":"b777_0155"},{"actor":"PILOT","item":"CLEARANCE DELIVERY","action":"OBTAIN ATC CLEARANCE & READ BACK","id":"b777_0156"},{"actor":"PILOT","item":"CABIN MANAGER","action":"ADVISED OF EXPECTED PUSHBACK","id":"b777_0157"}],"subgroups":[]},{"heading":"Performance Tool","level":1,"items":[],"subgroups":[{"heading":"Runway & Conditions","level":2,"items":[{"actor":"PILOT","item":"RUNWAY","action":"SELECT","id":"b777_0158"},{"actor":"PILOT","item":"RUNWAY CONDITION","action":"DRY / WET / CONTAMINATED","id":"b777_0159"},{"actor":"PILOT","item":"WIND / OAT / QNH","action":"ENTER OR IMPORT","id":"b777_0160"}]},{"heading":"Aircraft Config","level":2,"items":[{"actor":"PILOT","item":"ZFW / TOW / FUEL","action":"IMPORT FROM AIRCRAFT","id":"b777_0161"},{"actor":"PILOT","item":"FLAP CONFIG","action":"OPTIMUM (5 / 15 / 20)","id":"b777_0162"},{"actor":"PILOT","item":"THRUST RATING","action":"OPTIMUM (TO / TO1 / TO2)","id":"b777_0163"},{"actor":"PILOT","item":"ANTI-ICE CONFIG","action":"AUTO / WING / ENG / OFF","id":"b777_0164"},{"actor":"PILOT","item":"AIR-CON CONFIG","action":"AUTO (PACKS OFF / APU PACKS as required)","id":"b777_0165"}]},{"heading":"Calculate & Cross-Check","level":2,"items":[{"actor":"PILOT","item":"CALCULATE","action":"PRESS","id":"b777_0166"},{"actor":"PILOT","item":"RESULTS","action":"VERIFY V1 / VR / V2 / FLAPS / ASSUMED TEMP","id":"b777_0167"},{"actor":"_BULLET_","item":"Always run the first calculation in OPTIMUM. If runway/wind dictate, increase to flap 15 or 20. Never assume short-field flap based on weather alone.","action":""}]}]},{"heading":"Insert Takeoff Data into FMC","level":1,"items":[{"actor":"PILOT","item":"INIT REF \u2192 TAKEOFF page","action":"OPEN","id":"b777_0168"},{"actor":"PILOT","item":"FLAPS","action":"ENTER (5 / 15 / 20)","id":"b777_0169"},{"actor":"PILOT","item":"ASSUMED TEMP (SEL TEMP)","action":"ENTER","id":"b777_0170"},{"actor":"PILOT","item":"THRUST LIMIT (TO1 / TO2)","action":"SELECT IF APPLICABLE","id":"b777_0171"},{"actor":"PILOT","item":"V1 / VR / V2","action":"VERIFY (auto-populate after SEL TEMP & flap)","id":"b777_0172"},{"actor":"PILOT","item":"ACCEL HEIGHT","action":"ENTER (typically 1000 ft AGL or per airport)","id":"b777_0173"},{"actor":"PILOT","item":"THRUST REDUCTION HEIGHT","action":"ENTER","id":"b777_0174"},{"actor":"PILOT","item":"ENG OUT ACCEL HEIGHT","action":"ENTER","id":"b777_0175"},{"actor":"_NOTE_","item":"Acceleration and thrust-reduction values are sometimes negotiated between operator and airport \u2014 defer to BlackBox or your operator's data if available.","action":""},{"actor":"PILOT","item":"EXECUTE","action":"PRESS","id":"b777_0176"}],"subgroups":[]},{"heading":"Stabiliser Trim","level":1,"items":[{"actor":"PILOT","item":"STAB TRIM UNITS","action":"SET FROM PERF (e.g. 5.25)","id":"b777_0177"},{"actor":"PILOT","item":"FLT CTRL synoptic","action":"VERIFY STAB MATCHES SET","id":"b777_0178"}],"subgroups":[]},{"heading":"Set V2 in MCP","level":1,"items":[{"actor":"PILOT","item":"MCP IAS window","action":"SET V2 (e.g. 176)","id":"b777_0179"},{"actor":"_BULLET_","item":"Until V2 is in the window, the 200 kt placeholder is your visual cue that takeoff data is not yet complete.","action":""}],"subgroups":[]},{"heading":"APU Start","level":1,"items":[{"actor":"PILOT","item":"APU selector","action":"ON \u2014 count one potato \u2014 START","id":"b777_0180"},{"actor":"_BULLET_","item":"Watch L FWD fuel pump indicator: it auto-energises to feed the APU even if you have not commanded that pump on.","action":""},{"actor":"PILOT","item":"APU RUNNING on EICAS","action":"VERIFY","id":"b777_0181"}],"subgroups":[]}]},{"title":"Before Start Checklist","groups":[{"heading":"ATC","level":1,"items":[{"actor":"PILOT","item":"DEPARTURE / IFR CLEARANCE","action":"OBTAIN & READ BACK","id":"_dep_clr"}],"subgroups":[]},{"heading":"Pre-Pushback Confirmation","level":1,"items":[{"actor":"PILOT","item":"CABIN CREW","action":"ADVISED FOR DEPARTURE","id":"b777_0182"},{"actor":"PILOT","item":"BOARDING COMPLETE","action":"VERIFIED","id":"b777_0183"},{"actor":"PILOT","item":"FINAL WEIGHTS / LOAD SHEET","action":"RECEIVED","id":"b777_0184"},{"actor":"PILOT","item":"PERF UPLINK","action":"ACCEPT (after final weights)","id":"b777_0185"},{"actor":"PILOT","item":"DOORS","action":"ALL CLOSED & ARMED \u2014 DOOR synoptic","id":"b777_0186"}],"subgroups":[]},{"heading":"Aircraft Configuration","level":1,"items":[{"actor":"PILOT","item":"BEACON","action":"ON","id":"b777_0187"},{"actor":"PILOT","item":"TRANSPONDER","action":"TA (test only \u2014 pushback)","id":"b777_0188"},{"actor":"PILOT","item":"FUEL PUMPS (all six)","action":"ON","id":"b777_0189"},{"actor":"PILOT","item":"HYDRAULIC PANEL","action":"ALL PUMPS ON / AUTO","id":"b777_0190"},{"actor":"PILOT","item":"FLIGHT INSTRUMENTS","action":"CROSS-CHECKED","id":"b777_0191"},{"actor":"PILOT","item":"MCP","action":"V2 / HDG / ALT SET","id":"b777_0192"},{"actor":"PILOT","item":"Stab Trim","action":"SET FOR TAKEOFF","id":"b777_0193"},{"actor":"PILOT","item":"EICAS \u2014 RECALL","action":"PRESS \u2014 VERIFY NO RED OR AMBER","id":"b777_0194"},{"actor":"_BULLET_","item":"Squash the two EICAS messages (ENGINE SHUTDOWN and TCAS OFF) by pressing RECALL once. After engines start, the only remaining message should be APU RUNNING.","action":""}],"subgroups":[]},{"heading":"Pushback Coordination","level":1,"items":[{"actor":"PILOT","item":"Ground crew on intercom","action":"ESTABLISHED","id":"b777_0195"},{"actor":"PILOT","item":"Brake release on ground crew signal","action":"RELEASE PARKING BRAKE","id":"b777_0196"},{"actor":"_BULLET_","item":"Confirm direction and final orientation with the tug operator before releasing brakes.","action":""}],"subgroups":[]}]},{"title":"Engine Start & Taxi","groups":[{"heading":"Engine Start Sequence","level":1,"items":[{"actor":"_NOTE_","item":"Start L first, then R. The GE90 is the largest and most powerful jet engine in regular commercial service (115,000 lb thrust each). Only one engine at a time during pushback \u2014 running both could overpower the tug.","action":""}],"subgroups":[{"heading":"Engine 1 (Left)","level":2,"items":[{"actor":"PILOT","item":"L ENGINE START selector","action":"START","id":"b777_0197"},{"actor":"PILOT","item":"L FUEL CONTROL switch","action":"RUN (immediately after starter engaged)","id":"b777_0198"},{"actor":"PILOT","item":"L OIL PRESSURE rise","action":"VERIFY","id":"b777_0199"},{"actor":"PILOT","item":"L EGT light-off (red notch disappears)","action":"VERIFY","id":"b777_0200"},{"actor":"PILOT","item":"L N2 / N1 / FF / EGT stabilising","action":"VERIFY","id":"b777_0201"},{"actor":"_BULLET_","item":"Automation will abort the start automatically if any parameter goes out of limits \u2014 you only have to monitor oil pressure.","action":""}]},{"heading":"Engine 2 (Right)","level":2,"items":[{"actor":"PILOT","item":"R ENGINE START selector","action":"START","id":"b777_0202"},{"actor":"PILOT","item":"R FUEL CONTROL switch","action":"RUN","id":"b777_0203"},{"actor":"PILOT","item":"R OIL PRESSURE rise","action":"VERIFY","id":"b777_0204"},{"actor":"PILOT","item":"R EGT light-off (red notch disappears)","action":"VERIFY","id":"b777_0205"},{"actor":"PILOT","item":"R N2 / N1 / FF / EGT stabilising","action":"VERIFY","id":"b777_0206"}]}]},{"heading":"After Start Items","level":1,"items":[{"actor":"PILOT","item":"APU","action":"OFF (selector to OFF)","id":"b777_0207"},{"actor":"PILOT","item":"ENGINE ANTI-ICE","action":"AS REQUIRED","id":"b777_0208"},{"actor":"PILOT","item":"FLAPS","action":"5 (or per performance)","id":"b777_0209"},{"actor":"_BULLET_","item":"There is no flap 2 detent \u2014 valid takeoff settings are 5, 15, and 20.","action":""},{"actor":"PILOT","item":"EICAS \u2014 RECALL","action":"PRESS \u2014 only APU RUNNING should clear; nothing new should appear","id":"b777_0210"},{"actor":"PILOT","item":"HYDRAULIC pressures (L, C, R)","action":"VERIFY ALL NORMAL","id":"b777_0211"},{"actor":"PILOT","item":"ELECTRICAL","action":"L & R GEN ONLINE, EXT PWR / APU GEN OFF","id":"b777_0212"}],"subgroups":[]},{"heading":"Flight Controls Check","level":1,"items":[{"actor":"_NOTE_","item":"Even though the FBW system enforces protections, a full deflection check confirms all surfaces respond. In the real airplane do this slowly (lots of hydraulic pressure and big panels). On the F/CTRL synoptic the white boxes are spoiler-up indications, with elevator and rudder shown below.","action":""},{"actor":"PILOT","item":"AILERON \u2014 full L, full R","action":"CHECK ON F/CTRL SYNOPTIC","id":"b777_0213"},{"actor":"PILOT","item":"ELEVATOR \u2014 full nose-up, full nose-down","action":"CHECK","id":"b777_0214"},{"actor":"PILOT","item":"RUDDER \u2014 full L, full R","action":"CHECK","id":"b777_0215"},{"actor":"PILOT","item":"Display Select","action":"RETURN TO LOWER CENTER / ENG","id":"b777_0216"}],"subgroups":[]},{"heading":"Ground Crew Disconnect","level":1,"items":[{"actor":"PILOT","item":"Ground crew salute / pin in hand","action":"ACKNOWLEDGE","id":"b777_0217"},{"actor":"PILOT","item":"Push-to-talk","action":"RELEASE","id":"b777_0218"}],"subgroups":[]},{"heading":"Taxi Technique","level":1,"items":[{"actor":"_NOTE_","item":"Max 35% N1 breakaway thrust in congested ramp areas. Once rolling, idle is usually enough \u2014 these engines push the airplane forward easily, even at light weight. Taxi steady-state speed around 20 kt on straights; slower in turns.","action":""},{"actor":"PILOT","item":"TAXI clearance","action":"OBTAIN & READ BACK","id":"b777_0219"},{"actor":"PILOT","item":"PARKING BRAKE","action":"RELEASE","id":"b777_0220"},{"actor":"PILOT","item":"Initial thrust","action":"\u226435% N1 to begin roll","id":"b777_0221"},{"actor":"_BULLET_","item":"Use the airplane's mass \u2014 once moving you rarely need more than idle. The 777-300ER weighs up to 775,000 lb / 351 t at MTOW.","action":""}],"subgroups":[{"heading":"Turn Technique","level":2,"items":[{"actor":"PILOT","item":"Look down the runway / taxiway centerline","action":"AHEAD","id":"b777_0222"},{"actor":"PILOT","item":"Begin turn when the centerline reaches your shoulder","action":"ROLL TILLER IN","id":"b777_0223"},{"actor":"_NOTE_","item":"Main gear is approximately 100 ft aft of the cockpit \u2014 your wheels are always well inside your visual line. Take wide turns.","action":""},{"actor":"_NOTE_","item":"The rear truck of the main gear actively steers OPPOSITE the nose wheel once nose-wheel angle exceeds 10\u00b0, to prevent tyre scrub. Big airplane, big radius.","action":""}]}]}]},{"title":"Before Taxi Checklist","groups":[{"heading":"Standard Items","level":1,"items":[{"actor":"PILOT","item":"Anti-Ice","action":"AS REQUIRED","id":"b777_0224"},{"actor":"PILOT","item":"Recall","action":"COMPLETED","id":"b777_0225"},{"actor":"PILOT","item":"Auto Brake","action":"RTO","id":"b777_0226"},{"actor":"PILOT","item":"Flight Controls","action":"CHECKED","id":"b777_0227"},{"actor":"PILOT","item":"Ground Equipment","action":"CLEAR \u2014 VISUAL","id":"b777_0228"},{"actor":"PILOT","item":"Flaps","action":"TAKEOFF SETTING SET","id":"b777_0229"},{"actor":"PILOT","item":"Cabin Ready","action":"RECEIVED VIA DING","id":"b777_0230"}],"subgroups":[]}]},{"title":"Before Takeoff Checklist","groups":[{"heading":"Exterior Lights","level":1,"items":[{"actor":"PILOT","item":"LANDING LIGHTS","action":"ON","id":"b777_0231"},{"actor":"PILOT","item":"RUNWAY TURNOFF LIGHTS","action":"ON","id":"b777_0232"},{"actor":"PILOT","item":"STROBE","action":"ON","id":"b777_0233"},{"actor":"PILOT","item":"TAXI LIGHTS","action":"OFF (no longer needed at line-up)","id":"b777_0234"}],"subgroups":[]},{"heading":"Avionics","level":1,"items":[{"actor":"PILOT","item":"TRANSPONDER","action":"TA/RA","id":"b777_0235"},{"actor":"PILOT","item":"TCAS","action":"TA/RA","id":"b777_0236"},{"actor":"PILOT","item":"FLIGHT INSTRUMENTS","action":"RUNWAY HEADING / V2 / ALT","id":"b777_0237"}],"subgroups":[]},{"heading":"Line-Up","level":1,"items":[{"actor":"PILOT","item":"LINE-UP CLEARANCE","action":"OBTAIN","id":"b777_0238"},{"actor":"PILOT","item":"Center line","action":"ALIGNED","id":"b777_0239"},{"actor":"_NOTE_","item":"Once aligned, count one-potato-two-potato before applying takeoff thrust. This gives the locking hydraulic ram on the main-gear truck time to straighten the wheels \u2014 applying full power before it has straightened can produce a TAKEOFF CONFIG warning.","action":""}],"subgroups":[]}]},{"title":"Takeoff & Climb","groups":[{"heading":"Takeoff Roll","level":1,"items":[{"actor":"PILOT","item":"TAKEOFF CLEARANCE","action":"OBTAINED","id":"b777_0240"},{"actor":"PILOT","item":"Thrust levers \u2014 initial set","action":"\u224855% N1 (pointer at left edge of EGT arc)","id":"b777_0241"},{"actor":"PILOT","item":"Engines stabilised","action":"MOMENTARY PAUSE","id":"b777_0242"},{"actor":"PILOT","item":"TO/GA switch","action":"PRESS","id":"b777_0243"},{"actor":"PILOT","item":"N1 spool-up","action":"MONITOR \u2014 REF (green carat) CAPTURED","id":"b777_0244"},{"actor":"PILOT","item":"80 KNOTS callout","action":"PM CALLS","id":"b777_0245"},{"actor":"PILOT","item":"V1 callout","action":"PM CALLS \u2014 Captain transfers feet from brakes","id":"b777_0246"},{"actor":"PILOT","item":"ROTATE callout (VR)","action":"PM CALLS","id":"b777_0247"}],"subgroups":[]},{"heading":"Rotation & Initial Climb","level":1,"items":[{"actor":"PILOT","item":"Rotation rate","action":"1.5\u00b0\u20132\u00b0 per second to ~15\u00b0 pitch","id":"b777_0248"},{"actor":"_BULLET_","item":"Do not hesitate \u2014 the 777 wants to fly. A sluggish rotation eats runway.","action":""},{"actor":"PILOT","item":"POSITIVE RATE call","action":"PM","id":"b777_0249"},{"actor":"PILOT","item":"LANDING GEAR lever","action":"UP","id":"b777_0250"},{"actor":"PILOT","item":"LNAV captured","action":"VERIFY","id":"b777_0251"},{"actor":"PILOT","item":"Through THRUST REDUCTION altitude","action":"THR REF mode engages","id":"b777_0252"},{"actor":"PILOT","item":"Through ACCEL altitude","action":"VNAV SPD; nose lowers, speed builds","id":"b777_0253"}],"subgroups":[]},{"heading":"Flap Retraction Schedule","level":1,"items":[{"actor":"_NOTE_","item":"As you pass each green speed bug, the arrow points to the next flap setting. From 15 or 20 you always step to 5 first.","action":""},{"actor":"PILOT","item":"Slats / Flaps UP indication","action":"VERIFY","id":"b777_0259"}],"subgroups":[{"heading":"From Flaps 5 (typical)","level":2,"items":[{"actor":"PILOT","item":"Past F5 speed bug \u2192 Flaps 1","action":"RETRACT","id":"b777_0254"},{"actor":"PILOT","item":"Past F1 speed bug \u2192 Flaps UP","action":"RETRACT","id":"b777_0255"}]},{"heading":"From Flaps 15 / 20","level":2,"items":[{"actor":"PILOT","item":"Initial retraction to Flaps 5","action":"RETRACT","id":"b777_0256"},{"actor":"PILOT","item":"Then Flaps 1","action":"RETRACT","id":"b777_0257"},{"actor":"PILOT","item":"Then Flaps UP","action":"RETRACT","id":"b777_0258"}]}]},{"heading":"Initial Climb-Out Items","level":1,"items":[{"actor":"PILOT","item":"AUTOPILOT","action":"ENGAGE WHEN STABLE","id":"b777_0260"},{"actor":"PILOT","item":"AUTOTHROTTLE","action":"ARM (already armed on TO/GA)","id":"b777_0261"},{"actor":"PILOT","item":"MCP altitude","action":"SET TO CLEARED ALTITUDE","id":"b777_0262"},{"actor":"_NOTE_","item":"VNAV modes \u2014 review: SPD is essentially level-change with vertical protection. PATH means the box is on its planned profile. ALT means the FMC has no path and is holding because the MCP altitude is restricting it; you must intervene by pushing the ALT knob after setting a new value.","action":""}],"subgroups":[]}]},{"title":"After Takeoff Checklist","groups":[{"heading":"Sensed Items","level":1,"items":[{"actor":"PILOT","item":"Landing Gear","action":"UP & OFF","id":"b777_0263"},{"actor":"PILOT","item":"Flaps","action":"UP","id":"b777_0264"}],"subgroups":[]},{"heading":"Unsensed","level":1,"items":[{"actor":"PILOT","item":"Climb thrust","action":"VERIFY THR REF (Climb 1 / Climb 2 as set)","id":"b777_0265"},{"actor":"PILOT","item":"Speed schedule","action":"VERIFY 250 BELOW 10,000 OR PER WAIVER","id":"b777_0266"},{"actor":"_BULLET_","item":"777 holders of the high-speed waiver from ICAO may exceed 250 KIAS below 10,000 ft once clean. Confirm operator approval before doing so.","action":""}],"subgroups":[]}]},{"title":"10,000 ft & Cruise","groups":[{"heading":"Passing 10,000 ft","level":1,"items":[{"actor":"PILOT","item":"NO SMOKING sign \u2014 chime cycle","action":"OFF then ON (double chime)","id":"b777_0267"},{"actor":"PILOT","item":"LANDING LIGHTS","action":"OFF (or 18,000 ft per operator)","id":"b777_0268"},{"actor":"PILOT","item":"FASTEN BELTS","action":"AUTO","id":"b777_0269"},{"actor":"PILOT","item":"WING LIGHT","action":"OFF (daytime)","id":"b777_0270"},{"actor":"PILOT","item":"LOGO LIGHT","action":"OFF (daytime)","id":"b777_0271"}],"subgroups":[]},{"heading":"Cruise Setup","level":1,"items":[{"actor":"_NOTE_","item":"Configure the lower-center MFD to display the COMM page without losing engine indications, by reverting one display via the dial-by-the-yoke and selecting ENGINE on the alternate.","action":""}],"subgroups":[{"heading":"Lower Center \u2192 COMM","level":2,"items":[{"actor":"PILOT","item":"Display Reversionary selector","action":"ICAS","id":"b777_0272"},{"actor":"PILOT","item":"Display Select \u2192 Left Inboard \u2192 ENGINE","action":"SELECT","id":"b777_0273"},{"actor":"PILOT","item":"Display Reversionary selector","action":"BACK TO MFD","id":"b777_0274"},{"actor":"PILOT","item":"Display Select \u2192 Lower Center \u2192 COMM","action":"SELECT","id":"b777_0275"}]},{"heading":"Fuel Monitoring","level":2,"items":[{"actor":"PILOT","item":"Fuel remaining","action":"COMPARE TO OFP EVERY 30 MIN","id":"b777_0276"},{"actor":"PILOT","item":"Burn vs. plan","action":"DOCUMENT","id":"b777_0277"},{"actor":"PILOT","item":"Wind / TAS vs. plan","action":"CROSS-CHECK","id":"b777_0278"}]}]},{"heading":"Step Climbs","level":1,"items":[{"actor":"_NOTE_","item":"The 777-300ER is wing-limited \u2014 heavy long-hauls often start at FL280 and progressively step to FL380 or FL400 as fuel burns. The FMC's VNAV page shows OPT / MAX / RECOMMENDED altitudes; aim to be close to RECOMMENDED.","action":""}],"subgroups":[{"heading":"RVSM / Increment","level":2,"items  aircraft hasn\u2019t been electrically supplied for 6 hours or more","action":""},{"actor":"PM","item":"BATTERY 1 AND 2 pushbuttons","action":"VERIFY OFF","id":"s0_g0_sg4_i8"},{"actor":"PM","item":"BATTERY 1 AND 2 voltages","action":"VERIFY ABOVE 25.5 V","id":"s0_g0_sg4_i9"},{"actor":"_NOTE_","item":"The battery voltage should be above 25.5 volts.","action":""},{"actor":"_BULLET_","item":"If battery voltage is below 25.5 V:","action":""},{"actor":"PM","item":"BATTERY 1 AND 2 pushbuttons","action":"AUTO","id":"s0_g0_sg4_i10"},{"actor":"PM","item":"EXTERNAL POWER pushbutton","action":"ON","id":"s0_g0_sg4_i11"},{"actor":"_NOTE_","item":"Verify on the ECAM ELEC PAGE that the battery contactor is closed, and the battery is charging.","action":""},{"actor":"_BULLET_","item":"After 20 minutes:","action":""},{"actor":"PM","item":"BATTERY 1 AND 2 pushbuttons","action":"OFF","id":"s0_g0_sg4_i12"},{"actor":"PM","item":"BATTERY 1 AND 2 voltages","action":"VERIFY ABOVE 25.5 V","id":"s0_g0_sg4_i13"},{"actor":"PM","item":"BATTERY 1 AND 2 pushbuttons","action":"AUTO","id":"s0_g0_sg4_i14"},{"actor":"_BULLET_","item":"If battery voltage is above 25.5 V:","action":""},{"actor":"PM","item":"BATTERY 1 AND 2 pushbuttons","action":"AUTO","id":"s0_g0_sg4_i15"},{"actor":"_NOTE_","item":"If the flight crew decides to start the APU using the batteries only, it is recommended to start the APU within 30 minutes of selecting the batteries to AUTO.","action":""},{"actor":"_BULLET_","item":"If the aircraft has been electrically supplied during the last 6 hours","action":""},{"actor":"PM","item":"BATTERY 1 AND 2 pushbuttons","action":"AUTO","id":"s0_g0_sg4_i16"},{"actor":"PM","item":"EXTERNAL POWER pushbuttons","action":"ON","id":"s0_g0_sg4_i17"}]}]},{"heading":"APU Fire Test / APU Start","level":1,"items":[],"subgroups":[{"heading":"APU Fire Test","level":2,"items":[{"actor":"PM","item":"APU FIRE pushbutton","action":"IN AND GUARDED","id":"s0_g1_sg0_i18"},{"actor":"PM","item":"AGENT lights","action":"VERIFY OFF","id":"s0_g1_sg0_i19"},{"actor":"PM","item":"APU FIRE TEST pushbutton","action":"PRESS","id":"s0_g1_sg0_i20"},{"actor":"_NOTE_","item":"Verify that the APU Fire warning is displayed on the ECAM, the APU Fire pushbutton illuminates in red, the SQUIB and DISCH lights are on, the master warning light is on, and there is an audible continuous repetitive chime.","action":""}]},{"heading":"APU Start","level":2,"items":[{"actor":"_BULLET_","item":"If external power AVAIL light is on:","action":""},{"actor":"PM","item":"APU MASTER pushbutton","action":"PRESS","id":"s0_g1_sg1_i21"},{"actor":"PM","item":"APU START pushbutton","action":"ON","id":"s0_g1_sg1_i22"},{"actor":"_NOTE_","item":"It is recommended to wait 3 seconds before pressing the APU START pushbutton.","action":""},{"actor":"PM","item":"EXTERNAL POWER pushbutton","action":"AS REQUIRED","id":"s0_g1_sg1_i23"},{"actor":"_NOTE_","item":"It is recommended to keep the external power ON to reduce the load on the APU.","action":""},{"actor":"_BULLET_","item":"If external power AVAIL light is out:","action":""},{"actor":"PM","item":"APU MASTER pushbutton","action":"ON","id":"s0_g1_sg1_i24"},{"actor":"PM","item":"APU START pushbutton","action":"ON","id":"s0_g1_sg1_i25"},{"actor":"_NOTE_","item":"It is recommended to wait 3 seconds before pressing the APU START pushbutton.","action":""}]}]},{"heading":"Air Conditioning","level":1,"items":[{"actor":"_BULLET_","item":"When the APU is available:","action":""},{"actor":"PM","item":"APU BLEED pushbutton","action":"ON","id":"s0_g2_i26"},{"actor":"_NOTE_","item":"The flight crew should ensure that there is no low-pressure or high-pressure ground air unit connected to the aircraft. In case of a connection to an LP or HP ground air unit, do not use the APU bleed.","action":""}]},{"heading":"Cargo Heat","level":1,"items":[{"actor":"PM","item":"TEMPERATURE selector","action":"AS REQUIRED","id":"s0_g3_i27"}]},{"heading":"Cockpit Lighting","level":1,"items":[{"actor":"PM","item":"COCKPIT LIGHTS","action":"AS REQUIRED","id":"s0_g4_i28"},{"actor":"_NOTE_","item":"Set the integral light, standby compass light, dome light, and floodlight switches as required. It is recommended to set the dome light to ON, due to it being the only light source in the EMER ELEC configuration. It is also recommended to set the dome light to the OFF position for takeoff.","action":""}]},{"heading":"EFB / ACARS Initialization","level":1,"items":[{"actor":"PM","item":"EFB","action":"START","id":"s0_g5_i29"},{"actor":"PF","item":"ACARS","action":"INITIALIZE","id":"s0_g5_i30"}]},{"heading":"FMGS Pre-initialization","level":1,"items":[{"actor":"PF","item":"ENGINE & AIRCRAFT TYPE","action":"VERIFY","id":"s0_g6_i31"},{"actor":"PF","item":"FM DATABASE VALIDITY","action":"VERIFY","id":"s0_g6_i32"},{"actor":"_NOTE_","item":"Verify the database validity and stored waypoints, navaids, runways, and routes, if any.","action":""},{"actor":"PF","item":"FLIGHT NUMBER","action":"INSERT / VERIFY","id":"s0_g6_i33"},{"actor":"_NOTE_","item":"It is recommended to not insert the flight number if the flight plan is received by ACARS.","action":""},{"actor":"PF","item":"FROM/TO","action":"INSERT / VERIFY","id":"s0_g6_i34"},{"actor":"_NOTE_","item":"It is recommended to not insert the FROM/TO if the flight plan is received by ACARS.","action":""}]},{"heading":"ECAM / Logbook Verification","level":1,"items":[{"actor":"CM","item":"RCL pushbutton","action":"PRESS FOR 3 SECONDS","id":"s0_g7_i35"},{"actor":"_NOTE_","item":"This action will recall all the warnings that the flight crew cleared or cancelled during the last flight.","action":""},{"actor":"CM","item":"LOGBOOK","action":"VERIFY","id":"s0_g7_i36"},{"actor":"CM","item":"MEL/CDL ITEMS","action":"VERIFY DISPATCH CONDITION","id":"s0_g7_i37"},{"actor":"CM","item":"AIRCRAFT ACCEPTANCE","action":"PERFORM","id":"s0_g7_i38"}]},{"heading":"Preliminary Performance Determination","level":1,"items":[{"actor":"CM","item":"AIRFIELD DATA","action":"OBTAIN","id":"s0_g8_i39"},{"actor":"_NOTE_","item":"The airfield data should include the following information: the runway in use, the altimeter settings, and the weather data.","action":""},{"actor":"_BULLET_","item":"If the loadsheet application is used:","action":""},{"actor":"CM","item":"PRELIMINARY LOADING","action":"COMPUTE AND CROSSCHECK","id":"s0_g8_i40"},{"actor":"_BULLET_","item":"If dispatch under MEL and in accordance with the logbook:","action":""},{"actor":"CM","item":"MEL/CDL ITEMS","action":"VERIFY ACTIVATED","id":"s0_g8_i41"},{"actor":"CM","item":"PRELIMINARY TAKEOFF DATA","action":"COMPUTE","id":"s0_g8_i42"},{"actor":"CM","item":"PRELIMINARY TAKEOFF DATA","action":"CROSSCHECK","id":"s0_g8_i43"},{"actor":"_NOTE_","item":"The flight crew should compare both preliminary takeoff data results and ensure that the computations are the same.","action":""}]},{"heading":"Operation Engineering Bulletins","level":1,"items":[{"actor":"CM","item":"OEB","action":"VERIFY","id":"s0_g9_i44"}]},{"heading":"Before Walkaround","level":1,"items":[],"subgroups":[{"heading":"ECAM Pages","level":2,"items":[{"actor":"_BULLET_","item":"On the DOOR system display page:","action":""},{"actor":"PM","item":"OXYGEN","action":"VERIFY PRESSURE","id":"s0_g10_sg0_i45"},{"actor":"_BULLET_","item":"If the oxygen pressure is half boxed in amber:","action":""},{"actor":"PM","item":"MIN FLT CREW OXY CHART","action":"VERIFY PRESSURE","id":"s0_g10_sg0_i46"},{"actor":"_BULLET_","item":"On the HYD system display page:","action":""},{"actor":"PM","item":"RESERVOIR FLUID LEVEL","action":"VERIFY WITHIN NORMAL RANGE","id":"s0_g10_sg0_i47"},{"actor":"_NOTE_","item":"The volume of the hydraulic fluid level in the reservoirs may be altered due to the outside air pressure. It is recommended to verify with the maintenance crew to validate the issue and resolve the situation.","action":""},{"actor":"_BULLET_","item":"On the ENG system display page:","action":""},{"actor":"PM","item":"ENGINE OIL QUANTITY","action":"VERIFY WITHIN NORMAL RANGE","id":"s0_g10_sg0_i48"},{"actor":"_NOTE_","item":"If there is no indication of the engine oil quantity on the engine system display page, push the ENG 1 and 2 FADEC GND PWR to the ON position. The indication will then appear. After verification, set the ENG 1 and 2 FADEC GND PWR to the OFF position. The oil quantity should indicate at or above 8.9 qt + estimated consumption and not below 10.6 qt. The estimated consumption is 0.45 qt/h.","action":""}]}]},{"heading":"Flight Controls","level":1,"items":[{"actor":"PM","item":"FLAPS lever","action":"VERIFY POSITION","id":"s0_g11_i49"},{"actor":"_NOTE_","item":"Ensure that the upper ECAM displays the same position as the flap lever position.","action":""},{"actor":"PM","item":"SPEEDBRAKES lever","action":"VERIFY RETRACTED AND DISARMED","id":"s0_g11_i50"}]},{"heading":"Parking Brake","level":1,"items":[{"actor":"PM","item":"ACCU PRESS indicator","action":"VERIFY","id":"s0_g12_i51"},{"actor":"_NOTE_","item":"The ACCU PRESS indicator should indicate within the green band. If it is not in the green band, the flight crew may turn on the electric pump on the yellow hydraulic system to recharge the brake accumulator.","action":""},{"actor":"PM","item":"PARKING BRAKE handle","action":"ON","id":"s0_g12_i52"},{"actor":"_NOTE_","item":"It is recommended to avoid applying the parking brake when one or multiple brake temperatures are above 500\u00b0C.","action":""},{"actor":"PM","item":"BRAKE PRESS indicator","action":"VERIFY","id":"s0_g12_i53"}]},{"heading":"Alternate Braking System","level":1,"items":[{"actor":"PM","item":"Y ELECTRIC PUMP pushbutton","action":"VERIFY OFF","id":"s0_g13_i54"},{"actor":"PM","item":"CHOCKS","action":"VERIFY IN PLACE","id":"s0_g13_i55"},{"actor":"PM","item":"PARKING BRAKE handle","action":"OFF","id":"s0_g13_i56"},{"actor":"PM","item":"BRAKE pedals","action":"PRESS MAXIMUM PRESSURE","id":"s0_g13_i57"},{"actor":"PM","item":"BRAKE PRESSURE","action":"VERIFY","id":"s0_g13_i58"},{"actor":"_NOTE_","item":"The flight crew should ensure that the pressure builds up symmetrically without delay. With full pedal deflection, the pressure must be within 2000 and 2700 psi.","action":""},{"actor":"PM","item":"BRAKE pedals","action":"RELEASE","id":"s0_g13_i59"},{"actor":"PM","item":"PARKING BRAKE handle","action":"ON","id":"s0_g13_i60"},{"actor":"_NOTE_","item":"The parking brake must be set for the exterior inspection. This allows the flight crew to verify the brake wear indicators.","action":""}]},{"heading":"Emergency Equipment","level":1,"items":[{"actor":"PM","item":"EMERGENCY EQUIPMENT","action":"VERIFY ONBOARD","id":"s0_g14_i61"},{"actor":"_NOTE_","item":"Ensure that the following emergency equipment is found onboard the aircraft: life jackets, axe, smoke hoods or portable oxygen equipment and full-face masks, portable fire extinguisher, smoke goggles, oxygen masks, flashlights, and escape ropes.","action":""}]},{"heading":"Rain Repellent","level":1,"items":[{"actor":"PM","item":"RAIN RPLNT indicators","action":"VERIFY PRESSURE AND QUANTITY","id":"s0_g15_i62"},{"actor":"_NOTE_","item":"It is not recommended to use rain repellent to wash the windshield. It is also not recommended to use it on a dry windshield.","action":""}]},{"heading":"Circuit Breakers Panels","level":1,"items":[{"actor":"PM","item":"REAR AND OVERHEAD CIRCUIT BREAKER panels","action":"VERIFY","id":"s0_g16_i63"},{"actor":"_NOTE_","item":"Ensure that all the breakers are set. Flight crew may reset as necessary.","action":""}]},{"heading":"Landing Gear Pins and Covers","level":1,"items":[{"actor":"PM","item":"GEAR PINS AND COVERS","action":"VERIFY ONBOARD AND STOWED","id":"s0_g17_i64"}]}]},{"title":"Exterior Inspection","groups":[]},{"title":"Cockpit Preparation","groups":[{"heading":"Overhead Panel","level":1,"items":[],"subgroups":[{"heading":"White Lights on the Overhead Panel","level":2,"items":[{"actor":"_BULLET_","item":"In the passing flow the overhead panel:","action":""},{"actor":"PF","item":"ALL WHITE LIGHTS","action":"OFF","id":"s2_g0_sg0_i65"}]},{"heading":"Recorder","level":2,"items":[{"actor":"PF","item":"RCDR GND CTL pushbutton","action":"ON","id":"s2_g0_sg1_i66"},{"actor":"PF","item":"LOUDSPEAKER VOLUME knob","action":"BOTH SIDES \u2013 OFF","id":"s2_g0_sg1_i67"},{"actor":"PF","item":"ACP INT/RAD switch","action":"SET TO INT","id":"s2_g0_sg1_i68"},{"actor":"PF","item":"INTERPHONE VOLUME RECEPTION knob","action":"RELEASE","id":"s2_g0_sg1_i69"},{"actor":"PF","item":"CVR TEST pushbutton","action":"PRESS AND MAINTAIN","id":"s2_g0_sg1_i70"},{"actor":"_NOTE_","item":"To know the CVR result, the flight crew should hear an audio test signal through the loudspeakers. The audio test signal depends on the CVR model installed on the aircraft. A CVR 30 minutes will emit a continuous tone or a short tone, while the CVR 120 minutes will emit a short tone, or a short tone and a beep at every 4 seconds, or two short tones and a beep every 4 seconds.","action":""}]},{"heading":"EVAC","level":2,"items":[{"actor":"PF","item":"CAPT & PURS/CAPT switch","action":"AS REQUIRED","id":"s2_g0_sg2_i71"},{"actor":"_NOTE_","item":"This depends on the company policy.","action":""}]},{"heading":"ADIRS","level":2,"items":[{"actor":"PF","item":"All IR MODE selectors","action":"NAV","id":"s2_g0_sg3_i72"},{"actor":"_NOTE_","item":"It is recommended to align the inertial references as soon as possible. The initialization may take some time. It is also recommended to complete a full alignment if this is the first flight of the day, the flight crew has changed, the GPS is not available to all segments in the flight and the pilot expects long segments with low NAVAID coverage, or if the GPS is not available during a flight with an expected flight time over 3 hours. It is recommended to perform a fast alignment for all other flight conditions.","action":""}]},{"heading":"Exterior Lights","level":2,"items":[{"actor":"PF","item":"STROBE switch","action":"AUTO","id":"s2_g0_sg4_i73"},{"actor":"PF","item":"BEACON switch","action":"OFF","id":"s2_g0_sg4_i74"},{"actor":"PF","item":"NAV & LOGO switch","action":"AS REQUIRED","id":"s2_g0_sg4_i75"},{"actor":"PF","item":"REMAINING EXTERIOR LIGHTS","action":"AS REQUIRED","id":"s2_g0_sg4_i76"}]},{"heading":"Signs","level":2,"items":[{"actor":"PF","item":"SEAT BELTS sign","action":"ON / AUTO","id":"s2_g0_sg5_i77"},{"actor":"PF","item":"NO SMOKING sign","action":"AUTO","id":"s2_g0_sg5_i78"},{"actor":"_NOTE_","item":"Leaving the SEAT BELTS sign or NO SMOKING sign prevents the emergency batteries from charging.","action":""},{"actor":"PF","item":"EMER EXIT LT selector","action":"ARM","id":"s2_g0_sg5_i79"}]},{"heading":"Probe / Window Heat","level":2,"items":[{"actor":"PF","item":"PROBE/WINDOW HEAT pushbuttons","action":"VERIFY AUTO","id":"s2_g0_sg6_i80"}]},{"heading":"Cabin Pressure","level":2,"items":[{"actor":"PF","item":"LDG ELEV knob","action":"AUTO","id":"s2_g0_sg7_i81"}]},{"heading":"Air Conditioning","level":2,"items":[{"actor":"PF","item":"PACK FLOW selector","action":"AS REQUIRED","id":"s2_g0_sg8_i82"},{"actor":"_NOTE_","item":"It is recommended to set the PACK FLOW to NORM. The flight crew can select LO if the flight has less than 141 passengers. The flight crew can also select HI for abnormally hot and humid conditions.","action":""},{"actor":"_NOTE_","item":"Note: If the APU is supplying, the pack controllers will select HI flow automatically, no matter what the selector position is.","action":""}]},{"heading":"Electrical","level":2,"items":[{"actor":"PF","item":"ECAM ELEC PAGE","action":"PRESS","id":"s2_g0_sg9_i83"},{"actor":"PF","item":"BAT 1 & 2 pushbuttons","action":"OFF THEN ON","id":"s2_g0_sg9_i84"},{"actor":"_NOTE_","item":"After 10 seconds, the flight crew should ensure that the battery charge is below 60 A and is decreasing.","action":""}]},{"heading":"Fuel","level":2,"items":[{"actor":"_BULLET_","item":"If the fuel level in the center tank is less than 200 kg / 440 lbs for the flight:","action":""},{"actor":"PF","item":"FUEL MODE SEL pushbutton","action":"MAN","id":"s2_g0_sg10_i85"},{"actor":"PF","item":"CTR TK PUMP 1 & 2 pushbuttons","action":"OFF","id":"s2_g0_sg10_i86"},{"actor":"_BULLET_","item":"If the fuel level in the center tank is not less than 200 kg / 440 lbs for the flight:","action":""},{"actor":"PF","item":"FUEL MODE SEL pushbutton","action":"VERIFY AUTO","id":"s2_g0_sg10_i87"}]},{"heading":"Engine Fire Tests","level":2,"items":[{"actor":"PF","item":"ENG 1 FIRE & ENG 2 FIRE pushbuttons","action":"VERIFY IN AND GUARDED","id":"s2_g0_sg11_i88"},{"actor":"PF","item":"AGENT 1 & 2 lights","action":"VERIFY OFF","id":"s2_g0_sg11_i89"},{"actor":"PF","item":"ENG 1 TEST & ENG 2 TEST","action":"PRESS AND MAINTAIN","id":"s2_g0_sg11_i90"},{"actor":"_NOTE_","item":"The pilots hold the TEST pushbutton pressed throughout the test. The test result should include the following items:","action":""},{"actor":"_BULLET_","item":"A constant repetitive chime sound;","action":""},{"actor":"_BULLET_","item":"The master warning light flashes on the glareshield;","action":""},{"actor":"_BULLET_","item":"The ECAM displays the engine fire alert messages (ENG 1 FIRE, ENG 2 FIRE);","action":""},{"actor":"_BULLET_","item":"All engine fire pushbuttons and the squib lights of the engine agent pushbuttons are illuminated;","action":""},{"actor":"_BULLET_","item":"The disch light of the engine agent pushbutton illuminates; and","action":""},{"actor":"_BULLET_","item":"All fire lights on the engine master panel illuminate.","action":""}]},{"heading":"Audio Switching Panel","level":2,"items":[{"actor":"PF","item":"AUDIO SWITCHING selector","action":"NORM","id":"s2_g0_sg12_i91"}]},{"heading":"Ventilation","level":2,"items":[{"actor":"PF","item":"ALL LIGHTS","action":"VERIFY OFF","id":"s2_g0_sg13_i92"}]},{"heading":"ACT Control Panel","level":2,"items":[{"actor":"PF","item":"ACT XFR rotary selector","action":"OFF","id":"s2_g0_sg14_i93"}]},{"heading":"Third Occupant Audio Control Panel","level":2,"items":[{"actor":"PF","item":"PA knob","action":"RECEPT","id":"s2_g0_sg15_i94"},{"actor":"_NOTE_","item":"It is recommended to set the volume at or above medium range. This allows the cabin announcements to be recorded on the cockpit voice recorder.","action":""}]},{"heading":"Maintenance Panel","level":2,"items":[{"actor":"PF","item":"ALL LIGHTS","action":"VERIFY OFF","id":"s2_g0_sg16_i95"}]}]},{"heading":"Center Instrument Panel","level":1,"items":[],"subgroups":[{"heading":"ISIS","level":2,"items":[{"actor":"PF","item":"ISIS","action":"VERIFY","id":"s2_g1_sg0_i96"},{"actor":"_NOTE_","item":"The flight crew can adjust the brightness, the altimeter readings and setting, and the attitude display. Ensure that no flags are shown. If necessary, reset the attitude.","action":""},{"actor":"_NOTE_","item":"Note: The use of the ISIS bug functions is not recommended.","action":""}]},{"heading":"Clock","level":2,"items":[{"actor":"PF","item":"CLOCK","action":"VERIFY / SET","id":"s2_g1_sg1_i97"},{"actor":"_NOTE_","item":"The flight crew must ensure that the date is correct. If it is not correct, the flight crew can set the date manually and keep the clock mode in the internal mode for the flight.","action":""}]},{"heading":"Nosewheel Steering","level":2,"items":[{"actor":"PF","item":"A/SKID & N/W STRG switch","action":"ON","id":"s2_g1_sg2_i98"}]}]},{"heading":"Pedestal","level":1,"items":[],"subgroups":[{"heading":"ACP","level":2,"items":[{"actor":"PF","item":"INT knob","action":"PRESS OUT / VERIFY VOLUME","id":"s2_g2_sg0_i99"},{"actor":"PF","item":"VHF","action":"VERIFY","id":"s2_g2_sg0_i100"},{"actor":"PF","item":"HF","action":"VERIFY","id":"s2_g2_sg0_i101"},{"actor":"_NOTE_","item":"Verify the transmission and reception of the VHF and HF. It is prohibited to transmit on HF when the aircraft is refueling.","action":""}]},{"heading":"Cockpit Door","level":2,"items":[{"actor":"PF","item":"ANN LT selector","action":"TEST","id": 236"},{"actor":"_NOTE_","item":"Preset the heading if the air traffic control requires a radar vector departure. However, please note that the RWY TRK mode maintains the aircraft on the runway heading until the heading mode engages.","action":""},{"actor":"PM","item":"BOTH FD","action":"VERIFY ON","id":"s6_g0_sg9_i237"},{"actor":"CM","item":"PFD/ND","action":"VERIFY","id":"s6_g0_sg9_i238"},{"actor":"CM","item":"TAKEOFF BRIEFING","action":"CONFIRM","id":"s6_g0_sg9_i239"},{"actor":"PM","item":"RADAR","action":"ON","id":"s6_g0_sg9_i240"},{"actor":"_NOTE_","item":"It is recommended to set the MULTISCAN switch to MAN. This allows the flight crew to verify the radar and the departure path. The flight crew can then set the radar to the AUTO position.","action":""},{"actor":"PM","item":"PREDICTIVE WINDSHEAR SYSTEM","action":"AUTO","id":"s6_g0_sg9_i241"}]},{"heading":"ATC","level":2,"items":[{"actor":"PM","item":"ATC code/mode","action":"CONFIRM & SET FOR TAKEOFF","id":"s6_g0_sg10_i242"}]},{"heading":"Terrain Radar","level":2,"items":[{"actor":"CM","item":"TERR ON ND","action":"AS REQUIRED","id":"s6_g0_sg11_i243"},{"actor":"_NOTE_","item":"It is recommended to set the weather radar display on the PF side, and the terrain radar on the PM side.","action":""}]},{"heading":"Autobrakes","level":2,"items":[{"actor":"PM","item":"AUTO BRK MAX pushbutton","action":"ON","id":"s6_g0_sg12_i244"}]},{"heading":"Final Verification","level":2,"items":[{"actor":"PM","item":"T.O CONFIG pushbutton","action":"TEST","id":"s6_g0_sg13_i245"},{"actor":"_NOTE_","item":"Ensure that the upper ECAM display shows the message \u201cT.O CONFIG NORMAL\u201d.","action":""},{"actor":"PM","item":"T.O MEMO","action":"VERIFY NO BLUE","id":"s6_g0_sg13_i246"},{"actor":"CM","item":"CABIN REPORT","action":"RECEIVE","id":"s6_g0_sg13_i247"},{"actor":"_NOTE_","item":"Verify on the engine warning display the display of the message \u201cCABIN READY\u201d or obtain the report from the chief flight attendant \u201cCabin
