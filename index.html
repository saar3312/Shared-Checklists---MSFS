<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Shared Cockpit Checklist</title>
<style>
:root {
  --bg:#0a0c10;
  --surface:#13161c;
  --surface-2:#191d25;
  --text:#e8ebf1;
  --text-muted:#7a8290;
  --text-dim:#454c58;
  --border:#1f242d;
  --border-strong:#2a313c;
  --accent:#00B6E4;
  --accent-ink:#001f29;
  --good:#2ec27e;
  --bad:#ff6b6b;
  --tap:44px;
  --shade:8,10,14; /* RGB triple used by image-overlay gradients */
}
body.light {
  --bg:#f5f6f9;
  --surface:#ffffff;
  --surface-2:#eef0f4;
  --text:#15171d;
  --text-muted:#5a6270;
  --text-dim:#a4abb6;
  --border:#dce0e6;
  --border-strong:#bfc4ce;
  --good:#1c8f50;
  --bad:#c23a3a;
  --shade:240,242,247;
}
body.light .flight-number{color:#15171d}
body.light .flight-number:hover{background:rgba(0,0,0,0.04)}
body.light .home-brand-name,
body.light .home-brand-tag,
body.light .home-tile-eyebrow,
body.light .home-tile-sub{color:var(--text-muted)}
body.light .home-tile-name{filter:none}
body.light .pane-name.empty{color:var(--text-dim)}
body.light .modal-backdrop{background:rgba(20,24,32,0.45)}
body.light .toast{background:rgba(20,22,30,0.95);color:#fff}
body.light .actor-pill.pm{background:#6a7180;color:#fff;border-color:#6a7180}

.theme-a320{--accent:#00B6E4;--accent-ink:#001f29}
.theme-a330{--accent:#0093C2;--accent-ink:#001b25}
.theme-b777{--accent:#F39200;--accent-ink:#2b1900}

*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  font-size:15px;line-height:1.4;-webkit-font-smoothing:antialiased;
  font-feature-settings:"ss01","cv11";}
button{font-family:inherit;color:inherit}
.hidden{display:none !important}

/* ---------- Buttons (sleek) ---------- */
.btn{
  background:transparent;color:var(--text);
  border:1px solid var(--border-strong);
  padding:9px 14px;border-radius:3px;
  font-size:13px;font-weight:500;letter-spacing:0.02em;
  cursor:pointer;min-height:38px;
  transition:border-color .12s, background .12s, color .12s;
}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn:active{transform:translateY(1px)}
.btn.primary{
  background:var(--accent);color:var(--accent-ink);
  border-color:var(--accent);font-weight:600;
}
.btn.primary:hover{filter:brightness(1.08);color:var(--accent-ink)}
.btn.link{
  background:transparent;border:none;
  color:var(--text-muted);padding:6px 4px;min-height:32px;
}
.btn.link:hover{color:var(--accent);background:transparent}
.btn.danger{color:var(--bad);border-color:var(--border-strong)}
.btn.danger:hover{border-color:var(--bad);color:var(--bad)}

/* ---------- Inputs ---------- */
.input{
  width:100%;background:var(--bg);border:1px solid var(--border-strong);
  color:var(--text);padding:11px 12px;font-size:15px;border-radius:3px;
  font-family:inherit;letter-spacing:0.01em;
  transition:border-color .12s;
}
.input:focus{outline:none;border-color:var(--accent)}
.input.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:0.18em;text-transform:uppercase}
.field{display:block;margin-bottom:14px}
.field-label{
  display:block;font-size:10px;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.12em;margin-bottom:6px;
}
.field-label .req{color:var(--accent);margin-left:2px}

/* =====================================================================
   SCREEN 1: Home — A320 / B777 split
   ===================================================================== */
#screen-home{
  display:flex;flex-direction:column;min-height:100vh;
}
.home-brand{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:1px solid var(--border);
}
.home-brand-name{
  font-size:12px;text-transform:uppercase;letter-spacing:0.18em;
  color:var(--text-muted);
}
.home-brand-tag{font-size:11px;color:var(--text-dim);letter-spacing:0.06em}
.home-grid{
  flex:1 1 auto;display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:1px;background:var(--border);min-height:480px;
}
.home-tile{
  position:relative;background:var(--bg);border:none;color:var(--text);
  cursor:pointer;padding:36px;
  display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-end;
  text-align:left;transition:background .15s;overflow:hidden;
  image-rendering:-webkit-optimize-contrast;
  image-rendering:crisp-edges;
}
.home-tile:hover{background:var(--surface)}
.home-tile::before{
  content:"";position:absolute;top:0;left:0;right:0;height:3px;z-index:3;
}
.home-tile.a320::before{background:#00B6E4}
.home-tile.a330::before{background:#0093C2}
.home-tile.b777::before{background:#F39200}
.home-tile-eyebrow{font-size:11px;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.18em;margin-bottom:6px;
  position:relative;z-index:2}
.home-tile-name{font-size:84px;font-weight:800;letter-spacing:-0.03em;line-height:0.95}
.home-tile.a320 .home-tile-name{color:#00B6E4}
.home-tile.a330 .home-tile-name{color:#0093C2}
.home-tile.b777 .home-tile-name{color:#F39200}
.home-tile-sub{font-size:13px;color:var(--text-muted);margin-top:10px}
@media (max-width:880px){
  .home-tile-name{font-size:62px}
}
@media (max-width:560px){
  .home-tile-name{font-size:56px}
}

/* Tile backgrounds are injected by the build script via the
   <style id="aircraft-images"> block at the bottom of <body>.
   If no image is found for a tile, that tile just stays the default
   dark surface — graceful fallback. */
.home-join{
  flex:0 0 auto;padding:20px;border-top:1px solid var(--border);
  background:var(--surface);
  display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;
}
.home-join-label{font-size:11px;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.12em;margin-right:4px}
.home-join input{width:180px}
@media (max-width:880px){
  .home-grid{grid-template-columns:1fr 1fr;min-height:0}
  .home-tile{padding:32px;min-height:220px}
  .home-tile-name{font-size:60px}
}
@media (max-width:560px){
  .home-grid{grid-template-columns:1fr}
  .home-tile{min-height:200px}
}

/* =====================================================================
   SCREEN 2: Mode (Single / Dual)
   ===================================================================== */
#screen-mode{
  display:flex;flex-direction:column;min-height:100vh;
}
.subnav{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface);
}
.subnav-title{font-size:13px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase}
.subnav-title strong{color:var(--accent);font-weight:600}
.mode-grid{
  flex:1 1 auto;display:grid;grid-template-columns:1fr 1fr;
  gap:1px;background:var(--border);
}
.mode-tile{
  background:var(--bg);border:none;color:var(--text);
  padding:48px 40px;cursor:pointer;
  display:flex;flex-direction:column;align-items:flex-start;gap:8px;
  text-align:left;transition:background .15s;
}
.mode-tile:hover{background:var(--surface)}
.mode-tile-name{font-size:48px;font-weight:700;letter-spacing:-0.02em}
.mode-tile-sub{font-size:13px;color:var(--text-muted);max-width:380px;line-height:1.5}
.mode-tile-roles{
  margin-top:14px;font-size:11px;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:0.1em;
}
@media (max-width:680px){
  .mode-grid{grid-template-columns:1fr}
  .mode-tile{padding:32px 24px}
  .mode-tile-name{font-size:36px}
}

/* =====================================================================
   SCREEN 3: Host setup
   ===================================================================== */
#screen-host-setup, #screen-connect{
  display:flex;flex-direction:column;min-height:100vh;
}
.center-stack{
  flex:1 1 auto;display:flex;align-items:center;justify-content:center;padding:32px 20px;
}
.setup-card, .connect-card{
  width:100%;max-width:440px;background:var(--surface);
  border:1px solid var(--border);padding:28px 28px 24px;border-radius:4px;
}
.setup-card h2{margin:0 0 4px;font-size:18px;font-weight:600}
.setup-card .setup-sub{margin:0 0 22px;color:var(--text-muted);font-size:13px}
.setup-actions{
  display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:6px;
}

/* =====================================================================
   SCREEN 4: Connect (room code waiting)
   ===================================================================== */
.connect-card{text-align:center}
.connect-eyebrow{
  font-size:11px;text-transform:uppercase;letter-spacing:0.18em;
  color:var(--text-muted);margin:0 0 12px;
}
.code-display{
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  font-size:46px;font-weight:700;letter-spacing:0.18em;
  color:var(--accent);margin:0 0 6px;line-height:1;
}
.connect-sub{color:var(--text-muted);font-size:13px;margin:8px 0 18px}
.spinner{
  width:22px;height:22px;border:2px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .9s linear infinite;margin:14px auto 18px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.connect-actions{display:flex;gap:8px;justify-content:center}

/* =====================================================================
   SCREEN 5: Room (checklist)
   ===================================================================== */
#screen-room{display:flex;flex-direction:column;min-height:100vh}
#screen-room.dual{height:100vh;overflow:hidden}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;background:var(--surface);
  border-bottom:1px solid var(--border);gap:10px;
  flex:0 0 auto;
}
.topbar-left,.topbar-right{display:flex;align-items:center;gap:6px;min-width:0}
.topbar-center{flex:1 1 auto;display:flex;justify-content:center;min-width:0;padding:0 8px}
.room-code{
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  font-size:13px;font-weight:600;letter-spacing:0.14em;color:var(--accent);
  border:1px solid var(--border);padding:4px 8px;border-radius:3px;
}
.aircraft-tag{
  font-size:11px;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.08em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* Flight number (callsign) display */
.flight-number{
  background:transparent;border:1px solid transparent;
  color:#fff;font-weight:700;font-size:20px;letter-spacing:0.08em;
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  padding:4px 10px;border-radius:3px;cursor:pointer;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;
  transition:border-color .12s, background .12s;
}
.flight-number:hover{border-color:var(--border-strong);background:rgba(255,255,255,0.03)}
.flight-number.empty{
  color:var(--text-muted);font-weight:500;font-size:12px;
  letter-spacing:0.06em;border-color:var(--border-strong);
  font-family:inherit;text-transform:uppercase;
}
.flight-number .callsign-name{
  color:var(--text-muted);font-weight:500;font-size:13px;letter-spacing:0.04em;
  font-family:inherit;text-transform:none;margin-left:6px;
}
@media (max-width:720px){
  .flight-number{font-size:16px}
  .flight-number .callsign-name{font-size:11px}
}

.role-badge{
  font-size:10px;font-weight:700;letter-spacing:0.1em;
  padding:5px 8px;border:1px solid var(--border);color:var(--text-muted);
  border-radius:3px;white-space:nowrap;
}
.role-badge.role-PF,.role-badge.role-PM,.role-badge.role-PILOT{
  background:var(--accent);color:var(--accent-ink);border-color:var(--accent);
}

/* Section pills */
.section-pills{
  display:flex;gap:0;overflow-x:auto;background:var(--bg);
  border-bottom:1px solid var(--border);flex:0 0 auto;scrollbar-width:none;
}
.section-pills::-webkit-scrollbar{display:none}
.pill{
  flex:0 0 auto;background:transparent;color:var(--text-muted);
  border:none;border-bottom:2px solid transparent;
  padding:10px 14px;font-size:12px;font-weight:500;
  white-space:nowrap;cursor:pointer;letter-spacing:0.02em;
  transition:color .12s, border-color .12s;
}
.pill:hover{color:var(--text)}
.pill.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.pill.done{color:var(--good)}
.pill.done::after{content:" ✓";font-size:11px;margin-left:2px}
.pill.locked{color:var(--text-dim);cursor:not-allowed}
.pill.locked:hover{color:var(--text-dim)}
.pill.locked::after{content:" 🔒";font-size:10px;margin-left:3px}
.pill.shake{animation:shake .3s}

/* Checklist root */
.checklist-root{padding:14px 18px 60px;max-width:780px;margin:0 auto}
#screen-room.dual .checklist-root{
  flex:1 1 auto;display:grid;grid-template-columns:1fr 1fr;
  overflow:hidden;padding:0;max-width:none;margin:0;gap:0;
}
.pane{
  display:flex;flex-direction:column;min-width:0;min-height:0;
  border-right:1px solid var(--border);background:var(--bg);
}
.pane:last-child{border-right:none}
.pane-header{
  flex:0 0 auto;padding:10px 16px;background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:2px;
}
.pane-label{font-size:10px;color:var(--text-muted);
  letter-spacing:0.16em;text-transform:uppercase;font-weight:600}
.pane-name{font-size:15px;font-weight:600;color:var(--accent)}
.pane-name.empty{color:var(--text-dim);font-weight:400;font-style:italic}
.pane-scroll{flex:1 1 auto;overflow-y:auto;padding:12px 16px 80px}
@media (max-width:720px){
  #screen-room.dual{height:auto;overflow:visible}
  #screen-room.dual .checklist-root{
    grid-template-columns:1fr;overflow:visible;
  }
  .pane{border-right:none;border-bottom:1px solid var(--border)}
  .pane:last-child{border-bottom:none}
  .pane-scroll{overflow:visible;padding:12px 16px 30px}
}

/* Sections / groups */
.section{margin:14px 0}
.section-title{
  font-size:14px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
  margin:0 0 10px;padding:6px 0 6px;border-bottom:1px solid var(--accent);
  color:var(--text);
}
.group{margin:10px 0}
.group-heading{
  font-size:11px;text-transform:uppercase;letter-spacing:0.14em;
  color:var(--text-muted);margin:8px 2px 6px;font-weight:600;
}
.subgroup-heading{
  font-size:12px;font-weight:600;color:var(--accent);
  margin:10px 2px 4px;letter-spacing:0.03em;
}
.subgroup-block,.group-block{
  border:1px solid transparent;border-radius:4px;
  padding:2px 4px;margin:4px -4px;
  transition:background .2s, border-color .2s;
}
.subgroup-block.complete,.group-block.complete{
  background:rgba(46,194,126,0.10);
  border-color:rgba(46,194,126,0.45);
}
.subgroup-block.complete .subgroup-heading,
.group-block.complete .group-heading{color:var(--good)}
.subgroup-block.complete .row,.group-block.complete .row{
  background:rgba(46,194,126,0.07);border-color:rgba(46,194,126,0.3);
}

/* Section header row — title + "Mark all done" button side by side */
.section-header{
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:6px 0 6px;margin:0 0 10px;
  border-bottom:1px solid var(--accent);
}
.section-header .section-title{
  border-bottom:none;padding:0;margin:0;flex:1 1 auto;min-width:0;
}
.section-mark-done{
  flex:0 0 auto;
  background:transparent;color:var(--text-muted);
  border:1px solid var(--border-strong);border-radius:3px;
  padding:8px 14px;
  font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;
  cursor:pointer;white-space:nowrap;
  transition:border-color .12s, color .12s, background .12s;
}
.section-mark-done:hover{border-color:var(--accent);color:var(--accent)}
.section-mark-done.complete{
  color:var(--good);border-color:rgba(46,194,126,0.55);
  background:rgba(46,194,126,0.08);
}
.section-mark-done.complete::before{content:"✓ "}
@media (max-width:520px){
  .section-mark-done{font-size:10px;padding:6px 10px;letter-spacing:0.08em}
}

.note{
  font-style:italic;color:var(--text-muted);
  padding:6px 8px;margin:4px 0;
  border-left:2px solid var(--border-strong);font-size:13px;
}
.bullet{
  list-style:none;position:relative;padding:3px 8px 3px 18px;margin:2px 0;
  color:var(--text-muted);font-size:13px;
}
.bullet::before{content:"·";position:absolute;left:8px;top:1px;color:var(--accent);font-weight:700}

/* Tickable rows */
.row{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);
  border:1px solid var(--border);
  padding:9px 11px;margin:4px 0;
  min-height:var(--tap);cursor:pointer;user-select:none;
  border-radius:3px;
  transition:background .12s, border-color .12s, opacity .2s, transform .05s;
}
.row:hover{border-color:var(--border-strong)}
.row:active{transform:scale(0.997)}

.actor-pill{
  flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;
  min-width:34px;padding:3px 7px;font-size:10px;font-weight:700;
  letter-spacing:0.1em;border-radius:2px;
  background:var(--surface-2);color:var(--text);border:1px solid var(--border-strong);
}
.actor-pill.pf,.actor-pill.pilot{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.actor-pill.pm{background:#3a4150;color:#fff;border-color:#3a4150}
.actor-pill.cm{background:transparent;color:var(--text-muted);border-color:var(--border-strong)}

.item-text{flex:1 1 auto;font-size:14px;line-height:1.3;word-break:break-word}
.action{
  flex:0 0 auto;font-weight:700;font-size:12px;letter-spacing:0.04em;
  color:var(--text);text-align:right;max-width:45%;text-transform:uppercase;
}
.check{
  flex:0 0 auto;width:26px;height:26px;border-radius:2px;
  border:1px solid var(--border-strong);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;color:transparent;background:transparent;
  transition:all .12s;
}
.row.ticked .check{background:var(--good);border-color:var(--good);color:#fff}
.row.ticked .item-text{text-decoration:line-through;text-decoration-thickness:1px;opacity:0.75}
.row.ticked{opacity:0.75}
.row.locked{opacity:0.4;cursor:not-allowed}
.row.locked .check{border-color:var(--border);background:transparent;color:transparent}
.row.shake{animation:shake .32s}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-5px)}
  40%{transform:translateX(5px)}
  60%{transform:translateX(-3px)}
  80%{transform:translateX(3px)}
}

/* Floating UI */
.conn-indicator{
  position:fixed;bottom:14px;right:14px;background:var(--surface);
  border:1px solid var(--border);border-radius:3px;
  padding:6px 10px;font-size:11px;color:var(--text-muted);
  z-index:50;letter-spacing:0.04em;
}
.conn-indicator::before{
  content:"";display:inline-block;width:7px;height:7px;border-radius:50%;
  background:var(--text-muted);margin-right:6px;vertical-align:middle;
}
.conn-indicator.connected{color:var(--good)}
.conn-indicator.connected::before{background:var(--good)}
.conn-indicator.reconnecting{color:#e6b800}
.conn-indicator.reconnecting::before{background:#e6b800}
.conn-indicator.disconnected{color:var(--bad)}
.conn-indicator.disconnected::before{background:var(--bad)}

.toast{
  position:fixed;left:50%;bottom:64px;transform:translateX(-50%) translateY(10px);
  background:rgba(15,17,22,0.96);color:#fff;border:1px solid var(--border-strong);
  border-radius:3px;padding:9px 14px;font-size:13px;letter-spacing:0.02em;
  opacity:0;pointer-events:none;z-index:60;
  transition:opacity .18s, transform .18s;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Modals */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(5,7,12,0.7);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;
}
.modal-backdrop[hidden]{display:none !important}
.modal{
  width:100%;max-width:440px;background:var(--surface);
  border:1px solid var(--border);padding:24px;border-radius:4px;
}
.modal h2{margin:0 0 14px;font-size:17px;font-weight:600}
.modal .muted{color:var(--text-muted);font-size:13px;margin-top:0}

.role-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
#screen-room.pilots-1 .role-options,
.modal.pilots-1 .role-options{grid-template-columns:1fr}
.role-btn{
  background:var(--bg);border:1px solid var(--border-strong);color:var(--text);
  border-radius:3px;padding:14px 12px;min-height:60px;font-size:14px;
  text-align:left;cursor:pointer;display:flex;flex-direction:column;gap:3px;
  transition:border-color .12s, background .12s;
}
.role-btn .role-name{font-weight:700;letter-spacing:0.06em;font-size:14px}
.role-btn .role-holder{color:var(--text-muted);font-size:11px;letter-spacing:0.02em}
.role-btn:hover:not(:disabled){border-color:var(--accent);color:var(--text)}
.role-btn.mine{border-color:var(--accent);background:rgba(0,182,228,0.08)}
.theme-b777 .role-btn.mine{background:rgba(243,146,0,0.10)}
.role-btn:disabled, .role-btn.taken{
  opacity:0.55;cursor:not-allowed;
}
.role-btn:disabled:hover{border-color:var(--border-strong)}

.muted{color:var(--text-muted)}
</style>
</head>
<body>

<!-- ============================================================ -->
<!-- SCREEN 1: Home (A320 / B777 picker)                          -->
<!-- ============================================================ -->
<div id="screen-home">
  <div class="home-brand">
    <span class="home-brand-name">Shared Cockpit Checklist</span>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="home-brand-tag">Two browsers · peer-to-peer</span>
      <button class="btn link theme-toggle" id="btn-theme" title="Toggle light / dark">🌙</button>
    </div>
  </div>
  <div class="home-grid">
    <button class="home-tile a320" data-aircraft="a320">
      <span class="home-tile-eyebrow">Airbus</span>
      <span class="home-tile-name">A320</span>
      <span class="home-tile-sub">Twin-engine narrowbody · 150 to 180 seats</span>
    </button>
    <button class="home-tile a330" data-aircraft="a330">
      <span class="home-tile-eyebrow">Airbus</span>
      <span class="home-tile-name">A330</span>
      <span class="home-tile-sub">Widebody twin · same flows as A320</span>
    </button>
    <button class="home-tile b777" data-aircraft="b777">
      <span class="home-tile-eyebrow">Boeing</span>
      <span class="home-tile-name">B777</span>
      <span class="home-tile-sub">Long-haul twin · up to 400 seats</span>
    </button>
  </div>
  <div class="home-join">
    <span class="home-join-label">Joining a flight?</span>
    <form id="join-form" style="display:flex;gap:8px;align-items:center">
      <input id="join-code" class="input mono" placeholder="ROOM CODE"
        maxlength="6" autocomplete="off" autocapitalize="characters" spellcheck="false" required />
      <button type="submit" class="btn primary">Join</button>
    </form>
  </div>
</div>

<!-- ============================================================ -->
<!-- SCREEN 2: Mode (Single / Dual)                               -->
<!-- ============================================================ -->
<div id="screen-mode" class="hidden">
  <div class="subnav">
    <button class="btn link" id="btn-mode-back">← Back</button>
    <span class="subnav-title"><strong id="mode-aircraft">A320</strong> · choose mode</span>
    <span></span>
  </div>
  <div class="mode-grid">
    <button class="mode-tile" data-mode="1">
      <span class="mode-tile-name">Single</span>
      <span class="mode-tile-sub">One pilot runs every item. Useful for solo practice or briefing a cold-and-dark flow.</span>
      <span class="mode-tile-roles">Role: PILOT</span>
    </button>
    <button class="mode-tile" data-mode="2">
      <span class="mode-tile-name">Dual</span>
      <span class="mode-tile-sub">Two pilots, side-by-side. Items are split between Pilot Flying and Pilot Monitoring; either can do CM items.</span>
      <span class="mode-tile-roles">Roles: PF · PM</span>
    </button>
  </div>
</div>

<!-- ============================================================ -->
<!-- SCREEN 3: Host setup (name + flight # required)              -->
<!-- ============================================================ -->
<div id="screen-host-setup" class="hidden">
  <div class="subnav">
    <button class="btn link" id="btn-setup-back">← Back</button>
    <span class="subnav-title"><strong id="setup-aircraft">A320</strong> · <span id="setup-mode-label">Single</span></span>
    <span></span>
  </div>
  <div class="center-stack">
    <div class="setup-card">
      <h2>Start the flight</h2>
      <p class="setup-sub">A few details before we generate your room code.</p>
      <label class="field">
        <span class="field-label">Your name<span class="req">*</span></span>
        <input id="host-name" class="input" type="text" maxlength="24" required placeholder="e.g. Saar" />
      </label>
      <label class="field">
        <span class="field-label">Callsign / flight number<span class="req">*</span></span>
        <input id="host-flight" class="input mono" type="text" maxlength="16" required
          placeholder="e.g. AAL322" autocomplete="off" autocapitalize="characters" spellcheck="false" />
        <span id="host-flight-hint" class="muted" style="font-size:11px;display:block;margin-top:6px;min-height:14px"></span>
      </label>
      <div class="setup-actions">
        <button class="btn link" id="btn-setup-cancel">Cancel</button>
        <button class="btn primary" id="btn-setup-create">Create room</button>
      </div>
    </div>
  </div>
</div>

<!-- ============================================================ -->
<!-- SCREEN 4: Connect (room code waiting)                        -->
<!-- ============================================================ -->
<div id="screen-connect" class="hidden">
  <div class="center-stack">
    <div class="connect-card">
      <div class="connect-eyebrow" id="connect-eyebrow">Room code</div>
      <div class="code-display" id="connect-code"></div>
      <div class="connect-sub" id="connect-sub"></div>
      <div class="spinner" id="connect-spinner"></div>
      <div class="connect-actions">
        <button class="btn" id="btn-copy-code">Copy code</button>
        <button class="btn link" id="btn-cancel">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- ============================================================ -->
<!-- SCREEN 5: Room (checklist)                                   -->
<!-- ============================================================ -->
<div id="screen-room" class="hidden">
  <header class="topbar">
    <div class="topbar-left">
      <button class="btn link" id="btn-home" title="Back to home">← Home</button>
      <span class="room-code" id="room-code"></span>
      <span class="aircraft-tag" id="aircraft-tag"></span>
    </div>
    <div class="topbar-center">
      <button class="flight-number" id="flight-number" title="Click to edit"></button>
    </div>
    <div class="topbar-right">
      <button class="btn link" id="btn-theme-room" title="Toggle light / dark">🌙</button>
      <span class="role-badge" id="role-badge">No role</span>
      <button class="btn link" id="btn-change-role">Role</button>
      <button class="btn link" id="btn-reset">Reset</button>
    </div>
  </header>

  <nav class="section-pills" id="section-pills" aria-label="Sections"></nav>

  <main id="checklist-root" class="checklist-root"></main>

  <div class="conn-indicator" id="conn-indicator">Connecting…</div>
  <div class="toast" id="toast" aria-live="polite"></div>

  <div class="modal-backdrop" id="role-modal" hidden>
    <div class="modal" id="role-modal-inner">
      <h2>Who are you?</h2>
      <label class="field">
        <span class="field-label">Your name<span class="req">*</span></span>
        <input id="name-input" class="input" maxlength="24" placeholder="Name" />
      </label>
      <p class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:0.12em;margin:14px 0 8px">Pick a role</p>
      <div class="role-options" id="role-options"></div>
    </div>
  </div>
</div>

e same.","action":""}]},{"heading":"Operation Engineering Bulletins","level":1,"items":[{"actor":"CM","item":"OEB","action":"VERIFY","id":"s0_g9_i44"}]},{"heading":"Before Walkaround","level":1,"items":[],"subgroups":[{"heading":"ECAM Pages","level":2,"items":[{"actor":"_BULLET_","item":"On the DOOR system display page:","action":""},{"actor":"PM","item":"OXYGEN","action":"VERIFY PRESSURE","id":"s0_g10_sg0_i45"},{"actor":"_BULLET_","item":"If the oxygen pressure is half boxed in amber:","action":""},{"actor":"PM","item":"MIN FLT CREW OXY CHART","action":"VERIFY PRESSURE","id":"s0_g10_sg0_i46"},{"actor":"_BULLET_","item":"On the HYD system display page:","action":""},{"actor":"PM","item":"RESERVOIR FLUID LEVEL","action":"VERIFY WITHIN NORMAL RANGE","id":"s0_g10_sg0_i47"},{"actor":"_NOTE_","item":"The volume of the hydraulic fluid level in the reservoirs may be altered due to the outside air pressure. It is recommended to verify with the maintenance crew to validate the issue and resolve the situation.","action":""},{"actor":"_BULLET_","item":"On the ENG system display page:","action":""},{"actor":"PM","item":"ENGINE OIL QUANTITY","action":"VERIFY WITHIN NORMAL RANGE","id":"s0_g10_sg0_i48"},{"actor":"_NOTE_","item":"If there is no indication of the engine oil quantity on the engine system display page, push the ENG 1 and 2 FADEC GND PWR to the ON position. The indication will then appear. After verification, set the ENG 1 and 2 FADEC GND PWR to the OFF position. The oil quantity should indicate at or above 8.9 qt + estimated consumption and not below 10.6 qt. The estimated consumption is 0.45 qt/h.","action":""}]}]},{"heading":"Flight Controls","level":1,"items":[{"actor":"PM","item":"FLAPS lever","action":"VERIFY POSITION","id":"s0_g11_i49"},{"actor":"_NOTE_","item":"Ensure that the upper ECAM displays the same position as the flap lever position.","action":""},{"actor":"PM","item":"SPEEDBRAKES lever","action":"VERIFY RETRACTED AND DISARMED","id":"s0_g11_i50"}]},{"he
