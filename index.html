<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Shared Cockpit Checklist</title>
<style>
:root {
  --bg:#0a0c10;
  --surface:#13161c;
  --surface-2:#191d25;
  --text:#e8ebf1;
  --text-muted:#7a8290;
  --text-dim:#454c58;
  --border:#1f242d;
  --border-strong:#2a313c;
  --accent:#FFFFFF;
  --accent-ink:#14171d;
  --good:#2ec27e;
  --bad:#ff6b6b;
  --tap:44px;
  --shade:8,10,14; /* RGB triple used by image-overlay gradients */
}
body.light {
  --bg:#f5f6f9;
  --surface:#ffffff;
  --surface-2:#eef0f4;
  --text:#15171d;
  --text-muted:#5a6270;
  --text-dim:#a4abb6;
  --border:#dce0e6;
  --border-strong:#bfc4ce;
  --good:#1c8f50;
  --bad:#c23a3a;
  --shade:240,242,247;
}
body.light .flight-number{color:#15171d}
body.light .flight-number:hover{background:rgba(0,0,0,0.04)}
body.light .home-brand-name,
body.light .home-brand-tag,
body.light .home-tile-eyebrow,
body.light .home-tile-sub{color:var(--text-muted)}
body.light .home-tile-name{filter:none}
body.light .pane-name.empty{color:var(--text-dim)}
body.light .modal-backdrop{background:rgba(20,24,32,0.45)}
body.light .toast{background:rgba(20,22,30,0.95);color:#fff}
body.light .actor-pill.pm{background:#6a7180;color:#fff;border-color:#6a7180}

/* Manufacturer brand colours.
   Dark mode (default): lightened blues so the names stay readable on the
   very dark background. Light mode: the actual deep brand hexes so they
   pop on white. Both the tile name AND the accent stripe pick up the
   same variable so they stay in sync. */
:root{
  --airbus-brand:#7B95C5;
  --boeing-brand:#7DA2E0;
}
body.light{
  --airbus-brand:#00205B;
  --boeing-brand:#0033A1;
  /* Light-mode "neutral" accent that's actually visible on the white
     background; dark mode keeps the original white. The aircraft theme
     classes no longer override --accent — they just inherit from here so
     section underlines, role badges, etc. stay legible in both modes. */
  --accent:#1B2535;
  --accent-ink:#FFFFFF;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  font-size:15px;line-height:1.4;-webkit-font-smoothing:antialiased;
  font-feature-settings:"ss01","cv11";}
button{font-family:inherit;color:inherit}
.hidden{display:none !important}

/* ---------- Buttons (sleek) ---------- */
.btn{
  background:transparent;color:var(--text);
  border:1px solid var(--border-strong);
  padding:9px 14px;border-radius:3px;
  font-size:13px;font-weight:500;letter-spacing:0.02em;
  cursor:pointer;min-height:38px;
  transition:border-color .12s, background .12s, color .12s;
}
.btn:hover{border-color:var(--accent);color:var(--text)}
.btn:active{transform:translateY(1px)}
.btn.primary{
  background:var(--accent);color:var(--accent-ink);
  border-color:var(--accent);font-weight:600;
}
.btn.primary:hover{filter:brightness(1.08);color:var(--accent-ink)}
.btn.link{
  background:transparent;border:none;
  color:var(--text-muted);padding:6px 4px;min-height:32px;
}
.btn.link:hover{color:var(--text);background:transparent}
.btn.danger{color:var(--bad);border-color:var(--border-strong)}
.btn.danger:hover{border-color:var(--bad);color:var(--bad)}

/* ---------- Inputs ---------- */
.input{
  width:100%;background:var(--bg);border:1px solid var(--border-strong);
  color:var(--text);padding:11px 12px;font-size:15px;border-radius:3px;
  font-family:inherit;letter-spacing:0.01em;
  transition:border-color .12s;
}
.input:focus{outline:none;border-color:var(--accent)}
.input.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:0.18em;text-transform:uppercase}
.field{display:block;margin-bottom:14px}
.field-label{
  display:block;font-size:10px;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.12em;margin-bottom:6px;
}
.field-label .req{color:var(--bad);margin-left:2px}

/* =====================================================================
   SCREEN 1: Home — A320 / B777 split
   ===================================================================== */
#screen-home{
  display:flex;flex-direction:column;min-height:100vh;
}
.home-brand{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:1px solid var(--border);
}
.home-brand-name{
  font-size:12px;text-transform:uppercase;letter-spacing:0.18em;
  color:var(--text-muted);
}
.home-brand-tag{font-size:11px;color:var(--text-dim);letter-spacing:0.06em}
.version-tag{
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  font-size:10px;color:var(--text-dim);
  border:1px solid var(--border);border-radius:3px;
  padding:2px 6px;letter-spacing:0.04em;white-space:nowrap;
}
.home-grid{
  flex:1 1 auto;display:grid;grid-template-columns:repeat(5,1fr);
  gap:1px;background:var(--border);min-height:360px;
}
.home-tile{
  position:relative;background:var(--bg);border:none;color:var(--text);
  cursor:pointer;padding:36px;
  display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-end;
  text-align:left;transition:background .15s;overflow:hidden;
  image-rendering:-webkit-optimize-contrast;
  image-rendering:crisp-edges;
}
.home-tile:hover{background:var(--surface)}
.home-tile::before{
  content:"";position:absolute;top:0;left:0;right:0;height:3px;z-index:3;
}
.home-tile.a320::before,
.home-tile.a330::before,
.home-tile.a380::before{background:var(--airbus-brand)}
.home-tile.b737::before,
.home-tile.b777::before{background:var(--boeing-brand)}
.home-tile-eyebrow{font-size:11px;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.18em;margin-bottom:6px;
  position:relative;z-index:2}
.home-tile-name{font-size:64px;font-weight:800;letter-spacing:-0.03em;line-height:0.95;color:#FFFFFF}
.home-tile.a320 .home-tile-name,
.home-tile.a330 .home-tile-name,
.home-tile.a380 .home-tile-name{color:var(--airbus-brand)}
.home-tile.b737 .home-tile-name,
.home-tile.b777 .home-tile-name{color:var(--boeing-brand)}
.home-tile-sub{font-size:12px;color:var(--text-muted);margin-top:8px}
@media (max-width:1080px){
  .home-grid{grid-template-columns:1fr 1fr 1fr}
  .home-tile-name{font-size:54px}
}
@media (max-width:760px){
  .home-grid{grid-template-columns:1fr 1fr}
  .home-tile-name{font-size:50px}
}
@media (max-width:480px){
  .home-grid{grid-template-columns:1fr}
}

/* Tile backgrounds are injected by the build script via the
   <style id="aircraft-images"> block at the bottom of <body>.
   If no image is found for a tile, that tile just stays the default
   dark surface — graceful fallback. */
.home-join{
  flex:0 0 auto;padding:20px;border-top:1px solid var(--border);
  background:var(--surface);
  display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;
}
.home-join-label{font-size:11px;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.12em;margin-right:4px}
.home-join input{width:180px}
@media (max-width:880px){
  .home-grid{grid-template-columns:1fr 1fr;min-height:0}
  .home-tile{padding:32px;min-height:220px}
  .home-tile-name{font-size:60px}
}
@media (max-width:560px){
  .home-grid{grid-template-columns:1fr}
  .home-tile{min-height:200px}
}

/* =====================================================================
   SCREEN 2: Mode (Single / Dual)
   ===================================================================== */
#screen-mode{
  display:flex;flex-direction:column;min-height:100vh;
}
.subnav{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface);
}
.subnav-title{font-size:13px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase}
.subnav-title strong{color:var(--text);font-weight:700}
.mode-grid{
  flex:1 1 auto;display:grid;grid-template-columns:1fr 1fr;
  gap:1px;background:var(--border);
}
.mode-tile{
  background:var(--bg);border:none;color:var(--text);
  padding:48px 40px;cursor:pointer;
  display:flex;flex-direction:column;align-items:flex-start;gap:8px;
  text-align:left;transition:background .15s;
}
.mode-tile:hover{background:var(--surface)}
.mode-tile-name{font-size:48px;font-weight:700;letter-spacing:-0.02em}
.mode-tile-sub{font-size:13px;color:var(--text-muted);max-width:380px;line-height:1.5}
.mode-tile-roles{
  margin-top:14px;font-size:11px;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:0.1em;
}
@media (max-width:680px){
  .mode-grid{grid-template-columns:1fr}
  .mode-tile{padding:32px 24px}
  .mode-tile-name{font-size:36px}
}

/* =====================================================================
   SCREEN 3: Host setup
   ===================================================================== */
#screen-host-setup, #screen-connect{
  display:flex;flex-direction:column;min-height:100vh;
}
.center-stack{
  flex:1 1 auto;display:flex;align-items:center;justify-content:center;padding:32px 20px;
}
.setup-card, .connect-card{
  width:100%;max-width:440px;background:var(--surface);
  border:1px solid var(--border);padding:28px 28px 24px;border-radius:4px;
}
.setup-card h2{margin:0 0 4px;font-size:18px;font-weight:600}
.setup-card .setup-sub{margin:0 0 22px;color:var(--text-muted);font-size:13px}
.setup-actions{
  display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:6px;
}

/* =====================================================================
   SCREEN 4: Connect (room code waiting)
   ===================================================================== */
.connect-card{text-align:center}
.connect-eyebrow{
  font-size:11px;text-transform:uppercase;letter-spacing:0.18em;
  color:var(--text-muted);margin:0 0 12px;
}
.code-display{
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  font-size:46px;font-weight:700;letter-spacing:0.18em;
  color:var(--text);margin:0 0 6px;line-height:1;
}
.connect-sub{color:var(--text-muted);font-size:13px;margin:8px 0 18px}
.spinner{
  width:22px;height:22px;border:2px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .9s linear infinite;margin:14px auto 18px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.connect-actions{display:flex;gap:8px;justify-content:center}

/* =====================================================================
   SCREEN 5: Room (checklist)
   ===================================================================== */
#screen-room{display:flex;flex-direction:column;min-height:100vh}
#screen-room.dual{height:100vh;overflow:hidden}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;background:var(--surface);
  border-bottom:1px solid var(--border);gap:10px;
  flex:0 0 auto;
}
.topbar-left,.topbar-right{display:flex;align-items:center;gap:6px;min-width:0}
.topbar-center{flex:1 1 auto;display:flex;justify-content:center;min-width:0;padding:0 8px}
.room-code{
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  font-size:13px;font-weight:600;letter-spacing:0.14em;color:var(--text);
  border:1px solid var(--accent);padding:4px 8px;border-radius:3px;
}
.aircraft-tag{
  font-size:11px;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.08em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* Flight number (callsign) display */
.flight-number{
  background:transparent;border:1px solid transparent;
  color:#fff;font-weight:700;font-size:20px;letter-spacing:0.08em;
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  padding:4px 10px;border-radius:3px;cursor:pointer;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;
  transition:border-color .12s, background .12s;
}
.flight-number:hover{border-color:var(--border-strong);background:rgba(255,255,255,0.03)}
.flight-number.empty{
  color:var(--text-muted);font-weight:500;font-size:12px;
  letter-spacing:0.06em;border-color:var(--border-strong);
  font-family:inherit;text-transform:uppercase;
}
.flight-number .callsign-name{
  color:var(--text-muted);font-weight:500;font-size:13px;letter-spacing:0.04em;
  font-family:inherit;text-transform:none;margin-left:6px;
}
@media (max-width:720px){
  .flight-number{font-size:16px}
  .flight-number .callsign-name{font-size:11px}
}

.role-badge{
  font-size:10px;font-weight:700;letter-spacing:0.1em;
  padding:5px 8px;border:1px solid var(--border);color:var(--text-muted);
  border-radius:3px;white-space:nowrap;
}
.role-badge.role-PF,.role-badge.role-PM,.role-badge.role-PILOT{
  background:var(--accent);color:var(--accent-ink);border-color:var(--accent);
}

/* Section pills */
.section-pills{
  display:flex;gap:0;overflow-x:auto;background:var(--bg);
  border-bottom:1px solid var(--border);flex:0 0 auto;scrollbar-width:none;
}
.section-pills::-webkit-scrollbar{display:none}
.pill{
  flex:0 0 auto;background:transparent;color:var(--text-muted);
  border:none;border-bottom:2px solid transparent;
  padding:10px 14px;font-size:12px;font-weight:500;
  white-space:nowrap;cursor:pointer;letter-spacing:0.02em;
  transition:color .12s, border-color .12s;
}
.pill:hover{color:var(--text)}
.pill.active{color:var(--text);border-bottom-color:var(--accent);font-weight:600}
.pill.done{color:var(--good)}
.pill.done::after{content:" ✓";font-size:11px;margin-left:2px}
.pill.locked{color:var(--text-dim);cursor:not-allowed}
.pill.locked:hover{color:var(--text-dim)}
.pill.locked::after{content:" 🔒";font-size:10px;margin-left:3px}
.pill.shake{animation:shake .3s}

/* Checklist root */
.checklist-root{padding:14px 18px 60px;max-width:780px;margin:0 auto}
#screen-room.dual .checklist-root{
  flex:1 1 auto;display:grid;grid-template-columns:1fr 1fr;
  overflow:hidden;padding:0;max-width:none;margin:0;gap:0;
}
.pane{
  display:flex;flex-direction:column;min-width:0;min-height:0;
  border-right:1px solid var(--border);background:var(--bg);
}
.pane:last-child{border-right:none}
.pane-header{
  flex:0 0 auto;padding:10px 16px;background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:2px;
}
.pane-label{font-size:10px;color:var(--text-muted);
  letter-spacing:0.16em;text-transform:uppercase;font-weight:600}
.pane-name{font-size:15px;font-weight:600;color:var(--text)}
.pane-name.empty{color:var(--text-dim);font-weight:400;font-style:italic}
.pane-scroll{flex:1 1 auto;overflow-y:auto;padding:12px 16px 80px}
@media (max-width:720px){
  #screen-room.dual{height:auto;overflow:visible}
  #screen-room.dual .checklist-root{
    grid-template-columns:1fr;overflow:visible;
  }
  .pane{border-right:none;border-bottom:1px solid var(--border)}
  .pane:last-child{border-bottom:none}
  .pane-scroll{overflow:visible;padding:12px 16px 30px}
}

/* Sections / groups */
.section{margin:14px 0}
.section-title{
  font-size:14px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
  margin:0 0 10px;padding:6px 0 6px;border-bottom:1px solid var(--accent);
  color:var(--text);
}
.group{margin:10px 0}
.group-heading{
  font-size:11px;text-transform:uppercase;letter-spacing:0.14em;
  color:var(--text-muted);margin:8px 2px 6px;font-weight:600;
}
.subgroup-heading{
  font-size:12px;font-weight:700;color:var(--text);
  margin:10px 2px 4px;letter-spacing:0.03em;
}
.subgroup-block,.group-block{
  border:1px solid transparent;border-radius:4px;
  padding:2px 4px;margin:4px -4px;
  transition:background .2s, border-color .2s;
}
.subgroup-block.complete,.group-block.complete{
  background:rgba(46,194,126,0.10);
  border-color:rgba(46,194,126,0.45);
}
.subgroup-block.complete .subgroup-heading,
.group-block.complete .group-heading{color:var(--good)}
.subgroup-block.complete .row,.group-block.complete .row{
  background:rgba(46,194,126,0.07);border-color:rgba(46,194,126,0.3);
}

/* Section header row — title + "Mark all done" button side by side */
.section-header{
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:6px 0 6px;margin:0 0 10px;
  border-bottom:1px solid var(--accent);
}
.section-header .section-title{
  border-bottom:none;padding:0;margin:0;flex:1 1 auto;min-width:0;
}
.section-mark-done{
  flex:0 0 auto;
  background:transparent;color:var(--text-muted);
  border:1px solid var(--border-strong);border-radius:3px;
  padding:8px 14px;
  font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;
  cursor:pointer;white-space:nowrap;
  transition:border-color .12s, color .12s, background .12s;
}
.section-mark-done:hover{border-color:var(--accent);color:var(--text)}
.section-mark-done.complete{
  color:var(--good);border-color:rgba(46,194,126,0.55);
  background:rgba(46,194,126,0.08);
}
.section-mark-done.complete::before{content:"✓ "}
@media (max-width:520px){
  .section-mark-done{font-size:10px;padding:6px 10px;letter-spacing:0.08em}
}

.note{
  font-style:italic;color:var(--text-muted);
  padding:6px 8px;margin:4px 0;
  border-left:2px solid var(--border-strong);font-size:13px;
}
.bullet{
  list-style:none;position:relative;padding:3px 8px 3px 18px;margin:2px 0;
  color:var(--text-muted);font-size:13px;
}
.bullet::before{content:"·";position:absolute;left:8px;top:1px;color:var(--accent);font-weight:700}

/* Tickable rows */
.row{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);
  border:1px solid var(--border);
  padding:9px 11px;margin:4px 0;
  min-height:var(--tap);cursor:pointer;user-select:none;
  border-radius:3px;
  transition:background .12s, border-color .12s, opacity .2s, transform .05s;
}
.row:hover{border-color:var(--border-strong)}
.row:active{transform:scale(0.997)}

.actor-pill{
  flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;
  min-width:34px;padding:3px 7px;font-size:10px;font-weight:700;
  letter-spacing:0.1em;border-radius:2px;
  background:var(--surface-2);color:var(--text);border:1px solid var(--border-strong);
}
.actor-pill.pf,.actor-pill.pilot{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.actor-pill.pm{background:#3a4150;color:#fff;border-color:#3a4150}
.actor-pill.cm{background:transparent;color:var(--text-muted);border-color:var(--border-strong)}

.item-text{flex:1 1 auto;font-size:14px;line-height:1.3;word-break:break-word}
.action{
  flex:0 0 auto;font-weight:700;font-size:12px;letter-spacing:0.04em;
  color:var(--text);text-align:right;max-width:45%;text-transform:uppercase;
}
.check{
  flex:0 0 auto;width:26px;height:26px;border-radius:2px;
  border:1px solid var(--border-strong);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;color:transparent;background:transparent;
  transition:all .12s;
}
.row.ticked .check{background:var(--good);border-color:var(--good);color:#fff}
.row.ticked .item-text{text-decoration:line-through;text-decoration-thickness:1px;opacity:0.75}
.row.ticked{opacity:0.75}
.row.locked{opacity:0.4;cursor:not-allowed}
.row.locked .check{border-color:var(--border);background:transparent;color:transparent}
.row.shake{animation:shake .32s}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-5px)}
  40%{transform:translateX(5px)}
  60%{transform:translateX(-3px)}
  80%{transform:translateX(3px)}
}

/* Floating UI */
.conn-indicator{
  position:fixed;bottom:14px;right:14px;background:var(--surface);
  border:1px solid var(--border);border-radius:3px;
  padding:6px 10px;font-size:11px;color:var(--text-muted);
  z-index:50;letter-spacing:0.04em;
}
.conn-indicator::before{
  content:"";display:inline-block;width:7px;height:7px;border-radius:50%;
  background:var(--text-muted);margin-right:6px;vertical-align:middle;
}
.conn-indicator.connected{color:var(--good)}
.conn-indicator.connected::before{background:var(--good)}
.conn-indicator.reconnecting{color:#e6b800}
.conn-indicator.reconnecting::before{background:#e6b800}
.conn-indicator.disconnected{color:var(--bad)}
.conn-indicator.disconnected::before{background:var(--bad)}

.toast{
  position:fixed;left:50%;bottom:64px;transform:translateX(-50%) translateY(10px);
  background:rgba(15,17,22,0.96);color:#fff;border:1px solid var(--border-strong);
  border-radius:3px;padding:9px 14px;font-size:13px;letter-spacing:0.02em;
  opacity:0;pointer-events:none;z-index:60;
  transition:opacity .18s, transform .18s;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Modals */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(5,7,12,0.7);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;
}
.modal-backdrop[hidden]{display:none !important}
.modal{
  width:100%;max-width:440px;background:var(--surface);
  border:1px solid var(--border);padding:24px;border-radius:4px;
}
.modal h2{margin:0 0 14px;font-size:17px;font-weight:600}
.modal .muted{color:var(--text-muted);font-size:13px;margin-top:0}

.role-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
#screen-room.pilots-1 .role-options,
.modal.pilots-1 .role-options{grid-template-columns:1fr}
.role-btn{
  background:var(--bg);border:1px solid var(--border-strong);color:var(--text);
  border-radius:3px;padding:14px 12px;min-height:60px;font-size:14px;
  text-align:left;cursor:pointer;display:flex;flex-direction:column;gap:3px;
  transition:border-color .12s, background .12s;
}
.role-btn .role-name{font-weight:700;letter-spacing:0.06em;font-size:14px}
.role-btn .role-holder{color:var(--text-muted);font-size:11px;letter-spacing:0.02em}
.role-btn:hover:not(:disabled){border-color:var(--accent);color:var(--text)}
.role-btn.mine{border-color:var(--accent);background:rgba(0,182,228,0.08)}
.theme-b777 .role-btn.mine{background:rgba(243,146,0,0.10)}
.role-btn:disabled, .role-btn.taken{
  opacity:0.55;cursor:not-allowed;
}
.role-btn:disabled:hover{border-color:var(--border-strong)}

.muted{color:var(--text-muted)}
</style>
</head>
<body>

<!-- ============================================================ -->
<!-- SCREEN 1: Home (A320 / B777 picker)                          -->
<!-- ============================================================ -->
<div id="screen-home">
  <div class="home-brand">
    <span class="home-brand-name">Shared Cockpit Checklist</span>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="home-brand-tag">Two browsers · peer-to-peer</span>
      <span class="version-tag" id="version-tag-home"></span>
      <button class="btn link theme-toggle" id="btn-theme" title="Toggle light / dark">🌙</button>
    </div>
  </div>
  <div class="home-grid">
    <button class="home-tile a320" data-aircraft="a320">
      <span class="home-tile-eyebrow">Airbus</span>
      <span class="home-tile-name">A320</span>
      <span class="home-tile-sub">Narrowbody Twin</span>
    </button>
    <button class="home-tile a330" data-aircraft="a330">
      <span class="home-tile-eyebrow">Airbus</span>
      <span class="home-tile-name">A330</span>
      <span class="home-tile-sub">Widebody Twin</span>
    </button>
    <button class="home-tile a380" data-aircraft="a380">
      <span class="home-tile-eyebrow">Airbus</span>
      <span class="home-tile-name">A380</span>
      <span class="home-tile-sub">Double-Deck Quad</span>
    </button>
    <button class="home-tile b737" data-aircraft="b737">
      <span class="home-tile-eyebrow">Boeing</span>
      <span class="home-tile-name">B737</span>
      <span class="home-tile-sub">Narrowbody Twin</span>
    </button>
    <button class="home-tile b777" data-aircraft="b777">
      <span class="home-tile-eyebrow">Boeing</span>
      <span class="home-tile-name">B777</span>
      <span class="home-tile-sub">Long-Haul Twin</span>
    </button>
  </div>
  <div class="home-join">
    <span class="home-join-label">Joining a flight?</span>
    <form id="join-form" style="display:flex;gap:8px;align-items:center">
      <input id="join-code" class="input mono" placeholder="ROOM CODE"
        maxlength="6" autocomplete="off" autocapitalize="characters" spellcheck="false" required />
      <button type="submit" class="btn primary">Join</button>
    </form>
  </div>
</div>

<!-- ============================================================ -->
<!-- SCREEN 2: Mode (Single / Dual)                               -->
<!-- ============================================================ -->
<div id="screen-mode" class="hidden">
  <div class="subnav">
    <button class="btn link" id="btn-mode-back">← Back</button>
    <span class="subnav-title"><strong id="mode-aircraft">A320</strong> · choose mode</span>
    <span></span>
  </div>
  <div class="mode-grid">
    <button class="mode-tile" data-mode="1">
      <span class="mode-tile-name">Single</span>
      <span class="mode-tile-sub">One pilot runs every item. Useful for solo practice or briefing a cold-and-dark flow.</span>
      <span class="mode-tile-roles">Role: PILOT</span>
    </button>
    <button class="mode-tile" data-mode="2">
      <span class="mode-tile-name">Dual</span>
      <span class="mode-tile-sub">Two pilots, side-by-side. Items are split between Pilot Flying and Pilot Monitoring; either can do CM items.</span>
      <span class="mode-tile-roles">Roles: PF · PM</span>
    </button>
  </div>
</div>

<!-- ============================================================ -->
<!-- SCREEN 3: Host setup (name + flight # required)              -->
<!-- ============================================================ -->
<div id="screen-host-setup" class="hidden">
  <div class="subnav">
    <button class="btn link" id="btn-setup-back">← Back</button>
    <span class="subnav-title"><strong id="setup-aircraft">A320</strong> · <span id="setup-mode-label">Single</span></span>
    <span></span>
  </div>
  <div class="center-stack">
    <div class="setup-card">
      <h2>Start the flight</h2>
      <p class="setup-sub">A few details before we generate your room code.</p>
      <label class="field">
        <span class="field-label">Your name<span class="req">*</span></span>
        <input id="host-name" class="input" type="text" maxlength="24" required placeholder="e.g. Saar" />
      </label>
      <label class="field">
        <span class="field-label">Callsign / flight number<span class="req">*</span></span>
        <input id="host-flight" class="input mono" type="text" maxlength="16" required
          placeholder="e.g. AAL322" autocomplete="off" autocapitalize="characters" spellcheck="false" />
        <span id="host-flight-hint" class="muted" style="font-size:11px;display:block;margin-top:6px;min-height:14px"></span>
      </label>
      <div class="setup-actions">
        <button class="btn link" id="btn-setup-cancel">Cancel</button>
        <button class="btn primary" id="btn-setup-create">Create room</button>
      </div>
    </div>
  </div>
</div>

<!-- ============================================================ -->
<!-- SCREEN 4: Connect (room code waiting)                        -->
<!-- ============================================================ -->
<div id="screen-connect" class="hidden">
  <div class="center-stack">
    <div class="connect-card">
      <div class="connect-eyebrow" id="connect-eyebrow">Room code</div>
      <div class="code-display" id="connect-code"></div>
      <div class="connect-sub" id="connect-sub"></div>
      <div class="spinner" id="connect-spinner"></div>
      <div class="connect-actions">
        <button class="btn" id="btn-copy-code">Copy code</button>
        <button class="btn primary hidden" id="btn-retry">Retry</button>
        <button class="btn link" id="btn-cancel">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- ============================================================ -->
<!-- SCREEN 5: Room (checklist)                                   -->
<!-- ============================================================ -->
<div id="screen-room" class="hidden">
  <header class="topbar">
    <div class="topbar-left">
      <button class="btn link" id="btn-home" title="Back to home">← Home</button>
      <span class="room-code" id="room-code"></span>
      <span class="aircraft-tag" id="aircraft-tag"></span>
    </div>
    <div class="topbar-center">
      <button class="flight-number" id="flight-number" title="Click to edit"></button>
    </div>
    <div class="topbar-right">
      <span class="version-tag" id="version-tag-room"></span>
      <button class="btn link" id="btn-theme-room" title="Toggle light / dark">🌙</button>
      <span class="role-badge" id="role-badge">No role</span>
      <button class="btn link" id="btn-change-role">Role</button>
      <button class="btn link" id="btn-reset">Reset</button>
    </div>
  </header>

  <nav class="section-pills" id="section-pills" aria-label="Sections"></nav>

  <main id="checklist-root" class="checklist-root"></main>

  <div class="conn-indicator" id="conn-indicator">Connecting…</div>
  <div class="toast" id="toast" aria-live="polite"></div>

  <div class="modal-backdrop" id="role-modal" hidden>
    <div class="modal" id="role-modal-inner">
      <h2>Who are you?</h2>
      <label class="field">
        <span class="field-label">Your name<span class="req">*</span></span>
        <input id="name-input" class="input" maxlength="24" placeholder="Name" />
      </label>
      <p class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:0.12em;margin:14px 0 8px">Pick a role</p>
      <div class="role-options" id="role-options"></div>
    </div>
  </div>
</div>

    "ABY":"#A6093D","ACA":"#D91313","AEA":"#0033A0","AFL":"#1B3E80",
    "AFR":"#002654","AIC":"#D71921","AKJ":"#FF6600","ALK":"#1A2C57",
    "AMX":"#0033A0","ANA":"#003F87","ANZ":"#1A1A1A","APJ":"#A0006E",
    "ARG":"#3B5998","ASA":"#01426A","ATN":"#1F4E8C","AUA":"#E20613",
    "AVA":"#D31837","AXM":"#E50000","AZA":"#003366","BAV":"#0F8C2F",
    "BAW":"#075AAA","BEL":"#1F3A6E","BKP":"#005DAA","BTI":"#80BC00",
    "BTK":"#003078","CCA":"#C8102E","CES":"#C8102E","CFG":"#FFAD00",
    "CHH":"#C8102E","CKS":"#000000","CMP":"#003876","CPA":"#005A41",
    "CSA":"#1F4E8C","CSC":"#C8102E","CSN":"#005DAA","CXA":"#005DAA",
    "DAL":"#003366","DLH":"#05164D","EDV":"#003478","EIN":"#006847",
    "EJA":"#1F4E79","ELY":"#0038B8","ENY":"#A91D22","ETD":"#BD8B13",
    "ETH":"#1F4E8C","EWG":"#A22A2C","EZY":"#FF6600","FDB":"#FF6900",
    "FDX":"#4D148C","FFT":"#0F8C2F","FIN":"#0B1E5B","FLE":"#1B7C3D",
    "GFA":"#A98C45","GIA":"#0033A0","GJS":"#003876","GLO":"#FF6600",
    "GTI":"#003876","HAL":"#522398","HDA":"#005A41","HVN":"#015DA9",
    "IBE":"#D7282F","ICE":"#1F3258","IGO":"#001D5C","JAL":"#C8102E",
    "JBU":"#0033A0","JIA":"#003C71","JST":"#FF5115","JZA":"#D91313",
    "KAC":"#003876","KAL":"#00256C","KLC":"#00A1DE","KLM":"#00A1DE",
    "KQA":"#C8102E","LNI":"#E50000","LPE":"#E3001A","MAS":"#C8102E",
    "MEA":"#C8102E","MSR":"#1A1A66","MXY":"#56A0D3","NAX":"#D91E18",
    "NJE":"#006600","NKS":"#FFEB00","NOK":"#FFD200","OMA":"#7C2429",
    "PAL":"#003478","PDT":"#0033A0","PIA":"#005A41","POE":"#001A57",
    "QFA":"#EE0000","QTR":"#5C0D34","RAM":"#C8102E","RJA":"#7B0019",
    "ROU":"#D91313","RPA":"#003366","RXA":"#012169","RYR":"#1F4E8C",
    "SAA":"#003876","SAS":"#003876","SBI":"#7AC143","SCO":"#FFD500",
    "SCX":"#E61E26","SEJ":"#9E1B32","SIA":"#08407E","SKW":"#1A4480",
    "SLK":"#08407E","SVA":"#005430","SVR":"#7E0010","SWA":"#304CB2",
    "SWR":"#D91E25","TAM":"#E3001A","TAP":"#C8102E","TAR":"#C8102E",
    "TGW":"#FFD500","THA":"#52257F","THY":"#C70A0C","TRA":"#00A859",
    "TSC":"#0033A0","TUI":"#005DAA","UAE":"#D71921","UAL":"#002244",
    "UPS":"#351C15","UTA":"#003478","VIR":"#DA0530","VJC":"#E10600",
    "VLG":"#FFCC00","VOI":"#9E1B32","VOL":"#AA151B","VOZ":"#DA0530",
    "WJA":"#005DAA","WZZ":"#C6017E",
  };

  function getReadableInk(hex) {
    const h = hex.replace('#','');
    const r = parseInt(h.substr(0,2), 16);
    const g = parseInt(h.substr(2,2), 16);
    const b = parseInt(h.substr(4,2), 16);
    const yiq = (r * 299 + g * 587 + b * 114) / 1000;
    return yiq > 140 ? '#0a0c10' : '#ffffff';
  }

  // Larger fallback map (~5100 entries) keyed by radio telephony name
  // (space-stripped, uppercase). Used when the leading ICAO 3-letter
  // doesn't match but the typed prefix is the actual telephony callsign
  // (e.g. "AMERICAN322", "SPEEDBIRD42", "MOXY101").
  let AIRLINE_TELEPHONY = {};
  try {
    AIRLINE_TELEPHONY = JSON.parse(document.getElementById("telephony-data").textContent || "{}");
  } catch (e) {}

  function applyAirlineBrandColor(prefix) {
    let color = null;
    if (prefix && prefix.length === 3 && AIRLINE_COLORS[prefix]) {
      color = AIRLINE_COLORS[prefix];
    } else if (prefix && AIRLINE_TELEPHONY[prefix]) {
      color = AIRLINE_TELEPHONY[prefix];
    }
    if (color) {
      document.body.style.setProperty('--accent', color);
      document.body.style.setProperty('--accent-ink', getReadableInk(color));
    } else {
      document.body.style.removeProperty('--accent');
      document.body.style.removeProperty('--accent-ink');
    }
  }

  function parseCallsign(raw) {
    if (!raw) return null;
    const clean = String(raw).trim().toUpperCase().replace(/\s+/g, "");
    if (!clean) return null;
    // Pull the leading run of letters (any length): "AAL322" → "AAL",
    // "AMERICAN322" → "AMERICAN", "SPEEDBIRD42" → "SPEEDBIRD".
    const m = clean.match(/^([A-Z]+)(.*)$/);
    if (!m) return { display: clean, prefix: null, icao: null, rest: clean, name: null };
    const prefix = m[1];
    const rest = m[2];
    // Try the 3-letter ICAO name for the suffix display first; fall back
    // to no suffix when the user typed a telephony name directly.
    let icao = null, name = null;
    if (prefix.length >= 3) {
      const candidate = prefix.substring(0, 3);
      if (AIRLINE_CALLSIGNS[candidate]) {
        icao = candidate;
        name = AIRLINE_CALLSIGNS[candidate];
      }
    }
    if (!icao && prefix.length === 3 && AIRLINE_COLORS[prefix]) {
      icao = prefix;
    }
    return { display: clean, prefix, icao, rest, name };
  }

  // ---- state ----
  const state = {
    role: 'host',
    code: null,
    peer: null,
    conns: [],
    slug: null,
    checklist: null,
    pendingAircraft: null,    // 'a320' | 'b777' while in mode picker
    myName: '',
    myKey: null,              // '__me__' for host, peer.id for guest
    myRole: null,             // derived
    members: {},              // peerKey -> {name, role}
    roles: {},                // role -> peerKey | null
    ticked: new Set(),
    flightNumber: '',
  };

  function recomputeMyRole() {
    state.myRole = null;
    if (!state.myKey) return;
    for (const r of Object.keys(state.roles || {})) {
      if (state.roles[r] === state.myKey) { state.myRole = r; break; }
    }
  }

  // ---- DOM ----
  const $ = (id) => document.getElementById(id);
  const screens = {
    home: $('screen-home'),
    mode: $('screen-mode'),
    "host-setup": $('screen-host-setup'),
    connect: $('screen-connect'),
    room: $('screen-room'),
  };
  function show(name) {
    Object.keys(screens).forEach(k => screens[k].classList.toggle('hidden', k !== name));
  }

  // ---- home screen ----
  document.querySelectorAll('.home-tile').forEach(t => {
    t.addEventListener('click', () => {
      state.pendingAircraft = t.dataset.aircraft;
      const labels = { a320: 'A320', a330: 'A330', a380: 'A380', b737: 'B737', b777: 'B777' };
      $('mode-aircraft').textContent = labels[t.dataset.aircraft] || t.dataset.aircraft.toUpperCase();
      setAircraftTheme(state.pendingAircraft);
      show('mode');
    });
  });
  $('join-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const code = ($('join-code').value || '').trim().toUpperCase();
    if (code.length !== 6) return;
    joinRoom(code);
  });

  // ---- mode screen ----
  $('btn-mode-back').addEventListener('click', () => { document.body.className=''; show('home'); });
  document.querySelectorAll('.mode-tile').forEach(t => {
    t.addEventListener('click', () => {
      const pilots = parseInt(t.dataset.mode, 10);
      const slug = state.pendingAircraft + '_' + (pilots === 1 ? '1p' : '2p');
      state.slug = slug;
      state.checklist = CHECKLISTS[slug];
      setAircraftTheme(state.checklist.theme);
      $('setup-aircraft').textContent = state.checklist.aircraft;
      $('setup-mode-label').textContent = (pilots === 1 ? 'Single' : 'Dual');
      show('host-setup');
      setTimeout(() => $('host-name').focus(), 60);
    });
  });

  // ---- host setup ----
  $('btn-setup-back').addEventListener('click', () => show('mode'));
  $('btn-setup-cancel').addEventListener('click', () => { document.body.className=''; show('home'); });
  $('host-flight').addEventListener('input', () => {
    const parsed = parseCallsign($('host-flight').value);
    const hint = $('host-flight-hint');
    if (parsed && parsed.name) hint.textContent = parsed.icao + ' → "' + parsed.name + '"';
    else if (parsed && parsed.prefix && AIRLINE_TELEPHONY[parsed.prefix]) hint.textContent = parsed.prefix + ' → recognized telephony';
    else if (parsed && parsed.icao) hint.textContent = parsed.icao + ' → unknown ICAO code';
    else hint.textContent = '';
  });
  $('btn-setup-create').addEventListener('click', () => {
    const name = ($('host-name').value || '').trim().slice(0, 24);
    const flight = ($('host-flight').value || '').trim().toUpperCase().slice(0, 16);
    if (!name) { toast('Name is required'); $('host-name').focus(); return; }
    if (!flight) { toast('Flight number is required'); $('host-flight').focus(); return; }
    state.myName = name;
    state.flightNumber = flight;
    startHostRoom();
  });

  function startHostRoom() {
    state.role = 'host';
    state.code = randomCode();
    state.myKey = '__me__';
    state.members[state.myKey] = { name: state.myName, role: null };
    state.roles = (state.checklist.pilots === 1)
      ? { PILOT: null }
      : { PF: null, PM: null };

    $('connect-eyebrow').textContent = 'Room code';
    $('connect-code').textContent = state.code;
    $('connect-sub').textContent = 'Send this code to your co-pilot. Or start ticking on your own — the room enters as soon as you pick a role.';
    $('connect-spinner').classList.remove('hidden');
    show('connect');

    createPeerWithRetry(peerIdFor(state.code), true);
  }

  // ---- guest flow ----
  function joinRoom(code) {
    state.role = 'guest';
    state.code = code;
    state.myKey = null;
    $('connect-eyebrow').textContent = 'Joining';
    $('connect-code').textContent = code;
    $('connect-sub').textContent = 'Reaching out to the host browser…';
    $('connect-spinner').classList.remove('hidden');
    show('connect');

    const peer = new Peer(undefined, PEER_OPTS);
    state.peer = peer;
    peer.on('open', () => {
      state.myKey = peer.id;
      const conn = peer.connect(peerIdFor(code), { reliable: true });
      wireConnection(conn, true);

      // Monitor ICE state for diagnostics + show timeout error if the
      // data channel hasn't opened within 18 seconds (means NAT traversal
      // failed and TURN didn't help).
      try {
        const pc = conn.peerConnection;
        if (pc) {
          pc.addEventListener('iceconnectionstatechange', () => {
            console.log('[checklist] ICE state:', pc.iceConnectionState);
          });
        }
      } catch (e) {}

      const connectTimer = setTimeout(() => {
        if (state.conns.indexOf(conn) === -1 || !conn.open) {
          $('connect-spinner').classList.add('hidden');
          $('connect-eyebrow').textContent = 'Could not establish connection';
          $('connect-sub').textContent =
            "Your two browsers found each other but the direct connection didn't open. " +
            "This usually means both networks are behind strict NATs — try again, or see the README about adding your own TURN credentials.";
          $('btn-retry').classList.remove('hidden');
        }
      }, 18000);
      conn.on('open', () => clearTimeout(connectTimer));
    });
    peer.on('error', (err) => {
      const sub = $('connect-sub');
      $('connect-spinner').classList.add('hidden');
      $('connect-eyebrow').textContent = 'Could not connect';
      sub.textContent = (err && err.type === 'peer-unavailable')
        ? 'Nobody is hosting room ' + code + ' right now. Make sure your co-pilot has the tab open and try again.'
        : 'Connection failed: ' + (err && err.message || err);
      $('btn-retry').classList.remove('hidden');
    });
  }

  // ---- peer ----
  function randomCode() {
    let s=''; const a = new Uint32Array(6); crypto.getRandomValues(a);
    for (let i=0;i<6;i++) s += CODE_ALPHA[a[i] % CODE_ALPHA.length];
    return s;
  }
  function peerIdFor(code) { return 'cockpit-checklist-' + code; }

  function createPeerWithRetry(id, isHost, tries=0) {
    const peer = new Peer(id, PEER_OPTS);
    state.peer = peer;
    peer.on('open', () => { if (isHost) onHostReady(); });
    peer.on('connection', (conn) => wireConnection(conn, false));
    peer.on('error', (err) => {
      if (err && err.type === 'unavailable-id' && tries < 3) {
        state.code = randomCode();
        $('connect-code').textContent = state.code;
        peer.destroy();
        createPeerWithRetry(peerIdFor(state.code), isHost, tries+1);
      } else {
        $('connect-eyebrow').textContent = 'Connection error';
        $('connect-sub').textContent = (err && err.message) || String(err);
        $('connect-spinner').classList.add('hidden');
      }
    });
  }

  function onHostReady() {
    // Host can enter the room solo while waiting
    enterRoomUI();
    setConn('reconnecting', 'Waiting for co-pilot…');
  }

  function wireConnection(conn, outgoing) {
    state.conns.push(conn);
    conn.on('open', () => {
      if (outgoing) {
        send(conn, { type: 'hello', from: state.myKey });
      } else {
        send(conn, {
          type: 'sync',
          slug: state.slug,
          checklist: state.checklist,
          ticked: Array.from(state.ticked),
          roles: state.roles,
          members: state.members,
          flightNumber: state.flightNumber,
          yourKey: conn.peer,
        });
      }
      setConn('connected', 'Connected');
    });
    conn.on('data', (msg) => onMessage(conn, msg));
    conn.on('close', () => {
      state.conns = state.conns.filter(c => c !== conn);
      if (state.role === 'host') {
        const k = conn.peer;
        if (state.members[k]) {
          for (const r of Object.keys(state.roles)) {
            if (state.roles[r] === k) state.roles[r] = null;
          }
          delete state.members[k];
        }
        broadcastState();
      }
      if (state.conns.length === 0) setConn('disconnected', 'Peer disconnected');
      renderRoleBadge(); renderPaneHeaders();
    });
    conn.on('error', (e) => console.error('conn error', e));
  }

  function send(conn, obj) { try { conn.send(obj); } catch (e) { console.error(e); } }
  function broadcast(obj) { state.conns.forEach(c => send(c, obj)); }

  // ---- messaging ----
  function onMessage(conn, msg) {
    if (!msg || !msg.type) return;
    switch (msg.type) {
      case 'hello': // host gets it from guest
        if (state.role === 'host') {
          state.members[conn.peer] = { name: '(joining)', role: null };
          broadcastState();
        }
        break;
      case 'sync': // guest gets it from host
        state.slug = msg.slug;
        state.checklist = msg.checklist;
        state.ticked = new Set(msg.ticked || []);
        state.roles = msg.roles || {};
        state.members = msg.members || {};
        state.flightNumber = msg.flightNumber || '';
        if (msg.yourKey) state.myKey = msg.yourKey;
        setAircraftTheme(state.checklist.theme);
        enterRoomUI();
        break;
      case 'state':
        state.ticked = new Set(msg.ticked || []);
        state.roles = msg.roles || {};
        state.members = msg.members || {};
        if (typeof msg.flightNumber === 'string') state.flightNumber = msg.flightNumber;
        recomputeMyRole();
        applyTickedToDom();
        renderRoleBadge();
        renderFlightNumber();
        renderPaneHeaders();
        if (!$('role-modal').hidden) drawRoleOptions();
        break;
      case 'claim_role':
        if (state.role === 'host') {
          const ok = claimRole(conn.peer, msg.name, msg.role);
          if (!ok) {
            const holder = state.roles[msg.role];
            const holderName = (holder && state.members[holder] && state.members[holder].name) || 'someone';
            send(conn, { type: 'role_denied', role: msg.role, holderName });
          } else {
            broadcastState();
          }
        }
        break;
      case 'role_denied':
        toast(msg.role + ' is held by ' + (msg.holderName || 'someone'));
        break;
      case 'set_flight':
        if (state.role === 'host') {
          state.flightNumber = String(msg.flightNumber || '').slice(0, 16).toUpperCase();
          broadcastState();
        }
        break;
      case 'tick':
        if (state.role === 'host') {
          handleTickRequest(conn.peer, msg.id, msg.actor);
        }
        break;
      case 'tick_batch':
        if (state.role === 'host') {
          handleTickBatch(conn.peer, msg.ids || [], msg.actors || []);
        }
        break;
      case 'reset':
        if (state.role === 'host') {
          state.ticked.clear();
          broadcastState();
        }
        break;
      case 'denied':
        const row = document.querySelector('.row[data-id="' + CSS.escape(msg.id) + '"]');
        if (row) shake(row);
        toast(msg.reason || 'Not your row');
        break;
    }
  }

  function broadcastState() {
    recomputeMyRole();
    applyTickedToDom();
    renderRoleBadge();
    renderFlightNumber();
    renderPaneHeaders();
    if (!$('role-modal').hidden) drawRoleOptions();
    broadcast({
      type: 'state',
      ticked: Array.from(state.ticked),
      roles: state.roles,
      members: state.members,
      flightNumber: state.flightNumber,
    });
  }

  // claimRole: returns true if granted, false if denied (role taken by someone else)
  function claimRole(peerKey, name, role) {
    if (!state.checklist) return false;
    if (!(role in state.roles)) return false;
    if (!state.members[peerKey]) state.members[peerKey] = { name: name || 'Pilot', role: null };
    else state.members[peerKey].name = name || state.members[peerKey].name;
    const prev = state.roles[role];
    if (prev && prev !== peerKey) return false;
    // Free any role this peer currently holds (e.g. switching)
    for (const r of Object.keys(state.roles)) {
      if (state.roles[r] === peerKey) state.roles[r] = null;
    }
    state.roles[role] = peerKey;
    state.members[peerKey].role = role;
    return true;
  }

  function handleTickRequest(peerKey, itemId, actor) {
    const member = state.members[peerKey];
    const myRole = member && member.role;
    const conn = state.conns.find(c => c.peer === peerKey);
    if (!myRole) {
      if (conn) send(conn, { type: 'denied', id: itemId, reason: 'Pick a role first' });
      return;
    }
    const allowed = (actor === myRole) || (actor === 'CM');
    if (!allowed) {
      if (conn) send(conn, { type: 'denied', id: itemId, reason: actor + ' only' });
      return;
    }
    // Section lock check (server-side too — host is authoritative)
    if (isItemInLockedSection(itemId)) {
      if (conn) send(conn, { type: 'denied', id: itemId, reason: 'Locked' });
      return;
    }
    if (state.ticked.has(itemId)) state.ticked.delete(itemId);
    else state.ticked.add(itemId);
    broadcastState();
  }

  function handleTickBatch(peerKey, ids, actors) {
    const member = state.members[peerKey];
    const myRole = member && member.role;
    if (!myRole) return;
    let changed = false;
    for (let i = 0; i < ids.length; i++) {
      const id = ids[i], actor = actors[i];
      if (actor !== myRole && actor !== 'CM') continue;
      if (isItemInLockedSection(id)) continue;
      if (!state.ticked.has(id)) { state.ticked.add(id); changed = true; }
    }
    if (changed) broadcastState();
  }

  function isItemInLockedSection(itemId) {
    for (let i = 0; i < sectionItemIds.length; i++) {
      if (sectionItemIds[i].includes(itemId)) {
        return isSectionLocked(i);
      }
    }
    return false;
  }

  // ---- entering the room UI ----
  function enterRoomUI() {
    if (!state.checklist) return;
    acquireWakeLock();
    if (state.role === 'host') {
      state.myKey = '__me__';
      if (!state.members[state.myKey]) {
        state.members[state.myKey] = { name: state.myName || 'Pilot', role: null };
      }
    }
    show('room');
    setAircraftTheme(state.checklist.theme);
    screens.room.classList.toggle('dual', state.checklist.pilots === 2);
    screens.room.classList.toggle('pilots-1', state.checklist.pilots === 1);
    $('room-code').textContent = state.code;
    $('aircraft-tag').textContent = state.checklist.aircraft + ' · ' +
      (state.checklist.pilots === 1 ? 'Single' : 'Dual');
    renderFlightNumber();
    renderChecklist();
    recomputeMyRole();
    renderRoleBadge();
    renderPaneHeaders();
    setConn(state.conns.length ? 'connected' : 'reconnecting',
            state.conns.length ? 'Connected' : (state.role === 'host' ? 'Waiting for co-pilot…' : 'Connecting…'));
    if (!state.myRole) openRoleModal();
  }

  // ---- rendering ----
  let sectionItemIds = [];   // [idx] -> [item ids in that section, full union across panes]

  function shouldShowInPane(actor, paneRole) {
    if (!paneRole) return true;
    if (actor === '_NOTE_' || actor === '_BULLET_') return true;
    if (actor === 'CM') return true;
    return actor === paneRole;
  }

  // ---- pane visibility (note/bullet/heading should only appear with the
  //       pilot actually responsible for the items in that block) ----------
  function _tickableOf(items) {
    return (items || []).filter(it => it.actor !== '_NOTE_' && it.actor !== '_BULLET_');
  }
  function subgroupVisibleInPane(sg, paneRole) {
    if (!paneRole) return true;
    const tickable = _tickableOf(sg.items);
    if (tickable.length === 0) return true; // purely informational subgroup
    return tickable.some(it => shouldShowInPane(it.actor, paneRole));
  }
  function groupVisibleInPane(group, paneRole) {
    if (!paneRole) return true;
    const directTickable = _tickableOf(group.items);
    if (directTickable.length && directTickable.some(it => shouldShowInPane(it.actor, paneRole))) return true;
    const sgs = group.subgroups || [];
    if (sgs.some(sg => {
      const t = _tickableOf(sg.items);
      return t.length && t.some(it => shouldShowInPane(it.actor, paneRole));
    })) return true;
    const totalTickable = directTickable.length + sgs.reduce((a, sg) => a + _tickableOf(sg.items).length, 0);
    return totalTickable === 0; // purely informational group → render on both panes
  }
  function sectionVisibleInPane(sec, paneRole) {
    if (!paneRole) return true;
    return (sec.groups || []).some(g => groupVisibleInPane(g, paneRole));
  }

  function buildSectionItemIds() {
    sectionItemIds = state.checklist.sections.map(sec => {
      const ids = [];
      for (const g of (sec.groups || [])) {
        for (const it of (g.items || [])) if (it.id) ids.push(it.id);
        for (const sg of (g.subgroups || [])) {
          for (const it of (sg.items || [])) if (it.id) ids.push(it.id);
        }
      }
      return ids;
    });
  }

  function renderChecklist() {
    const root = $('checklist-root');
    const pills = $('section-pills');
    root.innerHTML = '';
    pills.innerHTML = '';
    buildSectionItemIds();

    // Section pills (shared header)
    state.checklist.sections.forEach((sec, idx) => {
      const pill = document.createElement('button');
      pill.type = 'button';
      pill.className = 'pill';
      pill.textContent = sec.title;
      pill.dataset.idx = String(idx);
      pill.addEventListener('click', () => onPillClick(pill, idx));
      pills.appendChild(pill);
    });

    if (state.checklist.pilots === 2) {
      // Dual panes
      const left = createPane('pf');
      const right = createPane('pm');
      root.appendChild(left.pane);
      root.appendChild(right.pane);
      state.checklist.sections.forEach((sec, idx) => {
        renderSectionInto(left.scroll, sec, idx, 'PF');
        renderSectionInto(right.scroll, sec, idx, 'PM');
      });
      // Scroll-spy per pane (left wins)
      left.scroll.addEventListener('scroll', () => {
        clearTimeout(scrollTimer);
        scrollTimer = setTimeout(() => highlightActivePill(left.scroll), 50);
      }, { passive: true });
    } else {
      // Single pane (no role filter)
      state.checklist.sections.forEach((sec, idx) => {
        renderSectionInto(root, sec, idx, null);
      });
      window.addEventListener('scroll', () => {
        clearTimeout(scrollTimer);
        scrollTimer = setTimeout(() => highlightActivePill(null), 50);
      }, { passive: true });
    }

    applyTickedToDom();
    highlightActivePill(null);
  }

  function createPane(roleLower) {
    const pane = document.createElement('aside');
    pane.className = 'pane pane-' + roleLower;
    pane.dataset.pane = roleLower.toUpperCase();
    const header = document.createElement('header');
    header.className = 'pane-header';
    const label = document.createElement('span');
    label.className = 'pane-label';
    label.textContent = (roleLower === 'pf') ? 'Pilot Flying' : 'Pilot Monitoring';
    const name = document.createElement('span');
    name.className = 'pane-name empty';
    name.textContent = 'available';
    name.dataset.role = (roleLower === 'pf') ? 'PF' : 'PM';
    header.appendChild(label);
    header.appendChild(name);
    pane.appendChild(header);
    const scroll = document.createElement('div');
    scroll.className = 'pane-scroll';
    pane.appendChild(scroll);
    return { pane, scroll };
  }

  function renderSectionInto(parent, sec, idx, paneRole) {
    if (!sectionVisibleInPane(sec, paneRole)) return;
    const secEl = document.createElement('section');
    secEl.className = 'section';
    secEl.dataset.secIdx = String(idx);

    const header = document.createElement('div');
    header.className = 'section-header';
    const title = document.createElement('h2');
    title.className = 'section-title';
    title.textContent = sec.title;
    header.appendChild(title);

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'section-mark-done';
    btn.textContent = 'Mark all done';
    btn.dataset.secIdx = String(idx);
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      markSectionComplete(idx);
    });
    header.appendChild(btn);
    secEl.appendChild(header);

    (sec.groups || []).forEach(g => renderGroup(secEl, g, paneRole));
    secEl.querySelectorAll('.row').forEach(r => { r.dataset.sectionIdx = String(idx); });
    parent.appendChild(secEl);
  }

  function renderGroup(parent, group, paneRole) {
    if (!groupVisibleInPane(group, paneRole)) return;

    const groupEl = document.createElement('div');
    groupEl.className = 'group';
    if (group.heading) {
      const h = document.createElement('div');
      h.className = 'group-heading';
      h.textContent = group.heading;
      groupEl.appendChild(h);
    }

    // Direct items: only render if at least one tickable matches this pane
    // (notes/bullets follow the tickable they belong to)
    const directItems = (group.items || []);
    const directTickable = _tickableOf(directItems);
    const directHasMatch = directTickable.some(it => shouldShowInPane(it.actor, paneRole));
    const directIsInfoOnly = paneRole && directTickable.length === 0;
    if (directItems.length && (paneRole === null || directHasMatch || directIsInfoOnly)) {
      const block = document.createElement('div');
      block.className = 'group-block';
      const allIds = []; // union across panes for green-complete tracking
      let rendered = 0;
      let rowsRendered = 0;
      directItems.forEach(it => {
        if (it.id) allIds.push(it.id);
        if (it.actor === '_NOTE_' || it.actor === '_BULLET_') {
          renderItem(block, it);
          rendered++;
          return;
        }
        if (!shouldShowInPane(it.actor, paneRole)) return;
        renderItem(block, it);
        rendered++;
        rowsRendered++;
      });
      if (allIds.length) block.dataset.itemIds = allIds.join(',');
      if (rendered > 0) groupEl.appendChild(block);
    }

    // Subgroups: skip whole subgroup if no tickable item matches this pane
    (group.subgroups || []).forEach(sg => {
      if (!subgroupVisibleInPane(sg, paneRole)) return;

      const block = document.createElement('div');
      block.className = 'subgroup-block';
      if (sg.heading) {
        const sh = document.createElement('div');
        sh.className = 'subgroup-heading';
        sh.textContent = sg.heading;
        block.appendChild(sh);
      }
      const allIds = [];
      let rendered = 0;
      let rowsRendered = 0;
      (sg.items || []).forEach(it => {
        if (it.id) allIds.push(it.id);
        if (it.actor === '_NOTE_' || it.actor === '_BULLET_') {
          renderItem(block, it);
          rendered++;
          return;
        }
        if (!shouldShowInPane(it.actor, paneRole)) return;
        renderItem(block, it);
        rendered++;
        rowsRendered++;
      });
      if (allIds.length) block.dataset.itemIds = allIds.join(',');
      if (rendered > 0) groupEl.appendChild(block);
    });

    // Don't append an empty group shell
    if (groupEl.children.length === (group.heading ? 1 : 0)) return;
    parent.appendChild(groupEl);
  }

  function renderItem(parent, it) {
    if (it.actor === '_NOTE_') {
      const n = document.createElement('div');
      n.className = 'note';
      n.textContent = it.item;
      parent.appendChild(n); return;
    }
    if (it.actor === '_BULLET_') {
      const b = document.createElement('div');
      b.className = 'bullet';
      b.textContent = it.item;
      parent.appendChild(b); return;
    }
    if (!it.id) {
      const n = document.createElement('div');
      n.className = 'note';
      n.textContent = (it.item || '') + (it.action ? ' — ' + it.action : '');
      parent.appendChild(n); return;
    }
    const row = document.createElement('div');
    row.className = 'row';
    row.dataset.id = it.id;
    row.dataset.actor = it.actor;

    const pill = document.createElement('span');
    pill.className = 'actor-pill ' + actorClass(it.actor);
    pill.textContent = it.actor;
    row.appendChild(pill);

    const text = document.createElement('span');
    text.className = 'item-text';
    text.textContent = it.item;
    row.appendChild(text);

    if (it.action) {
      const act = document.createElement('span');
      act.className = 'action';
      act.textContent = it.action;
      row.appendChild(act);
    }

    const check = document.createElement('span');
    check.className = 'check';
    check.textContent = '✓';
    row.appendChild(check);

    row.addEventListener('click', () => attemptTick(row, it));
    parent.appendChild(row);
  }

  function applyTickedToDom() {
    document.querySelectorAll('.row').forEach(row => {
      row.classList.toggle('ticked', state.ticked.has(row.dataset.id));
    });
    document.querySelectorAll('.subgroup-block, .group-block').forEach(block => {
      const raw = block.dataset.itemIds || '';
      if (!raw) { block.classList.remove('complete'); return; }
      const ids = raw.split(',');
      const allDone = ids.every(id => state.ticked.has(id));
      block.classList.toggle('complete', allDone);
    });
    // Section-level "Mark all done" buttons turn green when every item this
    // pilot is responsible for in that section is already ticked.
    document.querySelectorAll('.section-mark-done').forEach(btn => {
      const idx = parseInt(btn.dataset.secIdx, 10);
      if (isNaN(idx) || !state.checklist) return;
      const sec = state.checklist.sections[idx];
      if (!sec) return;
      let total = 0, done = 0;
      const myRole = state.myRole;
      const consider = (items) => {
        for (const it of (items || [])) {
          if (it.actor === '_NOTE_' || it.actor === '_BULLET_') continue;
          if (!it.id) continue;
          if (myRole && it.actor !== myRole && it.actor !== 'CM') continue;
          total++;
          if (state.ticked.has(it.id)) done++;
        }
      };
      for (const g of (sec.groups || [])) {
        consider(g.items);
        for (const sg of (g.subgroups || [])) consider(sg.items);
      }
      btn.classList.toggle('complete', total > 0 && done === total);
    });
    updateSectionLocks();
  }

  function attemptTick(row, it) {
    if (!state.myRole) { shake(row); toast('Pick a role first'); openRoleModal(); return; }
    const secIdx = parseInt(row.dataset.sectionIdx, 10);
    if (!isNaN(secIdx) && isSectionLocked(secIdx)) {
      shake(row);
      const prevTitle = findFirstIncompletePrevTitle(secIdx);
      toast(prevTitle ? 'Finish "' + prevTitle + '" first' : 'Locked');
      return;
    }
    const allowed = (it.actor === state.myRole) || (it.actor === 'CM');
    if (!allowed) { shake(row); toast(it.actor + ' only'); return; }
    if (state.role === 'host') {
      if (state.ticked.has(it.id)) state.ticked.delete(it.id);
      else state.ticked.add(it.id);
      broadcastState();
    } else {
      const conn = state.conns[0];
      if (conn) send(conn, { type: 'tick', id: it.id, actor: it.actor });
    }
  }

  // ---- section locking ----
  function sectionComplete(idx) {
    const ids = sectionItemIds[idx] || [];
    if (!ids.length) return true;
    return ids.every(id => state.ticked.has(id));
  }
  function findFirstIncompletePrevTitle(idx) {
    for (let i=0; i<idx; i++) {
      if (!sectionComplete(i)) return state.checklist.sections[i].title;
    }
    return null;
  }
  function isSectionLocked(idx) {
    for (let i=0; i<idx; i++) {
      if (!sectionComplete(i)) return true;
    }
    return false;
  }
  function updateSectionLocks() {
    document.querySelectorAll('.pill').forEach(pill => {
      const idx = parseInt(pill.dataset.idx, 10);
      const done = sectionComplete(idx);
      const locked = isSectionLocked(idx);
      pill.classList.toggle('done', done && !locked);
      pill.classList.toggle('locked', locked);
    });
    document.querySelectorAll('.row').forEach(row => {
      const idx = parseInt(row.dataset.sectionIdx, 10);
      row.classList.toggle('locked', isSectionLocked(idx));
    });
  }

  // ---- pills ----
  function onPillClick(pill, idx) {
    if (pill.classList.contains('locked')) {
      const prev = findFirstIncompletePrevTitle(idx);
      toast(prev ? 'Finish "' + prev + '" first' : 'Locked');
      pill.classList.remove('shake'); void pill.offsetWidth; pill.classList.add('shake');
      return;
    }
    document.querySelectorAll('section[data-sec-idx="' + idx + '"]').forEach(secEl => {
      const scroller = secEl.closest('.pane-scroll');
      if (scroller) {
        const top = secEl.offsetTop - 4;
        scroller.scrollTo({ top, behavior: 'smooth' });
      } else {
        window.scrollTo({
          top: secEl.getBoundingClientRect().top + window.scrollY - 100,
          behavior: 'smooth',
        });
      }
    });
  }

  let scrollTimer;
  function highlightActivePill(scroller) {
    if (!state.checklist) return;
    let activeIdx = 0;
    const sections = scroller
      ? scroller.querySelectorAll('section[data-sec-idx]')
      : document.querySelectorAll('#checklist-root > section[data-sec-idx]');
    for (const el of sections) {
      const rect = el.getBoundingClientRect();
      const ref = scroller ? scroller.getBoundingClientRect().top : 100;
      if (rect.top - ref - 10 <= 0) activeIdx = parseInt(el.dataset.secIdx, 10);
    }
    document.querySelectorAll('.pill').forEach(p => {
      p.classList.toggle('active', parseInt(p.dataset.idx, 10) === activeIdx);
    });
  }

  // ---- role modal ----
  function openRoleModal() {
    $('role-modal').hidden = false;
    $('role-modal-inner').className = 'modal' + (state.checklist.pilots === 1 ? ' pilots-1' : '');
    $('name-input').value = state.myName || '';
    drawRoleOptions();
    setTimeout(() => $('name-input').focus(), 50);
  }
  function closeRoleModal() { $('role-modal').hidden = true; }

  function drawRoleOptions() {
    const opts = $('role-options');
    opts.innerHTML = '';
    const roles = state.checklist.pilots === 1 ? ['PILOT'] : ['PF','PM'];
    roles.forEach(role => {
      const holderKey = state.roles[role];
      const holder = holderKey && state.members[holderKey] ? state.members[holderKey].name : null;
      const isMine = state.myRole === role;
      const taken = holderKey && holderKey !== state.myKey;
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'role-btn' + (isMine ? ' mine' : '') + (taken ? ' taken' : '');
      if (taken) b.disabled = true;
      b.innerHTML =
        '<span class="role-name">' + role + (role === 'PF' ? ' — Pilot Flying' : (role === 'PM' ? ' — Pilot Monitoring' : '')) + '</span>' +
        '<span class="role-holder">' +
          (isMine ? 'You' :
            (taken ? 'Taken by ' + escapeHTML(holder) :
              'Available'))
        + '</span>';
      if (!taken) {
        b.addEventListener('click', () => {
          const name = ($('name-input').value || '').trim().slice(0, 24);
          if (!name) { toast('Name is required'); $('name-input').focus(); return; }
          state.myName = name;
          if (state.role === 'host') {
            const ok = claimRole(state.myKey, name, role);
            if (!ok) { toast(role + ' is taken'); return; }
            broadcastState();
          } else {
            const conn = state.conns[0];
            if (conn) send(conn, { type: 'claim_role', name, role });
          }
          closeRoleModal();
        });
      }
      opts.appendChild(b);
    });
  }

  function renderRoleBadge() {
    const b = $('role-badge');
    b.textContent = state.myRole
      ? state.myRole + ' · ' + (state.myName || 'You')
      : 'No role';
    b.className = 'role-badge' + (state.myRole ? ' role-' + state.myRole : '');
  }

  // ---- pane headers ----
  function renderPaneHeaders() {
    if (!state.checklist || state.checklist.pilots !== 2) return;
    document.querySelectorAll('.pane-name').forEach(el => {
      const role = el.dataset.role;
      const holderKey = state.roles[role];
      const name = holderKey && state.members[holderKey] ? state.members[holderKey].name : null;
      if (name) { el.textContent = name; el.classList.remove('empty'); }
      else { el.textContent = 'available'; el.classList.add('empty'); }
    });
  }

  // ---- flight number ----
  function renderFlightNumber() {
    const f = $('flight-number');
    const v = (state.flightNumber || '').toString();
    if (!v) {
      f.innerHTML = '';
      f.textContent = '+ Flight #';
      f.classList.add('empty');
      applyAirlineBrandColor(null);
      return;
    }
    f.classList.remove('empty');
    const parsed = parseCallsign(v);
    applyAirlineBrandColor(parsed && parsed.prefix);
    f.innerHTML = '';
    const code = document.createElement('span');
    code.textContent = parsed ? parsed.display : v;
    f.appendChild(code);
    if (parsed && parsed.name) {
      const nm = document.createElement('span');
      nm.className = 'callsign-name';
      nm.textContent = '— ' + parsed.name;
      f.appendChild(nm);
    }
  }

  function editFlightNumber() {
    const cur = state.flightNumber || '';
    const next = prompt('Flight number / callsign (e.g. AAL322):', cur);
    if (next === null) return;
    const trimmed = String(next).trim().toUpperCase().slice(0, 16);
    state.flightNumber = trimmed;
    renderFlightNumber();
    if (state.role === 'host') broadcastState();
    else {
      const conn = state.conns[0];
      if (conn) send(conn, { type: 'set_flight', flightNumber: trimmed });
    }
  }

  // ---- helpers ----
  function actorClass(a) {
    switch (a) { case 'PF': return 'pf'; case 'PM': return 'pm';
      case 'PILOT': return 'pilot'; default: return 'cm'; }
  }
  function escapeHTML(s) {
    return String(s || '').replace(/[&<>"']/g, c => (
      { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]
    ));
  }
  let toastTimer;
  function toast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1400);
  }
  function shake(el) {
    el.classList.remove('shake');
    void el.offsetWidth;
    el.classList.add('shake');
  }
  function setConn(status, label) {
    const c = $('conn-indicator');
    c.className = 'conn-indicator ' + status;
    c.textContent = label;
  }

  // ---- topbar buttons ----
  $('btn-home').addEventListener('click', () => {
    if (!confirm('Leave this room and go back to the start screen?')) return;
    teardown();
    show('home');
  });
  $('flight-number').addEventListener('click', editFlightNumber);
  $('btn-change-role').addEventListener('click', openRoleModal);
  $('btn-reset').addEventListener('click', () => {
    if (!confirm('Reset all ticks for this room?')) return;
    if (state.role === 'host') {
      state.ticked.clear();
      broadcastState();
    } else {
      const conn = state.conns[0];
      if (conn) send(conn, { type: 'reset' });
    }
  });
  $('role-modal').addEventListener('click', (e) => {
    if (e.target === $('role-modal') && state.myRole) closeRoleModal();
  });

  // ---- connect screen buttons ----
  $('btn-copy-code').addEventListener('click', () => {
    if (!state.code) return;
    navigator.clipboard && navigator.clipboard.writeText(state.code).then(
      () => toast('Code copied'),
      () => toast('Copy failed')
    );
  });
  $('btn-cancel').addEventListener('click', () => { teardown(); show('home'); });
  $('btn-retry').addEventListener('click', () => {
    if (!state.code) return;
    $('btn-retry').classList.add('hidden');
    $('connect-spinner').classList.remove('hidden');
    $('connect-eyebrow').textContent = state.role === 'host' ? 'Room code' : 'Joining';
    $('connect-sub').textContent = state.role === 'host'
      ? 'Send this code to your co-pilot.'
      : 'Reaching out to the host browser…';
    try { if (state.peer) state.peer.destroy(); } catch(e){}
    state.peer = null;
    state.conns = [];
    if (state.role === 'host') {
      createPeerWithRetry(peerIdFor(state.code), true);
    } else {
      joinRoom(state.code);
    }
  });

  function teardown() {
    state.conns.forEach(c => { try { c.close(); } catch(e){} });
    if (state.peer) { try { state.peer.destroy(); } catch(e){} }
    state.peer = null;
    state.conns = [];
    state.code = null;
    state.slug = null;
    state.checklist = null;
    state.myKey = null;
    state.myRole = null;
    state.members = {};
    state.roles = {};
    state.ticked = new Set();
    state.flightNumber = '';
    state.pendingAircraft = null;
    setAircraftTheme(null);
    applyAirlineBrandColor(null);
  }

  // ---- theme handling (light / dark, persisted) ----
  const THEME_KEY = 'cockpit-checklist-theme';
  function applyStoredTheme() {
    try {
      if (localStorage.getItem(THEME_KEY) === 'light') document.body.classList.add('light');
    } catch (e) {}
    updateThemeIcons();
  }
  function toggleTheme() {
    document.body.classList.toggle('light');
    try {
      localStorage.setItem(THEME_KEY,
        document.body.classList.contains('light') ? 'light' : 'dark');
    } catch (e) {}
    updateThemeIcons();
  }
  function updateThemeIcons() {
    const isLight = document.body.classList.contains('light');
    const icon = isLight ? '☀️' : '🌙';
    const a = $('btn-theme'); if (a) a.textContent = icon;
    const b = $('btn-theme-room'); if (b) b.textContent = icon;
  }
  function setAircraftTheme(themeName) {
    document.body.classList.remove('theme-a320', 'theme-a330', 'theme-a380', 'theme-b737', 'theme-b777');
    if (themeName) document.body.classList.add('theme-' + themeName);
  }

  // ---- Wake Lock — try to keep the screen on while in a room so the
  //       browser doesn't suspend the tab and drop the WebSocket. ------
  let wakeLock = null;
  async function acquireWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => { wakeLock = null; });
      }
    } catch (e) { /* user denied or unsupported */ }
  }
  function releaseWakeLock() {
    if (wakeLock) { try { wakeLock.release(); } catch(e){} wakeLock = null; }
  }

  // ---- Auto-reconnect when the tab returns to foreground / network ----
  function tryReconnect() {
    if (!state.code) return;
    // Host: re-establish broker registration with the same room code
    if (state.role === 'host') {
      if (state.peer && state.peer.disconnected && !state.peer.destroyed) {
        try { state.peer.reconnect(); } catch (e) {}
        setConn('reconnecting', 'Reconnecting…');
      } else if (!state.peer || state.peer.destroyed) {
        try { if (state.peer) state.peer.destroy(); } catch(e){}
        state.peer = null;
        createPeerWithRetry(peerIdFor(state.code), true);
        setConn('reconnecting', 'Reconnecting…');
      }
      acquireWakeLock();
    }
    // Guest: if our data connection is dead, redial through the broker
    if (state.role === 'guest') {
      const stale = state.conns.length === 0
        || (state.peer && state.peer.destroyed)
        || (state.peer && state.peer.disconnected);
      if (stale) {
        try { state.conns.forEach(c => c.close()); } catch(e){}
        state.conns = [];
        try { if (state.peer) state.peer.destroy(); } catch(e){}
        state.peer = null;
        joinRoomSilent(state.code);
      }
    }
  }

  // A "silent" rejoin that doesn't kick the user back to a different
  // screen — used by the auto-reconnect path.
  function joinRoomSilent(code) {
    setConn('reconnecting', 'Reconnecting…');
    const peer = new Peer(undefined, PEER_OPTS);
    state.peer = peer;
    peer.on('open', () => {
      state.myKey = peer.id;
      const conn = peer.connect(peerIdFor(code), { reliable: true });
      wireConnection(conn, true);
    });
    peer.on('error', () => {
      setConn('disconnected', 'Could not reconnect');
    });
  }

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      setTimeout(tryReconnect, 400);
      if (state.role === 'host') acquireWakeLock();
    }
  });
  window.addEventListener('focus', () => setTimeout(tryReconnect, 200));
  window.addEventListener('online', tryReconnect);

  // ---- bulk "mark all done" override per block ----
  function markSectionComplete(idx) {
    if (!state.myRole) { toast('Pick a role first'); openRoleModal(); return; }
    if (isSectionLocked(idx)) {
      const prev = findFirstIncompletePrevTitle(idx);
      toast(prev ? 'Finish "' + prev + '" first' : 'Locked');
      return;
    }
    const sec = state.checklist.sections[idx];
    if (!sec) return;
    const ids = [], actors = [];
    function gather(items) {
      for (const it of (items || [])) {
        if (it.actor === '_NOTE_' || it.actor === '_BULLET_') continue;
        if (!it.id) continue;
        if (it.actor !== state.myRole && it.actor !== 'CM') continue;
        if (state.ticked.has(it.id)) continue;
        ids.push(it.id);
        actors.push(it.actor);
      }
    }
    for (const g of (sec.groups || [])) {
      gather(g.items);
      for (const sg of (g.subgroups || [])) gather(sg.items);
    }
    if (!ids.length) { toast('Nothing left to tick'); return; }
    if (state.role === 'host') {
      ids.forEach(id => state.ticked.add(id));
      broadcastState();
    } else {
      const conn = state.conns[0];
      if (conn) send(conn, { type: 'tick_batch', ids, actors });
    }
  }

  // ---- theme toggle buttons ----
  const btnTheme = $('btn-theme');
  if (btnTheme) btnTheme.addEventListener('click', toggleTheme);
  const btnThemeRoom = $('btn-theme-room');
  if (btnThemeRoom) btnThemeRoom.addEventListener('click', toggleTheme);

  // ---- boot ----
  ['version-tag-home', 'version-tag-room'].forEach(id => {
    const el = $(id); if (el) el.textContent = APP_VERSION;
  });
  applyStoredTheme();
  show('home');
})();
</script>
</body>
</html>
