action":"SET TAKEOFF POSITION","id":"s5_g0_sg6_i208"},{"actor":"PILOT","item":"FLAPS","action":"VERIFY POSITION","id":"s5_g0_sg6_i209"},{"actor":"_NOTE_","item":"If taxiing in icing condition, delay the flaps extension until the runway holding point. This prevents contamination in the mechanism.","action":""}]},{"heading":"Pitch Trim","level":2,"items":[{"actor":"PILOT","item":"PITCH TRIM handwheel","action":"SET","id":"s5_g0_sg7_i210"},{"actor":"_NOTE_","item":"Verify that the pitch trim is set to the takeoff trim position.","action":""}]},{"heading":"ECAM Status","level":2,"items":[{"actor":"PILOT","item":"STATUS REMINDER","action":"VERIFY NOT DISPLAYED","id":"s5_g0_sg8_i211"},{"actor":"_BULLET_","item":"If STS reminder is displayed:","action":""},{"actor":"PILOT","item":"STS pushbutton","action":"PRESS","id":"s5_g0_sg8_i212"}]},{"heading":"N/W STEER DISC Memo","level":2,"items":[{"actor":"PILOT","item":"N/W STEER DISC MEMO","action":"VERIFY NOT DISPLAYED","id":"s5_g0_sg9_i213"}]},{"heading":"Ground Crew","level":2,"items":[{"actor":"_NOTE_","item":"When the clearance to disconnect is given, the ground crew should remove the chocks, remove the tow pin, disconnect the interphone and make a hand signal on one side of the aircraft.","action":""}]},{"heading":"After Start Checklist","level":2,"items":[{"actor":"PILOT","item":"AFTER START Checklist","action":"COMPLETE","id":"s5_g0_sg11_i214"}]}]}]},{"title":"Taxi","groups":[{"heading":"Taxi","level":1,"items":[],"subgroups":[{"heading":"Taxi Clearance","level":2,"items":[{"actor":"PILOT","item":"TAXI clearance","action":"OBTAIN","id":"s6_g0_sg0_i215"}]},{"heading":"Exterior Lights","level":2,"items":[{"actor":"PILOT","item":"NOSE switch","action":"TAXI","id":"s6_g0_sg1_i216"},{"actor":"PILOT","item":"RWY TURN OFF switch","action":"ON","id":"s6_g0_sg1_i217"},{"actor":"_BULLET_","item":"When crossing a runway:","action":""},{"actor":"PILOT","item":"STROBE switch","action":"ON","id":"s6_g0_sg1_i218"}]},{"heading":"Parking Brakes","level":2,"items":[{"actor":"PILOT","item":"PARK BRK handle","action":"OFF","id":"s6_g0_sg2_i219"},{"actor":"PILOT","item":"BRAKES PRESSURE","action":"VERIFY AT ZERO","id":"s6_g0_sg2_i220"}]},{"heading":"Thrust Lever","level":2,"items":[{"actor":"PILOT","item":"THRUST lever","action":"AS REQUIRED","id":"s6_g0_sg3_i221"}]},{"heading":"Brakes","level":2,"items":[{"actor":"PILOT","item":"BRAKE PEDALS","action":"PRESS","id":"s6_g0_sg4_i222"},{"actor":"PILOT","item":"BRAKES","action":"VERIFY","id":"s6_g0_sg4_i223"},{"actor":"_NOTE_","item":"The flight crew should monitor the WHEEL SD page on the ECAM display. If an arc is displayed above the brake temperature, it is recommended to set the brake fans to ON.","action":""}]},{"heading":"Nosewheel Steering","level":2,"items":[{"actor":"PILOT","item":"TILLER or RUDDER PEDALS","action":"USE AS REQUIRED","id":"s6_g0_sg5_i224"}]},{"heading":"Flight Controls","level":2,"items":[{"actor":"PILOT","item":"FLIGHT CONTROLS","action":"VERIFY","id":"s6_g0_sg6_i225"}]},{"heading":"ATC Clearance","level":2,"items":[{"actor":"PILOT","item":"ATC Clearance","action":"CONFIRM","id":"s6_g0_sg7_i226"}]},{"heading":"Takeoff Data/Conditions","level":2,"items":[{"actor":"_BULLET_","item":"If takeoff conditions have changed:","action":""},{"actor":"PILOT","item":"FINAL TAKEOFF PERF DATA","action":"RECOMPUTE","id":"s6_g0_sg8_i227"},{"actor":"_NOTE_","item":"The flight crew should independently compute the takeoff performance data again.","action":""},{"actor":"PILOT","item":"FMS TAKEOFF DATA","action":"REVISE","id":"s6_g0_sg8_i228"},{"actor":"_NOTE_","item":"The flight crew should revise the takeoff data in the FMS. It is recommended to pay attention to the changes at the slats/flaps configuration at takeoff.","action":""},{"actor":"PILOT","item":"FMS REVISED TAKEOFF PERF DATA","action":"CROSSCHECK","id":"s6_g0_sg8_i229"},{"actor":"PILOT","item":"FLAPS lever","action":"AS APPROPRIATE","id":"s6_g0_sg8_i230"}]},{"heading":"AFS / Flight Instruments","level":2,"items":[{"actor":"PILOT","item":"F-PLN (SID, TRANS)","action":"REVISE or VERIFY","id":"s6_g0_sg9_i231"},{"actor":"_NOTE_","item":"Ensure that the ATC clearance is the same as the inserted flight plan in the FMS.","action":""},{"actor":"PILOT","item":"INITIAL CLIMB SPEED AND SPEED LIMIT","action":"MODIFY or VERIFY","id":"s6_g0_sg9_i232"},{"actor":"_NOTE_","item":"It is recommended to use VERT REV at departure, or at a CLB waypoint.","action":""},{"actor":"PILOT","item":"CLEARED ALTITUDE ON FCU","action":"SET","id":"s6_g0_sg9_i233"},{"actor":"PILOT","item":"HDG ON FCU","action":"PRESET","id":"s6_g0_sg9_i234"},{"actor":"_NOTE_","item":"Preset the heading if the air traffic control requires a radar vector departure. However, please note that the RWY TRK mode maintains the aircraft on the runway heading until the heading mode engages.","action":""},{"actor":"PILOT","item":"BOTH FD","action":"VERIFY ON","id":"s6_g0_sg9_i235"},{"actor":"PILOT","item":"PFD/ND","action":"VERIFY","id":"s6_g0_sg9_i236"},{"actor":"PILOT","item":"RADAR","action":"ON","id":"s6_g0_sg9_i237"},{"actor":"_NOTE_","item":"It is recommended to set the MULTISCAN switch to MAN. This allows the flight crew to verify the radar and the departure path. The flight crew can then set the radar to the AUTO position.","action":""},{"actor":"PILOT","item":"PREDICTIVE WINDSHEAR SYSTEM","action":"AUTO","id":"s6_g0_sg9_i238"}]},{"heading":"ATC","level":2,"items":[{"actor":"PILOT","item":"ATC code/mode","action":"CONFIRM & SET FOR TAKEOFF","id":"s6_g0_sg10_i239"}]},{"heading":"Terrain Radar","level":2,"items":[{"actor":"PILOT","item":"TERR ON ND","action":"AS REQUIRED","id":"s6_g0_sg11_i240"},{"actor":"_NOTE_","item":"It is recommended to set the weather radar display on the PF side, and the terrain radar on the PM side.","action":""}]},{"heading":"Autobrakes","level":2,"items":[{"actor":"PILOT","item":"AUTO BRK MAX pushbutton","action":"ON","id":"s6_g0_sg12_i241"}]},{"heading":"Final Verification","level":2,"items":[{"actor":"PILOT","item":"T.O CONFIG pushbutton","action":"TEST","id":"s6_g0_sg13_i242"},{"actor":"_NOTE_","item":"Ensure that the upper ECAM display shows the message \u201cT.O CONFIG NORMAL\u201d.","action":""},{"actor":"PILOT","item":"T.O MEMO","action":"VERIFY NO BLUE","id":"s6_g0_sg13_i243"},{"actor":"PILOT","item":"CABIN REPORT","action":"RECEIVE","id":"s6_g0_sg13_i244"},{"actor":"_NOTE_","item":"Verify on the engine warning display the display of the message \u201cCABIN READY\u201d or obtain the report from the chief flight attendant \u201cCabin ready for takeoff\u201d.","action":""}]},{"heading":"Before Takeoff Checklist","level":2,"items":[{"actor":"PILOT","item":"BEFORE TAKEOFF CHECKLIST down to the line","action":"COMPLETE","id":"s6_g0_sg14_i245"}]}]}]},{"title":"Before Takeoff","groups":[{"heading":"Before Takeoff","level":1,"items":[],"subgroups":[{"heading":"Brake Fans","level":2,"items":[{"actor":"_BULLET_","item":"If the brake fans are currently running:","action":""},{"actor":"PILOT","item":"BRAKE TEMPERATURE","action":"VERIFY","id":"s7_g0_sg0_i246"},{"actor":"_NOTE_","item":"If the brake temperature is below 150\u00b0C, the flight crew can select the brake fans OFF. If the brake temperature is above 150\u00b0C, it is recommended to delay the takeoff.","action":""}]},{"heading":"Line-Up Clearance","level":2,"items":[{"actor":"PILOT","item":"LINE-UP CLEARANCE","action":"OBTAIN","id":"s7_g0_sg1_i247"}]},{"heading":"Exterior Lights","level":2,"items":[{"actor":"PILOT","item":"STROBE switch","action":"ON","id":"s7_g0_sg2_i248"},{"actor":"_NOTE_","item":"The flight crew can turn off the strobe lights if it causes any visual trouble.","action":""}]},{"heading":"TCAS","level":2,"items":[{"actor":"PILOT","item":"TCAS mode selector","action":"TA or TA/RA","id":"s7_g0_sg3_i249"},{"actor":"_NOTE_","item":"It is recommended to use TA/RA for normal situations. If it is inappropriate, such as converging runways or parallel runways, the use of TA ONLY mode is recommended.","action":""}]},{"heading":"Approach Path","level":2,"items":[{"actor":"PILOT","item":"APPROACH PATH","action":"CLEARED OF TRAFFIC","id":"s7_g0_sg4_i250"},{"actor":"_NOTE_","item":"Ensure there is no traffic incoming, both from visual confirmation and using the TCAS display on the ND.","action":""}]},{"heading":"Sliding Table / EFB","level":2,"items":[{"actor":"PILOT","item":"SLIDING TABLE","action":"STOW","id":"s7_g0_sg5_i251"},{"actor":"PILOT","item":"ALL EFB transmitting mode","action":"AS REQUIRED","id":"s7_g0_sg5_i252"},{"actor":"PILOT","item":"TAKEOFF RUNWAY","action":"CONFIRM","id":"s7_g0_sg5_i253"},{"actor":"PILOT","item":"PACK 1 and 2","action":"AS REQUIRED","id":"s7_g0_sg5_i254"},{"actor":"_NOTE_","item":"It is recommended to select the packs OFF or put the APU bleed ON. This should improve performance when using TOGA thrust. Furthermore, it can reduce maintenance cost due to the takeoff EGT reduction. However, if the wing anti-ice is used, it is not recommended to use the APU bleed.","action":""},{"actor":"PILOT","item":"BEFORE TAKEOFF CHECKLIST below the line","action":"COMPLETE","id":"s7_g0_sg5_i255"}]}]}]},{"title":"Takeoff","groups":[{"heading":"Takeoff","level":1,"items":[],"subgroups":[{"heading":"Takeoff Clearance","level":2,"items":[{"actor":"PILOT","item":"TAKEOFF CLEARANCE","action":"OBTAINED","id":"s8_g0_sg0_i256"}]},{"heading":"Exterior Lights","level":2,"items":[{"actor":"PILOT","item":"NOSE switch","action":"T.O","id":"s8_g0_sg1_i257"},{"actor":"PILOT","item":"RWY TURN OFF switch","action":"ON","id":"s8_g0_sg1_i258"},{"actor":"PILOT","item":"LAND LIGHTS switch","action":"ON","id":"s8_g0_sg1_i259"}]},{"heading":"Thrust Setting","level":2,"items":[{"actor":"PILOT","item":"TAKEOFF","action":"VERIFY","id":"s8_g0_sg2_i260"},{"actor":"PILOT","item":"THRUST LEVERS","action":"50% N1","id":"s8_g0_sg2_i261"},{"actor":"_BULLET_","item":"If the crosswind is at or below 20 knots and there is no tailwind:","action":""},{"actor":"_NOTE_","item":"It is recommended to apply half forward sidestick until the aircraft reaches the airspeed of 80 knots to counter the nose-up effect. At 80 knots, release the sidestick gradually. The sidestick must be neutral at 100 knots.","action":""},{"actor":"PILOT","item":"BRAKES","action":"RELEASE","id":"s8_g0_sg2_i262"},{"actor":"PILOT","item":"THRUST LEVERS","action":"FLX or TOGA","id":"s8_g0_sg2_i263"},{"actor":"_BULLET_","item":"If the crosswind is greater than 20 knots, or there is tailwind:","action":""},{"actor":"_NOTE_","item":"It is recommended to apply full forward sidestick until the aircraft reaches the airspeed of 80 knots. At 80 knots, release the sidestick gradually. The sidestick must be neutral at 100 knots.","action":""},{"actor":"PILOT","item":"BRAKES","action":"RELEASE","id":"s8_g0_sg2_i264"},{"actor":"PILOT","item":"THRUST LEVERS","action":"FLX or TOGA","id":"s8_g0_sg2_i265"},{"actor":"_NOTE_","item":"Note: Expect the ENG SD page to replace the WHEEL SD page on the lower ECAM display.","action":""},{"actor":"PILOT","item":"DIRECTIONAL CONTROL","action":"RUDDER","id":"s8_g0_sg2_i266"},{"actor":"_NOTE_","item":"Once the wheel reaches 130 knots, there is an automatic disconnection between the nosewheel steering and the rudder pedals.","action":""},{"actor":"PILOT","item":"CHRONO","action":"START","id":"s8_g0_sg2_i267"},{"actor":"PILOT","item":"PFD/ND","action":"MONITOR","id":"s8_g0_sg2_i268"},{"actor":"_NOTE_","item":"Ensure that either of the following modes are displayed on the FMA: MAN TOGA (or MAN FLX xx) / SRS / RWY / A/THR / Blank. Also, verify the FMS position on the ND.","action":""},{"actor":"PILOT","item":"FMA","action":"VERIFY","id":"s8_g0_sg2_i269"}]},{"heading":"Below 80 Knots","level":2,"items":[{"actor":"PILOT","item":"TAKEOFF N1","action":"VERIFY","id":"s8_g0_sg3_i270"},{"actor":"_NOTE_","item":"Ensure that the actual N1 of each engine has reached the N1 rating limit before the aircraft reaches the airspeed of 80 knots.","action":""},{"actor":"PILOT","item":"THRUST SET","action":"VERIFY","id":"s8_g0_sg3_i271"},{"actor":"PILOT","item":"PFD/ENG indications","action":"MONITOR","id":"s8_g0_sg3_i272"}]},{"heading":"Reaching 100 Knots","level":2,"items":[{"actor":"PILOT","item":"ONE HUNDRED KNOTS","action":"VERIFY","id":"s8_g0_sg4_i273"},{"actor":"_NOTE_","item":"It is recommended to reject the takeoff under 100 knots. However, rejecting takeoff above 100 knots is a more serious case.","action":""}]},{"heading":"At V1","level":2,"items":[{"actor":"PILOT","item":"V1","action":"VERIFY","id":"s8_g0_sg5_i274"}]},{"heading":"At VR","level":2,"items":[{"actor":"PILOT","item":"ROTATION","action":"EXECUTE","id":"s8_g0_sg6_i275"},{"actor":"PILOT","item":"ROTATION","action":"PERFORM","id":"s8_g0_sg6_i276"},{"actor":"_NOTE_","item":"It is recommended to have a rotation rate of 3\u00b0/s until the aircraft is at a pitch attitude of 15\u00b0. It is recommended to minimize any lateral inputs as it can extend spoilers. After lift-off, it is recommended to follow the SRS pitch command bar.","action":""},{"actor":"_NOTE_","item":"Note: In case of an engine failure, the recommended pitch attitude is 12.5\u00b0.","action":""}]},{"heading":"When Positive Climb","level":2,"items":[{"actor":"PILOT","item":"POSITIVE CLIMB","action":"VERIFY","id":"s8_g0_sg7_i277"},{"actor":"PILOT","item":"LANDING GEAR UP","action":"EXECUTE","id":"s8_g0_sg7_i278"},{"actor":"PILOT","item":"LANDING GEAR","action":"SELECT UP","id":"s8_g0_sg7_i279"},{"actor":"PILOT","item":"AUTOPILOT","action":"AS REQUIRED","id":"s8_g0_sg7_i280"},{"actor":"_NOTE_","item":"The autopilot can be engaged above 100 feet AGL.","action":""}]},{"heading":"At Thrust Reduction Altitude","level":2,"items":[{"actor":"PILOT","item":"THRUST LEVERS","action":"CL","id":"s8_g0_sg8_i281"},{"actor":"_NOTE_","item":"On the FMA, when the message \u201cLVR CLB\u201d appears flashing, move the thrust levers to the CL detent. The autothrottle will activate.","action":""},{"actor":"PILOT","item":"PACK 1 & 2","action":"ON","id":"s8_g0_sg8_i282"},{"actor":"_NOTE_","item":"It is recommended to select PACK 2 at least 10 seconds after PACK 1 has been selected. This is for passenger comfort.","action":""}]},{"heading":"At Acceleration Altitude","level":2,"items":[{"actor":"PILOT","item":"TARGET SPEED","action":"MODIFIED","id":"s8_g0_sg9_i283"},{"actor":"_NOTE_","item":"Ensure that the speed target changes from V2 +10 to the first CLB speed.","action":""}]},{"heading":"Above Acceleration Altitude / Climb Phase","level":2,"items":[{"actor":"_BULLET_","item":"At F speed (the F speed will only appear if the aircraft is in a higher configuration than 1+F):","action":""},{"actor":"PILOT","item":"FLAPS 1","action":"EXECUTE","id":"s8_g0_sg10_i284"},{"actor":"PILOT","item":"FLAPS 1","action":"SELECT","id":"s8_g0_sg10_i285"},{"actor":"_BULLET_","item":"At S speed:","action":""},{"actor":"PILOT","item":"FLAPS 0","action":"EXECUTE","id":"s8_g0_sg10_i286"},{"actor":"PILOT","item":"FLAPS 0","action":"SELECT","id":"s8_g0_sg10_i287"},{"actor":"PILOT","item":"GND SPLRS","action":"DISARM","id":"s8_g0_sg10_i288"},{"actor":"PILOT","item":"NOSE switch","action":"OFF","id":"s8_g0_sg10_i289"},{"actor":"PILOT","item":"RWY TURN OFF switch","action":"OFF","id":"s8_g0_sg10_i290"},{"actor":"PILOT","item":"EXTERIOR LIGHTS","action":"AS REQUIRED","id":"s8_g0_sg10_i291"}]}]}]},{"title":"After Takeoff","groups":[{"heading":"After Takeoff","level":1,"items":[{"actor":"PILOT","item":"APU BLEED pushbutton","action":"AS REQUIRED","id":"s9_g0_i292"},{"actor":"PILOT","item":"APU MASTER pushbutton","action":"AS REQUIRED","id":"s9_g0_i293"},{"actor":"PILOT","item":"TCAS mode selector","action":"TA/RA","id":"s9_g0_i294"},{"actor":"_NOTE_","item":"If the takeoff was performed using TA only, select the TA/RA mode.","action":""},{"actor":"PILOT","item":"ENG ANTI-ICE pushbutton","action":"AS REQUIRED","id":"s9_g0_i295"},{"actor":"_NOTE_","item":"It is recommended to set the engine anti-ice to ON when flying through icing condition, or anticipated icing condition, except when the SAT is below -40\u00b0C.","action":""},{"actor":"PILOT","item":"WING ANTI-ICE pushbutton","action":"AS REQUIRED","id":"s9_g0_i296"},{"actor":"_NOTE_","item":"It is recommended to set the wing anti-ice to ON when flying through icing conditions. It prevents ice accretion on the wing leading edge.","action":""},{"actor":"PILOT","item":"AFTER TAKEOFF/CLIMB CHECKLIST down to the line","action":"COMPLETE","id":"s9_g0_i297"}]}]},{"title":"Climb","groups":[{"heading":"Climb","level":1,"items":[{"actor":"PILOT","item":"MCDU","action":"PERF CLB","id":"s10_g0_i298"},{"actor":"_NOTE_","item":"It is recommended for the PF MCDU to display the PERF CLB page. This allows the PF to monitor the aircraft when it reaches the FCU selected altitude.","action":""},{"actor":"PILOT","item":"MCDU","action":"F-PLN","id":"s10_g0_i299"},{"actor":"_NOTE_","item":"It is recommended for the PM MCDU to display the F-PLN page. This allows the PM to enter a long-term revision to the lateral or vertical flight plan.","action":""}],"subgroups":[{"heading":"Climb Speed Modifications","level":2,"items":[{"actor":"PILOT","item":"FCU SPD","action":"SELECT AND PULL","id":"s10_g0_sg0_i300"},{"actor":"_NOTE_","item":"By pulling the FCU SPD knob, the speed target is in the selected mode. To return in managed speed mode, push the FCU SPD knob.","action":""}]},{"heading":"Expedite Climb","level":2,"items":[{"actor":"_BULLET_","item":"If the ATC requires a rapid climb through a particular level:","action":""},{"actor":"PILOT","item":"EXP pushbutton","action":"PUSH","id":"s10_g0_sg1_i301"},{"actor":"_NOTE_","item":"By pushing the EXP pushbutton, the aircraft enters the expedite climb mode. To return to the ECON CLB mode, push the ALT knob.","action":""},{"actor":"PILOT","item":"BAROMETRIC REFERENCE","action":"SET STD / CROSSCHECK","id":"s10_g0_sg1_i302"},{"actor":"_NOTE_","item":"Once the aircraft reaches the transition altitude, set STD on the EFIS control panel and on the ISIS.","action":""},{"actor":"PILOT","item":"CRZ FL","action":"SET AS REQUIRED","id":"s10_g0_sg1_i303"}]},{"heading":"Checklist","level":2,"items":[{"actor":"PILOT","item":"AFTER TAKEOFF/CLIMB CHECKLIST below the line","action":"COMPLETE","id":"s10_g0_sg2_i304"},{"actor":"PILOT","item":"ENG ANTI-ICE pushbutton","action":"AS REQUIRED","id":"s10_g0_sg2_i305"},{"actor":"_NOTE_","item":"It is recommended to set the engine anti-ice to ON when icing conditions are present or are anticipated.","action":""},{"actor":"PILOT","item":"RADAR","action":"AS APPROPRIATE","id":"s10_g0_sg2_i306"}]},{"heading":"At 10 000 Feet","level":2,"items":[{"actor":"PILOT","item":"LAND LIGHTS selector","action":"RETRACT","id":"s10_g0_sg3_i307"},{"actor":"PILOT","item":"SEAT BELTS switch","action":"AS REQUIRED","id":"s10_g0_sg3_i308"},{"actor":"PILOT","item":"EFIS options","action":"AS REQUIRED","id":"s10_g0_sg3_i309"},{"actor":"_NOTE_","item":"It is recommended to select CSTR on one ND and ARPT on the other ND.","action":""},{"actor":"PILOT","item":"ECAM MEMO","action":"REVIEW","id":"s10_g0_sg3_i310"},{"actor":"PILOT","item":"NAVAIDS","action":"CLEAR","id":"s10_g0_sg3_i311"},{"actor":"_NOTE_","item":"It is recommended to clear the manually tuned VORs from the MCDU RAD NAV page.","action":""},{"actor":"PILOT","item":"SEC F-PLN page","action":"AS REQUIRED","id":"s10_g0_sg3_i312"},{"actor":"_NOTE_","item":"It is recommended to recopy the active flight plan in the secondary flight plan.","action":""},{"actor":"PILOT","item":"OPT/MAX ALT","action":"VERIFY","id":"s10_g0_sg3_i313"}]}]}]},{"title":"Cruise","groups":[{"heading":"Cruise","level":1,"items":[{"actor":"PILOT","item":"ECAM MEMO","action":"REVIEW","id":"s11_g0_i314"},{"actor":"PILOT","item":"ECAM SD PAGES","action":"REVIEW","id":"s11_g0_i315"},{"actor":"_NOTE_","item":"It is recommended to review regularly the following pages: ENG, BLEED, ELEC, HYD, FUEL, COND, FLT CTL, and DOOR.","action":""},{"actor":"PILOT","item":"FLIGHT PROGRESS","action":"VERIFY","id":"s11_g0_i316"},{"actor":"_NOTE_","item":"It is recommended to monitor the flight progress. When overflying a waypoint, verify the track and distance to the next waypoint. Each 30 minutes, verify the fuel on board from the ECAM, the fuel prediction from the FMGC, and compare the data with the flight plan. Ensure that the fuel on board and fuel consumed is consistent with the fuel on board at departure.","action":""},{"actor":"PILOT","item":"STEP FLIGHT LEVEL","action":"AS APPROPRIATE","id":"s11_g0_i317"},{"actor":"PILOT","item":"RADAR","action":"AS APPROPRIATE","id":"s11_g0_i318"},{"actor":"_BULLET_","item":"If the oxygen mask has been used:","action":""},{"actor":"PILOT","item":"OXYGEN MASK","action":"VERIFY","id":"s11_g0_i319"}]}]},{"title":"Descent Preparation","groups":[{"heading":"Descent Preparation","level":1,"items":[{"actor":"PILOT","item":"WEATHER AND LANDING INFORMATION","action":"OBTAIN","id":"s12_g0_i320"},{"actor":"_NOTE_","item":"Verify the weather reports at the destination and the alternate airport. This should include the runway in use for the arrival.","action":""},{"actor":"PILOT","item":"NAV CHARTS","action":"PREPARE","id":"s12_g0_i321"},{"actor":"PILOT","item":"LDG PERFORMANCE","action":"COMPUTE","id":"s12_g0_i322"},{"actor":"_NOTE_","item":"It is recommended to perform an in-flight landing performance calculation in case the landing conditions have changed since departure. If the landing conditions are expected to change, it is recommended to compute with the worst possible runway conditions. Furthermore, the selection of REV MAX is the standard practice for landing.","action":""},{"actor":"PILOT","item":"LDG PERFORMANCE","action":"VERIFY","id":"s12_g0_i323"},{"actor":"PILOT","item":"ARRIVAL page","action":"COMPLETE/VERIFY","id":"s12_g0_i324"},{"actor":"_NOTE_","item":"If possible, insert the APPR, STAR, APPR VIA and TRANS.","action":""},{"actor":"PILOT","item":"F-PLN A page","action":"VERIFY","id":"s12_g0_i325"},{"actor":"_NOTE_","item":"Ensure that the inserted flight plan agrees with the planned and missed approach. Ensure that they respect the restrictions from the charts. The flight crew may require adding a new speed or altitude constraint. It is not recommended to modify the final approach fix (FAF to runway or MAP). In case of a \u201cTOO STEEP PATH\u201d message appearing, do not use the FINAL APP guidance for approach.","action":""},{"actor":"PILOT","item":"DES WIND page","action":"VERIFY","id":"s12_g0_i326"},{"actor":"PILOT","item":"PERF CRUISE page","action":"VERIFY","id":"s12_g0_i327"},{"actor":"PILOT","item":"PERF DES page","action":"VERIFY","id":"s12_g0_i328"},{"actor":"_NOTE_","item":"Before starting the descent, it is recommended to access the PERF DES page and verify the ECON MACH/SPD. If any other speed is required other than the ECON speed, insert that MACH or SPD into the ECON field. This allows the system to calculate the descent path and the top of descent.","action":""},{"actor":"_NOTE_","item":"Note: The default speed limit is 250 knots below 10 000 feet. The flight crew may modify on the VERT REV at the DEST page.","action":""},{"actor":"PILOT","item":"PERF APPR page","action":"COMPLETE/VERIFY","id":"s12_g0_i329"},{"actor":"_NOTE_","item":"Insert the QNH, the temperature, the wind at destination and the minimum. It is not recommended to insert gust values.","action":""},{"actor":"_NOTE_","item":"Note: If there is a change of runway or a change in the approach type, it will automatically erase the inserted minimum.","action":""},{"actor":"PILOT","item":"PERF GO-AROUND page","action":"VERIFY/MODIFY","id":"s12_g0_i330"},{"actor":"_NOTE_","item":"Verify the thrust reduction altitude and the acceleration altitude. The flight crew may modify if necessary.","action":""},{"actor":"PILOT","item":"RAD NAV page","action":"VERIFY","id":"s12_g0_i331"},{"actor":"_NOTE_","item":"Set the navaids as required. Verify the idents on the navigation display and on the primary flight display. If a VOR/DME exists close to the airfield, it is recommended to select it and enter its ident in the BRG/DIST field of the PROG page. This allows the monitoring of NAV ACCY during descent.","action":""},{"actor":"PILOT","item":"SEC F-PLN page","action":"AS REQUIRED","id":"s12_g0_i332"},{"actor":"_NOTE_","item":"It is recommended to set the secondary flight plan to the alternate runway for destination, or to the landing runway in case of a circling approach.","action":""},{"actor":"PILOT","item":"GPWS LDG FLAP 3 pushbutton","action":"AS REQUIRED","id":"s12_g0_i333"},{"actor":"_NOTE_","item":"If the flight crew plans on landing with the FLAPS 3 configuration, the GPWS LDG FLAP 3 must be set to ON.","action":""},{"actor":"PILOT","item":"LDG ELEV","action":"VERIFY","id":"s12_g0_i334"},{"actor":"_NOTE_","item":"Ensure that the LDG ELEV AUTO displays in green on the ECAM CRUISE page and verify the associated value.","action":""},{"actor":"PILOT","item":"AUTO BRK","action":"AS REQUIRED","id":"s12_g0_i335"},{"actor":"_NOTE_","item":"It is recommended to use the autobrakes. For short or contaminated runways, the MED mode is recommended. For long runways, the LO mode is recommended. It is not recommended to use the MAX mode.","action":""},{"actor":"PILOT","item":"TERR ON ND","action":"AS REQUIRED","id":"s12_g0_i336"},{"actor":"_NOTE_","item":"It is recommended to set the weather radar to the PF side and the TERR ON ND on the PM side. It is not recommended to use the TERR ON ND if the nav accuracy is low.","action":""},{"actor":"PILOT","item":"RADAR","action":"ADJUST AS APPROPRIATE","id":"s12_g0_i337"},{"actor":"PILOT","item":"ENG ANTI-ICE pushbutton","action":"AS REQUIRED","id":"s12_g0_i338"},{"actor":"_NOTE_","item":"It is recommended to set the engine anti-ice to ON, even if the SAT is below -40\u00b0C. This ensures better protection against flame-out.","action":""},{"actor":"PILOT","item":"WING ANTI-ICE pushbutton","action":"AS REQUIRED","id":"s12_g0_i339"},{"actor":"_NOTE_","item":"Note: When turning the anti-ice on, it reduces the descent path angle. The pilot can therefore compensate by increasing the descent speed or by extending up to half speedbrakes.","action":""},{"actor":"PILOT","item":"DESCENT CLEARANCE","action":"OBTAIN","id":"s12_g0_i340"},{"actor":"PILOT","item":"CLEARED ALTITUDE ON FCU","action":"SET","id":"s12_g0_i341"},{"actor":"_NOTE_","item":"Ensure that the cleared altitude is lower than the ATC-cleared altitude.","action":""}]}]},{"title":"Descent","groups":[{"heading":"Descent Initiation","level":1,"items":[{"actor":"PILOT","item":"DESCENT","action":"INITIATE","id":"s13_g0_i342"},{"actor":"_NOTE_","item":"It is recommended to select the DES mode at the top of descent.","action":""}],"subgroups":[{"heading":"Descent Monitoring","level":2,"items":[{"actor":"PILOT","item":"MCDU","action":"PROG/PERF DES","id":"s13_g0_sg0_i343"},{"actor":"_NOTE_","item":"It is recommended for the PF to display the PROG page to get the VDEV or RQD DIST TO LAND/DIRECT DIST TO LAND information. The PF can also select the PERF DES page to get predictions to any inserted altitude in the DES/OP DES and EXP mode.","action":""},{"actor":"PILOT","item":"MCDU","action":"F-PLN","id":"s13_g0_sg0_i344"},{"actor":"PILOT","item":"DESCENT","action":"MONITOR/ADJUST","id":"s13_g0_sg0_i345"},{"actor":"_NOTE_","item":"It is recommended to use the DES mode when flying in the NAV mode. This allows the aircraft to descend along the descent flight path, considering all constraints.","action":""},{"actor":"_NOTE_","item":"Note: When the aircraft is flying in HDG or TRK mode, the DES mode is not available.","action":""}]},{"heading":"Descent Adjustment","level":2,"items":[{"actor":"_NOTE_","item":"To increase the rate of descent, it is recommended to increase the descent speed using selected speed. It allows better fuel economy than other techniques.","action":""},{"actor":"PILOT","item":"BAROMETRIC REFERENCE","action":"SET","id":"s13_g0_sg1_i346"},{"actor":"_NOTE_","item":"Set the QNH on the EFIS control panel and on the ISIS at the transition altitude.","action":""},{"actor":"PILOT","item":"ECAM STATUS","action":"VERIFY","id":"s13_g0_sg1_i347"},{"actor":"_NOTE_","item":"Ensure that there is no status reminder on the upper ECAM display. Note any degradation in landing capability or affecting approach and landing.","action":""}]},{"heading":"At 10 000 Feet","level":2,"items":[{"actor":"PILOT","item":"LAND lights","action":"SET","id":"s13_g0_sg2_i348"},{"actor":"PILOT","item":"SEAT BELTS switch","action":"ON","id":"s13_g0_sg2_i349"},{"actor":"PILOT","item":"EFIS options","action":"CSTR","id":"s13_g0_sg2_i350"},{"actor":"_NOTE_","item":"It is recommended to select CSTR on both sides.","action":""},{"actor":"PILOT","item":"ILS/LS pushbutton","action":"AS REQUIRED","id":"s13_g0_sg2_i351"},{"actor":"_NOTE_","item":"It is recommended to turn on the ILS/LS if an ILS, GLS, MLS, ILS G/S out, LOC only, LOC/BC or FLS approaches. The flight crew must ensure that the deviation scales and IDENT are displayed on the PFD.","action":""},{"actor":"PILOT","item":"RAD NAVAIDS","action":"SELECTED/IDENTIFIED","id":"s13_g0_sg2_i352"},{"actor":"_NOTE_","item":"The flight crew must ensure that the appropriate NAVAIDS are tuned and identified.","action":""},{"actor":"PILOT","item":"NAV ACCURACY","action":"VERIFY","id":"s13_g0_sg2_i353"},{"actor":"_NOTE_","item":"If the GPS PRIMARY function is available, there is no accuracy check required.","action":""}]},{"heading":"Approach Checklist","level":2,"items":[{"actor":"PILOT","item":"APPROACH CHECKLIST","action":"PERFORM","id":"s13_g0_sg3_i354"}]}]}]},{"title":"Approach \u2013 General","groups":[{"heading":"Guidance Mode per Approach Type","level":1,"items":[]},{"heading":"Initial Approach \u2013 General","level":1,"items":[{"actor":"PILOT","item":"F-PLN SEQUENCING","action":"ADJUST","id":"s14_g1_i355"},{"actor":"_NOTE_","item":"The NAV mode will be automatically available after go-around if the flight plan is properly sequenced. If flying in nav mode, the F-PLN will sequence automatically. In HDG/TRK mode, the F-PLN will only sequence automatically if flying close to the F-PLN route.","action":""},{"actor":"PILOT","item":"APPROACH PHASE","action":"VERIFY/ACTIVATE","id":"s14_g1_i356"},{"actor":"_NOTE_","item":"If flying in NAV mode, the approach phase will automatically activate itself if the aircraft overlies the DECEL pseudo waypoint. If flying in HDG/TRK mode, it is recommended to activate the approach phase 15 NM from touchdown.","action":""},{"actor":"PILOT","item":"MANAGED SPEED","action":"VERIFY","id":"s14_g1_i357"},{"actor":"_NOTE_","item":"It is recommended to remain in managed speed mode. If, for any reasons, the ATC requires a different speed, use the selected speed mode.","action":""},{"actor":"PILOT","item":"FLIGHT PATH","action":"MONITOR","id":"s14_g1_i358"},{"actor":"_NOTE_","item":"If flying in NAV mode, it is recommended to use the VDEV information on the PFD and PROG MCDU page. If flying in HDG/TRK mode, it is recommended to use the energy circle on the ND.","action":""},{"actor":"PILOT","item":"SPEED BRAKES lever","action":"AS REQUIRED","id":"s14_g1_i359"},{"actor":"_NOTE_","item":"It is recommended to avoid the use of the speed brakes. In the case of the use of the speedbrakes, the flight crew should ensure that there is an appropriate speed margin before the extension of the speed brakes. The flight crew should also ensure that there is an appropriate speed margin before the beginning of a turn. This is to ensure that the Alpha-Floor protection doesn\u2019t activate.","action":""},{"actor":"PILOT","item":"RADAR","action":"ADJUST AS APPROPRIATE","id":"s14_g1_i360"},{"actor":"PILOT","item":"NAV ACCURACY","action":"MONITOR","id":"s14_g1_i361"},{"actor":"_NOTE_","item":"If the GPS PRIMARY function is available, there is no accuracy check required.","action":""}]},{"heading":"Intermediate / Final Approach \u2013 General","level":1,"items":[],"subgroups":[{"heading":"At Green Dot Speed","level":2,"items":[{"actor":"PILOT","item":"FLAPS 1","action":"EXECUTE","id":"s14_g2_sg0_i362"},{"actor":"PILOT","item":"FLAPS 1","action":"SELECT","id":"s14_g2_sg0_i363"},{"actor":"_NOTE_","item":"It is recommended to select the FLAPS 1 3 NM before the final descent point. The aircraft should also decelerate. If the aircraft does not decelerate, the flight crew should consider the extension of the landing gear before the extension of speedbrakes. The extension of the speedbrakes at this point will cause an increase in VLS.","action":""},{"actor":"PILOT","item":"TCAS MODE selector","action":"TA or TA/RA","id":"s14_g2_sg0_i364"},{"actor":"_NOTE_","item":"It is recommended to use TA/RA for normal situations. If it is inappropriate, such as converging runways or parallel runways, the use of TA ONLY mode is recommended.","action":""}]},{"heading":"At 2 000 Feet AGL Minimum","level":2,"items":[{"actor":"PILOT","item":"FLAPS 2","action":"EXECUTE","id":"s14_g2_sg1_i365"},{"actor":"PILOT","item":"FLAPS 2","action":"SELECT","id":"s14_g2_sg1_i366"},{"actor":"_NOTE_","item":"The flight crew must notice a deceleration toward the F speed. The flight crew should consider extending the landing gear to reduce the airspeed. The use of speedbrakes is not recommended.","action":""}]},{"heading":"When Flaps Are at 2","level":2,"items":[{"actor":"PILOT","item":"L/G DOWN","action":"EXECUTE","id":"s14_g2_sg2_i367"},{"actor":"PILOT","item":"L/G lever","action":"SELECT DOWN","id":"s14_g2_sg2_i368"},{"actor":"PILOT","item":"AUTO BRK","action":"CONFIRM","id":"s14_g2_sg2_i369"},{"actor":"PILOT","item":"GROUND SPOILERS","action":"ARM","id":"s14_g2_sg2_i370"}]},{"heading":"Exterior Lights","level":2,"items":[{"actor":"PILOT","item":"NOSE switch","action":"T.O","id":"s14_g2_sg3_i371"},{"actor":"PILOT","item":"RWY TURN OFF switch","action":"ON","id":"s14_g2_sg3_i372"}]},{"heading":"When Landing Gear is Down","level":2,"items":[{"actor":"PILOT","item":"FLAPS 3","action":"EXECUTE","id":"s14_g2_sg4_i373"},{"actor":"PILOT","item":"FLAPS 3","action":"SELECT","id":"s14_g2_sg4_i374"},{"actor":"PILOT","item":"ECAM WHEEL SD page","action":"CHECK","id":"s14_g2_sg4_i375"},{"actor":"PILOT","item":"L/G lights","action":"CONFIRM THREE GREEN","id":"s14_g2_sg4_i376"},{"actor":"PILOT","item":"FLAPS FULL","action":"EXECUTE","id":"s14_g2_sg4_i377"},{"actor":"PILOT","item":"FLAPS FULL","action":"SELECT","id":"s14_g2_sg4_i378"},{"actor":"_NOTE_","item":"It is recommended to retract the speedbrakes before selecting the FLAPS full. This prevents the aircraft from pitching down when the speedbrakes retract automatically.","action":""},{"actor":"PILOT","item":"A/THR","action":"VERIFY IN SPEED MODE OR OFF","id":"s14_g2_sg4_i379"},{"actor":"PILOT","item":"WING ANTI-ICE pushbutton","action":"OFF","id":"s14_g2_sg4_i380"},{"actor":"_NOTE_","item":"Only turn the wing anti-ice ON when there are severe icing conditions.","action":""},{"actor":"PILOT","item":"SLIDING TABLE","action":"STOW","id":"s14_g2_sg4_i381"},{"actor":"PILOT","item":"ALL EFB","action":"STOW","id":"s14_g2_sg4_i382"},{"actor":"PILOT","item":"LDG MEMO","action":"VERIFY NO BLUE","id":"s14_g2_sg4_i383"},{"actor":"PILOT","item":"CABIN REPORT","action":"RECEIVE","id":"s14_g2_sg4_i384"},{"actor":"PILOT","item":"LANDING CHECKLIST","action":"COMPLETE","id":"s14_g2_sg4_i385"},{"actor":"PILOT","item":"FLIGHT PARAMETERS","action":"MONITOR","id":"s14_g2_sg4_i386"},{"actor":"_NOTE_","item":"The PF should announce any FMA modification. The PM should call out in the following conditions:","action":""},{"actor":"_BULLET_","item":"The speed goes lower than the speed target -5 kt, or greater than the speed target +10 kt;","action":""},{"actor":"_BULLET_","item":"The pitch attitude is lower than -2.5\u00b0 or greater than 7.5\u00b0;","action":""},{"actor":"_BULLET_","item":"The bank angle is greater than 7\u00b0;","action":""},{"actor":"_BULLET_","item":"The descent rate is greater than 1 000 ft/min.","action":""}]}]}]},{"title":"Approach \u2013 LOC G/S Guidance","groups":[{"heading":"Approach Using LOC G/S Guidance","level":1,"items":[],"subgroups":[{"heading":"Descent Preparation","level":2,"items":[{"actor":"PILOT","item":"APPROACH MINIMUM","action":"DETERMINE","id":"s15_g0_sg0_i387"},{"actor":"_NOTE_","item":"It is recommended to insert \u201cNO\u201d in the DH field of the MCDU to avoid any false auto callouts for a CAT III approach.","action":""}]},{"heading":"Initial / Intermediate Approach","level":2,"items":[{"actor":"PILOT","item":"APPR pushbutton","action":"PRESS","id":"s15_g0_sg1_i388"},{"actor":"_NOTE_","item":"The APPR should be activated when the aircraft is cleared for the approach, the aircraft is on the intercept trajectory for the final approach course, and the LOC deviation is available.","action":""},{"actor":"PILOT","item":"BOTH APs","action":"ENGAGE","id":"s15_g0_sg1_i389"},{"actor":"_NOTE_","item":"It is recommended to engage the AP1 and AP2 when the APPR mode is selected. The FMA will display CAT 1 above 5 000 feet AGL. Below 5 000 feet AGL, the FMA will display the intended approach.","action":""},{"actor":"PILOT","item":"LOC","action":"VERIFY ARMED","id":"s15_g0_sg1_i390"},{"actor":"PILOT","item":"G/S","action":"VERIFY ARMED","id":"s15_g0_sg1_i391"},{"actor":"PILOT","item":"LOC CAPTURE","action":"MONITOR","id":"s15_g0_sg1_i392"},{"actor":"PILOT","item":"G/S CAPTURE","action":"MONITOR","id":"s15_g0_sg1_i393"},{"actor":"PILOT","item":"GO-AROUND ALTITUDE","action":"SET","id":"s15_g0_sg1_i394"}]},{"heading":"Glide Interception from Above","level":2,"items":[{"actor":"PILOT","item":"APPR mode","action":"ARM / VERIFY ARMED","id":"s15_g0_sg2_i395"},{"actor":"PILOT","item":"FCU altitude","action":"SET ABOVE A/C ALTITUDE","id":"s15_g0_sg2_i396"},{"actor":"PILOT","item":"V/S MODE","action":"SELECT","id":"s15_g0_sg2_i397"},{"actor":"_NOTE_","item":"It is recommended to select a V/S of 1 500 ft/min. If the V/S is above 2 000 ft/min, the airspeed will increase toward VFE.","action":""}]},{"heading":"Final Approach","level":2,"items":[{"actor":"PILOT","item":"FLIGHT PARAMETERS","action":"MONITOR","id":"s15_g0_sg3_i398"},{"actor":"_NOTE_","item":"The PM should call out if \u00bd dot of LOC or GLIDE deviation.","action":""}]},{"heading":"At 350 ft RA","level":2,"items":[{"actor":"PILOT","item":"LAND mode","action":"VERIFY ENGAGED/ANNOUNCE","id":"s15_g0_sg4_i399"},{"actor":"_NOTE_","item":"If there is no LAND mode, the Autoland function is not authorized.","action":""}]},{"heading":"For CAT I, CAT II, CAT III with DH Approach","level":2,"items":[{"actor":"_NOTE_","item":"<b>At entered minimum + 100 ft</b>","action":""},{"actor":"PILOT","item":"ONE HUNDRED ABOVE","action":"MONITOR OR ANNOUNCE","id":"s15_g0_sg5_i400"},{"actor":"_NOTE_","item":"<b>At entered minimum</b>","action":""},{"actor":"PILOT","item":"MINIMUM","action":"MONITOR OR ANNOUNCE","id":"s15_g0_sg5_i401"},{"actor":"_BULLET_","item":"If visual references are sufficient:","action":""},{"actor":"PILOT","item":"CONTINUE","action":"VERIFY","id":"s15_g0_sg5_i402"},{"actor":"PILOT","item":"AP","action":"AS REQUIRED","id":"s15_g0_sg5_i403"},{"actor":"_BULLET_","item":"If visual references are not sufficient:","action":""},{"actor":"PILOT","item":"GO AROUND","action":"VERIFY","id":"s15_g0_sg5_i404"}]},{"heading":"For CAT III Without DH Approach","level":2,"items":[{"actor":"_NOTE_","item":"<b>At 100 ft (Alert height) if no failure</b>","action":""},{"actor":"PILOT","item":"CONTINUE","action":"VERIFY","id":"s15_g0_sg6_i405"}]},{"heading":"Degraded Guidance Procedures","level":2,"items":[{"actor":"_NOTE_","item":"<b>For CAT II, CAT III Operations</b>","action":""},{"actor":"_BULLET_","item":"In case of an amber caution, or landing capability degradation.","action":""},{"actor":"_NOTE_","item":"<b>Above 1 000 ft:</b>","action":""},{"actor":"PILOT","item":"ECAM / QRH PROCEDURE","action":"COMPLETE","id":"s15_g0_sg7_i406"},{"actor":"PILOT","item":"REQUIRED EQUIPMENT","action":"VERIFY","id":"s15_g0_sg7_i407"},{"actor":"PILOT","item":"APPROACH AND LANDING CAPABILITY","action":"VERIFY","id":"s15_g0_sg7_i408"},{"actor":"_NOTE_","item":"<i>If required:</i>","action":""},{"actor":"PILOT","item":"RVR","action":"VERIFY","id":"s15_g0_sg7_i409"},{"actor":"PILOT","item":"DH","action":"ADJUST","id":"s15_g0_sg7_i410"},{"actor":"_BULLET_","item":"If the flight crew does not complete all the above actions above 1 000 feet:","action":""},{"actor":"PILOT","item":"GO AROUND","action":"PERFORM","id":"s15_g0_sg7_i411"},{"actor":"_NOTE_","item":"<b>Below 1 000 ft:</b>","action":""},{"actor":"_BULLET_","item":"If external visual is not sufficient:","action":""},{"actor":"PILOT","item":"GO AROUND","action":"PERFORM","id":"s15_g0_sg7_i412"},{"actor":"_NOTE_","item":"<b>Below 100 feet (Alert height) for CAT 3 DUAL:</b>","action":""},{"actor":"_BULLET_","item":"In the case of Autoland warning light, if visual references not sufficient:","action":""},{"actor":"PILOT","item":"GO AROUND","action":"PERFORM","id":"s15_g0_sg7_i413"},{"actor":"_BULLET_","item":"If visual references are sufficient:","action":""},{"actor":"PILOT","item":"LANDING","action":"PERFORM","id":"s15_g0_sg7_i414"}]}]}]},{"title":"Approach \u2013 Final APP Guidance","groups":[{"heading":"Approach Using Final APP Guidance","level":1,"items":[],"subgroups":[{"heading":"Descent Preparation","level":2,"items":[{"actor":"PILOT","item":"WEATHER AND LANDING INFORMATION","action":"OBTAIN","id":"s16_g0_sg0_i415"},{"actor":"_NOTE_","item":"It is not recommended to use the vertical managed guidance if the OAT is below the minimum temperature indicated on the chart or when the temperature corrections are required.","action":""},{"actor":"PILOT","item":"F-PLN A page","action":"VERIFY","id":"s16_g0_sg0_i416"},{"actor":"_NOTE_","item":"It is not recommended to use FINAL APP guidance if a TOO STEEP PATH is displayed after the Final Descent Point.","action":""},{"actor":"PILOT","item":"PROG page","action":"COMPLETE","id":"s16_g0_sg0_i417"},{"actor":"_NOTE_","item":"Insert the reference runway threshold in the BRG/DIST field. This allows the monitoring of position during approach.","action":""},{"actor":"PILOT","item":"GO-AROUND STRATEGY","action":"REVIEW","id":"s16_g0_sg0_i418"}]},{"heading":"Descent","level":2,"items":[{"actor":"_NOTE_","item":"<b>At 10 000 feet:</b>","action":""},{"actor":"PILOT","item":"NAV ACCURACY","action":"VERIFY","id":"s16_g0_sg1_i419"},{"actor":"_NOTE_","item":"If the nav accuracy is low, it is recommended to use TRK FPA mode for approach.","action":""},{"actor":"_BULLET_","item":"For RNAV (GNSS) approach:","action":""},{"actor":"PILOT","item":"GPS PRIMARY","action":"VERIFY","id":"s16_g0_sg1_i420"},{"actor":"_NOTE_","item":"The GPS PRIMARY must be available on at least one FMS.","action":""},{"actor":"PILOT","item":"BARO REF","action":"SET","id":"s16_g0_sg1_i421"}]},{"heading":"Initial / Intermediate / Final Approach","level":2,"items":[{"actor":"PILOT","item":"POSITION","action":"MONITOR","id":"s16_g0_sg2_i422"},{"actor":"PILOT","item":"APPR pushbutton","action":"PRESS","id":"s16_g0_sg2_i423"},{"actor":"_NOTE_","item":"Turn on the APPR mode only when the aircraft is cleared for approach and the TO waypoint is the Final Descent Point.","action":""},{"actor":"PILOT","item":"APP NAV","action":"VERIFY ARMED or ENGAGED","id":"s16_g0_sg2_i424"},{"actor":"PILOT","item":"FINAL","action":"VERIFY ARMED","id":"s16_g0_sg2_i425"},{"actor":"_NOTE_","item":"Verify that the V/DEV scale is displayed on the PFD. Ensure the display of a blue arrow on ND. This indicates that FINAL APP engagement conditions are fulfilled.","action":""}]},{"heading":"At the Final Descent Point","level":2,"items":[{"actor":"PILOT","item":"FINAL APP","action":"VERIFY ENGAGED","id":"s16_g0_sg3_i426"},{"actor":"PILOT","item":"GO AROUND ALTITUDE","action":"SET","id":"s16_g0_sg3_i427"},{"actor":"PILOT","item":"FLIGHT PARAMETERS","action":"MONITOR","id":"s16_g0_sg3_i428"}]},{"heading":"At Entered Minimum + 100 feet","level":2,"items":[{"actor":"PILOT","item":"ONE HUNDRED ABOVE","action":"MONITOR OR ANNOUNCE","id":"s16_g0_sg4_i429"}]},{"heading":"At Entered Minimum","level":2,"items":[{"actor":"PILOT","item":"MINIMUM","action":"MONITOR OR ANNOUNCE","id":"s16_g0_sg5_i430"},{"actor":"_BULLET_","item":"If visual references are sufficient:","action":""},{"actor":"PILOT","item":"CONTINUE","action":"VERIFY","id":"s16_g0_sg5_i431"},{"actor":"_BULLET_","item":"At the latest at the MAP or Minimum Use Height of the AP (whichever occurs first):","action":""},{"actor":"PILOT","item":"AP","action":"OFF","id":"s16_g0_sg5_i432"},{"actor":"PILOT","item":"FD","action":"AS REQUIRED","id":"s16_g0_sg5_i433"},{"actor":"_BULLET_","item":"If visual references are not sufficient:","action":""},{"actor":"PILOT","item":"GO AROUND","action":"VERIFY","id":"s16_g0_sg5_i434"}]}]}]},{"title":"Approach \u2013 FPA Guidance","groups":[{"heading":"Approach Using FPA Guidance","level":1,"items":[],"subgroups":[{"heading":"Descent Preparation","level":2,"items":[{"actor":"PILOT","item":"F-PLN A page","action":"VERIFY","id":"s17_g0_sg0_i435"},{"actor":"_NOTE_","item":"It is recommended to disregard the V/DEV information on the PFD if the message TOO STEEP PATH is displayed after the Final Descent Point. For the approaches using the NAV FPA mode, 1 degree of difference between the MCDU and the charted final lateral track is acceptable. For conventional radio NAVAID approach, 3 degrees of difference between the MCDU and the charted final lateral track is acceptable. For all other cases, it is recommended to use TRK FPA mode.","action":""},{"actor":"PILOT","item":"PROG page","action":"COMPLETE","id":"s17_g0_sg0_i436"},{"actor":"_NOTE_","item":"Insert the reference runway threshold in the BRG/DIST field. This allows the monitoring of position during approach.","action":""},{"actor":"PILOT","item":"GO AROUND STRATEGY","action":"REVIEW","id":"s17_g0_sg0_i437"}]},{"heading":"Descent","level":2,"items":[{"actor":"_NOTE_","item":"<b>At 10 000 feet:</b>","action":""},{"actor":"PILOT","item":"NAV ACCURACY","action":"VERIFY","id":"s17_g0_sg1_i438"},{"actor":"_NOTE_","item":"If the nav accuracy is low, it is recommended to use TRK FPA mode for approach.","action":""},{"actor":"_BULLET_","item":"For RNAV (GNSS) approach:","action":""},{"actor":"PILOT","item":"GPS PRIMARY","action":"VERIFY","id":"s17_g0_sg1_i439"},{"actor":"_NOTE_","item":"The GPS PRIMARY must be available on at least one FMS.","action":""}]},{"heading":"Initial / Intermediate / Final Approach","level":2,"items":[{"actor":"PILOT","item":"LATERAL GUIDANCE MODE","action":"SET FOR APPROACH","id":"s17_g0_sg2_i440"},{"actor":"_NOTE_","item":"Arm the NAV or LOC mode as appropriate.","action":""},{"actor":"_BULLET_","item":"For LOC ONLY and ILS G/S OUT:","action":""},{"actor":"PILOT","item":"LOC pushbutton","action":"PRESS","id":"s17_g0_sg2_i441"},{"actor":"_NOTE_","item":"It is recommended to press the LOC pushbutton when cleared for approach and the aircraft is on the intercept trajectory for the final approach course.","action":""},{"actor":"PILOT","item":"LOC","action":"VERIFY ARMED","id":"s17_g0_sg2_i442"},{"actor":"_BULLET_","item":"For back course localizer approaches:","action":""},{"actor":"PILOT","item":"TRK FPA MODE","action":"USE FOR APPROACH","id":"s17_g0_sg2_i443"},{"actor":"PILOT","item":"LATERAL PATH","action":"INTERCEPT","id":"s17_g0_sg2_i444"},{"actor":"_NOTE_","item":"The flight crew should monitor the NAV or LOC engagement.","action":""},{"actor":"PILOT","item":"TRK FPA pushbutton","action":"SELECT","id":"s17_g0_sg2_i445"},{"actor":"PILOT","item":"FPA FOR FINAL APPROACH","action":"SET","id":"s17_g0_sg2_i446"}]},{"heading":"At 0.3 NM from the Final Descent Point","level":2,"items":[{"actor":"PILOT","item":"FPA selector","action":"PULL","id":"s17_g0_sg3_i447"},{"actor":"PILOT","item":"FPA MODE","action":"VERIFY ENGAGED","i   function parseCallsign(raw) {
    if (!raw) return null;
    const clean = String(raw).trim().toUpperCase().replace(/\s+/g, "");
    if (!clean) return null;
    const m = clean.match(/^([A-Z]{3})([A-Z0-9]*)$/);
    if (!m) return { display: clean, icao: null, rest: null, name: null };
    const icao = m[1];
    const rest = m[2];
    return { display: clean, icao, rest, name: AIRLINE_CALLSIGNS[icao] || null };
  }

    state.myRole = null;

    for (const r of Object.keys(state.roles || {})) {
